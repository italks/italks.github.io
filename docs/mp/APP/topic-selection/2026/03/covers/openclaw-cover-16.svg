<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 383">
  <!-- 背景 -->
  <rect width="900" height="383" fill="#FAFAFA"/>
  
  <!-- 左侧彩色边条 - 实战篇紫色 -->
  <rect width="8" height="383" fill="#9C27B0"/>
  
  <!-- 右上角 Logo -->
  <rect x="750" y="20" width="130" height="40" rx="5" fill="#0066CC" opacity="0.1"/>
  <text x="815" y="47" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0066CC" text-anchor="middle">OpenClaw</text>
  
  <!-- 主标题 -->
  <text x="450" y="120" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#333333" text-anchor="middle">个人知识库自动整理</text>
  
  <!-- 副标题 -->
  <text x="450" y="170" font-family="Arial, sans-serif" font-size="28" fill="#666666" text-anchor="middle">实战案例 04</text>
  
  <!-- 左侧:杂乱的文件和笔记 -->
  <g transform="translate(120, 190)">
    <!-- 散乱的文件 -->
    <rect x="0" y="20" width="80" height="100" rx="3" fill="#BDBDBD" transform="rotate(-15, 40, 70)"/>
    <rect x="30" y="10" width="80" height="100" rx="3" fill="#9E9E9E" transform="rotate(5, 70, 60)"/>
    <rect x="60" y="30" width="80" height="100" rx="3" fill="#757575" transform="rotate(-8, 100, 80)"/>
    
    <!-- 笔记图标 -->
    <rect x="20" y="120" width="70" height="50" rx="5" fill="#FFA726" transform="rotate(10, 55, 145)"/>
    <rect x="80" y="110" width="70" height="50" rx="5" fill="#42A5F5" transform="rotate(-5, 115, 135)"/>
    
    <!-- 问号 -->
    <text x="75" y="30" font-family="Arial, sans-serif" font-size="24" fill="#FF5722">?</text>
  </g>
  
  <!-- 中央:魔法棒 -->
  <g transform="translate(380, 230)">
    <rect x="0" y="0" width="80" height="12" rx="3" fill="#9C27B0" transform="rotate(45, 40, 6)"/>
    <polygon points="60,-30 75,-15 60,0 45,-15" fill="#FFD700"/>
    <!-- 星星 -->
    <text x="20" y="-10" font-family="Arial, sans-serif" font-size="20" fill="#FFD700">✨</text>
    <text x="70" y="20" font-family="Arial, sans-serif" font-size="16" fill="#FFD700">✨</text>
  </g>
  
  <!-- 右侧:整齐的书架/文件夹 -->
  <g transform="translate(550, 190)">
    <!-- 书架框架 -->
    <rect x="0" y="0" width="250" height="160" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="2"/>
    
    <!-- 分隔层 -->
    <line x1="0" y1="53" x2="250" y2="53" stroke="#E0E0E0" stroke-width="1"/>
    <line x1="0" y1="106" x2="250" y2="106" stroke="#E0E0E0" stroke-width="1"/>
    
    <!-- 第一层:文件夹 -->
    <rect x="10" y="10" width="50" height="35" rx="3" fill="#4CAF50"/>
    <text x="35" y="32" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle">编程</text>
    
    <rect x="70" y="10" width="50" height="35" rx="3" fill="#2196F3"/>
    <text x="95" y="32" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle">设计</text>
    
    <rect x="130" y="10" width="50" height="35" rx="3" fill="#FF9800"/>
    <text x="155" y="32" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle">管理</text>
    
    <rect x="190" y="10" width="50" height="35" rx="3" fill="#9C27B0"/>
    <text x="215" y="32" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle">效率</text>
    
    <!-- 第二层:书籍 -->
    <rect x="15" y="63" width="35" height="35" rx="2" fill="#E91E63"/>
    <rect x="55" y="63" width="35" height="35" rx="2" fill="#00BCD4"/>
    <rect x="95" y="63" width="35" height="35" rx="2" fill="#FFC107"/>
    <rect x="135" y="63" width="35" height="35" rx="2" fill="#795548"/>
    <rect x="175" y="63" width="35" height="35" rx="2" fill="#607D8B"/>
    <rect x="215" y="63" width="25" height="35" rx="2" fill="#9E9E9E"/>
    
    <!-- 第三层:标签 -->
    <rect x="10" y="116" width="70" height="35" rx="5" fill="#E3F2FD"/>
    <text x="45" y="138" font-family="Arial, sans-serif" font-size="10" fill="#2196F3" text-anchor="middle">标签索引</text>
    
    <rect x="90" y="116" width="70" height="35" rx="5" fill="#FFF3E0"/>
    <text x="125" y="138" font-family="Arial, sans-serif" font-size="10" fill="#FF9800" text-anchor="middle">全文搜索</text>
    
    <rect x="170" y="116" width="70" height="35" rx="5" fill="#F3E5F5"/>
    <text x="205" y="138" font-family="Arial, sans-serif" font-size="10" fill="#9C27B0" text-anchor="middle">智能分类</text>
  </g>
  
  <!-- 右下角标签 -->
  <rect x="760" y="340" width="120" height="30" rx="15" fill="#9C27B0" opacity="0.2"/>
  <text x="820" y="360" font-family="Arial, sans-serif" font-size="14" fill="#9C27B0" text-anchor="middle" font-weight="bold">#实战篇 16/19</text>
</svg>
