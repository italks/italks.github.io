<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 383">
  <!-- 背景 -->
  <rect width="900" height="383" fill="#1A237E"/>
  
  <!-- 左侧彩色边条 - 实战篇紫色 -->
  <rect width="8" height="383" fill="#9C27B0"/>
  
  <!-- 右上角 Logo -->
  <rect x="750" y="20" width="130" height="40" rx="5" fill="#0066CC" opacity="0.3"/>
  <text x="815" y="47" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">OpenClaw</text>
  
  <!-- 主标题 -->
  <text x="450" y="120" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#FFFFFF" text-anchor="middle">竞品信息自动监控</text>
  
  <!-- 副标题 -->
  <text x="450" y="170" font-family="Arial, sans-serif" font-size="28" fill="#B3E5FC" text-anchor="middle">实战案例 03</text>
  
  <!-- 中央:雷达/监控图标 -->
  <g transform="translate(350, 190)">
    <circle cx="100" cy="90" r="80" fill="none" stroke="#00BCD4" stroke-width="3" opacity="0.3"/>
    <circle cx="100" cy="90" r="60" fill="none" stroke="#00BCD4" stroke-width="2" opacity="0.5"/>
    <circle cx="100" cy="90" r="40" fill="none" stroke="#00BCD4" stroke-width="2" opacity="0.7"/>
    <circle cx="100" cy="90" r="20" fill="#00BCD4" opacity="0.9"/>
    
    <!-- 扫描线 -->
    <line x1="100" y1="90" x2="100" y2="10" stroke="#00BCD4" stroke-width="2" opacity="0.8"/>
    <line x1="100" y1="90" x2="180" y2="90" stroke="#00BCD4" stroke-width="2" opacity="0.8"/>
    
    <!-- 目标点 -->
    <circle cx="130" cy="50" r="6" fill="#FF6600"/>
    <circle cx="60" cy="120" r="6" fill="#FF6600"/>
    <circle cx="140" cy="130" r="6" fill="#FF6600"/>
  </g>
  
  <!-- 周围:竞品网站缩略图 -->
  <g transform="translate(100, 200)">
    <rect x="0" y="0" width="80" height="60" rx="5" fill="#FFFFFF" opacity="0.2"/>
    <text x="40" y="35" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle">竞品A</text>
  </g>
  
  <g transform="translate(720, 200)">
    <rect x="0" y="0" width="80" height="60" rx="5" fill="#FFFFFF" opacity="0.2"/>
    <text x="40" y="35" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle">竞品B</text>
  </g>
  
  <g transform="translate(100, 300)">
    <rect x="0" y="0" width="80" height="60" rx="5" fill="#FFFFFF" opacity="0.2"/>
    <text x="40" y="35" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle">竞品C</text>
  </g>
  
  <g transform="translate(720, 300)">
    <rect x="0" y="0" width="80" height="60" rx="5" fill="#FFFFFF" opacity="0.2"/>
    <text x="40" y="35" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle">竞品D</text>
  </g>
  
  <!-- 连接线 -->
  <line x1="140" y1="230" x2="350" y2="270" stroke="#00BCD4" stroke-width="1" stroke-dasharray="5,5" opacity="0.5"/>
  <line x1="760" y1="230" x2="550" y2="270" stroke="#00BCD4" stroke-width="1" stroke-dasharray="5,5" opacity="0.5"/>
  
  <!-- 右下角标签 -->
  <rect x="760" y="340" width="120" height="30" rx="15" fill="#9C27B0" opacity="0.3"/>
  <text x="820" y="360" font-family="Arial, sans-serif" font-size="14" fill="#9C27B0" text-anchor="middle" font-weight="bold">#实战篇 15/19</text>
</svg>
