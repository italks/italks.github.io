<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 383">
  <!-- 背景 -->
  <rect width="900" height="383" fill="#E3F2FD"/>
  
  <!-- 左侧彩色边条 - 入门篇绿色 -->
  <rect width="8" height="383" fill="#4CAF50"/>
  
  <!-- 右上角 Logo -->
  <rect x="750" y="20" width="130" height="40" rx="5" fill="#0066CC" opacity="0.1"/>
  <text x="815" y="47" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0066CC" text-anchor="middle">OpenClaw</text>
  
  <!-- 主标题 -->
  <text x="450" y="120" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#333333" text-anchor="middle">OpenClaw 能干什么?</text>
  
  <!-- 副标题 -->
  <text x="450" y="170" font-family="Arial, sans-serif" font-size="28" fill="#666666" text-anchor="middle">9大应用场景全解析</text>
  
  <!-- 9宫格图标布局 -->
  <g transform="translate(180, 200)">
    <!-- 第一行 -->
    <!-- PDF -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="70" height="70" rx="10" fill="#FF5722" opacity="0.9"/>
      <text x="35" y="45" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">PDF</text>
    </g>
    
    <!-- Excel -->
    <g transform="translate(90, 0)">
      <rect x="0" y="0" width="70" height="70" rx="10" fill="#4CAF50" opacity="0.9"/>
      <text x="35" y="45" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Excel</text>
    </g>
    
    <!-- Word -->
    <g transform="translate(180, 0)">
      <rect x="0" y="0" width="70" height="70" rx="10" fill="#2196F3" opacity="0.9"/>
      <text x="35" y="45" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Word</text>
    </g>
    
    <!-- 第二行 -->
    <!-- PPT -->
    <g transform="translate(270, 0)">
      <rect x="0" y="0" width="70" height="70" rx="10" fill="#FF9800" opacity="0.9"/>
      <text x="35" y="45" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">PPT</text>
    </g>
    
    <!-- 浏览器 -->
    <g transform="translate(360, 0)">
      <rect x="0" y="0" width="70" height="70" rx="10" fill="#9C27B0" opacity="0.9"/>
      <text x="35" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">浏览器</text>
      <text x="35" y="52" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">自动化</text>
    </g>
    
    <!-- 第三行 -->
    <!-- 邮件 -->
    <g transform="translate(0, 90)">
      <rect x="0" y="0" width="70" height="70" rx="10" fill="#00BCD4" opacity="0.9"/>
      <text x="35" y="45" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">邮件</text>
    </g>
    
    <!-- 代码 -->
    <g transform="translate(90, 90)">
      <rect x="0" y="0" width="70" height="70" rx="10" fill="#3F51B5" opacity="0.9"/>
      <text x="35" y="45" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">代码</text>
    </g>
    
    <!-- 文件 -->
    <g transform="translate(180, 90)">
      <rect x="0" y="0" width="70" height="70" rx="10" fill="#795548" opacity="0.9"/>
      <text x="35" y="45" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">文件</text>
    </g>
    
    <!-- AI -->
    <g transform="translate(270, 90)">
      <rect x="0" y="0" width="70" height="70" rx="10" fill="#E91E63" opacity="0.9"/>
      <text x="35" y="45" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">AI</text>
    </g>
    
    <!-- 更多 -->
    <g transform="translate(360, 90)">
      <rect x="0" y="0" width="70" height="70" rx="10" fill="#0066CC" opacity="0.9"/>
      <text x="35" y="45" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">...</text>
    </g>
  </g>
  
  <!-- 右下角标签 -->
  <rect x="760" y="340" width="120" height="30" rx="15" fill="#4CAF50" opacity="0.2"/>
  <text x="820" y="360" font-family="Arial, sans-serif" font-size="14" fill="#4CAF50" text-anchor="middle" font-weight="bold">#入门篇 02/19</text>
</svg>
