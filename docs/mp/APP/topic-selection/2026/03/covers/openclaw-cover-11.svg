<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 383">
  <!-- 背景 -->
  <rect width="900" height="383" fill="#1A237E"/>
  
  <!-- 左侧彩色边条 - 进阶篇橙色 -->
  <rect width="8" height="383" fill="#FF9800"/>
  
  <!-- 右上角 Logo -->
  <rect x="750" y="20" width="130" height="40" rx="5" fill="#0066CC" opacity="0.3"/>
  <text x="815" y="47" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">OpenClaw</text>
  
  <!-- 主标题 -->
  <text x="450" y="120" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#FFFFFF" text-anchor="middle">技能组合拳</text>
  
  <!-- 副标题 -->
  <text x="450" y="170" font-family="Arial, sans-serif" font-size="28" fill="#B3E5FC" text-anchor="middle">多个技能协同完成复杂任务</text>
  
  <!-- 三个技能图标用箭头串联 -->
  <!-- PDF技能 -->
  <g transform="translate(150, 200)">
    <circle cx="75" cy="75" r="70" fill="#FF5722" opacity="0.9"/>
    <text x="75" y="85" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">pdf</text>
  </g>
  
  <!-- 箭头1 -->
  <path d="M 310 275 L 370 275" stroke="#FFD700" stroke-width="6" fill="none" marker-end="url(#arrowhead11)"/>
  
  <!-- XLSX技能 -->
  <g transform="translate(375, 200)">
    <circle cx="75" cy="75" r="70" fill="#4CAF50" opacity="0.9"/>
    <text x="75" y="85" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">xlsx</text>
  </g>
  
  <!-- 箭头2 -->
  <path d="M 535 275 L 595 275" stroke="#FFD700" stroke-width="6" fill="none" marker-end="url(#arrowhead11)"/>
  
  <!-- PPTX技能 -->
  <g transform="translate(600, 200)">
    <circle cx="75" cy="75" r="70" fill="#FF9800" opacity="0.9"/>
    <text x="75" y="85" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">pptx</text>
  </g>
  
  <defs>
    <marker id="arrowhead11" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#FFD700"/>
    </marker>
  </defs>
  
  <!-- 齿轮装饰 -->
  <g transform="translate(100, 100)" opacity="0.3">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#FFFFFF" stroke-width="8"/>
    <circle cx="0" cy="0" r="15" fill="#FFFFFF"/>
  </g>
  
  <g transform="translate(800, 320)" opacity="0.3">
    <circle cx="0" cy="0" r="25" fill="none" stroke="#FFFFFF" stroke-width="6"/>
    <circle cx="0" cy="0" r="12" fill="#FFFFFF"/>
  </g>
  
  <!-- 右下角标签 -->
  <rect x="760" y="340" width="120" height="30" rx="15" fill="#FF9800" opacity="0.3"/>
  <text x="820" y="360" font-family="Arial, sans-serif" font-size="14" fill="#FF9800" text-anchor="middle" font-weight="bold">#进阶篇 11/19</text>
</svg>
