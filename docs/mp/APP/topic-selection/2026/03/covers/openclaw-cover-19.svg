<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 383">
  <!-- 背景 -->
  <rect width="900" height="383" fill="#1A237E"/>
  
  <!-- 左侧彩色边条 - 高级篇红色 -->
  <rect width="8" height="383" fill="#F44336"/>
  
  <!-- 右上角 Logo -->
  <rect x="750" y="20" width="130" height="40" rx="5" fill="#0066CC" opacity="0.3"/>
  <text x="815" y="47" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">OpenClaw</text>
  
 
  
  <!-- 中央:OpenClaw Logo -->
  <g transform="translate(375, 200)">
    <circle cx="75" cy="75" r="70" fill="#0066CC"/>
    <circle cx="75" cy="75" r="60" fill="#FFFFFF" opacity="0.1"/>
    <text x="75" y="85" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#FFFFFF" text-anchor="middle">OC</text>
  </g>
  
  <!-- 周围环绕的工具图标 -->
  <!-- ChatGPT -->
  <g transform="translate(150, 150)">
    <circle cx="40" cy="40" r="35" fill="#10A37F"/>
    <text x="40" y="48" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">GPT</text>
  </g>
  <line x1="195" y1="185" x2="375" y2="250" stroke="#10A37F" stroke-width="2" opacity="0.5"/>
  
  <!-- 企业微信 -->
  <g transform="translate(650, 150)">
    <circle cx="40" cy="40" r="35" fill="#5B5BFF"/>
    <text x="40" y="48" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">企微</text>
  </g>
  <line x1="650" y1="185" x2="525" y2="250" stroke="#5B5BFF" stroke-width="2" opacity="0.5"/>
  
  <!-- GitHub -->
  <g transform="translate(150, 280)">
    <circle cx="40" cy="40" r="35" fill="#24292E"/>
    <text x="40" y="48" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">GH</text>
  </g>
  <line x1="195" y1="305" x2="375" y2="280" stroke="#24292E" stroke-width="2" opacity="0.5"/>
  
  <!-- 阿里云 -->
  <g transform="translate(650, 280)">
    <circle cx="40" cy="40" r="35" fill="#FF6A00"/>
    <text x="40" y="48" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">阿里云</text>
  </g>
  <line x1="650" y1="305" x2="525" y2="280" stroke="#FF6A00" stroke-width="2" opacity="0.5"/>
  
  <!-- AWS -->
  <g transform="translate(300, 50)">
    <circle cx="20" cy="100" r="28" fill="#FF9900"/>
    <text x="20" y="110" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">AWS</text>
  </g>
  <line x1="330" y1="140" x2="420" y2="200" stroke="#FF9900" stroke-width="2" opacity="0.5"/>
  
  <!-- Slack -->
  <g transform="translate(500, 50)">
    <circle cx="80" cy="100" r="28" fill="#4A154B"/>
    <text x="80" y="110" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Slack</text>
  </g>
  <line x1="600" y1="160" x2="480" y2="200" stroke="#4A154B" stroke-width="2" opacity="0.5"/>
  
  <!-- 更多工具 -->
  <g transform="translate(300, 320)">
    <circle cx="30" cy="30" r="28" fill="#9E9E9E"/>
    <text x="30" y="38" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">...</text>
  </g>
  <line x1="330" y1="320" x2="420" y2="280" stroke="#9E9E9E" stroke-width="2" opacity="0.5"/>
  
  <g transform="translate(500, 320)">
    <circle cx="30" cy="30" r="28" fill="#9E9E9E"/>
    <text x="30" y="38" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">...</text>
  </g>
  <line x1="500" y1="320" x2="480" y2="280" stroke="#9E9E9E" stroke-width="2" opacity="0.5"/>
   <!-- 主标题 -->
  <text x="450" y="120" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#FFFFFF" text-anchor="middle">OpenClaw与其他工具集成</text>
  
  <!-- 副标题 -->
  <text x="450" y="170" font-family="Arial, sans-serif" font-size="28" fill="#B3E5FC" text-anchor="middle">融入现有工作流</text>
  <!-- 右下角标签 -->
  <rect x="760" y="340" width="120" height="30" rx="15" fill="#F44336" opacity="0.3"/>
  <text x="820" y="360" font-family="Arial, sans-serif" font-size="14" fill="#F44336" text-anchor="middle" font-weight="bold">#高级篇 19/19</text>
</svg>
