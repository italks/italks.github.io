<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 383">
  <!-- 背景 -->
  <rect width="900" height="383" fill="#E3F2FD"/>
  
  <!-- 左侧彩色边条 - 进阶篇橙色 -->
  <rect width="8" height="383" fill="#FF9800"/>
  
  <!-- 右上角 Logo -->
  <rect x="750" y="20" width="130" height="40" rx="5" fill="#0066CC" opacity="0.1"/>
  <text x="815" y="47" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0066CC" text-anchor="middle">OpenClaw</text>
  
  <!-- 主标题 -->
  <text x="450" y="120" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#333333" text-anchor="middle">浏览器自动化</text>
  
  <!-- 副标题 -->
  <text x="450" y="170" font-family="Arial, sans-serif" font-size="28" fill="#666666" text-anchor="middle">让OpenClaw帮你"上网办事"</text>
  
  <!-- 中央:浏览器窗口 -->
  <g transform="translate(250, 190)">
    <!-- 浏览器外框 -->
    <rect x="0" y="0" width="400" height="170" rx="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="2"/>
    
    <!-- 浏览器顶栏 -->
    <rect x="0" y="0" width="400" height="40" rx="10" fill="#F5F5F5"/>
    <circle cx="20" cy="20" r="6" fill="#FF5F56"/>
    <circle cx="40" cy="20" r="6" fill="#FFBD2E"/>
    <circle cx="60" cy="20" r="6" fill="#27C93F"/>
    
    <!-- 地址栏 -->
    <rect x="80" y="10" width="300" height="20" rx="3" fill="#FFFFFF" stroke="#E0E0E0"/>
    <text x="230" y="24" font-family="Arial, sans-serif" font-size="10" fill="#999999" text-anchor="middle">https://example.com</text>
    
    <!-- 网页内容 -->
    <rect x="10" y="50" width="380" height="110" fill="#FAFAFA"/>
    <rect x="20" y="60" width="100" height="40" fill="#E3F2FD"/>
    <rect x="130" y="60" width="250" height="20" fill="#E0E0E0"/>
    <rect x="130" y="90" width="200" height="10" fill="#EEEEEE"/>
    <rect x="20" y="110" width="360" height="40" fill="#FFF3E0"/>
    
    <!-- 机器人手臂 -->
    <g transform="translate(280, 80)">
      <rect x="0" y="0" width="50" height="15" rx="5" fill="#9C27B0"/>
      <circle cx="50" cy="7" r="10" fill="#9C27B0"/>
      <rect x="55" y="3" width="30" height="8" rx="2" fill="#9C27B0"/>
      <text x="40" y="5" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF">AI</text>
    </g>
  </g>
  
  <!-- 装饰:网页元素图标 -->
  <g transform="translate(100, 220)" opacity="0.5">
    <rect x="0" y="0" width="40" height="40" rx="5" fill="#0066CC"/>
    <text x="20" y="25" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle">表单</text>
  </g>
  
  <g transform="translate(760, 220)" opacity="0.5">
    <rect x="0" y="0" width="40" height="40" rx="5" fill="#0066CC"/>
    <text x="20" y="25" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle">数据</text>
  </g>
  
  <!-- 右下角标签 -->
  <rect x="760" y="340" width="120" height="30" rx="15" fill="#FF9800" opacity="0.2"/>
  <text x="820" y="360" font-family="Arial, sans-serif" font-size="14" fill="#FF9800" text-anchor="middle" font-weight="bold">#进阶篇 10/19</text>
</svg>
