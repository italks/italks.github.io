<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 383">
  <!-- 背景 -->
  <rect width="900" height="383" fill="#E3F2FD"/>
  
  <!-- 左侧彩色边条 - 实战篇紫色 -->
  <rect width="8" height="383" fill="#9C27B0"/>
  
  <!-- 右上角 Logo -->
  <rect x="750" y="20" width="130" height="40" rx="5" fill="#0066CC" opacity="0.1"/>
  <text x="815" y="47" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0066CC" text-anchor="middle">OpenClaw</text>
  
  <!-- 主标题 -->
  <text x="450" y="120" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#333333" text-anchor="middle">客户资料批量处理</text>
  
  <!-- 副标题 -->
  <text x="450" y="170" font-family="Arial, sans-serif" font-size="28" fill="#666666" text-anchor="middle">实战案例 02</text>
  
  <!-- 左侧:多个PDF文件堆叠 -->
  <g transform="translate(150, 180)">
    <!-- PDF 1 -->
    <rect x="0" y="0" width="100" height="130" rx="5" fill="#FF5722" opacity="0.7"/>
    <text x="50" y="70" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">PDF</text>
    
    <!-- PDF 2 -->
    <rect x="20" y="10" width="100" height="130" rx="5" fill="#FF5722" opacity="0.8"/>
    <text x="70" y="80" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">PDF</text>
    
    <!-- PDF 3 -->
    <rect x="40" y="20" width="100" height="130" rx="5" fill="#FF5722" opacity="0.9"/>
    <text x="90" y="90" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">PDF</text>
    
    <!-- 更多PDF提示 -->
    <text x="90" y="170" font-family="Arial, sans-serif" font-size="12" fill="#666666" text-anchor="middle">100+ 文件</text>
  </g>
  
  <!-- 中央:批量处理图标 -->
  <g transform="translate(350, 220)">
    <rect x="0" y="0" width="80" height="80" rx="10" fill="#9C27B0"/>
    <rect x="15" y="15" width="50" height="8" rx="2" fill="#FFFFFF"/>
    <rect x="15" y="28" width="40" height="8" rx="2" fill="#FFFFFF"/>
    <rect x="15" y="41" width="50" height="8" rx="2" fill="#FFFFFF"/>
    <rect x="15" y="54" width="35" height="8" rx="2" fill="#FFFFFF"/>
    <!-- 对勾 -->
    <circle cx="65" cy="65" r="15" fill="#4CAF50"/>
    <path d="M 58 65 L 62 69 L 72 59" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- 箭头 -->
  <path d="M 280 270 L 340 270" stroke="#9C27B0" stroke-width="4" fill="none" marker-end="url(#arrowhead14)"/>
  <path d="M 440 270 L 500 270" stroke="#9C27B0" stroke-width="4" fill="none" marker-end="url(#arrowhead14)"/>
  
  <!-- 右侧:Excel表格 -->
  <g transform="translate(500, 180)">
    <rect x="0" y="0" width="250" height="160" rx="8" fill="#FFFFFF" stroke="#4CAF50" stroke-width="3"/>
    <!-- 表头 -->
    <rect x="0" y="0" width="250" height="40" fill="#4CAF50"/>
    <text x="50" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">合同编号</text>
    <text x="150" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">甲方</text>
    <text x="220" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">金额</text>
    
    <!-- 数据行 -->
    <line x1="0" y1="40" x2="250" y2="40" stroke="#E0E0E0" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="160" stroke="#E0E0E0" stroke-width="1"/>
    <line x1="180" y1="0" x2="180" y2="160" stroke="#E0E0E0" stroke-width="1"/>
    
    <text x="50" y="65" font-family="Arial, sans-serif" font-size="10" fill="#333333" text-anchor="middle">HT-001</text>
    <text x="150" y="65" font-family="Arial, sans-serif" font-size="10" fill="#333333" text-anchor="middle">公司A</text>
    <text x="220" y="65" font-family="Arial, sans-serif" font-size="10" fill="#333333" text-anchor="middle">50万</text>
    
    <text x="50" y="95" font-family="Arial, sans-serif" font-size="10" fill="#333333" text-anchor="middle">HT-002</text>
    <text x="150" y="95" font-family="Arial, sans-serif" font-size="10" fill="#333333" text-anchor="middle">公司B</text>
    <text x="220" y="95" font-family="Arial, sans-serif" font-size="10" fill="#333333" text-anchor="middle">32万</text>
    
    <text x="50" y="125" font-family="Arial, sans-serif" font-size="10" fill="#333333" text-anchor="middle">HT-003</text>
    <text x="150" y="125" font-family="Arial, sans-serif" font-size="10" fill="#333333" text-anchor="middle">公司C</text>
    <text x="220" y="125" font-family="Arial, sans-serif" font-size="10" fill="#333333" text-anchor="middle">18万</text>
  </g>
  
  <defs>
    <marker id="arrowhead14" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#9C27B0"/>
    </marker>
  </defs>
  
  <!-- 右下角标签 -->
  <rect x="760" y="340" width="120" height="30" rx="15" fill="#9C27B0" opacity="0.2"/>
  <text x="820" y="360" font-family="Arial, sans-serif" font-size="14" fill="#9C27B0" text-anchor="middle" font-weight="bold">#实战篇 14/19</text>
</svg>
