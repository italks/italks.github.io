<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0a0e27"/><stop offset="50%" stop-color="#131836"/><stop offset="100%" stop-color="#201a30"/></linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#61dafb"/><stop offset="50%" stop-color="#42b883"/><stop offset="100%" stop-color="#ff7849"/>
    </linearGradient>
    <radialGradient id="glow1" cx="25%" cy="35%" r="40%"><stop offset="0%" stop-color="#61dafb" stop-opacity="0.12"/><stop offset="100%" stop-opacity="0"/></radialGradient>
    <radialGradient id="glow2" cx="75%" cy="65%" r="35%"><stop offset="0%" stop-color="#42b883" stop-opacity="0.1"/><stop offset="100%" stop-opacity="0"/></radialGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/></filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fff" stroke-opacity="0.03"/></pattern>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/><rect width="900" height="500" fill="url(#grid)"/>
  <rect width="900" height="500" fill="url(#glow1)"/><rect width="900" height="500" fill="url(#glow2)"/>

  <!-- 三框架图标 -->
  <g transform="translate(140, 250)">
    <!-- React -->
    <g transform="translate(-70, -15)">
      <circle r="48" fill="#61dafb" opacity="0.06"/>
      <ellipse rx="45" ry="16" fill="none" stroke="#61dafb" stroke-width="2.5" transform="rotate(30)" opacity="0.7">
        <animateTransform attributeName="transform" type="rotate" from="30" to="390" dur="20s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse rx="45" ry="16" fill="none" stroke="#61dafb" stroke-width="2.5" transform="rotate(150)" opacity="0.6">
        <animateTransform attributeName="transform" type="rotate" from="150" to="510" dur="18s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse rx="45" ry="16" fill="none" stroke="#61dafb" stroke-width="2.5" transform="rotate(270)" opacity="0.5">
        <animateTransform attributeName="transform" type="rotate" from="270" to="630" dur="22s" repeatCount="indefinite"/>
      </ellipse>
      <circle cx="0" cy="0" r="7" fill="#61dafb"/>
    </g>

    <!-- Vue -->
    <g transform="translate(0, -20)">
      <polygon points="0,-38 34,18 -17,18" fill="none" stroke="#42b883" stroke-width="3" stroke-linejoin="round" opacity="0.85"/>
      <polygon points="-34,18 0,-14 34,18" fill="none" stroke="#42b883" stroke-width="3" stroke-linejoin="round" opacity="0.75"/>
      <polygon points="0,-24 21,13 -10,13" fill="#42b883" opacity="0.15"/>
    </g>

    <!-- Svelte -->
    <g transform="translate(68, -10)">
      <path d="M -28,18 C -28,-8 -10,-32 10,-26 C 18,-23 24,-14 22,-4 C 20,8 8,18 -8,18 Z"
            fill="none" stroke="#ff7849" stroke-width="3" opacity="0.8"/>
      <text x="-2" y="4" font-family="sans-serif" font-size="16" font-weight="800" fill="#ff7849" text-anchor="middle" opacity="0.9">S</text>
    </g>
  </g>

  <!-- 连接线 + Electron 核心 -->
  <g transform="translate(140, 330)">
    <line x1="-80" y1="0" x2="80" y2="0" stroke="#ffffff" stroke-width="1" stroke-opacity="0.08" stroke-dasharray="4,4"/>
    <rect x="-55" y="-12" width="110" height="24" rx="12" fill="#1a1f35" stroke="#2d3654" stroke-width="0.8"/>
    <text x="0" y="5" font-family="Monaco,monospace" font-size="11" fill="#c4b5fd" text-anchor="middle">⚡ Electron</text>
  </g>

  <!-- 构建工具标签 -->
  <g transform="translate(50, 90)" filter="url(#shadow)">
    <rect width="145" height="60" rx="8" fill="#1e2235" opacity="0.95" stroke="#2d3654"/>
    <rect width="145" height="20" rx="8" fill="#16213a"/><rect y="12" width="145" height="8" fill="#16213a"/>
    <circle cx="12" cy="10" r="3.5" fill="#ff5f57"/><circle cx="24" cy="10" r="3.5" fill="#ffbd2e"/><circle cx="36" cy="10" r="3.5" fill="#28c840"/>
    <text x="73" y="13.5" font-family="Monaco,monospace" font-size="9" fill="#8892b0" text-anchor="middle">electron-vite</text>
    <text x="12" y="36" font-family="Monaco,monospace" font-size="9.5" fill="#82aaff">npm run dev</text>
    <text x="12" y="52" font-family="Monaco,monospace" font-size="8.5" fill="#636c7a">⚡ HMR · TS · 热重载</text>
  </g>

  <!-- 项目结构卡片 -->
  <g transform="translate(215, 360)" filter="url(#shadow)">
    <rect width="130" height="72" rx="8" fill="#1e2235" opacity="0.9" stroke="#2d3654"/>
    <circle cx="12" cy="11" r="4" fill="#ff5f57"/><circle cx="24" cy="11" r="4" fill="#ffbd2e"/><circle cx="36" cy="11" r="4" fill="#28c840"/>
    <text x="10" y="31" font-family="Monaco,monospace" font-size="9" fill="#61dafb">📁 src/main/</text>
    <text x="10" y="44" font-family="Monaco,monospace" font-size="9" fill="#42b883">📁 src/preload/</text>
    <text x="10" y="57" font-family="Monaco,monospace" font-size="9" fill="#ff7849">📁 src/renderer/</text>
    <text x="10" y="70" font-family="Monaco,monospace" font-size="9" fill="#8892b0">📄 electron.vite.ts</text>
  </g>


  <!-- 标题区 -->
  <g transform="translate(360,75)">
    <rect width="115" height="28" rx="14" fill="#61dafb" fill-opacity="0.12" stroke="url(#accent)" stroke-opacity="0.4"/>
    <text x="57.5" y="19.5" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="#c4b5fd" text-anchor="middle" letter-spacing="1">L1 / Day 3</text>
  </g>

  <text x="430" y="152" font-family="-apple-system,'Segoe UI','PingFang SC',sans-serif" font-size="42" font-weight="800" fill="#fff">前端框架集成</text>
  <text x="430" y="202" font-family="-apple-system,'Segoe UI','PingFang SC',sans-serif" font-size="37" font-weight="700" fill="url(#accent)">React · Vue · Svelte</text>

  <line x1="430" y1="222" x2="720" y2="222" stroke="url(#accent)" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <text x="430" y="256" font-family="-apple-system,sans-serif" font-size="18" fill="#a0aec0">用你熟悉的前端框架构建 Electron 桌面应用</text>

  <g transform="translate(430,290)">
    <rect width="108" height="34" rx="17" fill="#1e2235" stroke="#2d3654"/><circle cx="18" cy="17" r="5" fill="#61dafb"/>
    <text x="30" y="22" font-family="-apple-system,sans-serif" font-size="13" font-weight="500" fill="#e2e8f0">React + TS</text>
    <g transform="translate(116,0)"><rect width="98" height="34" rx="17" fill="#1e2235" stroke="#2d3654"/><circle cx="18" cy="17" r="5" fill="#42b883"/><text x="30" y="22" font-family="-apple-system,sans-serif" font-size="13" font-weight="500" fill="#e2e8f0">Vue 3</text></g>
    <g transform="translate(222,0)"><rect width="98" height="34" rx="17" fill="#1e2235" stroke="#2d3654"/><circle cx="18" cy="17" r="5" fill="#ff7849"/><text x="30" y="22" font-family="-apple-system,sans-serif" font-size="13" font-weight="500" fill="#e2e8f0">Svelte</text></g>
  </g>

  <g transform="translate(430,420)">
    <text font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="#4a5568" letter-spacing="2">FRAMEWORK · INTEGRATION · VITE</text>
    <g transform="translate(0,16)">
      <rect x="0" y="0" width="76" height="26" rx="5" fill="#1a1f35" stroke="#2d3654" stroke-width="0.8"/>
      <text x="10" y="17.5" font-family="-apple-system,sans-serif" font-size="10.5" font-weight="500" fill="#718096">⚛️ React</text>
      <g transform="translate(82,0)"><rect x="0" y="0" width="66" height="26" rx="5" fill="#1a1f35" stroke="#2d3654" stroke-width="0.8"/>
      <text x="10" y="17.5" font-family="-apple-system,sans-serif" font-size="10.5" font-weight="500" fill="#718096">💚 Vue</text></g>
      <g transform="translate(154,0)"><rect x="0" y="0" width="74" height="26" rx="5" fill="#1a1f35" stroke="#2d3654" stroke-width="0.8"/>
      <text x="10" y="17.5" font-family="-apple-system,sans-serif" font-size="10.5" font-weight="500" fill="#718096">🔥 Svelte</text></g>
    </g>
  </g>

  <g transform="translate(720,450)"><rect width="160" height="34" rx="17" fill="#fff" fill-opacity="0.04" stroke="#fff" stroke-opacity="0.08"/>
  <text x="16" y="22" font-family="-apple-system,sans-serif" font-size="12" font-weight="500" fill="#718096">📱 APP移动开发</text></g>

  <line x1="0" y1="0" x2="900" y2="0" stroke="url(#accent)" stroke-width="3"/>
  <line x1="0" y1="497" x2="900" y2="497" stroke="url(#accent)" stroke-width="3" opacity="0.3"/>
  <circle cx="20" cy="480" r="3" fill="#61dafb" opacity="0.4"/><circle cx="32" cy="480" r="3" fill="#42b883" opacity="0.3"/><circle cx="44" cy="480" r="3" fill="#ff7849" opacity="0.2"/>
  <g transform="translate(850,30)" opacity="0.08"><polygon points="0,25 25,0 50,25 25,50" fill="none" stroke="#fff" stroke-width="1.5"/><polygon points="12.5,25 25,12.5 37.5,25 25,37.5" fill="none" stroke="#fff" stroke-width="1"/><circle cx="25" cy="25" r="4" fill="#fff"/></g>
</svg>