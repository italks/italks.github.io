<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/><stop offset="50%" stop-color="#131836"/><stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/><stop offset="50%" stop-color="#34d399"/><stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="35%" r="45%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.12"/><stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/></filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fff" stroke-opacity="0.03"/>
    </pattern>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bg)"/>
  <rect width="900" height="500" fill="url(#grid)"/>
  <rect width="900" height="500" fill="url(#glow)"/>

  <!-- ========== 左侧：安全盾牌 + 桥梁视觉 ========== -->
  
  <!-- 盾牌图标 -->
  <g transform="translate(140, 240)">
    <!-- 外层光晕 -->
    <path d="M 0,-70 C 55,-60 80,-25 80,15 C 80,65 45,105 0,125 C -45,105 -80,65 -80,15 C -80,-25 -55,-60 0,-70 Z"
          fill="url(#shieldGrad)" opacity="0.08" filter="blur(8px)">
      <animate attributeName="opacity" values="0.08;0.15;0.08" dur="3s" repeatCount="indefinite"/>
    </path>
    <!-- 盾牌主体 -->
    <path d="M 0,-68 C 53,-58 77,-24 77,14 C 77,63 43,103 0,122 C -43,103 -77,63 -77,14 C -77,-24 -53,-58 0,-68 Z"
          fill="url(#shieldGrad)" stroke="#34d399" stroke-width="2" opacity="0.9"/>
    
    <!-- 内部对勾 -->
    <g transform="translate(-22, -5)">
      <path d="M 5,28 L 18,41 L 44,8" fill="none" stroke="#0a0e27" stroke-width="6"
            stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="90"
            stroke-dashoffset="90">
        <animate attributeName="stroke-dashoffset" from="90" to="0" dur="0.8s" begin="0.3s" fill="freeze"/>
      </path>
    </g>
  </g>

  <!-- 桥梁连接视觉 -->
  <g transform="translate(140, 380)">
    <line x1="-85" y1="0" x2="85" y2="0" stroke="#10b981" stroke-width="2" stroke-opacity="0.3"/>
    <rect x="-75" y="-20" width="36" height="42" rx="6" fill="#1e2235" stroke="#10b981" stroke-width="1" stroke-opacity="0.5"/>
    <text x="-57" y="3" font-family="Monaco,monospace" font-size="8" fill="#34d399" text-anchor="middle">Node</text>
    <rect x="39" y="-20" width="36" height="42" rx="6" fill="#1e2235" stroke="#6ee7b7" stroke-width="1" stroke-opacity="0.5"/>
    <text x="57" y="3" font-family="Monaco,monospace" font-size="8" fill="#6ee7b7" text-anchor="middle">Web</text>
    <!-- 箭头 -->
    <polygon points="0,-6 8,0 0,6" fill="#34d399" opacity="0.6">
      <animate attributeName="transform" values="translate(0,0);translate(15,0);translate(0,0)" dur="2s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="0,-6 -8,0 0,6" fill="#6ee7b7" opacity="0.6">
      <animate attributeName="transform" values="translate(0,0);translate(-15,0);translate(0,0)" dur="2s" repeatCount="indefinite"/>
    </polygon>
    <text x="0" y="-26" font-family="Monaco,monospace" font-size="9" fill="#8892b0" text-anchor="middle">contextBridge</text>
  </g>

  <!-- 浮动代码片段 — preload -->
  <g transform="translate(38, 92)" filter="url(#shadow)">
    <rect width="155" height="78" rx="8" fill="#1e2235" opacity="0.95" stroke="#2d3654"/>
    <rect width="155" height="22" rx="8" fill="#16213a"/>
    <rect y="14" width="155" height="8" fill="#16213a"/>
    <circle cx="14" cy="11" r="4" fill="#ff5f57"/><circle cx="28" cy="11" r="4" fill="#ffbd2e"/><circle cx="42" cy="11" r="4" fill="#28c840"/>
    <text x="79" y="15" font-family="Monaco,monospace" font-size="9" fill="#8892b0" text-anchor="middle">preload.js</text>
    <text x="11" y="39" font-family="Monaco,monospace" font-size="9" fill="#c792ea">contextBridge</text>
    <text x="96" y="39" font-family="Monaco,monospace" font-size="9" fill="#89ddff">.</text>
    <text x="11" y="54" font-family="Monaco,monospace" font-size="9" fill="#82aaff">expose</text>
    <text x="48" y="54" font-family="Monaco,monospace" font-size="9" fill="#82aaff">InMainWorld</text>
    <text x="126" y="54" font-family="Monaco,monospace" font-size="9" fill="#89ddff">(</text>
    <text x="11" y="69" font-family="Monaco,monospace" font-size="9" fill="#ffcb6b">'electronAPI'</text>
    <text x="87" y="69" font-family="Monaco,monospace" font-size="9" fill="#89ddff">,</text>
    <text x="94" y="69" font-family="Monaco,monospace" font-size="9" fill="#c792ea">api</text>
    <text x="109" y="69" font-family="Monaco,monospace" font-size="9" fill="#89ddff">)</text>
  </g>

  <!-- 浮动代码片段 — 白名单 -->
  <g transform="translate(210, 350)" filter="url(#shadow)">
    <rect width="140" height="58" rx="8" fill="#1e2235" opacity="0.9" stroke="#2d3654"/>
    <circle cx="12" cy="11" r="4" fill="#ff5f57"/><circle cx="24" cy="11" r="4" fill="#ffbd2e"/><circle cx="36" cy="11" r="4" fill="#28c840"/>
    <text x="11" y="33" font-family="Monaco,monospace" font-size="9" fill="#f07178">if</text>
    <text x="21" y="33" font-family="Monaco,monospace" font-size="9" fill="#89ddff">(</text>
    <text x="27" y="33" font-family="Monaco,monospace" font-size="9" fill="#c792ea">allowed</text>
    <text x="66" y="33" font-family="Monaco,monospace" font-size="9" fill="#89ddff">)</text>
    <text x="11" y="49" font-family="Monaco,monospace" font-size="9" fill="#82aaff">ipcRenderer</text>
    <text x="76" y="49" font-family="Monaco,monospace" font-size="9" fill="#89ddff">.</text>
    <text x="83" y="49" font-family="Monaco,monospace" font-size="9" fill="#82aaff">send</text>
    <text x="107" y="49" font-family="Monaco,monospace" font-size="9" fill="#89ddff">(ch)</text>
  </g>


  <!-- ========== 右侧：标题区域 ========== -->

  <g transform="translate(360, 75)">
    <rect width="110" height="28" rx="14" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-opacity="0.4"/>
    <text x="55" y="19.5" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="#6ee7b7" text-anchor="middle" letter-spacing="1">L1 / Day 2</text>
  </g>

  <text x="430" y="152" font-family="-apple-system,'Segoe UI','PingFang SC',sans-serif" font-size="42" font-weight="800" fill="#ffffff">Preload 安全</text>
  <text x="430" y="202" font-family="-apple-system,'Segoe UI','PingFang SC',sans-serif" font-size="37" font-weight="700" fill="url(#accent)">与 IPC 通信基础</text>

  <line x1="430" y1="222" x2="720" y2="222" stroke="url(#accent)" stroke-width="2" opacity="0.4" stroke-linecap="round"/>

  <text x="430" y="256" font-family="-apple-system,sans-serif" font-size="18" fill="#a0aec0">构建渲染进程与主进程之间的安全桥梁</text>

  <!-- 特性标签 -->
  <g transform="translate(430, 290)">
    <rect width="118" height="34" rx="17" fill="#1e2235" stroke="#2d3654"/><circle cx="18" cy="17" r="5" fill="#10b981"/>
    <text x="30" y="22" font-family="-apple-system,sans-serif" font-size="13" font-weight="500" fill="#e2e8f0">白名单机制</text>
    <g transform="translate(128,0)"><rect width="108" height="34" rx="17" fill="#1e2235" stroke="#2d3654"/><circle cx="18" cy="17" r="5" fill="#34d399"/><text x="30" y="22" font-family="-apple-system,sans-serif" font-size="13" font-weight="500" fill="#e2e8f0">Obsidian 级别</text></g>
    <g transform="translate(244,0)"><rect width="98" height="34" rx="17" fill="#1e2235" stroke="#2d3654"/><circle cx="18" cy="17" r="5" fill="#6ee7b7"/><text x="30" y="22" font-family="-apple-system,sans-serif" font-size="13" font-weight="500" fill="#e2e8f0">完整实战代码</text></g>
  </g>

  <!-- 底部 -->
  <g transform="translate(430, 420)">
    <text font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="#4a5568" letter-spacing="2">SECURITY · BRIDGE · IPC</text>
    <g transform="translate(0,16)">
      <rect x="0" y="0" width="72" height="26" rx="5" fill="#1a1f35" stroke="#2d3654" stroke-width="0.8"/>
      <text x="10" y="17.5" font-family="-apple-system,sans-serif" font-size="10.5" font-weight="500" fill="#718096">🔒 安全</text>
      <g transform="translate(78,0)"><rect x="0" y="0" width="74" height="26" rx="5" fill="#1a1f35" stroke="#2d3654" stroke-width="0.8"/>
      <text x="10" y="17.5" font-family="-apple-system,sans-serif" font-size="10.5" font-weight="500" fill="#718096">🌉 通信</text></g>
      <g transform="translate(158,0)"><rect x="0" y="0" width="84" height="26" rx="5" fill="#1a1f35" stroke="#2d3654" stroke-width="0.8"/>
      <text x="10" y="17.5" font-family="-apple-system,sans-serif" font-size="10.5" font-weight="500" fill="#718096">📋 实战项目</text></g>
    </g>
  </g>

  <g transform="translate(720,450)">
    <rect width="160" height="34" rx="17" fill="#fff" fill-opacity="0.04" stroke="#fff" stroke-opacity="0.08"/>
    <text x="16" y="22" font-family="-apple-system,sans-serif" font-size="12" font-weight="500" fill="#718096">📱 APP移动开发</text>
  </g>

  <!-- 装饰 -->
  <line x1="0" y1="0" x2="900" y2="0" stroke="url(#accent)" stroke-width="3"/>
  <line x1="0" y1="497" x2="900" y2="497" stroke="url(#accent)" stroke-width="3" opacity="0.3"/>
  <circle cx="20" cy="480" r="3" fill="#10b981" opacity="0.4"/><circle cx="32" cy="480" r="3" fill="#34d399" opacity="0.3"/><circle cx="44" cy="480" r="3" fill="#6ee7b7" opacity="0.2"/>
  <g transform="translate(850,30)" opacity="0.08"><polygon points="0,25 25,0 50,25 25,50" fill="none" stroke="#fff" stroke-width="1.5"/><polygon points="12.5,25 25,12.5 37.5,25 25,37.5" fill="none" stroke="#fff" stroke-width="1"/><circle cx="25" cy="25" r="4" fill="#fff"/></g>
</svg>