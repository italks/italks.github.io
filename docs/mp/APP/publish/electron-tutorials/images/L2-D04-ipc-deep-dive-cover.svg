<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0a0e27"/><stop offset="50%" stop-color="#131836"/><stop offset="100%" stop-color="#20102a"/></linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/><stop offset="50%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%" r="45%"><stop offset="0%" stop-color="#7c3aed" stop-opacity="0.12"/><stop offset="100%" stop-opacity="0"/></radialGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/></filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fff" stroke-opacity="0.03"/></pattern>
    <!-- 箭头标记 -->
    <marker id="arrowRight" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#7c3aed"/>
    </marker>
    <marker id="arrowLeft" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <polygon points="8,0 0,3 8,6" fill="#a78bfa"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/><rect width="900" height="500" fill="url(#grid)"/><rect width="900" height="500" fill="url(#glow1)"/>

  <!-- ========== IPC 通信图解 ========== -->
  
  <!-- Main Process 盒子 -->
  <g transform="translate(140, 130)">
    <rect x="-90" y="-50" width="180" height="100" rx="14" fill="#1e2235" stroke="#7c3aed" stroke-width="2" stroke-opacity="0.5" filter="url(#shadow)"/>
    <text x="0" y="-18" font-family="-apple-system,sans-serif" font-size="13" font-weight="700" fill="#a78bfa" text-anchor="middle">Main Process</text>
    
    <!-- IPC handlers -->
    <text x="-70" y="5" font-family="Monaco,monospace" font-size="9.5" fill="#c792ea">ipcMain.</text>
    <text x="-15" y="5" font-family="Monaco,monospace" font-size="9.5" fill="#82aaff">handle()</text>
    
    <text x="-70" y="23" font-family="Monaco,monospace" font-size="9.5" fill="#c792ea">ipcMain.</text>
    <text x="-15" y="23" font-family="Monaco,monospace" font-size="9.5" fill="#82aaff">on()</text>
    
    <text x="-70" y="41" font-family="Monaco,monospace" font-size="9.5" fill="#c792ea">webContents.</text>
    <text x="5" y="41" font-family="Monaco,monospace" font-size="9.5" fill="#82aaff">send()</text>
  </g>

  <!-- Renderer Process 盒子 -->
  <g transform="translate(140, 340)">
    <rect x="-95" y="-42" width="190" height="84" rx="14" fill="#1e2235" stroke="#a78bfa" stroke-width="2" stroke-opacity="0.35" filter="url(#shadow)"/>
    <text x="0" y="-16" font-family="-apple-system,sans-serif" font-size="13" font-weight="700" fill="#c4b5fd" text-anchor="middle">Renderer Process</text>
    
    <text x="-75" y="6" font-family="Monaco,monospace" font-size="9.5" fill="#82aaff">ipcRenderer.</text>
    <text x="5" y="6" font-family="Monaco,monospace" font-size="9.5" fill="#89ddff">invoke()</text>
    
    <text x="-75" y="24" font-family="Monaco,monospace" font-size="9.5" fill="#82aaff">ipcRenderer.</text>
    <text x="5" y="24" font-family="Monaco,monospace" font-size="9.5" fill="#89ddff">send()</text>
    
    <text x="55" y="24" font-family="Monaco,monospace" font-size="9.5" fill="#82aaff">.on()</text>
  </g>

  <!-- 双向箭头连线 -->
  <!-- invoke/handle (双向) -->
  <line x1="110" y1="185" x2="70" y2="295" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowLeft)" opacity="0.7">
    <animate attributeName="stroke-dasharray" from="0,150" to="150,0" dur="1.5s" repeatCount="indefinite"/>
  </line>
  <text x="38" y="240" font-family="Monaco,monospace" font-size="8" fill="#a78bfa" transform="rotate(-60,38,240)">invoke/handle</text>

  <!-- send/on (单向上) -->
  <line x1="170" y1="185" x2="195" y2="295" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowLeft)" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
  </line>
  
  <!-- webContents.send (单向下) -->
  <line x1="65" y1="295" x2="40" y2="185" stroke="#c4b5fd" stroke-width="1.5" marker-end="url(#arrowRight)" opacity="0.5"/>

  <!-- Preload 桥梁层 -->
  <g transform="translate(140, 250)">
    <rect x="-80" y="-13" width="160" height="26" rx="13" fill="#7c3aed" fill-opacity="0.12" stroke="#7c3aed" stroke-opacity="0.4" stroke-dasharray="4,2"/>
    <text x="0" y="5" font-family="Monaco,monospace" font-size="10" fill="#c4b5fd" text-anchor="middle">🔗 preload.js (contextBridge)</text>
  </g>


  <!-- 标题区 -->
  <g transform="translate(360,75)">
    <rect width="115" height="28" rx="14" fill="#7c3aed" fill-opacity="0.12" stroke="url(#accent)" stroke-opacity="0.4"/>
    <text x="57.5" y="19.5" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="#c4b5fd" text-anchor="middle" letter-spacing="1">L2 / Day 4</text>
  </g>

  <text x="430" y="152" font-family="-apple-system,'Segoe UI','PingFang SC',sans-serif" font-size="44" font-weight="800" fill="#fff">IPC 通信</text>
  <text x="430" y="204" font-family="-apple-system,'Segoe UI','PingFang SC',sans-serif" font-size="37" font-weight="700" fill="url(#accent)">深度解析与实战</text>

  <line x1="430" y1="224" x2="720" y2="224" stroke="url(#accent)" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <text x="430" y="258" font-family="-apple-system,sans-serif" font-size="18" fill="#a0aec0">掌握四种通信模式，构建类型安全的消息体系</text>

  <g transform="translate(430,290)">
    <rect width="108" height="34" rx="17" fill="#1e2235" stroke="#2d3654"/><circle cx="18" cy="17" r="5" fill="#7c3aed"/>
    <text x="30" y="22" font-family="-apple-system,sans-serif" font-size="13" font-weight="500" fill="#e2e8f0">4种模式</text>
    <g transform="translate(116,0)"><rect width="118" height="34" rx="17" fill="#1e2235" stroke="#2d3654"/><circle cx="18" cy="17" r="5" fill="#a78bfa"/><text x="30" y="22" font-family="-apple-system,sans-serif" font-size="13" font-weight="500" fill="#e2e8f0">TypeScript 类型安全</text></g>
    <g transform="translate(242,0)"><rect width="98" height="34" rx="17" fill="#1e2235" stroke="#2d3654"/><circle cx="18" cy="17" r="5" fill="#c4b5fd"/><text x="30" y="22" font-family="-apple-system,sans-serif" font-size="13" font-weight="500" fill="#e2e8f0">IpcRouter 架构</text></g>
  </g>

  <g transform="translate(430,420)">
    <text font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="#4a5568" letter-spacing="2">IPC · COMMUNICATION · TYPE-SAFE</text>
    <g transform="translate(0,16)">
      <rect x="0" y="0" width="76" height="26" rx="5" fill="#1a1f35" stroke="#2d3654" stroke-width="0.8"/>
      <text x="10" y="17.5" font-family="-apple-system,sans-serif" font-size="10.5" font-weight="500" fill="#718096">📡 invoke/handle</text>
      <g transform="translate(82,0)"><rect x="0" y="0" width="68" height="26" rx="5" fill="#1a1f35" stroke="#2d3654" stroke-width="0.8"/>
      <text x="10" y="17.5" font-family="-apple-system,sans-serif" font-size="10.5" font-weight="500" fill="#718096">📤 send/on</text></g>
      <g transform="translate(156,0)"><rect x="0" y="0" width="86" height="26" rx="5" fill="#1a1f35" stroke="#2d3654" stroke-width="0.8"/>
      <text x="10" y="17.5" font-family="-apple-system,sans-serif" font-size="10.5" font-weight="500" fill="#718096">🔄 broadcast</text></g>
    </g>
  </g>

  <g transform="translate(720,450)"><rect width="160" height="34" rx="17" fill="#fff" fill-opacity="0.04" stroke="#fff" stroke-opacity="0.08"/>
  <text x="16" y="22" font-family="-apple-system,sans-serif" font-size="12" font-weight="500" fill="#718096">📱 APP移动开发</text></g>

  <line x1="0" y1="0" x2="900" y2="0" stroke="url(#accent)" stroke-width="3"/>
  <line x1="0" y1="497" x2="900" y2="497" stroke="url(#accent)" stroke-width="3" opacity="0.3"/>
  <circle cx="20" cy="480" r="3" fill="#7c3aed" opacity="0.4"/><circle cx="32" cy="480" r="3" fill="#a78bfa" opacity="0.3"/><circle cx="44" cy="480" r="3" fill="#c4b5fd" opacity="0.2"/>
  <g transform="translate(850,30)" opacity="0.08"><polygon points="0,25 25,0 50,25 25,50" fill="none" stroke="#fff" stroke-width="1.5"/><polygon points="12.5,25 25,12.5 37.5,25 25,37.5" fill="none" stroke="#fff" stroke-width="1"/><circle cx="25" cy="25" r="4" fill="#fff"/></g>
</svg>