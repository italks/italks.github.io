<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 383">
  <!-- 背景 -->
  <rect width="900" height="383" fill="#FAFAFA"/>
  
  <!-- 左侧彩色边条 - 基础篇蓝色 -->
  <rect width="8" height="383" fill="#2196F3"/>
  
  <!-- 右上角 Logo -->
  <rect x="750" y="20" width="130" height="40" rx="5" fill="#0066CC" opacity="0.1"/>
  <text x="815" y="47" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0066CC" text-anchor="middle">OpenClaw</text>
  
  <!-- 主标题 -->
  <text x="450" y="120" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#333333" text-anchor="middle">你的第一个任务</text>
  
  <!-- 副标题 -->
  <text x="450" y="170" font-family="Arial, sans-serif" font-size="28" fill="#666666" text-anchor="middle">让OpenClaw帮你处理PDF</text>
  
  <!-- 左侧:PDF文件 -->
  <g transform="translate(150, 200)">
    <rect x="0" y="0" width="100" height="130" rx="5" fill="#FF5722"/>
    <rect x="10" y="10" width="80" height="110" fill="#FFFFFF" opacity="0.3"/>
    <text x="50" y="70" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">PDF</text>
    <!-- 文件内容线条 -->
    <line x1="20" y1="30" x2="80" y2="30" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
    <line x1="20" y1="45" x2="70" y2="45" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
    <line x1="20" y1="60" x2="75" y2="60" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
    <line x1="20" y1="75" x2="60" y2="75" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- 中央:OpenClaw Logo + 箭头 -->
  <g transform="translate(350, 230)">
    <!-- 圆形背景 -->
    <circle cx="60" cy="50" r="55" fill="#0066CC"/>
    <text x="60" y="58" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF" text-anchor="middle">OC</text>
    
    <!-- 箭头 -->
    <path d="M 130 50 L 170 50 L 160 40 M 170 50 L 160 60" stroke="#0066CC" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- 右侧:文本文件 -->
  <g transform="translate(550, 200)">
    <rect x="0" y="0" width="100" height="130" rx="5" fill="#4CAF50"/>
    <rect x="10" y="10" width="80" height="110" fill="#FFFFFF" opacity="0.3"/>
    <text x="50" y="70" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">TXT</text>
    <!-- 文本内容线条 -->
    <line x1="20" y1="30" x2="80" y2="30" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
    <line x1="20" y1="45" x2="75" y2="45" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
    <line x1="20" y1="60" x2="70" y2="60" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
    <line x1="20" y1="75" x2="65" y2="75" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- 脚印图案 -->
  <g transform="translate(700, 280)" opacity="0.2">
    <circle cx="0" cy="0" r="8" fill="#2196F3"/>
    <circle cx="20" cy="15" r="8" fill="#2196F3"/>
    <circle cx="40" cy="30" r="8" fill="#2196F3"/>
  </g>
  
  <!-- 右下角标签 -->
  <rect x="760" y="340" width="120" height="30" rx="15" fill="#2196F3" opacity="0.2"/>
  <text x="820" y="360" font-family="Arial, sans-serif" font-size="14" fill="#2196F3" text-anchor="middle" font-weight="bold">#基础篇 05/19</text>
</svg>
