<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 383">
  <!-- 背景 -->
  <defs>
    <linearGradient id="bgGradient3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8ECEF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E3F2FD;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="900" height="383" fill="url(#bgGradient3)"/>
  
  <!-- 左侧彩色边条 - 入门篇绿色 -->
  <rect width="8" height="383" fill="#4CAF50"/>
  
  <!-- 右上角 Logo -->
  <rect x="750" y="20" width="130" height="40" rx="5" fill="#0066CC" opacity="0.1"/>
  <text x="815" y="47" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0066CC" text-anchor="middle">OpenClaw</text>
  
  <!-- 主标题 -->
  <text x="450" y="120" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#333333" text-anchor="middle">OpenClaw vs 其他工具</text>
  
  <!-- 副标题 -->
  <text x="450" y="170" font-family="Arial, sans-serif" font-size="28" fill="#666666" text-anchor="middle">到底有什么不一样?</text>
  
  <!-- 左侧:其他工具 -->
  <g transform="translate(100, 200)">
    <!-- ChatGPT -->
    <rect x="0" y="0" width="80" height="50" rx="8" fill="#10A37F"/>
    <text x="40" y="32" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">ChatGPT</text>
    
    <!-- Coze -->
    <rect x="0" y="60" width="80" height="50" rx="8" fill="#5B5BFF"/>
    <text x="40" y="92" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Coze</text>
    
    <!-- Dify -->
    <rect x="0" y="120" width="80" height="50" rx="8" fill="#FF6B6B"/>
    <text x="40" y="152" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Dify</text>
  </g>
  
  <!-- 中央:VS标志 -->
  <g transform="translate(380, 240)">
    <circle cx="70" cy="50" r="50" fill="#FF6600" opacity="0.9"/>
    <text x="70" y="58" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#FFFFFF" text-anchor="middle">VS</text>
  </g>
  
  <!-- 右侧:OpenClaw -->
  <g transform="translate(600, 200)">
    <rect x="0" y="30" width="150" height="100" rx="15" fill="#0066CC"/>
    <text x="75" y="75" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">OpenClaw</text>
    <text x="75" y="105" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">本地运行 | 技能扩展</text>
    特点标记
    <!-- <circle cx="20" cy="50" r="8" fill="#4CAF50"/>
    <circle cx="20" cy="70" r="8" fill="#FF9800"/>
    <circle cx="20" cy="90" r="8" fill="#2196F3"/> -->
  </g>
  
  <!-- 右下角标签 -->
  <rect x="760" y="340" width="120" height="30" rx="15" fill="#4CAF50" opacity="0.2"/>
  <text x="820" y="360" font-family="Arial, sans-serif" font-size="14" fill="#4CAF50" text-anchor="middle" font-weight="bold">#入门篇 03/19</text>
</svg>
