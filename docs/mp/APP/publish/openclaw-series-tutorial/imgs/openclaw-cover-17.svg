<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 383">
  <!-- 背景 -->
  <rect width="900" height="383" fill="#263238"/>
  
  <!-- 左侧彩色边条 - 高级篇红色 -->
  <rect width="8" height="383" fill="#F44336"/>
  
  <!-- 右上角 Logo -->
  <rect x="750" y="20" width="130" height="40" rx="5" fill="#0066CC" opacity="0.3"/>
  <text x="815" y="47" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">OpenClaw</text>
  
  <!-- 主标题 -->
  <text x="450" y="120" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#FFFFFF" text-anchor="middle">如何编写自己的技能?</text>
  
  <!-- 副标题 -->
  <text x="450" y="170" font-family="Arial, sans-serif" font-size="28" fill="#B3E5FC" text-anchor="middle">扩展OpenClaw能力边界</text>
  
  <!-- 中央:代码编辑器 -->
  <g transform="translate(200, 200)">
    <!-- 编辑器窗口 -->
    <rect x="0" y="0" width="500" height="150" rx="8" fill="#1E1E1E" stroke="#424242" stroke-width="2"/>
    
    <!-- 标题栏 -->
    <rect x="0" y="0" width="500" height="30" rx="8" fill="#2D2D2D"/>
    <circle cx="20" cy="15" r="5" fill="#FF5F56"/>
    <circle cx="40" cy="15" r="5" fill="#FFBD2E"/>
    <circle cx="60" cy="15" r="5" fill="#27C93F"/>
    <text x="250" y="20" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle">main.py - OpenClaw技能</text>
    
    <!-- 代码内容 -->
    <text x="20" y="55" font-family="monospace" font-size="11" fill="#569CD6">def</text>
    <text x="45" y="55" font-family="monospace" font-size="11" fill="#DCDCAA">execute</text>
    <text x="95" y="55" font-family="monospace" font-size="11" fill="#FFFFFF">(command, params):</text>
    
    <text x="30" y="75" font-family="monospace" font-size="11" fill="#C586C0">if</text>
    <text x="50" y="75" font-family="monospace" font-size="11" fill="#9CDCFE">command</text>
    <text x="105" y="75" font-family="monospace" font-size="11" fill="#D4D4D4">==</text>
    <text x="120" y="75" font-family="monospace" font-size="11" fill="#CE9178">"hello"</text>
    <text x="170" y="75" font-family="monospace" font-size="11" fill="#D4D4D4">:</text>
    
    <text x="40" y="95" font-family="monospace" font-size="11" fill="#C586C0">return</text>
    <text x="80" y="95" font-family="monospace" font-size="11" fill="#4EC9B0">{</text>
    <text x="90" y="95" font-family="monospace" font-size="11" fill="#CE9178">"success"</text>
    <text x="145" y="95" font-family="monospace" font-size="11" fill="#9CDCFE">: True</text>
    <text x="180" y="95" font-family="monospace" font-size="11" fill="#4EC9B0">}</text>
    
    <!-- 行号 -->
    <text x="10" y="55" font-family="monospace" font-size="10" fill="#858585">1</text>
    <text x="10" y="75" font-family="monospace" font-size="10" fill="#858585">2</text>
    <text x="10" y="95" font-family="monospace" font-size="10" fill="#858585">3</text>
    <text x="10" y="115" font-family="monospace" font-size="10" fill="#858585">4</text>
    <text x="10" y="135" font-family="monospace" font-size="10" fill="#858585">5</text>
  </g>
  
  <!-- 装饰:齿轮 -->
  <g transform="translate(100, 100)" opacity="0.3">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#FFFFFF" stroke-width="8"/>
    <circle cx="0" cy="0" r="15" fill="#FFFFFF"/>
  </g>
  
  <g transform="translate(800, 300)" opacity="0.3">
    <circle cx="0" cy="0" r="25" fill="none" stroke="#FFFFFF" stroke-width="6"/>
    <circle cx="0" cy="0" r="12" fill="#FFFFFF"/>
  </g>
  
  <!-- 工具图标 -->
  <g transform="translate(750, 220)">
    <rect x="0" y="0" width="40" height="40" rx="5" fill="#FF6600" opacity="0.8"/>
    <rect x="15" y="10" width="10" height="20" rx="2" fill="#FFFFFF"/>
    <rect x="10" y="15" width="20" height="10" rx="2" fill="#FFFFFF"/>
  </g>
  
  <!-- 右下角标签 -->
  <rect x="760" y="340" width="120" height="30" rx="15" fill="#F44336" opacity="0.3"/>
  <text x="820" y="360" font-family="Arial, sans-serif" font-size="14" fill="#F44336" text-anchor="middle" font-weight="bold">#高级篇 17/19</text>
</svg>
