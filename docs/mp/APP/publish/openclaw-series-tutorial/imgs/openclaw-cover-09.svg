<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 383">
  <!-- 背景 -->
  <defs>
    <linearGradient id="bgGradient9" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FAFAFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E3F2FD;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="900" height="383" fill="url(#bgGradient9)"/>
  
  <!-- 左侧彩色边条 - 进阶篇橙色 -->
  <rect width="8" height="383" fill="#FF9800"/>
  
  <!-- 右上角 Logo -->
  <rect x="750" y="20" width="130" height="40" rx="5" fill="#0066CC" opacity="0.1"/>
  <text x="815" y="47" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0066CC" text-anchor="middle">OpenClaw</text>
  
  <!-- 主标题 -->
  <text x="450" y="120" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#333333" text-anchor="middle">让OpenClaw帮你做PPT</text>
  
  <!-- 副标题 -->
  <text x="450" y="170" font-family="Arial, sans-serif" font-size="28" fill="#666666" text-anchor="middle">从此告别加班</text>
  
  <!-- 左侧:文字大纲 -->
  <g transform="translate(100, 200)">
    <rect x="0" y="0" width="200" height="150" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="2"/>
    <text x="100" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle">文字大纲</text>
    <line x1="20" y1="50" x2="180" y2="50" stroke="#E0E0E0" stroke-width="1"/>
    <text x="30" y="75" font-family="Arial, sans-serif" font-size="12" fill="#666666">一、项目背景</text>
    <text x="30" y="95" font-family="Arial, sans-serif" font-size="12" fill="#666666">二、核心功能</text>
    <text x="30" y="115" font-family="Arial, sans-serif" font-size="12" fill="#666666">三、技术方案</text>
    <text x="30" y="135" font-family="Arial, sans-serif" font-size="12" fill="#666666">四、总结展望</text>
  </g>
  
  <!-- 中央:魔法棒 -->
  <g transform="translate(380, 240)">
    <!-- 魔法棒 -->
    <rect x="30" y="-20" width="80" height="15" rx="3" fill="#9C27B0" transform="rotate(45, 70, -12)"/>
    <polygon points="90,-50 100,-40 90,-30 80,-40" fill="#FFD700"/>
    <!-- 星星特效 -->
    <text x="20" y="20" font-family="Arial, sans-serif" font-size="24" fill="#FFD700">✨</text>
    <text x="100" y="-10" font-family="Arial, sans-serif" font-size="18" fill="#FFD700">✨</text>
    <text x="60" y="60" font-family="Arial, sans-serif" font-size="20" fill="#FFD700">✨</text>
  </g>
  
  <!-- 右侧:精美PPT -->
  <g transform="translate(600, 200)">
    <rect x="0" y="0" width="200" height="150" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="2"/>
    <!-- PPT封面 -->
    <rect x="10" y="10" width="180" height="70" fill="#0066CC"/>
    <text x="100" y="50" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">项目汇报</text>
    <!-- PPT内容页 -->
    <rect x="10" y="90" width="85" height="50" fill="#E3F2FD"/>
    <rect x="105" y="90" width="85" height="50" fill="#FFF3E0"/>
    <!-- 图表 -->
    <rect x="20" y="100" width="20" height="30" fill="#4CAF50"/>
    <rect x="45" y="110" width="20" height="20" fill="#2196F3"/>
    <rect x="70" y="105" width="20" height="25" fill="#FF9800"/>
  </g>
  
  <!-- 箭头 -->
  <path d="M 310 275 L 360 275 L 350 265 M 360 275 L 350 285" stroke="#FF9800" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 590 275 L 590 275" stroke="#FF9800" stroke-width="4" fill="none"/>
  
  <!-- 右下角标签 -->
  <rect x="760" y="340" width="120" height="30" rx="15" fill="#FF9800" opacity="0.2"/>
  <text x="820" y="360" font-family="Arial, sans-serif" font-size="14" fill="#FF9800" text-anchor="middle" font-weight="bold">#进阶篇 09/19</text>
</svg>
