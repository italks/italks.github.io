<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 383">
  <!-- 背景 -->
  <defs>
    <linearGradient id="bgGradient1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8ECEF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E3F2FD;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 主背景 -->
  <rect width="900" height="383" fill="url(#bgGradient1)"/>
  
  <!-- 左侧彩色边条 - 入门篇绿色 -->
  <rect width="8" height="383" fill="#4CAF50"/>
  
  <!-- 右上角 Logo 区域 -->
  <rect x="750" y="20" width="130" height="40" rx="5" fill="#0066CC" opacity="0.1"/>
  <text x="815" y="47" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0066CC" text-anchor="middle">OpenClaw</text>
  
  <!-- 主标题 -->
  <text x="450" y="120" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#333333" text-anchor="middle">OpenClaw 是什么?</text>
  
  <!-- 副标题 -->
  <text x="450" y="170" font-family="Arial, sans-serif" font-size="28" fill="#666666" text-anchor="middle">3分钟看懂 AI 自动化新物种</text>
  
  <!-- 中央图标区域 -->
  <!-- 左侧:传统办公场景 -->
  <g transform="translate(150, 200)">
    <!-- 文件堆叠 -->
    <rect x="0" y="0" width="60" height="80" rx="3" fill="#BDBDBD" opacity="0.8"/>
    <rect x="10" y="10" width="60" height="80" rx="3" fill="#9E9E9E" opacity="0.8"/>
    <rect x="20" y="20" width="60" height="80" rx="3" fill="#757575"/>
    <!-- 文件线条 -->
    <line x1="30" y1="40" x2="70" y2="40" stroke="#E0E0E0" stroke-width="2"/>
    <line x1="30" y1="55" x2="65" y2="55" stroke="#E0E0E0" stroke-width="2"/>
    <line x1="30" y1="70" x2="60" y2="70" stroke="#E0E0E0" stroke-width="2"/>
  </g>
  
  <!-- 中央:Logo + 问号 -->
  <g transform="translate(400, 220)">
    <!-- 圆形背景 -->
    <circle cx="50" cy="50" r="60" fill="#0066CC" opacity="0.1"/>
    <!-- Logo -->
    <text x="50" y="60" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#0066CC" text-anchor="middle">OC</text>
    <!-- 问号 -->
    <circle cx="90" cy="20" r="20" fill="#FF6600"/>
    <text x="90" y="28" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">?</text>
  </g>
  
  <!-- 右侧:AI助手 -->
  <g transform="translate(650, 200)">
    <!-- 机器人身体 -->
    <rect x="20" y="30" width="60" height="70" rx="10" fill="#0066CC"/>
    <!-- 机器人头部 -->
    <rect x="25" y="10" width="50" height="30" rx="5" fill="#0066CC"/>
    <!-- 眼睛 -->
    <circle cx="38" cy="25" r="6" fill="#FFFFFF"/>
    <circle cx="62" cy="25" r="6" fill="#FFFFFF"/>
    <circle cx="38" cy="25" r="3" fill="#333333"/>
    <circle cx="62" cy="25" r="3" fill="#333333"/>
    <!-- 天线 -->
    <line x1="50" y1="10" x2="50" y2="-5" stroke="#0066CC" stroke-width="3"/>
    <circle cx="50" cy="-10" r="5" fill="#FF6600"/>
    <!-- 对话气泡 -->
    <rect x="85" y="20" width="30" height="25" rx="5" fill="#4CAF50"/>
    <text x="100" y="38" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">AI</text>
  </g>
  
  <!-- 右下角标签 -->
  <rect x="760" y="340" width="120" height="30" rx="15" fill="#4CAF50" opacity="0.2"/>
  <text x="820" y="360" font-family="Arial, sans-serif" font-size="14" fill="#4CAF50" text-anchor="middle" font-weight="bold">#入门篇 01/19</text>
</svg>
