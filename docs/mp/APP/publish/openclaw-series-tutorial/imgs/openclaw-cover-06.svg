<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 383">
  <!-- 背景 -->
  <rect width="900" height="383" fill="#E3F2FD"/>
  
  <!-- 左侧彩色边条 - 基础篇蓝色 -->
  <rect width="8" height="383" fill="#2196F3"/>
  
  <!-- 右上角 Logo -->
  <rect x="750" y="20" width="130" height="40" rx="5" fill="#0066CC" opacity="0.1"/>
  <text x="815" y="47" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0066CC" text-anchor="middle">OpenClaw</text>
  
  <!-- 主标题 -->
  <text x="450" y="120" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#333333" text-anchor="middle">技能市场初探</text>
  
  <!-- 副标题 -->
  <text x="450" y="170" font-family="Arial, sans-serif" font-size="28" fill="#666666" text-anchor="middle">如何找到你需要的技能?</text>
  
  <!-- 搜索框 -->
  <g transform="translate(250, 200)">
    <rect x="0" y="0" width="400" height="50" rx="25" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="2"/>
    <!-- 搜索图标 -->
    <circle cx="30" cy="25" r="10" fill="none" stroke="#999999" stroke-width="2"/>
    <line x1="37" y1="32" x2="45" y2="40" stroke="#999999" stroke-width="2" stroke-linecap="round"/>
    <text x="200" y="32" font-family="Arial, sans-serif" font-size="18" fill="#999999" text-anchor="middle">搜索技能...</text>
  </g>
  
  <!-- 技能卡片 -->
  <g transform="translate(150, 270)">
    <!-- pdf卡片 -->
    <rect x="0" y="0" width="100" height="70" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
    <text x="50" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FF5722" text-anchor="middle">pdf</text>
    <text x="50" y="50" font-family="Arial, sans-serif" font-size="11" fill="#999999" text-anchor="middle">⭐ 1.2k</text>
    
    <!-- xlsx卡片 -->
    <rect x="120" y="0" width="100" height="70" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
    <text x="170" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#4CAF50" text-anchor="middle">xlsx</text>
    <text x="170" y="50" font-family="Arial, sans-serif" font-size="11" fill="#999999" text-anchor="middle">⭐ 980</text>
    
    <!-- pptx卡片 -->
    <rect x="240" y="0" width="100" height="70" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
    <text x="290" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FF9800" text-anchor="middle">pptx</text>
    <text x="290" y="50" font-family="Arial, sans-serif" font-size="11" fill="#999999" text-anchor="middle">⭐ 856</text>
    
    <!-- browser卡片 -->
    <rect x="360" y="0" width="100" height="70" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
    <text x="410" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#9C27B0" text-anchor="middle">browser</text>
    <text x="410" y="50" font-family="Arial, sans-serif" font-size="11" fill="#999999" text-anchor="middle">⭐ 723</text>
    
    <!-- 更多卡片 -->
    <rect x="480" y="0" width="100" height="70" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
    <text x="530" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0066CC" text-anchor="middle">...</text>
  </g>
  
  <!-- 右下角标签 -->
  <rect x="760" y="340" width="120" height="30" rx="15" fill="#2196F3" opacity="0.2"/>
  <text x="820" y="360" font-family="Arial, sans-serif" font-size="14" fill="#2196F3" text-anchor="middle" font-weight="bold">#基础篇 06/19</text>
</svg>
