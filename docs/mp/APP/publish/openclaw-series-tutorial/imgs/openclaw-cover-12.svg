<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 383">
  <!-- 背景 -->
  <rect width="900" height="383" fill="#FFF9C4"/>
  
  <!-- 左侧彩色边条 - 进阶篇橙色 -->
  <rect width="8" height="383" fill="#FF9800"/>
  
  <!-- 右上角 Logo -->
  <rect x="750" y="20" width="130" height="40" rx="5" fill="#0066CC" opacity="0.1"/>
  <text x="815" y="47" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0066CC" text-anchor="middle">OpenClaw</text>
  
  <!-- 主标题 -->
  <text x="450" y="120" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#333333" text-anchor="middle">排错指南</text>
  
  <!-- 副标题 -->
  <text x="450" y="170" font-family="Arial, sans-serif" font-size="28" fill="#666666" text-anchor="middle">遇到问题怎么办?</text>
  
  <!-- 中央:放大镜 -->
  <g transform="translate(350, 200)">
    <circle cx="100" cy="80" r="70" fill="none" stroke="#FF9800" stroke-width="8"/>
    <line x1="150" y1="130" x2="200" y2="180" stroke="#FF9800" stroke-width="12" stroke-linecap="round"/>
    
    <!-- 放大镜内的代码/日志 -->
    <rect x="50" y="40" width="100" height="80" fill="#FFFFFF" opacity="0.8"/>
    <text x="100" y="60" font-family="monospace" font-size="8" fill="#333333" text-anchor="middle">[ERROR]</text>
    <text x="100" y="75" font-family="monospace" font-size="8" fill="#666666" text-anchor="middle">File not found</text>
    <text x="100" y="90" font-family="monospace" font-size="8" fill="#666666" text-anchor="middle">at line 42</text>
    <text x="100" y="105" font-family="monospace" font-size="8" fill="#666666" text-anchor="middle">...</text>
  </g>
  
  <!-- 问号图标 -->
  <g transform="translate(200, 220)">
    <circle cx="30" cy="30" r="25" fill="#FFA726"/>
    <text x="30" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">?</text>
  </g>
  
  <!-- 感叹号图标 -->
  <g transform="translate(650, 220)">
    <circle cx="30" cy="30" r="25" fill="#FF5722"/>
    <text x="30" y="42" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#FFFFFF" text-anchor="middle">!</text>
  </g>
  
  <!-- 对勾图标 -->
  <g transform="translate(720, 150)">
    <circle cx="30" cy="30" r="25" fill="#4CAF50"/>
    <path d="M 20 30 L 27 37 L 40 24" stroke="#FFFFFF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- 右下角标签 -->
  <rect x="760" y="340" width="120" height="30" rx="15" fill="#FF9800" opacity="0.2"/>
  <text x="820" y="360" font-family="Arial, sans-serif" font-size="14" fill="#FF9800" text-anchor="middle" font-weight="bold">#进阶篇 12/19</text>
</svg>
