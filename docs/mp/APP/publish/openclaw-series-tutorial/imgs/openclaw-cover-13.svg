<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 383">
  <!-- 背景 -->
  <rect width="900" height="383" fill="#E3F2FD"/>
  
  <!-- 左侧彩色边条 - 实战篇紫色 -->
  <rect width="8" height="383" fill="#9C27B0"/>
  
  <!-- 右上角 Logo -->
  <rect x="750" y="20" width="130" height="40" rx="5" fill="#0066CC" opacity="0.1"/>
  <text x="815" y="47" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0066CC" text-anchor="middle">OpenClaw</text>
  
  <!-- 主标题 -->
  <text x="450" y="120" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#333333" text-anchor="middle">自动化周报生成系统</text>
  
  <!-- 副标题 -->
  <text x="450" y="170" font-family="Arial, sans-serif" font-size="28" fill="#666666" text-anchor="middle">实战案例 01</text>
  
  <!-- 左侧:日历 -->
  <g transform="translate(150, 200)">
    <rect x="0" y="0" width="120" height="140" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="2"/>
    <rect x="0" y="0" width="120" height="40" rx="8" fill="#9C27B0"/>
    <text x="60" y="28" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">周五</text>
    <text x="60" y="80" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#333333" text-anchor="middle">11</text>
    <text x="60" y="110" font-family="Arial, sans-serif" font-size="12" fill="#666666" text-anchor="middle">2026年3月</text>
    <text x="60" y="130" font-family="Arial, sans-serif" font-size="10" fill="#FF6600" text-anchor="middle">周报日</text>
  </g>
  
  <!-- 中央:箭头和流程 -->
  <g transform="translate(300, 240)">
    <path d="M 0 35 L 80 35" stroke="#9C27B0" stroke-width="4" fill="none" marker-end="url(#arrowhead13)"/>
    <text x="40" y="20" font-family="Arial, sans-serif" font-size="12" fill="#9C27B0" text-anchor="middle">自动</text>
  </g>
  
  <!-- 右侧:周报PPT -->
  <g transform="translate(500, 200)">
    <rect x="0" y="0" width="200" height="140" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="2"/>
    <!-- PPT封面 -->
    <rect x="10" y="10" width="180" height="60" fill="#0066CC"/>
    <text x="100" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">团队周报</text>
    <text x="100" y="55" font-family="Arial, sans-serif" font-size="11" fill="#E3F2FD" text-anchor="middle">2026-03-11</text>
    
    <!-- PPT内容 -->
    <rect x="10" y="80" width="85" height="50" fill="#E3F2FD"/>
    <rect x="105" y="80" width="85" height="50" fill="#FFF3E0"/>
    <!-- 图表 -->
    <rect x="20" y="90" width="15" height="30" fill="#4CAF50"/>
    <rect x="40" y="100" width="15" height="20" fill="#2196F3"/>
    <rect x="60" y="95" width="15" height="25" fill="#FF9800"/>
  </g>
  
  <defs>
    <marker id="arrowhead13" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#9C27B0"/>
    </marker>
  </defs>
  
  <!-- 右下角标签 -->
  <rect x="760" y="340" width="120" height="30" rx="15" fill="#9C27B0" opacity="0.2"/>
  <text x="820" y="360" font-family="Arial, sans-serif" font-size="14" fill="#9C27B0" text-anchor="middle" font-weight="bold">#实战篇 13/19</text>
</svg>
