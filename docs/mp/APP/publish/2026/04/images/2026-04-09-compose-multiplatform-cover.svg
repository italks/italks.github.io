<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="versionGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#F97316" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bg)"/>

  <!-- 顶部装饰线 -->
  <line x1="60" y1="50" x2="840" y2="50" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>

  <!-- 主标题 -->
  <text x="450" y="110" text-anchor="middle" font-family="'SF Pro Display', -apple-system, 'Microsoft YaHei', sans-serif" font-size="28" font-weight="600" fill="#E6EDF3" letter-spacing="3">
    Compose Multiplatform
  </text>

  <!-- 版本号核心区域 -->
  <rect x="300" y="145" width="300" height="180" rx="20" fill="url(#versionGlow)" stroke="url(#accent)" stroke-width="1.5" opacity="0.8"/>
  
  <!-- 版本号 -->
  <text x="450" y="245" text-anchor="middle" font-family="'SF Pro Display', -apple-system, sans-serif" font-size="80" font-weight="800" fill="#FFFFFF">
    1.10
  </text>
  <text x="450" y="295" text-anchor="middle" font-family="'SF Pro Display', -apple-system, 'Microsoft YaHei', sans-serif" font-size="16" fill="#8B949E" letter-spacing="2">
    DEEP DIVE
  </text>

  <!-- 左侧 Android 图标 -->
  <g transform="translate(120, 195)">
    <rect x="0" y="0" width="44" height="76" rx="8" fill="none" stroke="#3FB850" stroke-width="2"/>
    <circle cx="22" cy="68" r="5" fill="none" stroke="#3FB850" stroke-width="1.5"/>
    <line x1="12" y1="10" x2="32" y2="10" stroke="#3FB850" stroke-width="1.5" opacity="0.5"/>
    <text x="22" y="-14" text-anchor="middle" font-size="13" fill="#3FB850" font-weight="600">Android</text>
  </g>

  <!-- 右侧 iOS 图标 -->
  <g transform="translate(736, 195)">
    <rect x="0" y="0" width="44" height="76" rx="8" fill="none" stroke="#007AFF" stroke-width="2"/>
    <circle cx="22" cy="68" r="5" fill="none" stroke="#007AFF" stroke-width="1.5"/>
    <line x1="12" y1="10" x2="32" y2="10" stroke="#007AFF" stroke-width="1.5" opacity="0.5"/>
    <text x="22" y="-14" text-anchor="middle" font-size="13" fill="#007AFF" font-weight="600">iOS</text>
  </g>

  <!-- 中间连接箭头 -->
  <path d="M175 233 L210 233 M190 223 L205 233 L190 243" stroke="#8B949E" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M690 233 L725 233 M710 223 L695 233 L710 243" stroke="#8B949E" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- 三大特性 - 简洁标签 -->
  <g transform="translate(170, 355)">
    <!-- 统一Preview -->
    <rect x="0" y="0" width="170" height="42" rx="21" fill="#7C3AED" fill-opacity="0.15" stroke="#7C3AED" stroke-width="1"/>
    <text x="85" y="27" text-anchor="middle" font-family="-apple-system, 'Microsoft YaHei', sans-serif" font-size="15" font-weight="500" fill="#A78BFA">@Preview</text>
    
    <!-- Navigation 3 -->
    <rect x="190" y="0" width="170" height="42" rx="21" fill="#F97316" fill-opacity="0.15" stroke="#F97316" stroke-width="1"/>
    <text x="275" y="27" text-anchor="middle" font-family="-apple-system, 'Microsoft YaHei', sans-serif" font-size="15" font-weight="500" fill="#FB923C">Navigation 3</text>
    
    <!-- Hot Reload -->
    <rect x="380" y="0" width="170" height="42" rx="21" fill="#10B981" fill-opacity="0.15" stroke="#10B981" stroke-width="1"/>
    <text x="465" y="27" text-anchor="middle" font-family="-apple-system, 'Microsoft YaHei', sans-serif" font-size="15" font-weight="500" fill="#34D399">Hot Reload</text>
  </g>

  <!-- 底部副标题 -->
  <text x="450" y="440" text-anchor="middle" font-family="'SF Pro Display', -apple-system, 'Microsoft YaHei', sans-serif" font-size="18" font-weight="500" fill="#8B949E">
    KMP 正式「威胁」Flutter
  </text>

  <!-- 底部装饰线 -->
  <line x1="280" y1="458" x2="620" y2="458" stroke="url(#accent)" stroke-width="1.5" opacity="0.3"/>

  <!-- 品牌标识 -->
  <text x="450" y="480" text-anchor="middle" font-family="-apple-system, 'Microsoft YaHei', sans-serif" font-size="11" fill="#484F58" letter-spacing="1">
    APP 开发前线 · 技术干货
  </text>
</svg>