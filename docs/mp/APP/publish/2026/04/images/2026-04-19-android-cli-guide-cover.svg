<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <!-- 标题渐变 -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3DDC84"/>
      <stop offset="50%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
    <!-- 卡片发光 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bg)"/>

  <!-- 点阵纹理 -->
  <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="0.7" fill="rgba(255,255,255,0.04)"/>
  </pattern>
  <rect width="900" height="500" fill="url(#dots)"/>

  <!-- 顶部标签 -->
  <g transform="translate(40, 32)">
    <rect width="72" height="26" rx="13" fill="rgba(61,220,132,0.12)" stroke="rgba(61,220,132,0.35)" stroke-width="1"/>
    <text x="36" y="17.5" font-family="'Microsoft YaHei'" font-size="12" fill="#3DDC84" text-anchor="middle">Android</text>

    <rect x="82" width="80" height="26" rx="13" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
    <text x="122" y="17.5" font-family="'Microsoft YaHei'" font-size="12" fill="#a78bfa" text-anchor="middle">CLI 工具</text>

    <rect x="170" width="96" height="26" rx="13" fill="rgba(251,146,60,0.1)" stroke="rgba(251,146,60,0.28)" stroke-width="1"/>
    <text x="218" y="17.5" font-family="'Microsoft YaHei'" font-size="11" fill="#fb923c" text-anchor="middle">Google 官方发布</text>
  </g>

  <!-- ===== 主标题区 ===== -->
  <text x="450" y="105" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="38" font-weight="bold" fill="url(#titleGrad)" text-anchor="middle">
    Google 新神器让 Android 开发
  </text>
  <text x="450" y="155" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="38" font-weight="bold" fill="url(#titleGrad)" text-anchor="middle">
    快 3 倍
  </text>

  <!-- 副标题 -->
  <text x="450" y="195" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="16" fill="rgba(255,255,255,0.45)" text-anchor="middle">
    Android CLI 完全指南 · 从安装到实战
  </text>

  <!-- 分割线 -->
  <line x1="300" y1="215" x2="600" y2="215" stroke="url(#titleGrad)" stroke-width="1.5" opacity="0.5"/>

  <!-- ===== 三大数据卡片 ===== -->
  <g transform="translate(95, 240)">
    <!-- 卡片1: 3X速度 -->
    <g filter="url(#glow)">
      <rect width="220" height="120" rx="14" fill="rgba(61,220,132,0.07)" stroke="rgba(61,220,132,0.25)" stroke-width="1.2"/>
    </g>
    <text x="110" y="38" font-family="'Microsoft YaHei'" font-size="13" fill="rgba(61,220,132,0.75)">开发效率</text>
    <text x="110" y="85" font-family="'Arial Black',sans-serif" font-size="46" font-weight="bold" fill="#3DDC84" text-anchor="middle">3×</text>
    <text x="110" y="108" font-family="'Microsoft YaHei'" font-size="11" fill="rgba(255,255,255,0.35)" text-anchor="middle">任务完成更快</text>

    <!-- 卡片2: -70% Token -->
    <g transform="translate(245, 0)">
      <g filter="url(#glow)">
        <rect width="220" height="120" rx="14" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.28)" stroke-width="1.2"/>
      </g>
      <text x="110" y="38" font-family="'Microsoft YaHei'" font-size="13" fill="rgba(167,139,250,0.8)">Token 消耗</text>
      <text x="110" y="85" font-family="'Arial Black',sans-serif" font-size="44" font-weight="bold" fill="#a78bfa" text-anchor="middle">−70%</text>
      <text x="110" y="108" font-family="'Microsoft YaHei'" font-size="11" fill="rgba(255,255,255,0.35)" text-anchor="middle">成本大幅降低</text>
    </g>

    <!-- 卡片3: 15秒 -->
    <g transform="translate(490, 0)">
      <g filter="url(#glow)">
        <rect width="210" height="120" rx="14" fill="rgba(251,146,60,0.06)" stroke="rgba(251,146,60,0.25)" stroke-width="1.2"/>
      </g>
      <text x="105" y="38" font-family="'Microsoft YaHei'" font-size="13" fill="rgba(251,146,60,0.8)">从零到运行</text>
      <text x="105" y="85" font-family="'Arial Black',sans-serif" font-size="44" font-weight="bold" fill="#fb923c" text-anchor="middle">15秒</text>
      <text x="105" y="108" font-family="'Microsoft YaHei'" font-size="11" fill="rgba(255,255,255,0.35)" text-anchor="middle">一条命令搞定</text>
    </g>
  </g>

  <!-- ===== 终端代码块（底部） ===== -->
  <g transform="translate(45, 385)">
    <rect width="810" height="88" rx="10" fill="rgba(0,0,0,0.42)" stroke="rgba(61,220,132,0.18)" stroke-width="1"/>
    
    <!-- 命令行内容 -->
    <text x="18" y="28" font-family="'Consolas','Monaco',monospace" font-size="13"><tspan fill="rgba(255,255,255,0.3)">$</tspan> <tspan fill="#3DDC84">android</tspan> <tspan fill="#e2e8f0">create</tspan> <tspan fill="rgba(255,255,255,0.3)">--template modern-compose-app MyApp</tspan></text>
    
    <text x="18" y="50" font-family="'Consolas','Monaco',monospace" font-size="13"><tspan fill="rgba(255,255,255,0.3)">$</tspan> <tspan fill="#3DDC84">android</tspan> <tspan fill="#e2e8f0">skills install</tspan> <tspan fill="rgba(255,255,255,0.3)">navigation edge-to-edge</tspan></text>
    
    <text x="18" y="72" font-family="'Consolas','Monaco',monospace" font-size="13"><tspan fill="rgba(255,255,255,0.3)">$</tspan> <tspan fill="#3DDC84">android</tspan> <tspan fill="#fb923c">run</tspan> <tspan fill="#3DDC84"> ✅ App launched on device!</tspan></text>
  </g>

  <!-- 底部装饰线 -->
  <line x1="100" y1="488" x2="800" y2="488" stroke="rgba(61,220,132,0.15)" stroke-width="1"/>
</svg>