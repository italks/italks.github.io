<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0e1a"/>
      <stop offset="50%" stop-color="#141830"/>
      <stop offset="100%" stop-color="#0a0d18"/>
    </linearGradient>
    <linearGradient id="iosBlueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#5AC8FA"/>
    </linearGradient>
    <linearGradient id="alertColorGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#FFB74D"/>
    </linearGradient>
    <radialGradient id="glowArea" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#007AFF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#007AFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bgGrad)"/>

  <!-- 中央光晕 -->
  <ellipse cx="450" cy="230" rx="380" ry="220" fill="url(#glowArea)"/>

  <!-- iOS 26 标签 -->
  <g transform="translate(310, 60)">
    <rect width="280" height="38" rx="19" fill="url(#iosBlueGrad)" opacity="0.92"/>
    <text x="140" y="25" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif"
          font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="1.5">iOS 26 SDK 强制要求</text>
  </g>

  <!-- 主标题 -->
  <text x="450" y="150" font-family="PingFang SC, Microsoft YaHei, -apple-system, sans-serif"
        font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">
    还剩 20 天！不升级就拒审
  </text>

  <!-- 截止日期卡片 -->
  <g transform="translate(450, 210)">
    <rect x="-230" y="0" width="460" height="110" rx="20" fill="rgba(255,107,107,0.06)"
          stroke="rgba(255,107,107,0.28)" stroke-width="1.5"/>
    <text x="0" y="35" font-family="PingFang SC, Microsoft YaHei, sans-serif"
          font-size="16" fill="rgba(255,255,255,0.55)" text-anchor="middle" letter-spacing="2">
      App Store 截止日期
    </text>
    <text x="0" y="85" font-family="Helvetica Neue, -apple-system, Helvetica, sans-serif"
          font-size="42" font-weight="bold" fill="url(#alertColorGrad)" text-anchor="middle">
      2026 / 04 / 28
    </text>
  </g>

  <!-- 三条核心要点 -->
  <g transform="translate(160, 360)">
    <circle cx="7" cy="0" r="7" fill="#007AFF"/>
    <text x="25" y="5" font-family="PingFang SC, Microsoft YaHei, sans-serif"
          font-size="15" fill="rgba(255,255,255,0.82)">
      Xcode 26 + iOS 26 SDK 构建成硬性门槛
    </text>

    <circle cx="7" cy="34" r="7" fill="#5856D6"/>
    <text x="25" y="39" font-family="PingFang SC, Microsoft YaHei, sans-serif"
          font-size="15" fill="rgba(255,255,255,0.82)">
      UIScene 生命周期适配，不升级可能崩溃
    </text>

    <circle cx="7" cy="68" r="7" fill="#5AC8FA"/>
    <text x="25" y="73" font-family="PingFang SC, Microsoft YaHei, sans-serif"
          font-size="15" fill="rgba(255,255,255,0.82)">
      液态玻璃 UI 自动生效，覆盖 Flutter / RN / Swift
    </text>
  </g>

  <!-- 底部标识 -->
  <g transform="translate(290, 460)">
    <rect width="320" height="32" rx="8" fill="rgba(255,255,255,0.05)"
          stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="160" y="21" font-family="PingFang SC, Microsoft YaHei, sans-serif"
          font-size="12" fill="rgba(255,255,255,0.45)" text-anchor="middle">
      移动 APP 开发 · 技术实战指南
    </text>
  </g>
</svg>