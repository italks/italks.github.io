<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="50%" style="stop-color:#111638"/>
      <stop offset="100%" style="stop-color:#0d1033"/>
    </linearGradient>
    
    <!-- SpaceX风格主色渐变（白→灰） -->
    <linearGradient id="spacexGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#a0a8c0"/>
    </linearGradient>
    
    <!-- Cursor蓝紫渐变 -->
    <linearGradient id="cursorGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4d8"/>
      <stop offset="100%" style="stop-color:#7b2cbf"/>
    </linearGradient>
    
    <!-- 金钱/价值金色渐变 -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f4d03f"/>
      <stop offset="50%" style="stop-color:#f5b041"/>
      <stop offset="100%" style="stop-color:#e67e22"/>
    </linearGradient>
    
    <!-- 警示红渐变 -->
    <linearGradient id="alertRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a5a"/>
    </linearGradient>
    
    <!-- 光晕效果 -->
    <radialGradient id="glowCenter" cx="50%" cy="40%" r="35%">
      <stop offset="0%" style="stop-color:#7b2cbf;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#7b2cbf;stop-opacity:0"/>
    </radialGradient>
    
    <radialGradient id="glowGold" cx="50%" cy="55%" r="25%">
      <stop offset="0%" style="stop-color:#f4d03f;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#f4d03f;stop-opacity:0"/>
    </radialGradient>

    <!-- 网格图案 -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1a2050" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    
    <!-- 发光滤镜 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  
  <!-- 网格层 -->
  <rect width="900" height="500" fill="url(#grid)" opacity="0.4"/>
  
  <!-- 中央光晕 -->
  <ellipse cx="450" cy="200" rx="350" ry="180" fill="url(#glowCenter)"/>
  <ellipse cx="450" cy="280" rx="280" ry="120" fill="url(#glowGold)"/>
  
  <!-- ====== 顶部紧急标签条 ====== -->
  <rect x="0" y="0" width="900" height="36" fill="#ff6b6b" opacity="0.9"/>
  <text x="450" y="24" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" font-weight="bold" fill="#ffffff">
    ⚡ 刚刚发布 · AI编程史上最大交易
  </text>
  
  <!-- ====== 主标题区域 ====== -->
  <text x="450" y="85" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="38" font-weight="bold" fill="url(#spacexGrad)" filter="url(#glow)">
    马斯克600亿"锁定"Cursor
  </text>
  
  <!-- 副标题 -->
  <text x="450" y="125" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="20" fill="#8892b0" letter-spacing="1">
    AI编程赛道最大收购案 · 对移动开发者意味着什么？
  </text>
  
  <!-- 分隔线 -->
  <line x1="150" y1="145" x2="750" y2="145" stroke="url(#cursorGrad)" stroke-width="1.5" opacity="0.5"/>
  
  <!-- ====== 三大核心数据卡片 ====== -->
  
  <!-- 卡片1: 600亿美元 -->
  <g transform="translate(80, 170)">
    <rect x="0" y="0" width="230" height="95" rx="10" ry="10" fill="#141838" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.85"/>
    <text x="115" y="38" text-anchor="middle" font-family="'Arial Black',Impact,sans-serif" font-size="34" font-weight="bold" fill="url(#goldGrad)" filter="url(#glow)">$600亿</text>
    <text x="115" y="62" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="12" fill="#a0aec0">收购锁定金额</text>
    <text x="115" y="82" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#718096">≈ 4098亿人民币</text>
  </g>
  
  <!-- 卡片2: 00后团队/4年 -->
  <g transform="translate(335, 170)">
    <rect x="0" y="0" width="230" height="95" rx="10" ry="10" fill="#141838" stroke="url(#cursorGrad)" stroke-width="1.5" opacity="0.85"/>
    <text x="115" y="35" text-anchor="middle" font-family="'Arial Black',Impact,sans-serif" font-size="30" font-weight="bold" fill="url(#cursorGrad)" filter="url(#glow)">00后</text>
    <text x="115" y="58" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="13" fill="#a0aec0">MIT辍学生创办</text>
    <text x="115" y="78" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#718096">4年 · 年入20亿美元</text>
  </g>
  
  <!-- 卡片3: 67% 500强使用 -->
  <g transform="translate(590, 170)">
    <rect x="0" y="0" width="230" height="95" rx="10" ry="10" fill="#141838" stroke="#00b4d8" stroke-width="1.5" opacity="0.85"/>
    <text x="115" y="38" text-anchor="middle" font-family="'Arial Black',Impact,sans-serif" font-size="34" font-weight="bold" fill="#00b4d8" filter="url(#glow)">67%</text>
    <text x="115" y="62" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="12" fill="#a0aec0">《财富》500强</text>
    <text x="115" y="82" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#718096">日生成1.5亿行代码</text>
  </g>
  
  <!-- ====== 中部：SpaceX ↔ Cursor 关系可视化 ====== -->
  <g transform="translate(0, 285)">
    
    <!-- SpaceX侧 (左侧) -->
    <g transform="translate(100, 20)">
      <!-- SpaceX标识背景圆 -->
      <circle cx="60" cy="35" r="42" fill="#0d111f" stroke="#e8e8e8" stroke-width="1.5" opacity="0.8"/>
      <!-- SpaceX简化文字Logo -->
      <text x="60" y="31" text-anchor="middle" font-family="'Arial',sans-serif" font-size="11" font-weight="bold" fill="#ffffff" letter-spacing="2">SPACEX</text>
      <text x="60" y="46" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="9" fill="#8892b0">太空探索</text>
      
      <!-- SpaceX标签 -->
      <rect x="-5" y="85" width="130" height="22" rx="4" fill="#1a2050" stroke="#555" stroke-width="0.5"/>
      <text x="60" y="100" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#c0c8e0">Colossus 百万H100算力</text>
      
      <rect x="-5" y="112" width="130" height="22" rx="4" fill="#1a2050" stroke="#555" stroke-width="0.5"/>
      <text x="60" y="127" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#c0c8e0">IPO估值 1.25万亿美元</text>
    </g>
    
    <!-- 中央连接箭头和交易信息 -->
    <g transform="translate(270, 35)">
      <!-- 双向箭头线 -->
      <line x1="0" y1="25" x2="130" y2="25" stroke="url(#goldGrad)" stroke-width="2.5" stroke-dasharray="8,4" opacity="0.8"/>
      
      <!-- 左箭头 -->
      <polygon points="8,25 18,19 18,31" fill="#f4d03f" opacity="0.8"/>
      <!-- 右箭头 -->
      <polygon points="122,25 112,19 112,31" fill="#f4d03f" opacity="0.8"/>
      
      <!-- 交易核心标签 -->
      <rect x="25" y="0" width="80" height="24" rx="12" fill="url(#goldGrad)" opacity="0.9"/>
      <text x="65" y="16" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">600亿 或 100亿</text>
      
      <!-- 底部说明 -->
      <text x="65" y="55" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#8892b0">收购权 / 深度合作 二选一</text>
    </g>
    
    <!-- Cursor侧 (右侧) -->
    <g transform="translate(440, 20)">
      <!-- Cursor标识背景圆 -->
      <circle cx="60" cy="35" r="42" fill="#0d111f" stroke="url(#cursorGrad)" stroke-width="1.5" opacity="0.8"/>
      <!-- Cursor图标：文字+光标符号 -->
      <text x="48" y="32" text-anchor="middle" font-family="'Arial',sans-serif" font-size="16" font-weight="bold" fill="url(#cursorGrad)">Cursor</text>
      <!-- 光标闪烁符 -->
      <text x="83" y="33" text-anchor="middle" font-family="monospace" font-size="18" fill="#00b4d8">▎</text>
      <text x="60" y="50" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="9" fill="#8892b0">AI编程工具</text>
      
      <!-- Cursor标签 -->
      <rect x="-5" y="85" width="130" height="22" rx="4" fill="#1a2050" stroke="#555" stroke-width="0.5"/>
      <text x="60" y="100" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#c0c8e0">估值 500 亿美元</text>
      
      <rect x="-5" y="112" width="130" height="22" rx="4" fill="#1a2050" stroke="#555" stroke-width="0.5"/>
      <text x="60" y="127" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#c0c8e0">年化收入 20亿+</text>
    </g>
    
    <!-- 右侧额外说明 -->
    <g transform="translate(600, 30)">
      <rect x="0" y="0" width="200" height="110" rx="8" fill="#12152e" stroke="#333" stroke-width="0.5" opacity="0.7"/>
      <text x="100" y="22" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="11" font-weight="bold" fill="#f4d03f">🎯 马斯克原话</text>
      <text x="100" y="44" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#a0aec0">"开发全球最有用的模型"</text>
      <line x1="15" y1="54" x2="185" y2="54" stroke="#333" stroke-width="0.5"/>
      <text x="100" y="72" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#8892b0">xAI Grok 追赶乏力</text>
      <text x="100" y="90" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#8892b0">从地基重建 → 直接买</text>
      <text x="100" y="105" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="9" fill="#666">2026.06 IPO前放大招</text>
    </g>
  </g>
  
  <!-- ====== 底部四大影响要点标签栏 ====== -->
  <g transform="translate(0, 438)">
    <!-- 标签背景条 -->
    <rect x="0" y="0" width="900" height="62" fill="#0a0e22" opacity="0.9"/>
    <line x1="0" y1="0" x2="900" y2="0" stroke="url(#goldGrad)" stroke-width="1" opacity="0.4"/>
    
    <!-- 四个标签 -->
    <g transform="translate(45, 14)">
      <!-- 标签1: 好消息 -->
      <rect x="0" y="0" width="190" height="36" rx="6" fill="#0d3320" stroke="#10b981" stroke-width="0.8" opacity="0.8"/>
      <text x="95" y="15" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#10b981">✅ 好消息</text>
      <text x="95" y="30" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="9" fill="#6ee7b7">Colossus算力加持</text>
    </g>
    
    <g transform="translate(255, 14)">
      <!-- 标签2: 不确定 -->
      <rect x="0" y="0" width="190" height="36" rx="6" fill="#3d2e0a" stroke="#f59e0b" stroke-width="0.8" opacity="0.8"/>
      <text x="95" y="15" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#f59e0b">⚠️ 不确定</text>
      <text x="95" y="30" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="9" fill="#fcd34d">中立性 &amp; 数据隐私</text>
    </g>
    
    <g transform="translate(465, 14)">
      <!-- 标签3: 风险 -->
      <rect x="0" y="0" width="190" height="36" rx="6" fill="#3d0a0a" stroke="#ef4444" stroke-width="0.8" opacity="0.8"/>
      <text x="95" y="15" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#ef4444">🔴 风险预警</text>
      <text x="95" y="30" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="9" fill="#fca5a5">Anthropic反制 / 涨价</text>
    </g>
    
    <g transform="translate(675, 14)">
      <!-- 标签4: 行动 -->
      <rect x="0" y="0" width="190" height="36" rx="6" fill="#1a1a3e" stroke="#7b2cbf" stroke-width="0.8" opacity="0.8"/>
      <text x="95" y="15" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#a78bfa">📌 开发者行动</text>
      <text x="95" y="30" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="9" fill="#c4b5fd">备份配置 · 尝试替代品</text>
    </g>
  </g>
  
  <!-- ====== 装饰元素 ====== -->
  
  <!-- 二进制装饰流 - 左上角 -->
  <text x="15" y="55" font-family="monospace" font-size="8" fill="#1a2050" opacity="0.4">01001001</text>
  <text x="15" y="68" font-family="monospace" font-size="8" fill="#1a2050" opacity="0.3">11010010</text>
  <text x="75" y="58" font-family="monospace" font-size="8" fill="#1a2050" opacity="0.25">00110101</text>
  
  <!-- 二进制装饰流 - 右上角 -->
  <text x="810" y="55" font-family="monospace" font-size="8" fill="#1a2050" opacity="0.4">10110010</text>
  <text x="840" y="68" font-family="monospace" font-size="8" fill="#1a2050" opacity="0.3">01101001</text>
  <text x="800" y="80" font-family="monospace" font-size="8" fill="#1a2050" opacity="0.25">10010110</text>
  
  <!-- 星点装饰 -->
  <circle cx="50" cy="160" r="1.5" fill="#fff" opacity="0.3"/>
  <circle cx="850" cy="150" r="1.5" fill="#fff" opacity="0.25"/>
  <circle cx="30" cy="300" r="1" fill="#00b4d8" opacity="0.3"/>
  <circle cx="870" cy="320" r="1" fill="#f4d03f" opacity="0.3"/>
  <circle cx="200" cy="420" r="1.2" fill="#fff" opacity="0.2"/>
  <circle cx="700" cy="430" r="1.2" fill="#fff" opacity="0.2"/>
  
  <!-- 来源标注 -->
  <text x="880" y="495" text-anchor="end" font-family="'Microsoft YaHei',sans-serif" font-size="8" fill="#4a5568" opacity="0.6">2026.04.23 | 移动开发前沿</text>
</svg>