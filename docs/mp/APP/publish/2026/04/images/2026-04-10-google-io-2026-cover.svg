<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F2447;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#1A1A3E;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0D1B2A;stop-opacity:1"/>
    </linearGradient>
    <!-- Google彩色渐变 -->
    <linearGradient id="googleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4285F4"/>
      <stop offset="33%" style="stop-color:#EA4335"/>
      <stop offset="66%" style="stop-color:#FBBC05"/>
      <stop offset="100%" style="stop-color:#34A853"/>
    </linearGradient>
    <!-- 彩虹光晕 -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4285F4;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0F2447;stop-opacity:0"/>
    </radialGradient>
    <!-- 光线渐变 -->
    <linearGradient id="rayGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4285F4;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#4285F4;stop-opacity:0"/>
    </linearGradient>
    <!-- 卡片渐变 -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#152840;stop-opacity:1"/>
    </linearGradient>
    <!-- 过滤器：模糊 -->
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bgGrad)"/>

  <!-- 网格线装饰 -->
  <g opacity="0.06">
    <line x1="0" y1="100" x2="900" y2="100" stroke="#4285F4" stroke-width="1"/>
    <line x1="0" y1="200" x2="900" y2="200" stroke="#4285F4" stroke-width="1"/>
    <line x1="0" y1="300" x2="900" y2="300" stroke="#4285F4" stroke-width="1"/>
    <line x1="0" y1="400" x2="900" y2="400" stroke="#4285F4" stroke-width="1"/>
    <line x1="150" y1="0" x2="150" y2="500" stroke="#4285F4" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="500" stroke="#4285F4" stroke-width="1"/>
    <line x1="450" y1="0" x2="450" y2="500" stroke="#4285F4" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="500" stroke="#4285F4" stroke-width="1"/>
    <line x1="750" y1="0" x2="750" y2="500" stroke="#4285F4" stroke-width="1"/>
  </g>

  <!-- 光晕效果 -->
  <ellipse cx="450" cy="250" rx="300" ry="200" fill="url(#glowGrad)" filter="url(#blur)"/>

  <!-- 左侧装饰圆点 -->
  <circle cx="80" cy="80" r="3" fill="#4285F4" opacity="0.6"/>
  <circle cx="60" cy="140" r="2" fill="#EA4335" opacity="0.5"/>
  <circle cx="110" cy="160" r="4" fill="#34A853" opacity="0.4"/>
  <circle cx="40" cy="220" r="2" fill="#FBBC05" opacity="0.6"/>
  <circle cx="820" cy="80" r="3" fill="#EA4335" opacity="0.6"/>
  <circle cx="845" cy="160" r="2" fill="#4285F4" opacity="0.5"/>
  <circle cx="870" cy="120" r="4" fill="#FBBC05" opacity="0.4"/>
  <circle cx="800" cy="200" r="2" fill="#34A853" opacity="0.6"/>

  <!-- Google I/O Logo区域 -->
  <!-- Google 彩色横条 -->
  <rect x="300" y="55" width="300" height="6" rx="3" fill="url(#googleGrad)"/>

  <!-- "GOOGLE I/O" 大标题 -->
  <text x="450" y="145" text-anchor="middle" font-family="'Google Sans', 'Segoe UI', Arial, sans-serif" font-weight="700" font-size="58" fill="white" filter="url(#glow)">Google I/O</text>
  <text x="450" y="200" text-anchor="middle" font-family="'Google Sans', 'Segoe UI', Arial, sans-serif" font-weight="700" font-size="58" fill="url(#googleGrad)" filter="url(#glow)">2026</text>

  <!-- 副标题 -->
  <text x="450" y="248" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="400" font-size="19" fill="#A8C4E0">开发者终极预热指南</text>

  <!-- 分割线 -->
  <line x1="200" y1="268" x2="700" y2="268" stroke="url(#googleGrad)" stroke-width="1.5" opacity="0.5"/>

  <!-- 特性标签行 -->
  <!-- Android 17 标签 -->
  <rect x="98" y="288" width="140" height="34" rx="17" fill="#4285F4" opacity="0.2"/>
  <rect x="98" y="288" width="140" height="34" rx="17" fill="none" stroke="#4285F4" stroke-width="1.5" opacity="0.7"/>
  <text x="168" y="310" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="13" fill="#4285F4">📱 Android 17</text>

  <!-- Gemini 3 标签 -->
  <rect x="258" y="288" width="120" height="34" rx="17" fill="#EA4335" opacity="0.2"/>
  <rect x="258" y="288" width="120" height="34" rx="17" fill="none" stroke="#EA4335" stroke-width="1.5" opacity="0.7"/>
  <text x="318" y="310" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="13" fill="#EA4335">🤖 Gemini 3</text>

  <!-- Android XR 标签 -->
  <rect x="398" y="288" width="128" height="34" rx="17" fill="#34A853" opacity="0.2"/>
  <rect x="398" y="288" width="128" height="34" rx="17" fill="none" stroke="#34A853" stroke-width="1.5" opacity="0.7"/>
  <text x="462" y="310" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="13" fill="#34A853">🥽 Android XR</text>

  <!-- KMP 标签 -->
  <rect x="546" y="288" width="100" height="34" rx="17" fill="#FBBC05" opacity="0.2"/>
  <rect x="546" y="288" width="100" height="34" rx="17" fill="none" stroke="#FBBC05" stroke-width="1.5" opacity="0.7"/>
  <text x="596" y="310" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="13" fill="#FBBC05">⚡ KMP</text>

  <!-- 本地AI标签 -->
  <rect x="666" y="288" width="130" height="34" rx="17" fill="#9C27B0" opacity="0.2"/>
  <rect x="666" y="288" width="130" height="34" rx="17" fill="none" stroke="#9C27B0" stroke-width="1.5" opacity="0.7"/>
  <text x="731" y="310" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="13" fill="#BB86FC">🧠 本地AI</text>

  <!-- 倒计时区域 -->
  <rect x="310" y="348" width="280" height="60" rx="12" fill="url(#cardGrad)" stroke="#4285F4" stroke-width="1" stroke-opacity="0.4"/>
  <!-- 倒计时标志 -->
  <text x="345" y="372" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#A8C4E0">📅 距大会开幕</text>
  <text x="450" y="398" text-anchor="middle" font-family="'Google Sans', 'Segoe UI', Arial, sans-serif" font-weight="700" font-size="22" fill="url(#googleGrad)">2026年5月19-20日</text>

  <!-- 右下装饰 -->
  <circle cx="830" cy="440" r="40" fill="none" stroke="#4285F4" stroke-width="1" stroke-opacity="0.2"/>
  <circle cx="830" cy="440" r="25" fill="none" stroke="#EA4335" stroke-width="1" stroke-opacity="0.2"/>
  <circle cx="830" cy="440" r="10" fill="#34A853" opacity="0.3"/>

  <!-- 左下装饰 -->
  <polygon points="70,420 90,380 110,420" fill="none" stroke="#FBBC05" stroke-width="1.5" stroke-opacity="0.4"/>
  <polygon points="50,460 80,410 110,460" fill="none" stroke="#4285F4" stroke-width="1" stroke-opacity="0.2"/>

  <!-- 底部标识 -->
  <text x="450" y="476" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#4A7AAB" letter-spacing="3">AppDev Weekly · 移动开发 · 技术干货</text>

  <!-- 顶部装饰光点 -->
  <circle cx="450" cy="30" r="2" fill="#FBBC05" opacity="0.8"/>
  <circle cx="420" cy="25" r="1.5" fill="#4285F4" opacity="0.6"/>
  <circle cx="480" cy="25" r="1.5" fill="#EA4335" opacity="0.6"/>
</svg>
