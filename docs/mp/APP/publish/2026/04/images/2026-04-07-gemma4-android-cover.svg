<svg width="900" height="500" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d2040"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4285F4"/>
      <stop offset="50%" style="stop-color:#34A853"/>
      <stop offset="100%" style="stop-color:#4285F4"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bg)"/>

  <!-- 装饰：左侧大号Gemma 4文字水印 -->
  <text x="-30" y="320" font-family="Arial Black, Arial" font-size="200" fill="#ffffff" opacity="0.03">Gemma 4</text>

  <!-- Google 四色条 -->
  <rect x="60" y="70" width="8" height="36" rx="3" fill="#4285F4"/>
  <rect x="72" y="70" width="8" height="36" rx="3" fill="#EA4335"/>
  <rect x="84" y="70" width="8" height="36" rx="3" fill="#FBBC05"/>
  <rect x="96" y="70" width="8" height="36" rx="3" fill="#34A853"/>

  <!-- 品牌名 -->
  <text x="116" y="88" font-family="Arial Black, Arial" font-size="18" fill="#fff" font-weight="bold">Google</text>
  <text x="116" y="112" font-family="Arial Black, Arial" font-size="28" fill="url(#accent)" font-weight="bold">Gemma 4</text>

  <!-- 开源标签 -->
  <rect x="116" y="122" width="90" height="20" rx="10" fill="#34A853" opacity="0.15"/>
  <rect x="116" y="122" width="90" height="20" rx="10" fill="none" stroke="#34A853" stroke-width="1.2"/>
  <text x="161" y="136" font-family="Arial" font-size="10" fill="#34A853" text-anchor="middle" font-weight="bold">OPEN SOURCE</text>

  <!-- 主标题 -->
  <text x="60" y="195" font-family="'PingFang SC', 'Microsoft YaHei', Arial Black, Arial" font-size="38" fill="#ffffff" font-weight="bold">你的 App 现在</text>
  <text x="60" y="248" font-family="'PingFang SC', 'Microsoft YaHei', Arial Black, Arial" font-size="42" fill="url(#accent)" font-weight="bold">就能离线跑 AI</text>

  <!-- 分隔线 -->
  <line x1="60" y1="275" x2="400" y2="275" stroke="url(#accent)" stroke-width="1.5" opacity="0.6"/>

  <!-- 副标题 -->
  <text x="60" y="305" font-family="Arial" font-size="15" fill="#7a9cc6">Android 端侧 AI 接入指南 · 附代码实战</text>

  <!-- 三大核心数据卡片 -->
  
  <!-- 卡片1: E4B -->
  <rect x="60" y="340" width="150" height="90" rx="12" fill="#0d1f3a" opacity="0.9"/>
  <rect x="60" y="340" width="150" height="3" rx="1.5" fill="#34A853"/>
  <circle cx="135" cy="372" r="22" fill="#0d1f3a" stroke="#34A853" stroke-width="1.5"/>
  <text x="135" y="380" font-family="Arial Black" font-size="16" fill="#34A853" text-anchor="middle" font-weight="bold">4B</text>
  <text x="135" y="405" font-family="Arial" font-size="11" fill="#aaa" text-anchor="middle">参数量 · 离线运行</text>
  <text x="135" y="420" font-family="Arial" font-size="10" fill="#34A853" text-anchor="middle">≥6GB RAM 可用</text>

  <!-- 卡片2: 性能 -->
  <rect x="230" y="340" width="150" height="90" rx="12" fill="#0d1f3a" opacity="0.9"/>
  <rect x="230" y="340" width="150" height="3" rx="1.5" fill="#4285F4"/>
  <circle cx="305" cy="372" r="22" fill="#0d1f3a" stroke="#4285F4" stroke-width="1.5"/>
  <text x="305" y="380" font-family="Arial Black" font-size="14" fill="#4285F4" text-anchor="middle" font-weight="bold">45</text>
  <text x="305" y="405" font-family="Arial" font-size="11" fill="#aaa" text-anchor="middle">tokens / s</text>
  <text x="305" y="420" font-family="Arial" font-size="10" fill="#4285F4" text-anchor="middle">首Token 仅 80ms</text>

  <!-- 卡片3: 协议 -->
  <rect x="400" y="340" width="150" height="90" rx="12" fill="#0d1f3a" opacity="0.9"/>
  <rect x="400" y="340" width="150" height="3" rx="1.5" fill="#FBBC05"/>
  <circle cx="475" cy="372" r="22" fill="#0d1f3a" stroke="#FBBC05" stroke-width="1.5"/>
  <text x="475" y="380" font-family="Arial Black" font-size="13" fill="#FBBC05" text-anchor="middle" font-weight="bold">Apache</text>
  <text x="475" y="405" font-family="Arial" font-size="11" fill="#aaa" text-anchor="middle">开源协议</text>
  <text x="475" y="420" font-family="Arial" font-size="10" fill="#FBBC05" text-anchor="middle">商用完全免费</text>

  <!-- 右侧：手机示意图（极简） -->
  <g transform="translate(600, 80)">
    <!-- 手机外框 -->
    <rect x="0" y="20" width="160" height="300" rx="22" fill="#111b2e" stroke="#2a4a7a" stroke-width="1.5"/>
    
    <!-- 屏幕区域 -->
    <rect x="10" y="40" width="140" height="260" rx="12" fill="#0a1225"/>
    
    <!-- 刘海 -->
    <rect x="52" y="26" width="56" height="8" rx="4" fill="#111b2e"/>
    
    <!-- 屏幕内容：AI对话（简化） -->
    <rect x="20" y="55" width="120" height="32" rx="8" fill="#1e3a6e" opacity="0.8"/>
    <text x="30" y="73" font-family="Arial" font-size="8" fill="#7BB3F0">🤖 Gemma 4 离线</text>
    
    <rect x="35" y="97" width="95" height="20" rx="10" fill="#1a3a1a" opacity="0.8"/>
    <text x="82" y="111" font-family="Arial" font-size="7.5" fill="#7BF07B" text-anchor="middle">帮我总结这份文档</text>
    
    <rect x="20" y="127" width="115" height="48" rx="8" fill="#1e3a6e" opacity="0.8"/>
    <text x="30" y="143" font-family="Arial" font-size="7" fill="#cce0ff">文档共 3 个要点：</text>
    <text x="30" y="156" font-family="Arial" font-size="6.5" fill="#8ab4d4">1. 端侧AI推理架构...</text>
    <text x="30" y="168" font-family="Arial" font-size="6.5" fill="#8ab4d4">2. 性能优化策略...</text>

    <!-- 底部性能条 -->
    <rect x="20" y="190" width="120" height="36" rx="6" fill="#0d1f3a" opacity="0.7"/>
    <text x="80" y="205" font-family="Arial" font-size="7" fill="#666" text-anchor="middle">推理中...</text>
    <rect x="25" y="214" width="110" height="5" rx="2.5" fill="#1a2a4a"/>
    <rect x="25" y="214" width="75" height="5" rx="2.5" fill="url(#accent)"/>

    <!-- Home 指示条 -->
    <rect x="58" y="308" width="44" height="4" rx="2" fill="#4285F4" opacity="0.5"/>
  </g>

  <!-- 右下角特性标签（精简为3个） -->
  <g transform="translate(600, 420)">
    <rect x="0" y="0" width="75" height="24" rx="12" fill="#0d1f3a" stroke="#34A853" stroke-width="1" opacity="0.8"/>
    <text x="37" y="16" font-family="Arial" font-size="9" fill="#34A853" text-anchor="middle">✈️ 离线运行</text>
    
    <rect x="82" y="0" width="85" height="24" rx="12" fill="#0d1f3a" stroke="#4285F4" stroke-width="1" opacity="0.8"/>
    <text x="124" y="16" font-family="Arial" font-size="9" fill="#4285F4" text-anchor="middle">📸 多模态输入</text>
    
    <rect x="172" y="0" width="78" height="24" rx="12" fill="#0d1f3a" stroke="#FBBC05" stroke-width="1" opacity="0.8"/>
    <text x="211" y="16" font-family="Arial" font-size="9" fill="#FBBC05" text-anchor="middle">🌍 140+ 语言</text>
  </g>

  <!-- 底部品牌 -->
  <text x="60" y="472" font-family="Arial" font-size="11" fill="#2a4a6a">AppDev · 移动开发·资讯·教程·社区</text>
  <text x="840" y="472" font-family="Arial" font-size="11" fill="#2a4a6a" text-anchor="end">2026.04.07</text>
</svg>
