<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060b1a"/>
      <stop offset="50%" stop-color="#0c1435"/>
      <stop offset="100%" stop-color="#080d24"/>
    </linearGradient>

    <linearGradient id="topBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="40%" stop-color="#00d4ff"/>
      <stop offset="70%" stop-color="#7c68ee"/>
      <stop offset="100%" stop-color="#ff6b9d"/>
    </linearGradient>

    <!-- 数据高光渐变 -->
    <radialGradient id="dataGlow" cx="45%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.015)"/>
    </linearGradient>

    <filter id="shadow" x="-8%" y="-8%" width="116%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>

    <filter id="glow" x="-15%" y="-15%" width="130%" height="140%">
      <feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="numGlow">
      <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bg)"/>

  <!-- 数据光晕 -->
  <ellipse cx="400" cy="260" rx="350" ry="200" fill="url(#dataGlow)"/>

  <!-- 顶部色条 -->
  <rect width="900" height="3" fill="url(#topBar)"/>

  <!-- ========== 标题区 ========== -->

  <!-- 会议徽标 -->
  <g transform="translate(450, 56)">
    <text x="-72" y="0" text-anchor="middle" font-family="'Inter',Arial,sans-serif" font-size="38" font-weight="900" fill="#fff" letter-spacing="6">SITS</text>
    <text x="28" y="0" font-family="'Inter',Arial,sans-serif" font-size="20" font-weight="700" fill="#00ff88" letter-spacing="3">2026</text>
  </g>

  <!-- 主标题 -->
  <text x="450" y="106" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="28" font-weight="800" fill="#fff" filter="url(#glow)">
    移动端AI编程已过临界点
  </text>

  <!-- 副标题钩子 -->
  <text x="450" y="136" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="14" fill="#94a3b8">
    人效暴增310%，但92%的团队正踩在这4个盲区
  </text>

  <!-- 分隔线 -->
  <line x1="150" y1="160" x2="750" y2="160" stroke="rgba(0,255,136,0.15)" stroke-width="1"/>


  <!-- ========== 核心：震撼数据卡片（左侧大卡）========== -->
  <g transform="translate(36, 178)">
    <rect width="280" height="278" rx="18" fill="url(#cardBg)" stroke="rgba(0,255,136,0.25)" stroke-width="1.5" filter="url(#shadow)"/>

    <!-- 角标 -->
    <g transform="translate(230, -10)">
      <rect x="-30" y="-11" width="60" height="22" rx="11" fill="#00ff88" opacity="0.9"/>
      <text x="0" y="4" text-anchor="middle" font-family="Arial,sans-serif" font-size="9.5" font-weight="700" fill="#064e3b">实测数据</text>
    </g>

    <!-- 卡片标题 -->
    <text x="140" y="32" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="13" font-weight="700" fill="#64748b">MobileCoder-Lite 引擎表现</text>

    <!-- 数据网格 -->
    
    <!-- 第1行 -->
    <g transform="translate(18, 48)">
      <rect width="120" height="64" rx="12" fill="rgba(0,255,136,0.05)" stroke="rgba(0,255,136,0.1)" stroke-width="0.5"/>
      <text x="60" y="26" text-anchor="middle" font-family="'Inter',Arial,sans-serif" font-size="24" font-weight="800" fill="#00ff88" filter="url(#numGlow)">+310%</text>
      <text x="60" y="46" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="10" fill="#94a3b8">开发人效提升</text>
    </g>

    <g transform="translate(146, 48)">
      <rect width="120" height="64" rx="12" fill="rgba(239,68,68,0.05)" stroke="rgba(239,68,68,0.1)" stroke-width="0.5"/>
      <text x="60" y="26" text-anchor="middle" font-family="'Inter',Arial,sans-serif" font-size="24" font-weight="800" fill="#ef4444" filter="url(#numGlow)">-68%</text>
      <text x="60" y="46" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="10" fill="#94a3b8">CR缺陷率下降</text>
    </g>

    <!-- 第2行 -->
    <g transform="translate(18, 122)">
      <rect width="120" height="64" rx="12" fill="rgba(0,212,255,0.05)" stroke="rgba(0,212,255,0.1)" stroke-width="0.5"/>
      <text x="60" y="22" text-anchor="middle" font-family="'Inter',Arial,sans-serif" font-size="22" font-weight="800" fill="#00d4ff" filter="url(#numGlow)">94.1%</text>
      <text x="60" y="42" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="9.5" fill="#94a3b8">编译通过率</text>
      <text x="60" y="55" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="8" fill="#475569">(vs 78.3%)</text>
    </g>

    <g transform="translate(146, 122)">
      <rect width="120" height="64" rx="12" fill="rgba(124,104,238,0.05)" stroke="rgba(124,104,238,0.1)" stroke-width="0.5"/>
      <text x="60" y="22" text-anchor="middle" font-family="'Inter',Arial,sans-serif" font-size="22" font-weight="800" fill="#7c68ee" filter="url(#numGlow)">142MB</text>
      <text x="60" y="42" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="9.5" fill="#94a3b8">内存占用</text>
      <text x="60" y="55" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="8" fill="#475569">(vs 1.8GB)</text>
    </g>

    <!-- 第3行 -->
    <g transform="translate(18, 196)">
      <rect width="120" height="64" rx="12" fill="rgba(251,191,36,0.05)" stroke="rgba(251,191,36,0.1)" stroke-width="0.5"/>
      <text x="60" y="22" text-anchor="middle" font-family="'Inter',Arial,sans-serif" font-size="22" font-weight="800" fill="#fbbf24" filter="url(#numGlow)">89ms</text>
      <text x="60" y="42" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="9.5" fill="#94a3b8">推理延迟</text>
      <text x="60" y="55" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="8" fill="#475569">(vs 1280ms+)</text>
    </g>

    <g transform="translate(146, 196)">
      <rect width="120" height="64" rx="12" fill="rgba(255,107,157,0.05)" stroke="rgba(255,107,157,0.1)" stroke-width="0.5"/>
      <text x="60" y="22" text-anchor="middle" font-family="'Inter',Arial,sans-serif" font-size="20" font-weight="800" fill="#ff6b9d" filter="url(#numGlow)">0.4次</text>
      <text x="60" y="42" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="9.5" fill="#94a3b8">平均修复轮次</text>
      <text x="60" y="55" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="8" fill="#475569">(vs 2.7次)</text>
    </g>
  </g>


  <!-- ========== 右侧：技术突破 + 盲区 ========== -->

  <!-- 技术突破卡 -->
  <g transform="translate(338, 178)">
    <rect width="250" height="130" rx="16" fill="url(#cardBg)" stroke="rgba(124,104,238,0.2)" stroke-width="1" filter="url(#shadow)"/>
    
    <circle cx="32" cy="30" r="18" fill="rgba(124,104,238,0.12)"/>
    <text x="32" y="36" text-anchor="middle" font-size="18">⚡</text>
    
    <text x="60" y="26" font-family="'PingFang SC',sans-serif" font-size="14" font-weight="700" fill="#e2e8f0">核心技术突破</text>
    <text x="60" y="43" font-family="'PingFang SC',sans-serif" font-size="9" fill="#64748b">MoE + AST感知 + INT4量化</text>

    <line x1="16" y1="58" x2="234" y2="58" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

    <g font-family="'PingFang SC',sans-serif" font-size="11" fill="#cbd5e1">
      <g transform="translate(16, 70)">
        <circle cx="7" cy="7" r="4" fill="#7c68ee"/><text x="18" y="11">32专家 MoE 稀疏激活</text>
      </g>
      <g transform="translate(16, 92)">
        <circle cx="7" cy="7" r="4" fill="#00d4ff"/><text x="18" y="11">AST 感知补全机制</text>
      </g>
      <g transform="translate(16, 114)">
        <circle cx="7" cy="7" r="4" fill="#00ff88"/><text x="18" y="11">7B模型压缩至180MB</text>
      </g>
    </g>
  </g>

  <!-- 4大盲区卡（重点）-->
  <g transform="translate(338, 320)">
    <rect width="250" height="136" rx="16" fill="url(#cardBg)" stroke="rgba(239,68,68,0.22)" stroke-width="1" filter="url(#shadow)"/>

    <!-- 警告标签 -->
    <g transform="translate(198, -10)">
      <rect x="-28" y="-11" width="56" height="22" rx="11" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.3)" stroke-width="0.5"/>
      <text x="0" y="4" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="8.5" font-weight="700" fill="#ef4444">92%团队踩中</text>
    </g>

    <text x="125" y="28" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="13" font-weight="700" fill="#fca5a5">4 大认知盲区</text>

    <line x1="16" y1="42" x2="234" y2="42" stroke="rgba(239,68,68,0.12)" stroke-width="1"/>

    <!-- 盲区列表 -->
    <g transform="translate(16, 54)" font-family="'PingFang SC',sans-serif">
      <g>
        <rect width="218" height="17" rx="6" fill="rgba(239,68,68,0.04)"/>
        <text x="10" y="13" font-size="10" fill="#e2e8f0"><tspan fill="#ef4444">01</tspan> AI只能替代样板代码？</text>
      </g>
      <g transform="translate(0, 21)">
        <rect width="218" height="17" rx="6" fill="rgba(239,68,68,0.04)"/>
        <text x="10" y="13" font-size="10" fill="#e2e8f0"><tspan fill="#ef4444">02</tspan> 模型越大越准？</text>
      </g>
      <g transform="translate(0, 42)">
        <rect width="218" height="17" rx="6" fill="rgba(239,68,68,0.04)"/>
        <text x="10" y="13" font-size="10" fill="#e2e8f0"><tspan fill="#ef4444">03</tspan> Prompt工程万能论？</text>
      </g>
      <g transform="translate(0, 63)">
        <rect width="218" height="17" rx="6" fill="rgba(239,68,68,0.07)" stroke="rgba(239,68,68,0.15)" stroke-width="0.5"/>
        <text x="10" y="13" font-size="10" font-weight="600" fill="#fca5a5"><tspan fill="#ef4444">04</tspan> 交付即完成？（最致命）</text>
      </g>
    </g>
  </g>


  <!-- ========== 右侧：关键结论 ========== -->
  <g transform="translate(606, 178)">
    <rect width="258" height="278" rx="16" fill="url(#cardBg)" stroke="rgba(0,212,255,0.18)" stroke-width="1" filter="url(#shadow)"/>

    <text x="129" y="30" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="13" font-weight="700" fill="#64748b">核心结论</text>
    
    <line x1="20" y1="46" x2="238" y2="46" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

    <!-- 结论引用框 -->
    <rect x="20" y="58" width="218" height="80" rx="12" fill="rgba(0,212,255,0.04)"/>
    <text x="34" y="80" font-size="22" fill="#67e8f9">"</text>
    <text x="129" y="98" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="12" fill="#e2e8f0" font-weight="500">
      移动端AI编程已过
    </text>
    <text x="129" y="118" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="12" fill="#00d4ff" font-weight="700">
      能不能用 → 怎么用好
    </text>
    <text x="129" y="132" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="11" fill="#94a3b8">
      的阶段跨越
    </text>

    <!-- 适用对象 -->
    <g transform="translate(20, 152)">
      <text y="0" font-family="'PingFang SC',sans-serif" font-size="10" fill="#64748b">谁该关注</text>
      
      <g transform="translate(0, 12)" font-family="'PingFang SC',sans-serif" font-size="9.5">
        <rect x="0" y="0" width="62" height="20" rx="10" fill="rgba(0,255,136,0.08)"/>
        <text x="31" y="14" text-anchor="middle" fill="#00ff88" font-weight="600">Android</text>
        
        <rect x="69" y="0" width="52" height="20" rx="10" fill="rgba(0,212,255,0.08)"/>
        <text x="95" y="14" text-anchor="middle" fill="#00d4ff" font-weight="600">iOS</text>
        
        <rect x="127" y="0" width="52" height="20" rx="10" fill="rgba(124,104,238,0.08)"/>
        <text x="153" y="14" text-anchor="middle" fill="#7c68ee" font-weight="600">Flutter</text>
        
        <rect x="185" y="0" width="33" height="20" rx="10" fill="rgba(251,191,36,0.08)"/>
        <text x="201" y="14" text-anchor="middle" fill="#fbbf24" font-weight="600">CTO</text>
      </g>
    </g>

    <!-- 行动建议 -->
    <g transform="translate(20, 196)">
      <text y="0" font-family="'PingFang SC',sans-serif" font-size="10" fill="#64748b">破局路径</text>
      <g transform="translate(0, 14)" font-family="'PingFang SC',sans-serif" font-size="10" fill="#94a3b8">
        <text y="0">&#10003; 意图对齐 DSL</text>
        <text y="16">&#10003; AST 感知编码</text>
        <text y="32">&#10003; 可信交付体系</text>
        <text y="48">&#10003; 按场景选模型规模</text>
      </g>
    </g>

    <!-- 底部强调 -->
    <rect x="35" y="256" width="188" height="16" rx="8" fill="rgba(0,255,136,0.08)"/>
    <text x="129" y="267" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="9" font-weight="600" fill="#00ff88">纯本地运行 · 零云成本 · 数据不出设备</text>
  </g>


  <!-- 极简底部 -->
  <text x="450" y="480" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="9.5" fill="#374151">
    移动开发前沿 · AI编程 · SITS2026深度解析
  </text>

  <!-- 角落装饰 -->
  <path d="M0 0 L30 0 L0 30Z" fill="#00ff88" opacity="0.06"/>
  <path d="M900 500 L870 500 L900 470Z" fill="#7c68ee" opacity="0.06"/>
</svg>