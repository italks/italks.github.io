<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="100%" style="stop-color:#071535"/>
    </linearGradient>
    <!-- 主标题辉光 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 绿色渐变（Google Play） -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c853"/>
      <stop offset="100%" style="stop-color:#01875f"/>
    </linearGradient>
    <!-- 金色渐变（利益） -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd54f"/>
      <stop offset="100%" style="stop-color:#f4b400"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bgGrad)"/>

  <!-- 微妙的光晕背景 -->
  <ellipse cx="450" cy="250" rx="350" ry="200" fill="#01875f" opacity="0.06"/>
  <ellipse cx="650" cy="150" rx="200" ry="120" fill="#f4b400" opacity="0.04"/>

  <!-- ========== 标题区域 ========== -->
  <text x="450" y="95" font-family="'Microsoft YaHei', sans-serif" font-size="42" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#glow)">
    Google Play 计费变革
  </text>
  <text x="450" y="138" font-family="'Microsoft YaHei', sans-serif" font-size="20" fill="#78909c" text-anchor="middle">
    第三方支付正式开放 · 开发者收益大幅提升
  </text>

  <!-- 分隔线 -->
  <line x1="180" y1="160" x2="720" y2="160" stroke="#1a3a5c" stroke-width="1.5"/>

  <!-- ========== 核心对比区：左侧 旧模式 ========== -->
  <g transform="translate(70, 195)">
    <!-- 卡片背景 -->
    <rect width="340" height="220" rx="16" fill="#111b2e" stroke="#1e3a5f" stroke-width="1.5"/>
    
    <!-- 标签 -->
    <rect x="18" y="18" width="80" height="28" rx="14" fill="#37474f"/>
    <text x="58" y="37" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#b0bec5" text-anchor="middle">旧模式</text>

    <!-- 30% 抽成 - 大字突出 -->
    <text x="170" y="105" font-family="'Arial Black', sans-serif" font-size="72" font-weight="bold" fill="#ef5350" text-anchor="middle" opacity="0.9">30%</text>
    <text x="170" y="140" font-family="'Microsoft YaHei', sans-serif" font-size="15" fill="#90a4ae" text-anchor="middle">Google 强制抽成比例</text>

    <!-- 底部说明 -->
    <line x1="25" y1="165" x2="315" y2="165" stroke="#1e3a5f" stroke-width="1"/>
    <text x="170" y="192" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#607d8b" text-anchor="middle">仅支持 Google Play 支付</text>
  </g>

  <!-- 中间箭头 -->
  <g transform="translate(430, 290)">
    <polygon points="-25,-18 20,0 -25,18" fill="url(#goldGrad)" opacity="0.85"/>
    <circle cx="0" cy="0" r="32" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-dasharray="6,4" opacity="0.4"/>
  </g>
  <text x="450" y="340" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#ffd54f" text-anchor="middle" font-weight="bold">2026 年政策更新</text>

  <!-- ========== 核心对比区：右侧 新模式 ========== -->
  <g transform="translate(490, 195)">
    <!-- 卡片背景 -->
    <rect width="340" height="220" rx="16" fill="#0d2818" stroke="#0d5c2e" stroke-width="1.5"/>

    <!-- 标签 -->
    <rect x="18" y="18" width="80" height="28" rx="14" fill="url(#greenGrad)"/>
    <text x="58" y="37" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">新模式</text>

    <!-- 0% 或 自定义费率 - 大字 -->
    <text x="170" y="105" font-family="'Arial Black', sans-serif" font-size="68" font-weight="bold" fill="url(#greenGrad)" text-anchor="middle" filter="url(#glow)">0~3%</text>
    <text x="170" y="140" font-family="'Microsoft YaHei', sans-serif" font-size="15" fill="#a5d6a7" text-anchor="middle">第三方支付服务费（自选）</text>

    <!-- 底部亮点 -->
    <line x1="25" y1="165" x2="315" y2="165" stroke="#1b5e20" stroke-width="1"/>
    <text x="170" y="192" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#81c784" text-anchor="middle">✓ 支持第三方支付  ✓ 用户自主选择</text>
  </g>

  <!-- ========== 底部关键数据条 ========== -->
  <rect x="120" y="438" width="660" height="46" rx="10" fill="#12243a" stroke="#1e3a5f" stroke-width="1"/>
  
  <text x="155" y="467" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#90a4ae">
    收益测算示例：
  </text>
  <text x="280" y="467" font-family="Arial, sans-serif" font-size="15" fill="#ffffff" font-weight="bold">
    月入 $100K →
  </text>
  <text x="395" y="467" font-family="Arial, sans-serif" font-size="16" fill="url(#goldGrad)" font-weight="bold">
    每月多留 $15K+
  </text>
  <text x="540" y="467" font-family="Arial, sans-serif" font-size="15" fill="url(#greenGrad)" font-weight="bold">
    | 年省 $180K
  </text>

  <!-- 右上角时间标签 -->
  <rect x="750" y="22" width="128" height="28" rx="6" fill="#12243a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="814" y="41" font-family="'Microsoft YaHei', sans-serif" font-size="11" fill="#607d8b" text-anchor="middle">2026年3月生效</text>

  <!-- 底部署名 -->
  <text x="450" y="493" font-family="'Microsoft YaHei', sans-serif" font-size="11" fill="#2a3f5f" text-anchor="middle">AppDev | 移动开发技术栈</text>
</svg>