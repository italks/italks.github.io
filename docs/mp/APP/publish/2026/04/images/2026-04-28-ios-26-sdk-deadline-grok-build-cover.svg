<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="50%" style="stop-color:#121832"/>
      <stop offset="100%" style="stop-color:#0d1230"/>
    </linearGradient>
    
    <!-- 紧急红色光晕 -->
    <radialGradient id="redGlow" cx="50%" cy="35%" r="40%">
      <stop offset="0%" style="stop-color:#f85149;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#f85149;stop-opacity:0"/>
    </radialGradient>
    
    <!-- iOS蓝紫渐变 -->
    <linearGradient id="iosGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#007AFF"/>
      <stop offset="100%" style="stop-color:#AF52DE"/>
    </linearGradient>
    
    <!-- Grok/XAI 渐变 (暗金到橙色) -->
    <linearGradient id="grokGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f4d03f"/>
      <stop offset="100%" style="stop-color:#e67e22"/>
    </linearGradient>
    
    <!-- 卡片阴影 -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    
    <!-- 发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  
  <!-- 网格装饰线 -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="320" x2="900" y2="320"/>
    <line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="150" y1="0" x2="150" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="450" y1="0" x2="450" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="750" y1="0" x2="750" y2="500"/>
  </g>

  <!-- 红色紧急光晕（顶部区域） -->
  <ellipse cx="450" cy="170" rx="380" ry="140" fill="url(#redGlow)"/>

  <!-- ========== 顶部紧急条 ========== -->
  <rect x="0" y="0" width="900" height="42" fill="#f85149" opacity="0.92"/>
  
  <!-- 紧急条文字 -->
  <text x="450" y="27" font-family="-apple-system, 'SF Pro Display', 'Microsoft YaHei', sans-serif" 
        font-size="15" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="1.5">
    ⚡ 就在今天！4月28日 App Store 拒收非 iOS 26 SDK 应用
  </text>

  <!-- ========== 主标题区 ========== -->
  <text x="450" y="85" font-family="-apple-system, 'SF Pro Display', 'Microsoft YaHei', sans-serif" 
        font-size="32" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="1">
    iOS 26 SDK 截止日 + Grok Build 入局
  </text>
  
  <!-- 副标题 -->
  <text x="450" y="115" font-family="-apple-system, 'SF Pro Display', 'Microsoft YaHei', sans-serif" 
        font-size="14" font-weight="400" fill="#8b95b0" text-anchor="middle" letter-spacing="0.5">
    苹果强制执行 · 马斯克杀入 AI 编程赛道 · 双热点同日爆发
  </text>

  <!-- ========== 三大核心数据卡片 ========== -->

  <!-- 卡片1: iOS 26 SDK 截止日（红色警告） -->
  <g filter="url(#cardShadow)">
    <rect x="45" y="145" width="255" height="135" rx="12" fill="#161b33" stroke="#f85149" stroke-width="1.5" stroke-opacity="0.6"/>
  </g>
  
  <!-- 卡片1图标：iPhone + 警告 -->
  <g transform="translate(172, 172)">
    <rect x="-16" y="-22" width="32" height="48" rx="4" fill="none" stroke="#f85149" stroke-width="2"/>
    <line x1="-10" y1="-14" x2="10" y2="-14" stroke="#f85149" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="0" cy="21" r="3" fill="#f85149"/>
    <!-- 警告三角 -->
    <polygon points="20,-18 30,-2 10,-2" fill="#f85149" opacity="0.9"/>
    <text x="20" y="-6" font-size="11" fill="#0a0e27" text-anchor="middle" font-weight="900">!</text>
  </g>
  
  <text x="172" y="210" font-family="'SF Pro Display', 'Microsoft YaHei', sans-serif" 
        font-size="18" font-weight="700" fill="#f85149" text-anchor="middle">iOS 26 SDK</text>
  <text x="172" y="234" font-family="'SF Pro Display', 'Microsoft YaHei', sans-serif" 
        font-size="13" font-weight="600" fill="#ff6b6b" text-anchor="middle">今天截止!!</text>
  <text x="172" y="260" font-family="'SF Pro Display', sans-serif" 
        font-size="11" fill="#6b7394" text-anchor="middle">未升级 = 直接被拒</text>

  <!-- 卡片2: Grok Build 即将发布（金色） -->
  <g filter="url(#cardShadow)">
    <rect x="322" y="145" width="255" height="135" rx="12" fill="#161b33" stroke="#f4d03f" stroke-width="1.5" stroke-opacity="0.6"/>
  </g>
  
  <!-- 卡片2图标：XAI / Grok Logo风格 -->
  <g transform="translate(449, 175)">
    <circle cx="0" cy="0" r="17" fill="none" stroke="#f4d03f" stroke-width="2"/>
    <text x="0" y="6" font-family="-apple-system, sans-serif" font-size="16" font-weight="800" 
          fill="#f4d03f" text-anchor="middle">G</text>
  </g>
  
  <text x="449" y="212" font-family="'SF Pro Display', 'Microsoft YaHei', sans-serif" 
        font-size="18" font-weight="700" fill="#f4d03f" text-anchor="middle">Grok Build</text>
  <text x="449" y="234" font-family="'SF Pro Display', 'Microsoft YaHei', sans-serif" 
        font-size="13" font-weight="600" fill="#f5b041" text-anchor="middle">即将发布</text>
  <text x="449" y="260" font-family="'SF Pro Display', sans-serif" 
        font-size="11" fill="#6b7394" text-anchor="middle">马斯克 × AI编程</text>

  <!-- 卡片3: 四强争霸（紫蓝色） -->
  <g filter="url(#cardShadow)">
    <rect x="600" y="145" width="255" height="135" rx="12" fill="#161b33" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.6"/>
  </g>
  
  <!-- 卡片3图标：VS 对决 -->
  <g transform="translate(727, 175)">
    <text x="-9" y="7" font-family="-apple-system, sans-serif" font-size="18" font-weight="800" 
          fill="#58a6ff" text-anchor="middle">⚔</text>
    <line x1="-2" y1="-10" x2="2" y2="10" stroke="#444" stroke-width="1.5"/>
    <text x="10" y="7" font-family="-apple-system, sans-serif" font-size="18" font-weight="800" 
          fill="#a371f7" text-anchor="middle">★</text>
  </g>
  
  <text x="727" y="212" font-family="'SF Pro Display', 'Microsoft YaHei', sans-serif" 
        font-size="18" font-weight="700" fill="#58a6ff" text-anchor="middle">AI 编程四强</text>
  <text x="727" y="234" font-family="'SF Pro Display', 'Microsoft YaHei', sans-serif" 
        font-size="13" font-weight="600" fill="#8b9cf7" text-anchor="middle">格局剧变</text>
  <text x="727" y="260" font-family="'SF Pro Display', sans-serif" 
        font-size="11" fill="#6b7394" text-anchor="middle">Cursor·Claude·Copilot·Grok</text>

  <!-- ========== 时间线可视化 ========== -->
  <text x="450" y="310" font-family="'SF Pro Display', 'Microsoft YaHei', sans-serif" 
        font-size="13" font-weight="600" fill="#5a6380" text-anchor="middle" letter-spacing="2">
        — 本月 AI 编程行业大事记 —
  </text>

  <!-- 时间轴线 -->
  <line x1="60" y1="340" x2="840" y2="340" stroke="#2a3150" stroke-width="2" stroke-linecap="round"/>

  <!-- 时间节点 -->
  <!-- 4/20 Copilot预告 -->
  <circle cx="110" cy="340" r="8" fill="#2a3150" stroke="#a371f7" stroke-width="2"/>
  <text x="110" y="366" font-family="'SF Pro Display', sans-serif" font-size="10" fill="#8b95b0" text-anchor="middle">4/20</text>
  <text x="110" y="380" font-family="'SF Pro Display', 'Microsoft YaHei', sans-serif" font-size="10" fill="#a371f7" text-anchor="middle">Copilot</text>
  <text x="110" y="393" font-family="'SF Pro Display', sans-serif" font-size="9" fill="#5a6380" text-anchor="middle">条款预告</text>

  <!-- 4/21 SpaceX×Cursor -->
  <circle cx="254" cy="340" r="8" fill="#2a3150" stroke="#f4d03f" stroke-width="2"/>
  <text x="254" y="366" font-family="'SF Pro Display', sans-serif" font-size="10" fill="#8b95b0" text-anchor="middle">4/21</text>
  <text x="254" y="380" font-family="'SF Pro Display', 'Microsoft YaHei', sans-serif" font-size="10" fill="#f4d03f" text-anchor="middle">SpaceX×Cursor</text>
  <text x="254" y="393" font-family="'SF Pro Display', sans-serif" font-size="9" fill="#5a6380" text-anchor="middle">$600亿收购</text>

  <!-- 4/24 Copilot生效 -->
  <circle cx="398" cy="340" r="8" fill="#2a3150" stroke="#f85149" stroke-width="2"/>
  <text x="398" y="366" font-family="'SF Pro Display', sans-serif" font-size="10" fill="#8b95b0" text-anchor="middle">4/24</text>
  <text x="398" y="380" font-family="'SF Pro Display', 'Microsoft YaHei', sans-serif" font-size="10" fill="#f85149" text-anchor="middle">Copilot生效</text>
  <text x="398" y="393" font-family="'SF Pro Display', sans-serif" font-size="9" fill="#5a6380" text-anchor="middle">数据采集开始</text>

  <!-- 4/28 今天! iOS SDK截止 (高亮) -->
  <circle cx="542" cy="340" r="12" fill="#f85149" filter="url(#glow)"/>
  <circle cx="542" cy="340" r="7" fill="#0a0e27"/>
  <text x="542" y="344" font-family="-apple-system, sans-serif" font-size="9" font-weight="800" fill="#f85149" text-anchor="middle">!</text>
  <text x="542" y="366" font-family="'SF Pro Display', sans-serif" font-size="11" font-weight="700" fill="#f85149" text-anchor="middle">4/28 今天!</text>
  <text x="542" y="380" font-family="'SF Pro Display', 'Microsoft YaHei', sans-serif" font-size="10" fill="#ff6b6b" text-anchor="middle" font-weight="600">iOS 26 SDK</text>
  <text x="542" y="393" font-family="'SF Pro Display', sans-serif" font-size="9" fill="#f85149" text-anchor="middle">截止日!!!</text>

  <!-- 本周? Grok Build -->
  <circle cx="686" cy="340" r="8" fill="#2a3150" stroke="#e67e22" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="686" y="366" font-family="'SF Pro Display', sans-serif" font-size="10" fill="#8b95b0" text-anchor="middle">本周?</text>
  <text x="686" y="380" font-family="'SF Pro Display', 'Microsoft YaHei', sans-serif" font-size="10" fill="#e67e22" text-anchor="middle">Grok Build</text>
  <text x="686" y="393" font-family="'SF Pro Display', sans-serif" font-size="9" fill="#5a6380" text-anchor="middle">马斯克入局</text>

  <!-- 未来 WWDC26 -->
  <circle cx="810" cy="340" r="6" fill="#2a3150" stroke="#007AFF" stroke-width="1.5" stroke-dasharray="2,2" opacity="0.5"/>
  <text x="810" y="366" font-family="'SF Pro Display', sans-serif" font-size="10" fill="#5a6380" text-anchor="middle">6/8</text>
  <text x="810" y="380" font-family="'SF Pro Display', 'Microsoft YaHei', sans-serif" font-size="10" fill="#007AFF" text-anchor="middle" opacity="0.6">WWDC26</text>
  <text x="810" y="393" font-family="'SF Pro Display', sans-serif" font-size="9" fill="#5a6380" text-anchor="middle" opacity="0.5">iOS 27</text>

  <!-- ========== 底部行动标签栏 ========== -->
  <g transform="translate(0, 420)">
    <!-- 标签背景条 -->
    <rect x="30" y="0" width="840" height="56" rx="10" fill="#0d1127" stroke="#1e2647" stroke-width="1"/>
    
    <!-- 四个行动标签 -->
    <!-- 标签1 -->
    <rect x="50" y="10" width="178" height="36" rx="8" fill="#f85149" fill-opacity="0.12"/>
    <text x="139" y="34" font-family="'SF Pro Display', 'Microsoft YaHei', sans-serif" 
          font-size="12" font-weight="600" fill="#ff6b6b" text-anchor="middle">🔴 立即自查SDK版本</text>
    
    <!-- 标签2 -->
    <rect x="245" y="10" width="178" height="36" rx="8" fill="#007AFF" fill-opacity="0.12"/>
    <text x="334" y="34" font-family="'SF Pro Display', 'Microsoft YaHei', sans-serif" 
          font-size="12" font-weight="600" fill="#58a6ff" text-anchor="middle">🔵 Flutter/RN适配</text>
    
    <!-- 标签3 -->
    <rect x="440" y="10" width="178" height="36" rx="8" fill="#f4d03f" fill-opacity="0.12"/>
    <text x="529" y="34" font-family="'SF Pro Display', 'Microsoft YaHei', sans-serif" 
          font-size="12" font-weight="600" fill="#f5b041" text-anchor="middle">🟡 Liquid Glass检查</text>
    
    <!-- 标签4 -->
    <rect x="635" y="10" width="178" height="36" rx="8" fill="#a371f7" fill-opacity="0.12"/>
    <text x="724" y="34" font-family="'SF Pro Display', 'Microsoft YaHei', sans-serif" 
          font-size="12" font-weight="600" fill="#c9a0ff" text-anchor="middle">🟣 Grok Build追踪</text>
  </g>

  <!-- ========== 角落装饰元素 ========== -->
  <!-- 左下角小字 -->
  <text x="30" y="492" font-family="'SF Pro Display', sans-serif" font-size="9" fill="#3a4260">
    移动APP开发 | 2026.04.28
  </text>
  
  <!-- 右下角标识 -->
  <text x="870" y="492" font-family="'SF Pro Display', sans-serif" font-size="9" fill="#3a4260" text-anchor="end">
    AI 编程 × iOS 开发
  </text>

  <!-- 顶部角落装饰点 -->
  <circle cx="20" cy="55" r="3" fill="#f85149" opacity="0.6"/>
  <circle cx="880" cy="55" r="3" fill="#007AFF" opacity="0.6"/>
</svg>