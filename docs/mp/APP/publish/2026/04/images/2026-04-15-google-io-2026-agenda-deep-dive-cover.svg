<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img">
  <title>Google I/O 2026 议程深度解析</title>
  
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="50%" stop-color="#111640"/>
      <stop offset="100%" stop-color="#0d1033"/>
    </linearGradient>

    <!-- 主标题光晕 -->
    <radialGradient id="glow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#4285f4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4285f4" stop-opacity="0"/>
    </radialGradient>

    <!-- 卡片渐变 -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.1)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.03)"/>
    </linearGradient>

    <!-- Google 色条 -->
    <linearGradient id="googleColors" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4285f4"/>
      <stop offset="25%" stop-color="#ea4335"/>
      <stop offset="50%" stop-color="#fbbc04"/>
      <stop offset="75%" stop-color="#4285f4"/>
      <stop offset="100%" stop-color="#34a853"/>
    </linearGradient>

    <!-- AI 光效 -->
    <filter id="aiGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 卡片阴影 -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  <rect width="900" height="500" fill="url(#glow)"/>

  <!-- 网格背景装饰 -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="180" y1="0" x2="180" y2="500"/>
    <line x1="360" y1="0" x2="360" y2="500"/>
    <line x1="540" y1="0" x2="540" y2="500"/>
    <line x1="720" y1="0" x2="720" y2="500"/>
  </g>

  <!-- 顶部色条 -->
  <rect x="0" y="0" width="900" height="4" fill="url(#googleColors)"/>

  <!-- ========== 主标题区 ========== -->
  <g text-anchor="middle">
    <!-- I/O 徽标 -->
    <text x="450" y="72" font-family="-apple-system, 'Segoe UI', Arial, sans-serif" font-size="52" font-weight="800" fill="#fff" letter-spacing="8">I</text>
    <circle cx="450" cy="56" r="14" fill="none" stroke="#fff" stroke-width="3.5"/>
    <text x="482" y="72" font-family="-apple-system, 'Segoe UI', Arial, sans-serif" font-size="52" font-weight="800" fill="#fff" letter-spacing="8">/O</text>

    <!-- 年份 -->
    <text x="450" y="108" font-family="-apple-system, 'Segoe UI', Arial, sans-serif" font-size="18" font-weight="600" fill="#4285f4" letter-spacing="16">2026</text>

    <!-- 副标题 -->
    <text x="450" y="148" font-family="'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif" font-size="22" font-weight="700" fill="#e8eaed">5 大核心变化 · 改变你的开发方式</text>
    
    <!-- 英文副标题 -->
    <text x="450" y="172" font-family="-apple-system, sans-serif" font-size="11" font-weight="400" fill="#9aa0a6" letter-spacing="3">VIBE-CODING  ·  GENUI  ·  GEMINI NANO 3  ·  AGENT-FIRST</text>
  </g>

  <!-- 分隔线 -->
  <line x1="150" y1="194" x2="750" y2="194" stroke="rgba(66,133,244,0.3)" stroke-width="1"/>

  <!-- ========== 五大变化卡片 ========== -->

  <!-- 卡片 1: Vibe-coding -->
  <g transform="translate(40, 214)">
    <rect width="156" height="128" rx="14" fill="url(#cardGrad)" stroke="rgba(66,133,244,0.25)" stroke-width="1" filter="url(#cardShadow)"/>
    <!-- 图标：闪电+代码 -->
    <g transform="translate(20, 18)">
      <rect width="32" height="32" rx="8" fill="rgba(66,133,244,0.15)"/>
      <text x="16" y="23" text-anchor="middle" font-size="18" fill="#4285f4">⚡</text>
    </g>
    <text x="78" y="70" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#e8eaed">Vibe-coding</text>
    <text x="78" y="92" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#9aa0a6">自然语言写 App</text>
    <!-- 标签 -->
    <rect x="36" y="104" width="84" height="18" rx="9" fill="rgba(66,133,244,0.15)"/>
    <text x="78" y="116" text-anchor="middle" font-family="'PingFang SC', sans-serif" font-size="9" font-weight="600" fill="#4285f4">Antigravity</text>
  </g>

  <!-- 卡片 2: Flutter GenUI -->
  <g transform="translate(210, 214)">
    <rect width="156" height="128" rx="14" fill="url(#cardGrad)" stroke="rgba(52,168,83,0.25)" stroke-width="1" filter="url(#cardShadow)"/>
    <g transform="translate(20, 18)">
      <rect width="32" height="32" rx="8" fill="rgba(52,168,83,0.15)"/>
      <text x="16" y="23" text-anchor="middle" font-size="18" fill="#34a853">🎨</text>
    </g>
    <text x="78" y="70" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#e8eaed">Flutter GenUI</text>
    <text x="78" y="92" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#9aa0a6">AI 自动生成 UI</text>
    <rect x="30" y="104" width="96" height="18" rx="9" fill="rgba(52,168,83,0.15)"/>
    <text x="78" y="116" text-anchor="middle" font-family="'PingFang SC', sans-serif" font-size="9" font-weight="600" fill="#34a853">效率提升 3-5x</text>
  </g>

  <!-- 卡片 3: Gemini Nano 3 -->
  <g transform="translate(380, 214)">
    <rect width="156" height="128" rx="14" fill="url(#cardGrad)" stroke="rgba(251,188,4,0.3)" stroke-width="1" filter="url(#cardShadow)"/>
    <g transform="translate(20, 18)">
      <rect width="32" height="32" rx="8" fill="rgba(251,188,4,0.15)"/>
      <text x="16" y="23" text-anchor="middle" font-size="18" fill="#fbbc04">🧠</text>
    </g>
    <text x="78" y="68" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#e8eaed">Gemini</text>
    <text x="78" y="86" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#e8eaed">Nano 3</text>
    <text x="78" y="106" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#9aa0a6">端侧 AI 系统级集成</text>
    <rect x="28" y="114" width="100" height="18" rx="9" fill="rgba(251,188,4,0.15)"/>
    <text x="78" y="126" text-anchor="middle" font-family="'PingFang SC', sans-serif" font-size="9" font-weight="600" fill="#fbbc04">比 Nano 2 快 40%</text>
  </g>

  <!-- 卡片 4: Material You 3 -->
  <g transform="translate(550, 214)">
    <rect width="156" height="128" rx="14" fill="url(#cardGrad)" stroke="rgba(234,67,53,0.25)" stroke-width="1" filter="url(#cardShadow)"/>
    <g transform="translate(20, 18)">
      <rect width="32" height="32" rx="8" fill="rgba(234,67,53,0.15)"/>
      <text x="16" y="23" text-anchor="middle" font-size="18" fill="#ea4335">✨</text>
    </g>
    <text x="78" y="68" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#e8eaed">Material</text>
    <text x="78" y="86" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#e8eaed">You 3</text>
    <text x="78" y="106" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#9aa0a6">全新设计语言</text>
    <rect x="26" y="114" width="104" height="18" rx="9" fill="rgba(234,67,53,0.15)"/>
    <text x="78" y="126" text-anchor="middle" font-family="'PingFang SC', sans-serif" font-size="9" font-weight="600" fill="#ea4335">Smart Reply 升级</text>
  </g>

  <!-- 卡片 5: Agent-first -->
  <g transform="translate(720, 214)">
    <rect width="140" height="128" rx="14" fill="url(#cardGrad)" stroke="rgba(168,85,247,0.3)" stroke-width="1" filter="url(#cardShadow)"/>
    <g transform="translate(18, 18)">
      <rect width="32" height="32" rx="8" fill="rgba(168,85,247,0.15)"/>
      <text x="16" y="23" text-anchor="middle" font-size="18" fill="#a855f7">🤖</text>
    </g>
    <text x="70" y="70" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#e8eaed">Agent-first</text>
    <text x="70" y="90" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#9aa0a6">AI Agent 全链路</text>
    <rect x="22" y="106" width="96" height="18" rx="9" fill="rgba(168,85,247,0.15)"/>
    <text x="70" y="118" text-anchor="middle" font-family="'PingFang SC', sans-serif" font-size="9" font-weight="600" fill="#a855f7">Firebase 原生支持</text>
  </g>

  <!-- ========== 底部信息栏 ========== -->
  <g transform="translate(0, 365)">
    <!-- 底部卡片背景 -->
    <rect x="40" y="0" width="820" height="115" rx="16" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <!-- 时间信息 -->
    <g transform="translate(70, 28)">
      <circle cx="8" cy="8" r="5" fill="#4285f4"/>
      <text x="22" y="13" font-family="'PingFang SC', sans-serif" font-size="13" font-weight="600" fill="#e8eaed">5月19-20日 · 山景城</text>
      <text x="22" y="34" font-family="'PingFang SC', sans-serif" font-size="11" fill="#9aa0a6">北京时间 5/20 凌晨 Keynote</text>
    </g>

    <!-- 分隔线 -->
    <line x1="280" y1="18" x2="280" y2="90" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <!-- 核心主题 -->
    <g transform="translate(305, 28)">
      <text x="0" y="13" font-family="'PingFang SC', sans-serif" font-size="13" font-weight="600" fill="#e8eaed">核心主题</text>
      <text x="0" y="35" font-family="'PingFang SC', sans-serif" font-size="12" font-weight="500" fill="#4285f4" filter="url(#aiGlow)">AI-first Development</text>
      <text x="0" y="58" font-family="'PingFang SC', sans-serif" font-size="11" fill="#9aa0a6">Android 17 · Firebase · Gemini · Flutter</text>
    </g>

    <!-- 分隔线 -->
    <line x1="560" y1="18" x2="560" y2="90" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <!-- 关键数字 -->
    <g transform="translate(585, 22)">
      <text x="0" y="18" font-family="-apple-system, sans-serif" font-size="32" font-weight="800" fill="#fbbc04">5</text>
      <text x="22" y="18" font-family="'PingFang SC', sans-serif" font-size="13" fill="#9aa0a6">大变化</text>
      
      <text x="75" y="18" font-family="-apple-system, sans-serif" font-size="32" font-weight="800" fill="#34a853">35</text>
      <text x="105" y="18" font-family="'PingFang SC', sans-serif" font-size="13" fill="#9aa0a6">天倒计时</text>
      
      <text x="170" y="18" font-family="-apple-system, sans-serif" font-size="32" font-weight="800" fill="#ea4335">40+</text>
      <text x="208" y="18" font-family="'PingFang SC', sans-serif" font-size="13" fill="#9aa0a6">Sessions</text>

      <text x="0" y="54" font-family="'PingFang SC', sans-serif" font-size="10" fill="#5f6368">涵盖 Android / Flutter / AI / 全栈 开发者</text>
      <text x="0" y="74" font-family="'PingFang SC', sans-serif" font-size="10" fill="#5f6368">从提示词到生产的全链路 AI 开发新范式</text>
    </g>
  </g>

  <!-- 装饰性光点 -->
  <circle cx="50" cy="60" r="2" fill="#4285f4" opacity="0.5"/>
  <circle cx="850" cy="80" r="1.5" fill="#ea4335" opacity="0.4"/>
  <circle cx="870" cy="450" r="2" fill="#34a853" opacity="0.4"/>
  <circle cx="30" cy="420" r="1.5" fill="#fbbc04" opacity="0.5"/>

  <!-- 右下角品牌标识 -->
  <text x="850" y="488" text-anchor="end" font-family="'PingFang SC', sans-serif" font-size="9" fill="#5f6368" letter-spacing="1">移动开发技术干货</text>
</svg>
