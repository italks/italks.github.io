<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 1350">
  <defs>
    <!-- 主背景渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F2027"/>
      <stop offset="50%" style="stop-color:#203A43"/>
      <stop offset="100%" style="stop-color:#2C5364"/>
    </linearGradient>
    
    <!-- 科技蓝渐变 -->
    <linearGradient id="techBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0099ff"/>
    </linearGradient>
    
    <!-- 强调黄渐变 -->
    <linearGradient id="accentYellow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
    
    <!-- 光晕效果 -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="2400" height="1350" fill="url(#bgGradient)"/>
  
  <!-- 背景装饰：六边形网格 -->
  <g stroke="#ffffff" stroke-opacity="0.05" fill="none" stroke-width="1">
    <polygon points="200,100 300,160 300,280 200,340 100,280 100,160"/>
    <polygon points="500,240 600,300 600,420 500,480 400,420 400,300"/>
    <polygon points="800,120 900,180 900,300 800,360 700,300 700,180"/>
    <polygon points="1800,900 1900,960 1900,1080 1800,1140 1700,1080 1700,960"/>
    <polygon points="2100,700 2200,760 2200,880 2100,940 2000,880 2000,760"/>
    <polygon points="2200,1040 2300,1100 2300,1220 2200,1280 2100,1220 2100,1100"/>
  </g>
  
  <!-- 光晕装饰 -->
  <circle cx="1900" cy="400" r="400" fill="url(#glow)"/>
  <circle cx="400" cy="1000" r="300" fill="url(#glow)"/>
  
  <!-- 左侧主内容区 -->
  <g transform="translate(160, 240)">
    <!-- 年份标签 -->
    <rect x="0" y="0" width="200" height="72" rx="36" fill="url(#techBlue)" fill-opacity="0.2"/>
    <text x="100" y="50" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#00d4ff" text-anchor="middle">2026</text>
    
    <!-- 主标题 -->
    <text x="0" y="160" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="112" font-weight="bold" fill="#FFFFFF">
      最实用的AI工具
    </text>
    
    <!-- 副标题 -->
    <text x="0" y="300" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="80" font-weight="bold" fill="#FFFFFF" fill-opacity="0.9">
      OpenClaw技能安装指南
    </text>
    
    <!-- 分隔线 -->
    <rect x="0" y="360" width="160" height="8" rx="4" fill="url(#accentYellow)"/>
    
    <!-- 核心价值点 -->
    <g transform="translate(0, 440)">
      <!-- 点1 -->
      <circle cx="24" cy="24" r="12" fill="#00d4ff"/>
      <text x="60" y="36" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="40" fill="#FFFFFF" fill-opacity="0.85">
        GitHub 12万星 · 开源智能体平台
      </text>
      
      <!-- 点2 -->
      <circle cx="24" cy="104" r="12" fill="#00d4ff"/>
      <text x="60" y="116" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="40" fill="#FFFFFF" fill-opacity="0.85">
        skills.sh · AI技能应用商店
      </text>
      
      <!-- 点3 -->
      <circle cx="24" cy="184" r="12" fill="#00d4ff"/>
      <text x="60" y="196" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="40" fill="#FFFFFF" fill-opacity="0.85">
        9大实用技能 · 让AI帮你干活
      </text>
    </g>
    
    <!-- 底部强力文案 - 黄色背景按钮 -->
    <rect x="0" y="680" width="720" height="100" rx="16" fill="#FFCB05"/>
    <text x="360" y="750" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="48" font-weight="bold" fill="#0F2027" text-anchor="middle">
      装上技能，让AI干活
    </text>
  </g>
  
  <!-- 右侧终端/代码风格区域 -->
  <g transform="translate(1360, 200)">
    <!-- 终端窗口背景 -->
    <rect x="0" y="0" width="880" height="840" rx="24" fill="#1a1a2e" fill-opacity="0.95"/>
    
    <!-- 终端标题栏 -->
    <rect x="0" y="0" width="880" height="80" rx="24" fill="#16213e"/>
    <rect x="0" y="56" width="880" height="24" fill="#16213e"/>
    
    <!-- 窗口按钮 -->
    <circle cx="40" cy="40" r="14" fill="#ff5f56"/>
    <circle cx="88" cy="40" r="14" fill="#ffbd2e"/>
    <circle cx="136" cy="40" r="14" fill="#27ca40"/>
    
    <!-- 终端标题 -->
    <text x="440" y="52" font-family="Monaco, Consolas, monospace" font-size="28" fill="#888" text-anchor="middle">
      Terminal — OpenClaw
    </text>
    
    <!-- 终端内容 -->
    <g transform="translate(40, 120)" font-family="Monaco, Consolas, monospace" font-size="30">
      <!-- 命令1 -->
      <text x="0" y="0" fill="#00d4ff">$</text>
      <text x="40" y="0" fill="#ffffff">npm install -g openclaw</text>
      
      <!-- 输出 -->
      <text x="0" y="56" fill="#27ca40">✓ OpenClaw installed</text>
      
      <!-- 空行 -->
      <text x="0" y="112" fill="#666"># 安装技能</text>
      
      <!-- 命令2 -->
      <text x="0" y="168" fill="#00d4ff">$</text>
      <text x="40" y="168" fill="#ffffff">npx skillsadd pdf</text>
      
      <!-- 输出 -->
      <text x="0" y="224" fill="#27ca40">✓ PDF skill installed (3.3万+)</text>
      
      <!-- 空行 -->
      <text x="0" y="280" fill="#666"># 查看已安装技能</text>
      
      <!-- 命令3 -->
      <text x="0" y="336" fill="#00d4ff">$</text>
      <text x="40" y="336" fill="#ffffff">claw list</text>
      
      <!-- 输出表格 -->
      <text x="0" y="392" fill="#aaaaaa">┌─────────────┬──────────────┬─────────────┐</text>
      <text x="0" y="448" fill="#aaaaaa">│</text>
      <text x="24" y="448" fill="#ffffff">Skill</text>
      <text x="144" y="448" fill="#aaaaaa">│</text>
      <text x="168" y="448" fill="#ffffff">Name</text>
      <text x="360" y="448" fill="#aaaaaa">│</text>
      <text x="384" y="448" fill="#ffffff">Installs</text>
      <text x="552" y="448" fill="#aaaaaa">│</text>
      <text x="0" y="504" fill="#aaaaaa">├─────────────┼──────────────┼─────────────┤</text>
      <text x="0" y="560" fill="#aaaaaa">│</text>
      <text x="24" y="560" fill="#00d4ff">pdf</text>
      <text x="144" y="560" fill="#aaaaaa">│</text>
      <text x="168" y="560" fill="#ffffff">PDF处理</text>
      <text x="360" y="560" fill="#aaaaaa">│</text>
      <text x="384" y="560" fill="#27ca40">3.3万+</text>
      <text x="552" y="560" fill="#aaaaaa">│</text>
      <text x="0" y="616" fill="#aaaaaa">│</text>
      <text x="24" y="616" fill="#00d4ff">pptx</text>
      <text x="144" y="616" fill="#aaaaaa">│</text>
      <text x="168" y="616" fill="#ffffff">PPT制作</text>
      <text x="360" y="616" fill="#aaaaaa">│</text>
      <text x="384" y="616" fill="#27ca40">2.9万+</text>
      <text x="552" y="616" fill="#aaaaaa">│</text>
      <text x="0" y="672" fill="#aaaaaa">└─────────────┴──────────────┴─────────────┘</text>
    </g>
  </g>
  
  <!-- 底部品牌栏 -->
  <rect x="0" y="1240" width="2400" height="110" fill="#000000" fill-opacity="0.4"/>
  <text x="1200" y="1310" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="36" fill="#FFFFFF" fill-opacity="0.7" text-anchor="middle">
    移动APP开发 · 技术实战 · 行业解决方案
  </text>
  
  <!-- 装饰：角落科技线条 -->
  <g stroke="url(#techBlue)" stroke-width="3" fill="none" stroke-opacity="0.3">
    <path d="M 0 300 L 80 300 L 120 260"/>
    <path d="M 2280 1050 L 2320 1050 L 2360 1010"/>
  </g>
  
  <!-- 装饰：数据点 -->
  <g fill="#00d4ff" fill-opacity="0.4">
    <circle cx="120" cy="360" r="6"/>
    <circle cx="140" cy="380" r="4"/>
    <circle cx="110" cy="400" r="4"/>
    <circle cx="2280" cy="980" r="6"/>
    <circle cx="2300" cy="1000" r="4"/>
    <circle cx="2270" cy="1020" r="4"/>
  </g>
</svg>