<svg width="900" height="500" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 背景渐变：深色科技感 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d1528;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#071020;stop-opacity:1" />
    </linearGradient>
    <!-- 微信绿渐变 -->
    <linearGradient id="wechatGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07C160;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06AD56;stop-opacity:1" />
    </linearGradient>
    <!-- AI光晕渐变 -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#07C160;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#07C160;stop-opacity:0" />
    </radialGradient>
    <!-- 蓝色渐变（Agent节点） -->
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E88E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565C0;stop-opacity:1" />
    </linearGradient>
    <!-- 标题文字渐变 -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#07C160;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4DD4F0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#07C160;stop-opacity:1" />
    </linearGradient>
    <!-- 连线动感渐变 -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#07C160;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#07C160;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#4DD4F0;stop-opacity:0" />
    </linearGradient>
    <!-- 网格滤镜 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 柔和发光 -->
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bgGrad)"/>

  <!-- 网格背景线 -->
  <g opacity="0.08" stroke="#07C160" stroke-width="0.5">
    <!-- 垂直线 -->
    <line x1="75" y1="0" x2="75" y2="500"/>
    <line x1="150" y1="0" x2="150" y2="500"/>
    <line x1="225" y1="0" x2="225" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="375" y1="0" x2="375" y2="500"/>
    <line x1="450" y1="0" x2="450" y2="500"/>
    <line x1="525" y1="0" x2="525" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="675" y1="0" x2="675" y2="500"/>
    <line x1="750" y1="0" x2="750" y2="500"/>
    <line x1="825" y1="0" x2="825" y2="500"/>
    <!-- 水平线 -->
    <line x1="0" y1="62" x2="900" y2="62"/>
    <line x1="0" y1="125" x2="900" y2="125"/>
    <line x1="0" y1="187" x2="900" y2="187"/>
    <line x1="0" y1="250" x2="900" y2="250"/>
    <line x1="0" y1="312" x2="900" y2="312"/>
    <line x1="0" y1="375" x2="900" y2="375"/>
    <line x1="0" y1="437" x2="900" y2="437"/>
  </g>

  <!-- 中心AI光晕 -->
  <ellipse cx="450" cy="250" rx="200" ry="200" fill="url(#glowGrad)" opacity="0.5"/>

  <!-- ============ 左侧：用户对话区域 ============ -->
  <!-- 用户手机轮廓 -->
  <rect x="60" y="150" width="130" height="220" rx="18" ry="18" fill="#111827" stroke="#1E3A5F" stroke-width="2"/>
  <!-- 手机顶部刘海 -->
  <rect x="100" y="150" width="50" height="8" rx="4" fill="#1E3A5F"/>
  <!-- 手机屏幕 -->
  <rect x="70" y="170" width="110" height="185" rx="4" fill="#0D1F35"/>
  
  <!-- 微信聊天界面 -->
  <!-- 顶栏 -->
  <rect x="70" y="170" width="110" height="28" rx="4" fill="#1a2840"/>
  <text x="125" y="189" font-family="Arial" font-size="9" fill="#9DB4CC" text-anchor="middle">微信 AI Agent</text>
  
  <!-- 用户消息气泡 -->
  <rect x="82" y="210" width="90" height="28" rx="10" fill="#07C160"/>
  <text x="127" y="222" font-family="Arial" font-size="7.5" fill="white" text-anchor="middle">帮我预约周六晚餐</text>
  <text x="127" y="232" font-family="Arial" font-size="7.5" fill="white" text-anchor="middle">附近好评餐厅</text>
  
  <!-- AI回复气泡 -->
  <rect x="74" y="250" width="95" height="38" rx="10" fill="#1E3A5F"/>
  <text x="121" y="263" font-family="Arial" font-size="7" fill="#4DD4F0" text-anchor="middle">已为您找到3家餐厅</text>
  <text x="121" y="274" font-family="Arial" font-size="7" fill="#9DB4CC" text-anchor="middle">大董烤鸭 ⭐4.9</text>
  <text x="121" y="285" font-family="Arial" font-size="7" fill="#9DB4CC" text-anchor="middle">是否需要直接预订？</text>
  
  <!-- 小程序调用提示 -->
  <rect x="74" y="300" width="95" height="45" rx="8" fill="#142030" stroke="#07C160" stroke-width="0.8"/>
  <rect x="78" y="304" width="16" height="16" rx="4" fill="#07C160"/>
  <text x="80" y="314" font-family="Arial" font-size="7" fill="white">餐</text>
  <text x="98" y="313" font-family="Arial" font-size="7" fill="#4DD4F0">大众点评小程序</text>
  <text x="98" y="323" font-family="Arial" font-size="6.5" fill="#607D8B">已调用 · 预约周六18:00</text>
  <rect x="78" y="329" width="86" height="12" rx="6" fill="#07C160"/>
  <text x="121" y="338" font-family="Arial" font-size="7" fill="white" text-anchor="middle">✓ 预约成功</text>

  <!-- 左侧标签 -->
  <text x="125" y="390" font-family="Arial" font-size="9" fill="#607D8B" text-anchor="middle">用户自然语言交互</text>

  <!-- ============ 中央：AI Agent核心 ============ -->
  <!-- 核心圆圈 -->
  <circle cx="450" cy="250" r="85" fill="none" stroke="#07C160" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5"/>
  <circle cx="450" cy="250" r="70" fill="#071520" stroke="#07C160" stroke-width="2" filter="url(#glow)"/>
  
  <!-- AI Agent图标 -->
  <!-- 大脑轮廓 -->
  <path d="M430,220 C420,215 415,225 418,235 C415,240 418,250 425,252 C425,262 432,268 440,266 C443,272 452,272 455,266 C463,268 470,262 470,252 C477,250 480,240 477,235 C480,225 475,215 465,220 C462,210 452,207 450,212 C448,207 438,210 430,220Z" 
        fill="none" stroke="#4DD4F0" stroke-width="1.5" opacity="0.8"/>
  <!-- 神经连接点 -->
  <circle cx="435" cy="240" r="3" fill="#07C160" filter="url(#glow)"/>
  <circle cx="450" cy="233" r="3" fill="#07C160" filter="url(#glow)"/>
  <circle cx="465" cy="240" r="3" fill="#07C160" filter="url(#glow)"/>
  <circle cx="440" cy="253" r="3" fill="#4DD4F0" filter="url(#glow)"/>
  <circle cx="460" cy="253" r="3" fill="#4DD4F0" filter="url(#glow)"/>
  <!-- 神经连线 -->
  <line x1="435" y1="240" x2="450" y2="233" stroke="#07C160" stroke-width="1" opacity="0.6"/>
  <line x1="450" y1="233" x2="465" y2="240" stroke="#07C160" stroke-width="1" opacity="0.6"/>
  <line x1="435" y1="240" x2="440" y2="253" stroke="#4DD4F0" stroke-width="1" opacity="0.6"/>
  <line x1="465" y1="240" x2="460" y2="253" stroke="#4DD4F0" stroke-width="1" opacity="0.6"/>
  <line x1="440" y1="253" x2="460" y2="253" stroke="#4DD4F0" stroke-width="1" opacity="0.6"/>

  <!-- Agent标签 -->
  <text x="450" y="278" font-family="Arial" font-size="11" fill="#07C160" text-anchor="middle" font-weight="bold" filter="url(#glow)">AI Agent</text>
  
  <!-- 内部功能标签 -->
  <text x="450" y="295" font-family="Arial" font-size="8" fill="#607D8B" text-anchor="middle">意图识别 · 任务拆解 · Function Call</text>

  <!-- ============ 右侧：小程序矩阵 ============ -->
  <!-- 小程序节点1：餐饮 -->
  <rect x="690" y="130" width="90" height="65" rx="12" fill="#0D1F35" stroke="#07C160" stroke-width="1.5"/>
  <rect x="700" y="140" width="30" height="30" rx="8" fill="#E53935"/>
  <text x="715" y="161" font-family="Arial" font-size="14" fill="white" text-anchor="middle">🍜</text>
  <text x="750" y="155" font-family="Arial" font-size="9" fill="#4DD4F0" text-anchor="middle">餐饮外卖</text>
  <text x="750" y="168" font-family="Arial" font-size="8" fill="#607D8B" text-anchor="middle">美团/饿了么</text>
  <text x="750" y="180" font-family="Arial" font-size="8" fill="#607D8B" text-anchor="middle">大众点评</text>

  <!-- 小程序节点2：出行 -->
  <rect x="690" y="215" width="90" height="65" rx="12" fill="#0D1F35" stroke="#1E88E5" stroke-width="1.5"/>
  <rect x="700" y="225" width="30" height="30" rx="8" fill="#0288D1"/>
  <text x="715" y="246" font-family="Arial" font-size="14" fill="white" text-anchor="middle">🚖</text>
  <text x="750" y="240" font-family="Arial" font-size="9" fill="#4DD4F0" text-anchor="middle">出行预约</text>
  <text x="750" y="253" font-family="Arial" font-size="8" fill="#607D8B" text-anchor="middle">滴滴/高德</text>
  <text x="750" y="265" font-family="Arial" font-size="8" fill="#607D8B" text-anchor="middle">12306</text>

  <!-- 小程序节点3：医疗 -->
  <rect x="690" y="300" width="90" height="65" rx="12" fill="#0D1F35" stroke="#AB47BC" stroke-width="1.5"/>
  <rect x="700" y="310" width="30" height="30" rx="8" fill="#7B1FA2"/>
  <text x="715" y="331" font-family="Arial" font-size="14" fill="white" text-anchor="middle">🏥</text>
  <text x="750" y="325" font-family="Arial" font-size="9" fill="#CE93D8" text-anchor="middle">医疗健康</text>
  <text x="750" y="338" font-family="Arial" font-size="8" fill="#607D8B" text-anchor="middle">挂号/问诊</text>
  <text x="750" y="350" font-family="Arial" font-size="8" fill="#607D8B" text-anchor="middle">健康码</text>

  <!-- ============ 连接线 ============ -->
  <!-- 左侧（用户）到中央Agent -->
  <path d="M195,250 C260,250 350,250 378,250" fill="none" stroke="url(#lineGrad)" stroke-width="2" filter="url(#glow)"/>
  <!-- 箭头 -->
  <polygon points="375,245 385,250 375,255" fill="#07C160" opacity="0.8"/>
  
  <!-- Agent到右侧小程序1（餐饮） -->
  <path d="M522,235 C580,200 630,175 688,162" fill="none" stroke="#07C160" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <polygon points="685,158 692,163 683,167" fill="#07C160" opacity="0.6"/>
  
  <!-- Agent到右侧小程序2（出行） -->
  <path d="M522,250 C600,250 650,248 688,248" fill="none" stroke="#1E88E5" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <polygon points="685,244 692,248 685,252" fill="#1E88E5" opacity="0.6"/>
  
  <!-- Agent到右侧小程序3（医疗） -->
  <path d="M522,265 C580,295 630,320 688,330" fill="none" stroke="#AB47BC" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <polygon points="685,326 692,331 683,335" fill="#AB47BC" opacity="0.6"/>

  <!-- ============ 顶部标题区域 ============ -->
  <!-- 顶部渐变条 -->
  <rect x="0" y="0" width="900" height="80" fill="url(#bgGrad)" opacity="0.9"/>
  <line x1="0" y1="80" x2="900" y2="80" stroke="#07C160" stroke-width="0.5" opacity="0.3"/>
  
  <!-- 主标题 -->
  <text x="450" y="42" font-family="'PingFang SC', 'Microsoft YaHei', Arial" font-size="30" fill="url(#titleGrad)" text-anchor="middle" font-weight="bold" filter="url(#softGlow)">微信 AI Agent 来了</text>
  <text x="450" y="70" font-family="'PingFang SC', 'Microsoft YaHei', Arial" font-size="16" fill="#9DB4CC" text-anchor="middle">你的小程序准备好了吗？开发者必读备战清单</text>

  <!-- ============ 底部信息区域 ============ -->
  <rect x="0" y="430" width="900" height="70" fill="#030810" opacity="0.9"/>
  <line x1="0" y1="430" x2="900" y2="430" stroke="#07C160" stroke-width="0.5" opacity="0.3"/>

  <!-- 底部左：关键数据 -->
  <text x="60" y="453" font-family="Arial" font-size="10" fill="#607D8B">关键数据</text>
  <!-- 数据1 -->
  <text x="60" y="470" font-family="'PingFang SC', 'Microsoft YaHei', Arial" font-size="13" fill="#07C160" font-weight="bold">14亿</text>
  <text x="90" y="470" font-family="Arial" font-size="10" fill="#607D8B">月活用户</text>
  <!-- 数据2 -->
  <text x="155" y="470" font-family="'PingFang SC', 'Microsoft YaHei', Arial" font-size="13" fill="#4DD4F0" font-weight="bold">数百万</text>
  <text x="197" y="470" font-family="Arial" font-size="10" fill="#607D8B">小程序打通</text>
  <!-- 数据3 -->
  <text x="265" y="470" font-family="'PingFang SC', 'Microsoft YaHei', Arial" font-size="13" fill="#FFB300" font-weight="bold">Q3</text>
  <text x="285" y="470" font-family="Arial" font-size="10" fill="#607D8B">2026全量上线</text>
  <!-- 数据4 -->
  <text x="360" y="470" font-family="'PingFang SC', 'Microsoft YaHei', Arial" font-size="13" fill="#E53935" font-weight="bold">3个月</text>
  <text x="395" y="470" font-family="Arial" font-size="10" fill="#607D8B">开发者备战窗口</text>

  <!-- 底部右：公众号信息 -->
  <rect x="700" y="438" width="180" height="44" rx="8" fill="#0D1F35" stroke="#07C160" stroke-width="0.8"/>
  <circle cx="720" cy="460" r="12" fill="url(#wechatGrad)"/>
  <text x="720" y="464" font-family="Arial" font-size="10" fill="white" text-anchor="middle" font-weight="bold">A</text>
  <text x="738" y="454" font-family="Arial" font-size="10" fill="#4DD4F0" font-weight="bold">AppDev</text>
  <text x="738" y="467" font-family="Arial" font-size="9" fill="#607D8B">移动开发·干货·前沿</text>

  <!-- 底部标签行 -->
  <!-- 标签1 -->
  <rect x="60" y="483" width="62" height="14" rx="7" fill="#071520" stroke="#07C160" stroke-width="0.8"/>
  <text x="91" y="493" font-family="Arial" font-size="8" fill="#07C160" text-anchor="middle">#微信开发</text>
  <!-- 标签2 -->
  <rect x="130" y="483" width="52" height="14" rx="7" fill="#071520" stroke="#1E88E5" stroke-width="0.8"/>
  <text x="156" y="493" font-family="Arial" font-size="8" fill="#1E88E5" text-anchor="middle">#AI Agent</text>
  <!-- 标签3 -->
  <rect x="190" y="483" width="54" height="14" rx="7" fill="#071520" stroke="#4DD4F0" stroke-width="0.8"/>
  <text x="217" y="493" font-family="Arial" font-size="8" fill="#4DD4F0" text-anchor="middle">#小程序</text>
  <!-- 标签4 -->
  <rect x="252" y="483" width="52" height="14" rx="7" fill="#071520" stroke="#FFB300" stroke-width="0.8"/>
  <text x="278" y="493" font-family="Arial" font-size="8" fill="#FFB300" text-anchor="middle">#2026热点</text>
  
  <!-- 右下角日期 -->
  <text x="860" y="490" font-family="Arial" font-size="9" fill="#37474F" text-anchor="end">2026.03.28</text>

  <!-- 装饰性浮动点 -->
  <circle cx="320" cy="150" r="2" fill="#07C160" opacity="0.6" filter="url(#glow)"/>
  <circle cx="580" cy="130" r="3" fill="#4DD4F0" opacity="0.5" filter="url(#glow)"/>
  <circle cx="200" cy="350" r="2" fill="#07C160" opacity="0.4"/>
  <circle cx="650" cy="400" r="2" fill="#1E88E5" opacity="0.5"/>
  <circle cx="820" cy="180" r="2" fill="#4DD4F0" opacity="0.4"/>
  <circle cx="100" cy="420" r="2" fill="#07C160" opacity="0.3"/>
  
  <!-- 左侧装饰竖线 -->
  <rect x="0" y="0" width="4" height="500" fill="url(#wechatGrad)" opacity="0.6"/>
  <!-- 右侧装饰竖线 -->
  <rect x="896" y="0" width="4" height="500" fill="url(#agentGrad)" opacity="0.6"/>
</svg>
