<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 383">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <linearGradient id="wechatGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#07C160"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="codeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="383" fill="url(#bgGrad)"/>
  
  <!-- 装饰网格 -->
  <g opacity="0.03">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fff" stroke-width="1"/>
    </pattern>
    <rect width="900" height="383" fill="url(#grid)"/>
  </g>
  
  <!-- 左侧手机 -->
  <g transform="translate(60, 50)">
    <!-- 手机外壳 -->
    <rect x="0" y="0" width="180" height="320" rx="20" ry="20" fill="#1E293B" filter="url(#softShadow)"/>
    <rect x="8" y="12" width="164" height="296" rx="16" ry="16" fill="#0F172A"/>
    
    <!-- 状态栏 -->
    <rect x="8" y="12" width="164" height="24" rx="16" ry="16" fill="#1E293B"/>
    <circle cx="90" cy="24" r="4" fill="#10B981"/>
    
    <!-- 微信聊天界面 -->
    <g transform="translate(16, 50)">
      <!-- 用户头像 -->
      <circle cx="20" cy="0" r="18" fill="url(#wechatGrad)"/>
      <text x="20" y="6" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">我</text>
      
      <!-- 发送的消息气泡 -->
      <rect x="45" y="-20" width="110" height="40" rx="12" fill="url(#wechatGrad)"/>
      <text x="100" y="8" text-anchor="middle" fill="#fff" font-size="12" font-weight="500">帮我改下登录接口</text>
      
      <!-- AI头像 -->
      <circle cx="140" cy="70" r="18" fill="url(#aiGrad)" filter="url(#glow)"/>
      <text x="140" y="75" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">AI</text>
      
      <!-- AI回复消息气泡 -->
      <rect x="5" y="50" width="125" height="40" rx="12" fill="#2D3748"/>
      <text x="67" y="75" text-anchor="middle" fill="#E2E8F0" font-size="11">好的，已完成修改✓</text>
    </g>
    
    <!-- 手机底部导航 -->
    <rect x="8" y="280" width="164" height="28" rx="0" ry="0" fill="#1E293B"/>
    <circle cx="50" cy="294" r="3" fill="#10B981"/>
    <circle cx="90" cy="294" r="3" fill="#6366F1"/>
    <circle cx="130" cy="294" r="3" fill="#94A3B8"/>
  </g>
  
  <!-- 中间连接箭头 -->
  <g transform="translate(280, 170)">
    <!-- 数据流线条 -->
    <path d="M 0 30 Q 50 0 100 30 Q 150 60 200 30" fill="none" stroke="url(#wechatGrad)" stroke-width="3" opacity="0.6">
      <animate attributeName="stroke-dasharray" values="0,400;400,0" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 0 50 Q 50 80 100 50 Q 150 20 200 50" fill="none" stroke="url(#aiGrad)" stroke-width="3" opacity="0.6">
      <animate attributeName="stroke-dasharray" values="0,400;400,0" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </path>
    
    <!-- 连接符号 -->
    <g transform="translate(85, 20)">
      <circle cx="15" cy="15" r="25" fill="none" stroke="url(#wechatGrad)" stroke-width="2" opacity="0.5"/>
      <path d="M 5 15 L 25 15 M 15 5 L 15 25" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>
  
  <!-- 右侧电脑 -->
  <g transform="translate(520, 40)">
    <!-- 显示器 -->
    <rect x="0" y="0" width="320" height="220" rx="12" ry="12" fill="#1E293B" filter="url(#softShadow)"/>
    <rect x="10" y="10" width="300" height="180" rx="8" ry="8" fill="#0F172A"/>
    
    <!-- 代码编辑器界面 -->
    <g transform="translate(20, 20)">
      <!-- 编辑器顶栏 -->
      <rect x="0" y="0" width="280" height="24" rx="4" fill="#1E293B"/>
      <circle cx="12" cy="12" r="5" fill="#EF4444"/>
      <circle cx="28" cy="12" r="5" fill="#F59E0B"/>
      <circle cx="44" cy="12" r="5" fill="#10B981"/>
      <text x="140" y="16" text-anchor="middle" fill="#94A3B8" font-size="10" font-family="monospace">LoginActivity.kt</text>
      
      <!-- 代码区域 -->
      <g transform="translate(0, 32)">
        <!-- 行号 -->
        <text x="5" y="12" fill="#4B5563" font-size="9" font-family="monospace">1</text>
        <text x="5" y="28" fill="#4B5563" font-size="9" font-family="monospace">2</text>
        <text x="5" y="44" fill="#4B5563" font-size="9" font-family="monospace">3</text>
        <text x="5" y="60" fill="#4B5563" font-size="9" font-family="monospace">4</text>
        <text x="5" y="76" fill="#4B5563" font-size="9" font-family="monospace">5</text>
        <text x="5" y="92" fill="#4B5563" font-size="9" font-family="monospace">6</text>
        <text x="5" y="108" fill="#4B5563" font-size="9" font-family="monospace">7</text>
        
        <!-- 代码内容 -->
        <text x="25" y="12" fill="#C084FC" font-size="9" font-family="monospace">fun</text>
        <text x="45" y="12" fill="#60A5FA" font-size="9" font-family="monospace">handleLogin</text>
        <text x="115" y="12" fill="#E2E8F0" font-size="9" font-family="monospace">() {</text>
        
        <text x="25" y="28" fill="#94A3B8" font-size="9" font-family="monospace">// 用户登录错误提示</text>
        
        <text x="25" y="44" fill="#F472B6" font-size="9" font-family="monospace">val</text>
        <text x="45" y="44" fill="#E2E8F0" font-size="9" font-family="monospace">errorMsg =</text>
        <text x="105" y="44" fill="#10B981" font-size="9" font-family="monospace">"请检查网络后重试"</text>
        
        <text x="25" y="60" fill="#60A5FA" font-size="9" font-family="monospace">showToast</text>
        <text x="85" y="60" fill="#E2E8F0" font-size="9" font-family="monospace">(errorMsg)</text>
        
        <text x="25" y="76" fill="#E2E8F0" font-size="9" font-family="monospace">}</text>
        
        <!-- 光标闪烁 -->
        <rect x="175" y="68" width="2" height="14" fill="#10B981">
          <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
        </rect>
      </g>
    </g>
    
    <!-- 显示器支架 -->
    <rect x="130" y="220" width="60" height="30" fill="#374151"/>
    <rect x="100" y="250" width="120" height="8" rx="4" fill="#4B5563"/>
  </g>
  
  <!-- 标题区域 -->
  <g transform="translate(450, 320)">
    <text x="0" y="0" text-anchor="middle" fill="#F1F5F9" font-size="22" font-weight="bold" font-family="system-ui">
      WorkBuddy + 微信
    </text>
    <text x="0" y="30" text-anchor="middle" fill="#94A3B8" font-size="14" font-family="system-ui">
      手机发消息 · AI帮你写代码
    </text>
  </g>
  
  <!-- 装饰元素 -->
  <g opacity="0.4">
    <!-- 左上角装饰 -->
    <circle cx="30" cy="30" r="3" fill="#10B981"/>
    <circle cx="50" cy="20" r="2" fill="#6366F1"/>
    <circle cx="70" cy="35" r="2.5" fill="#8B5CF6"/>
    
    <!-- 右上角装饰 -->
    <circle cx="870" cy="30" r="3" fill="#6366F1"/>
    <circle cx="850" cy="45" r="2" fill="#10B981"/>
    <circle cx="880" cy="50" r="2.5" fill="#3B82F6"/>
    
    <!-- 右下角装饰 -->
    <circle cx="860" cy="350" r="2" fill="#10B981"/>
    <circle cx="880" cy="365" r="3" fill="#6366F1"/>
  </g>
  
  <!-- 小标签 -->
  <g transform="translate(750, 20)">
    <rect x="0" y="0" width="120" height="26" rx="13" fill="#10B981" opacity="0.2"/>
    <text x="60" y="17" text-anchor="middle" fill="#10B981" font-size="11" font-weight="500">2026.03.17</text>
  </g>
</svg>