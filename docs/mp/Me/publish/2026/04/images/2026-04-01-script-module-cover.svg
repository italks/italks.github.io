<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" patternUnits="userSpaceOnUse" width="40" height="40">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
    </pattern>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  <rect width="900" height="500" fill="url(#grid)"/>
  
  <!-- 装饰圆形 -->
  <circle cx="100" cy="400" r="150" fill="#667eea" opacity="0.05"/>
  <circle cx="800" cy="100" r="120" fill="#764ba2" opacity="0.05"/>
  
  <!-- 主标题 -->
  <text x="450" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="url(#accentGrad)" filter="url(#glow)">
    type="module"
  </text>
  <text x="450" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#ffffff">
    三个坑与五个实测案例
  </text>
  
  <!-- 核心概念卡片 -->
  <g transform="translate(100, 220)">
    <rect x="0" y="0" width="220" height="140" rx="12" fill="#1e1e3f" stroke="#667eea" stroke-width="2"/>
    <circle cx="30" cy="30" r="15" fill="#667eea" opacity="0.3"/>
    <text x="30" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#667eea">1</text>
    <text x="110" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">路径解析</text>
    <text x="110" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#b8b8d1">相对于当前模块文件</text>
    <text x="110" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#b8b8d1">而非 HTML 页面</text>
    <text x="110" y="115" text-anchor="middle" font-family="monospace" font-size="11" fill="#667eea">import './utils.js'</text>
  </g>
  
  <g transform="translate(340, 220)">
    <rect x="0" y="0" width="220" height="140" rx="12" fill="#1e1e3f" stroke="#764ba2" stroke-width="2"/>
    <circle cx="30" cy="30" r="15" fill="#764ba2" opacity="0.3"/>
    <text x="30" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#764ba2">2</text>
    <text x="110" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">异步加载</text>
    <text x="110" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#b8b8d1">默认 defer 效果</text>
    <text x="110" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#b8b8d1">不阻塞 HTML 解析</text>
    <text x="110" y="115" text-anchor="middle" font-family="monospace" font-size="11" fill="#764ba2">DOM 解析后执行</text>
  </g>
  
  <g transform="translate(580, 220)">
    <rect x="0" y="0" width="220" height="140" rx="12" fill="#1e1e3f" stroke="#667eea" stroke-width="2"/>
    <circle cx="30" cy="30" r="15" fill="#667eea" opacity="0.3"/>
    <text x="30" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#667eea">3</text>
    <text x="110" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">等待加载</text>
    <text x="110" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#b8b8d1">import() → Promise</text>
    <text x="110" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#b8b8d1">顶层 await 语法</text>
    <text x="110" y="115" text-anchor="middle" font-family="monospace" font-size="11" fill="#667eea">await import(...)</text>
  </g>
  
  <!-- 代码装饰 -->
  <g transform="translate(100, 400)">
    <rect x="0" y="0" width="700" height="70" rx="8" fill="#0a0a1a" opacity="0.9"/>
    <circle cx="20" cy="15" r="5" fill="#ff5f56"/>
    <circle cx="35" cy="15" r="5" fill="#ffbd2e"/>
    <circle cx="50" cy="15" r="5" fill="#27ca40"/>
    <text x="20" y="45" font-family="monospace" font-size="12" fill="#b8b8d1">&lt;script </text>
    <text x="85" y="45" font-family="monospace" font-size="12" fill="#667eea">type="module"</text>
    <text x="195" y="45" font-family="monospace" font-size="12" fill="#b8b8d1">&gt;</text>
    <text x="40" y="60" font-family="monospace" font-size="11" fill="#27ca40">import</text>
    <text x="90" y="60" font-family="monospace" font-size="11" fill="#ffffff">{ init }</text>
    <text x="150" y="60" font-family="monospace" font-size="11" fill="#27ca40">from</text>
    <text x="190" y="60" font-family="monospace" font-size="11" fill="#ffbd2e">'./app.js'</text>
    <text x="270" y="60" font-family="monospace" font-size="11" fill="#ffffff">;</text>
    <text x="290" y="60" font-family="monospace" font-size="11" fill="#27ca40">await</text>
    <text x="340" y="60" font-family="monospace" font-size="11" fill="#ffffff">init();</text>
  </g>
  
  <!-- 底部装饰线 -->
  <path d="M 0 495 Q 225 480 450 490 T 900 485" stroke="url(#accentGrad)" stroke-width="2" fill="none" opacity="0.3"/>
</svg>