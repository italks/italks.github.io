<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 383">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="50%" style="stop-color:#764ba2"/>
      <stop offset="100%" style="stop-color:#f093fb"/>
    </linearGradient>
    
    <!-- 卡片阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    
    <!-- 发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 代码块渐变 -->
    <linearGradient id="codeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e1e"/>
      <stop offset="100%" style="stop-color:#2d2d2d"/>
    </linearGradient>
    
    <!-- 技能模块渐变 -->
    <linearGradient id="skillGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    
    <linearGradient id="skillGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    
    <linearGradient id="skillGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="383" fill="url(#bgGradient)"/>
  
  <!-- 装饰性背景元素 -->
  <circle cx="100" cy="80" r="120" fill="#fff" opacity="0.05"/>
  <circle cx="800" cy="300" r="150" fill="#fff" opacity="0.05"/>
  <circle cx="450" cy="400" r="200" fill="#fff" opacity="0.03"/>
  
  <!-- 左侧：代码编辑器卡片 -->
  <g transform="translate(40, 50)" filter="url(#shadow)">
    <!-- 编辑器窗口 -->
    <rect width="320" height="220" rx="12" fill="url(#codeGradient)"/>
    
    <!-- 窗口标题栏 -->
    <rect width="320" height="32" rx="12" fill="#323232"/>
    <rect y="32" width="320" height="188" fill="url(#codeGradient)"/>
    
    <!-- 窗口按钮 -->
    <circle cx="20" cy="16" r="6" fill="#ff5f57"/>
    <circle cx="40" cy="16" r="6" fill="#ffbd2e"/>
    <circle cx="60" cy="16" r="6" fill="#28ca42"/>
    
    <!-- 代码行 -->
    <text x="20" y="60" font-family="Consolas, Monaco, monospace" font-size="12" fill="#6a9955">// Skill 定义</text>
    <text x="20" y="82" font-family="Consolas, Monaco, monospace" font-size="12" fill="#569cd6">name:</text>
    <text x="70" y="82" font-family="Consolas, Monaco, monospace" font-size="12" fill="#ce9178">"my-skill"</text>
    <text x="20" y="104" font-family="Consolas, Monaco, monospace" font-size="12" fill="#569cd6">version:</text>
    <text x="80" y="104" font-family="Consolas, Monaco, monospace" font-size="12" fill="#ce9178">"1.0.0"</text>
    <text x="20" y="126" font-family="Consolas, Monaco, monospace" font-size="12" fill="#569cd6">triggers:</text>
    <text x="20" y="148" font-family="Consolas, Monaco, monospace" font-size="12" fill="#ce9178">  - "开始任务"</text>
    <text x="20" y="170" font-family="Consolas, Monaco, monospace" font-size="12" fill="#ce9178">  - "run task"</text>
    <text x="20" y="192" font-family="Consolas, Monaco, monospace" font-size="12" fill="#6a9955">// AI 执行工作流...</text>
  </g>
  
  <!-- 右侧：技能模块 -->
  <g transform="translate(520, 60)">
    <!-- 技能模块 1 -->
    <g transform="translate(0, 0)">
      <rect width="160" height="60" rx="10" fill="url(#skillGradient1)" filter="url(#shadow)"/>
      <circle cx="30" cy="30" r="18" fill="#fff" opacity="0.3"/>
      <text x="30" y="36" font-family="Arial, sans-serif" font-size="20" fill="#fff" text-anchor="middle">📦</text>
      <text x="60" y="28" font-family="Arial, sans-serif" font-size="13" fill="#fff" font-weight="bold">Skill 模块</text>
      <text x="60" y="45" font-family="Arial, sans-serif" font-size="11" fill="#fff" opacity="0.9">扩展 AI 能力</text>
    </g>
    
    <!-- 技能模块 2 -->
    <g transform="translate(0, 80)">
      <rect width="160" height="60" rx="10" fill="url(#skillGradient2)" filter="url(#shadow)"/>
      <circle cx="30" cy="30" r="18" fill="#fff" opacity="0.3"/>
      <text x="30" y="36" font-family="Arial, sans-serif" font-size="20" fill="#fff" text-anchor="middle">⚡</text>
      <text x="60" y="28" font-family="Arial, sans-serif" font-size="13" fill="#fff" font-weight="bold">自动化</text>
      <text x="60" y="45" font-family="Arial, sans-serif" font-size="11" fill="#fff" opacity="0.9">智能执行任务</text>
    </g>
    
    <!-- 技能模块 3 -->
    <g transform="translate(0, 160)">
      <rect width="160" height="60" rx="10" fill="url(#skillGradient3)" filter="url(#shadow)"/>
      <circle cx="30" cy="30" r="18" fill="#fff" opacity="0.3"/>
      <text x="30" y="36" font-family="Arial, sans-serif" font-size="20" fill="#fff" text-anchor="middle">🚀</text>
      <text x="60" y="28" font-family="Arial, sans-serif" font-size="13" fill="#fff" font-weight="bold">快速发布</text>
      <text x="60" y="45" font-family="Arial, sans-serif" font-size="11" fill="#fff" opacity="0.9">共享到社区</text>
    </g>
    
    <!-- 连接线 -->
    <path d="M 160 30 Q 180 30 200 70 Q 220 110 200 150 Q 180 190 160 190" 
          stroke="#fff" stroke-width="2" fill="none" opacity="0.3" stroke-dasharray="5,5"/>
  </g>
  
  <!-- 中间：AI 核心图标 -->
  <g transform="translate(380, 140)">
    <!-- 外圈 -->
    <circle cx="60" cy="50" r="55" fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>
    <circle cx="60" cy="50" r="45" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
    
    <!-- AI 核心圆 -->
    <circle cx="60" cy="50" r="35" fill="#fff" filter="url(#glow)"/>
    
    <!-- AI 文字 -->
    <text x="60" y="45" font-family="Arial, sans-serif" font-size="18" fill="#667eea" text-anchor="middle" font-weight="bold">AI</text>
    <text x="60" y="62" font-family="Arial, sans-serif" font-size="10" fill="#764ba2" text-anchor="middle">Agent</text>
    
    <!-- 脉冲效果 -->
    <circle cx="60" cy="50" r="35" fill="none" stroke="#fff" stroke-width="2" opacity="0.6">
      <animate attributeName="r" values="35;55;35" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- 连接箭头 -->
  <g opacity="0.6">
    <!-- 左到中间 -->
    <path d="M 360 160 L 380 165" stroke="#fff" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    
    <!-- 中间到右 -->
    <path d="M 500 165 L 520 160" stroke="#fff" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- 箭头定义 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#fff" opacity="0.6"/>
    </marker>
  </defs>
  
  <!-- 底部标题区域 -->
  <g transform="translate(0, 290)">
    <!-- 半透明背景 -->
    <rect width="900" height="93" fill="#000" opacity="0.15"/>
    
    <!-- 主标题 -->
    <text x="450" y="40" font-family="Arial, sans-serif" font-size="32" fill="#fff" text-anchor="middle" font-weight="bold">
      OpenClaw Skill 开发完整指南
    </text>
    
    <!-- 副标题 -->
    <text x="450" y="70" font-family="Arial, sans-serif" font-size="16" fill="#fff" text-anchor="middle" opacity="0.9">
      从零开始创建你的第一个技能 | 让 AI 智能体更强大
    </text>
  </g>
  
  <!-- 装饰性代码符号 -->
  <g opacity="0.15">
    <text x="50" y="350" font-family="Consolas, Monaco, monospace" font-size="24" fill="#fff">&lt;/&gt;</text>
    <text x="820" y="80" font-family="Consolas, Monaco, monospace" font-size="24" fill="#fff">{ }</text>
    <text x="750" y="350" font-family="Consolas, Monaco, monospace" font-size="24" fill="#fff">[ ]</text>
  </g>
  
  <!-- 顶部标签 -->
  <g transform="translate(30, 15)">
    <rect width="120" height="28" rx="14" fill="#fff" opacity="0.2"/>
    <text x="60" y="20" font-family="Arial, sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">🤖 AI 开发</text>
  </g>
  
  <!-- 右上角技术标签 -->
  <g transform="translate(750, 15)">
    <rect width="120" height="28" rx="14" fill="#fff" opacity="0.2"/>
    <text x="60" y="20" font-family="Arial, sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">📖 完整教程</text>
  </g>
</svg>