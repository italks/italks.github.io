<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500" role="img">
  <title>Ubuntu 26.04 LTS 倒计时4天 终极前瞻</title>
  
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    
    <!-- Ubuntu橙色渐变 -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E95420"/>
      <stop offset="100%" style="stop-color:#FF7043"/>
    </linearGradient>
    
    <!-- 数字发光效果 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 强发光 -->
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 网格图案 -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
    </pattern>
    
    <!-- 圆点装饰 -->
    <circle id="dot" r="3" fill="#E95420" opacity="0.6"/>
    
    <!-- Ubuntu Circle of Friends (简化版) -->
    <g id="ubuntuLogo">
      <circle cx="0" cy="-22" r="6" fill="#E95420"/>
      <circle cx="19" cy="11" r="6" fill="#FF7043"/>
      <circle cx="-19" cy="11" r="6" fill="#FFAB91"/>
      <line x1="0" y1="-16" x2="14" y2="7" stroke="#fff" stroke-width="2.5" opacity="0.9"/>
      <line x1="-14" y1="7" x2="14" y2="7" stroke="#fff" stroke-width="2.5" opacity="0.9"/>
      <line x1="0" y1="-16" x2="-14" y2="7" stroke="#fff" stroke-width="2.5" opacity="0.9"/>
    </g>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  <rect width="900" height="500" fill="url(#grid)"/>
  
  <!-- 顶部装饰线 -->
  <rect x="0" y="0" width="900" height="4" fill="url(#orangeGrad)"/>
  
  <!-- 左上角标签 -->
  <rect x="30" y="24" rx="12" ry="12" width="120" height="30" fill="#E95420" opacity="0.9"/>
  <text x="90" y="44" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">LTS 长期支持</text>
  
  <!-- 主标题区 -->
  <text x="450" y="85" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle" opacity="0.9">Ubuntu 26.04 LTS 终极前瞻</text>
  <text x="450" y="115" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle">Resolute Raccoon · 坚毅浣熊</text>
  
  <!-- 核心倒计时数字 -->
  <g transform="translate(450, 240)">
    <!-- 背景圆环 -->
    <circle cx="0" cy="0" r="95" fill="none" stroke="#E95420" stroke-width="3" opacity="0.25"/>
    <circle cx="0" cy="0" r="85" fill="none" stroke="#E95420" stroke-width="1" opacity="0.15"/>
    
    <!-- 进度环（表示接近发布） -->
    <circle cx="0" cy="0" r="95" fill="none" stroke="url(#orangeGrad)" stroke-width="4" 
            stroke-dasharray="560 600" stroke-linecap="round" 
            transform="rotate(-90)" filter="url(#glow)" opacity="0.8"/>
    
    <!-- 大数字 -->
    <text x="0" y="18" font-family="'Helvetica Neue',Arial,sans-serif" font-size="96" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#strongGlow)">4</text>
    
    <!-- DAYS 文字 -->
    <text x="0" y="52" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="600" fill="#E95420" text-anchor="middle" letter-spacing="8">DAYS</text>
    
    <!-- 倒计时说明 -->
    <text x="0" y="130" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">距离正式发布</text>
  </g>
  
  <!-- 发布日期 -->
  <g transform="translate(450, 395)">
    <rect x="-80" y="-18" width="160" height="36" rx="18" fill="#E95420" opacity="0.15"/>
    <text x="0" y="6" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" font-weight="bold" fill="#E95420" text-anchor="middle">📅 2026.04.23 正式发布</text>
  </g>
  
  <!-- 底部特性标签 -->
  <g transform="translate(0, 445)">
    <!-- 分隔线 -->
    <line x1="50" y1="0" x2="850" y2="0" stroke="#E95420" stroke-width="1" opacity="0.2"/>
    
    <!-- 特性标签组 -->
    <g transform="translate(120, 30)">
      <rect x="-55" y="-14" width="110" height="28" rx="14" fill="#E95420" opacity="0.12"/>
      <text x="0" y="5" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" fill="#FF7043" text-anchor="middle">🐧 Linux 7.0</text>
    </g>
    
    <g transform="translate(280, 30)">
      <rect x="-55" y="-14" width="110" height="28" rx="14" fill="#E95420" opacity="0.12"/>
      <text x="0" y="5" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" fill="#FF7043" text-anchor="middle">🖥️ GNOME 50</text>
    </g>
    
    <g transform="translate(440, 30)">
      <rect x="-65" y="-14" width="130" height="28" rx="14" fill="#E95420" opacity="0.12"/>
      <text x="0" y="5" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" fill="#FF7043" text-anchor="middle">⚡ Rust 正式入驻</text>
    </g>
    
    <g transform="translate(610, 30)">
      <rect x="-55" y="-14" width="110" height="28" rx="14" fill="#E95420" opacity="0.12"/>
      <text x="0" y="5" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" fill="#FF7043" text-anchor="middle">🤖 AI 开发就绪</text>
    </g>
    
    <g transform="translate(770, 30)">
      <rect x="-55" y="-14" width="110" height="28" rx="14" fill="#E95420" opacity="0.12"/>
      <text x="0" y="5" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" fill="#FF7043" text-anchor="middle">🔒 抗量子加密</text>
    </g>
  </g>
  
  <!-- 装饰元素：Ubuntu Logo (左下角) -->
  <g transform="translate(55, 400) scale(0.7)">
    <use href="#ubuntuLogo"/>
  </g>
  
  <!-- 右侧装饰点 -->
  <use href="#dot" x="830" y="80"/>
  <use href="#dot" x="855" y="105"/>
  <use href="#dot" x="845" y="135"/>
  
  <!-- 左侧装饰线 -->
  <line x1="30" y1="150" x2="30" y2="250" stroke="#E95420" stroke-width="2" opacity="0.3"/>
  <circle cx="30" cy="260" r="4" fill="#E95420" opacity="0.5"/>
  
  <!-- 右侧装饰线 -->
  <line x1="870" y1="160" x2="870" y2="240" stroke="#E95420" stroke-width="2" opacity="0.3"/>
  <circle cx="870" cy="250" r="4" fill="#E95420" opacity="0.5"/>
  
  <!-- 角落装饰 -->
  <path d="M 0 500 L 0 475 Q 0 465 10 465 L 35 465" fill="none" stroke="#E95420" stroke-width="2" opacity="0.4"/>
  <path d="M 900 500 L 900 475 Q 900 465 890 465 L 865 465" fill="none" stroke="#E95420" stroke-width="2" opacity="0.4"/>
</svg>
