<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img">
  <title>Linux 7.0 内核正式发布</title>
  
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    
    <!-- 橙色高亮渐变 -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E95420"/>
      <stop offset="100%" style="stop-color:#FF6B35"/>
    </linearGradient>
    
    <!-- 光晕效果 -->
    <radialGradient id="glowGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#E95420;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#E95420;stop-opacity:0"/>
    </radialGradient>
    
    <!-- 内核图标渐变 -->
    <linearGradient id="kernelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD93D"/>
      <stop offset="100%" style="stop-color:#E95420"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  
  <!-- 光晕效果 -->
  <rect width="900" height="500" fill="url(#glowGrad)"/>
  
  <!-- 装饰网格线 -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="380" x2="900" y2="380"/>
    <line x1="150" y1="0" x2="150" y2="500"/>
    <line x1="750" y1="0" x2="750" y2="500"/>
  </g>
  
  <!-- 左上角装饰 -->
  <circle cx="80" cy="80" r="60" fill="none" stroke="#E95420" stroke-width="2" opacity="0.2"/>
  <circle cx="80" cy="80" r="45" fill="none" stroke="#E95420" stroke-width="1" opacity="0.15"/>
  
  <!-- 右下角装饰 -->
  <circle cx="820" cy="420" r="70" fill="none" stroke="#E95420" stroke-width="2" opacity="0.15"/>
  <circle cx="820" cy="420" r="50" fill="none" stroke="#E95420" stroke-width="1" opacity="0.1"/>
  
  <!-- 顶部标签栏 -->
  <g transform="translate(450, 55)">
    <!-- 标签背景 -->
    <rect x="-180" y="-22" width="360" height="44" rx="22" fill="#E95420" opacity="0.9"/>
    
    <!-- 标签文字 -->
    <text x="0" y="6" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" font-weight="bold" fill="#ffffff">🔥 热点资讯</text>
  </g>
  
  <!-- 主标题区域 -->
  <g transform="translate(450, 165)">
    <!-- 主标题 -->
    <text x="0" y="0" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="52" font-weight="bold" fill="#ffffff">
      Linux 7.0 内核
    </text>
    
    <text x="0" y="58" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="48" font-weight="bold" fill="url(#orangeGrad)">
      正式发布！
    </text>
  </g>
  
  <!-- 副标题 -->
  <text x="450" y="268" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="20" fill="#a0c4e8" letter-spacing="2">
    Rust 转正 · 性能狂飙 · Ubuntu 26.04 首批搭载
  </text>
  
  <!-- 分隔线 -->
  <line x1="250" y1="295" x2="650" y2="295" stroke="url(#orangeGrad)" stroke-width="2" opacity="0.5"/>
  
  <!-- 三大亮点卡片 -->
  <g transform="translate(130, 330)">
    <!-- 卡片1: Rust转正 -->
    <g transform="translate(0, 0)">
      <rect width="190" height="110" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#E95420" stroke-width="1" stroke-opacity="0.3"/>
      
      <!-- 图标：Rust -->
      <circle cx="95" cy="42" r="28" fill="#E95420" fill-opacity="0.15"/>
      <text x="95" y="49" text-anchor="middle" font-size="24">🦀</text>
      
      <!-- 文字 -->
      <text x="95" y="82" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Rust 正式转正</text>
      <text x="95" y="100" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="11" fill="#8899aa">内存安全漏洞 -1000x</text>
    </g>
    
    <!-- 卡片2: AI规范 -->
    <g transform="translate(210, 0)">
      <rect width="190" height="110" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#E95420" stroke-width="1" stroke-opacity="0.3"/>
      
      <!-- 图标：AI -->
      <circle cx="95" cy="42" r="28" fill="#E95420" fill-opacity="0.15"/>
      <text x="95" y="49" text-anchor="middle" font-size="24">🤖</text>
      
      <!-- 文字 -->
      <text x="95" y="82" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="15" font-weight="bold" fill="#ffffff">AI 代码三条铁律</text>
      <text x="95" y="100" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="11" fill="#8899aa">人机协作新规范</text>
    </g>
    
    <!-- 卡片3: 性能提升 -->
    <g transform="translate(420, 0)">
      <rect width="190" height="110" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#E95420" stroke-width="1" stroke-opacity="0.3"/>
      
      <!-- 图标：性能 -->
      <circle cx="95" cy="42" r="28" fill="#E95420" fill-opacity="0.15"/>
      <text x="95" y="49" text-anchor="middle" font-size="24">⚡</text>
      
      <!-- 文字 -->
      <text x="95" y="82" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="15" font-weight="bold" fill="#ffffff">性能全面进化</text>
      <text x="95" y="100" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="11" fill="#8899aa">Swap +20% / 游戏帧率 +40%</text>
    </g>
  </g>
  
  <!-- 底部信息栏 -->
  <g transform="translate(450, 468)">
    <rect x="-140" y="-16" width="280" height="32" rx="16" fill="#E95420" fill-opacity="0.15"/>
    
    <!-- Ubuntu Logo 圆点 -->
    <circle cx="-115" cy="0" r="7" fill="#E95420"/>
    
    <text x="-98" y="5" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="14" fill="#e0e0e0">UbuntuNews</text>
    
    <!-- 分隔符 -->
    <text x="10" y="5" text-anchor="middle" font-size="14" fill="#666">|</text>
    
    <text x="35" y="5" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#888">2026.04.17</text>
  </g>
  
  <!-- 装饰性代码片段（左下角） -->
  <g transform="translate(30, 400)" opacity="0.08" font-family="'Consolas', 'Monaco', monospace" font-size="10" fill="#00ff88">
    <text x="0" y="0">$ uname -r</text>
    <text x="0" y="16">7.0.0-generic</text>
    <text x="0" y="32">$ lsb_release -a</text>
    <text x="0" y="48">Ubuntu 26.04 LTS</text>
  </g>
  
  <!-- 装饰性版本号（右上角） -->
  <g transform="translate(850, 130)" opacity="0.06">
    <text x="0" y="0" text-anchor="end" font-family="'Arial Black', sans-serif" font-size="90" font-weight="bold" fill="#E95420">7.0</text>
  </g>
</svg>