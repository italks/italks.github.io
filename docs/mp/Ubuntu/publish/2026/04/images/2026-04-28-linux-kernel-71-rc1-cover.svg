<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    
    <!-- Ubuntu橙色光晕 -->
    <radialGradient id="orangeGlow" cx="75%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#E95420;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#E95420;stop-opacity:0"/>
    </radialGradient>
    
    <!-- 绿色光晕（NTFS性能提升） -->
    <radialGradient id="greenGlow" cx="25%" cy="70%" r="35%">
      <stop offset="0%" style="stop-color:#00b894;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#00b894;stop-opacity:0"/>
    </radialGradient>
    
    <!-- 标题文字渐变 -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="50%" style="stop-color:#E95420"/>
      <stop offset="100%" style="stop-color:#ff7b54"/>
    </linearGradient>
    
    <!-- 卡片阴影 -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    
    <!-- 发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  
  <!-- 光晕层 -->
  <rect width="900" height="500" fill="url(#orangeGlow)"/>
  <rect width="900" height="500" fill="url(#greenGlow)"/>
  
  <!-- 网格背景装饰 -->
  <g opacity="0.05">
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#fff" stroke-width="0.5"/>
    </pattern>
    <rect width="900" height="500" fill="url(#grid)"/>
  </g>
  
  <!-- 顶部装饰线 -->
  <rect x="0" y="0" width="900" height="4" fill="#E95420"/>
  
  <!-- 版本号标签（左上角） -->
  <g transform="translate(40, 45)">
    <rect x="0" y="0" width="140" height="36" rx="18" fill="#E95420" opacity="0.9"/>
    <text x="70" y="24" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#fff" text-anchor="middle">Linux 7.1 RC1</text>
  </g>
  
  <!-- 日期标签（右上角） -->
  <g transform="translate(720, 45)">
    <rect x="0" y="0" width="140" height="36" rx="18" fill="#333" stroke="#444" stroke-width="1"/>
    <text x="70" y="24" font-family="Arial, sans-serif" font-size="14" fill="#aaa" text-anchor="middle">2026.04.28</text>
  </g>

  <!-- 主标题 -->
  <text x="450" y="115" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="36" font-weight="bold" fill="url(#titleGrad)" text-anchor="middle" filter="url(#glow)">
    Linux 7.1 来了
  </text>
  
  <!-- 副标题 -->
  <text x="450" y="158" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="20" fill="#e0e0e0" text-anchor="middle">
    NTFS 写入暴涨 <tspan fill="#00b894" font-weight="bold">110%</tspan> · 40年 i486 正式退役
  </text>
  
  <!-- 分隔线 -->
  <line x1="150" y1="180" x2="750" y2="180" stroke="#E95420" stroke-width="2" opacity="0.6"/>

  <!-- ===== 左侧卡片：NTFS 重写 ===== -->
  <g transform="translate(45, 205)" filter="url(#cardShadow)">
    <!-- 卡片背景 -->
    <rect width="380" height="250" rx="16" fill="#1e2a42" opacity="0.9"/>
    <rect width="380" height="250" rx="16" fill="none" stroke="#E95420" stroke-width="1.5" opacity="0.4"/>
    
    <!-- 卡片顶部色条 -->
    <rect width="380" height="46" rx="16" fill="#E95420" opacity="0.15"/>
    <rect width="380" height="46" fill="#E95420" opacity="0.15"/>
    <rect y="38" width="380" height="8" fill="#1e2a42"/>
    
    <!-- NTFS 图标区域 -->
    <circle cx="52" cy="23" r="14" fill="#E95420" opacity="0.2"/>
    <text x="52" y="29" font-family="Arial" font-size="16" font-weight="bold" fill="#E95420" text-anchor="middle">N</text>
    
    <!-- 卡片标题 -->
    <text x="78" y="30" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="17" font-weight="bold" fill="#fff">
      NTFS 驱动重写
    </text>
    
    <!-- 性能提升数据 - 大数字展示 -->
    <text x="190" y="105" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#00b894" text-anchor="middle" filter="url(#glow)">+110%</text>
    <text x="190" y="135" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="14" fill="#8892a0" text-anchor="middle">写入性能最高提升</text>
    
    <!-- 关键数据条 -->
    <g transform="translate(25, 155)">
      <!-- 数据项1 -->
      <rect width="155" height="38" rx="8" fill="#0d1b2a"/>
      <text x="12" y="19" font-family="Arial" font-size="15" fill="#00b894" font-weight="bold">35~110%</text>
      <text x="12" y="33" font-family="'Microsoft YaHei'" font-size="11" fill="#6b7280">多线程写入提速</text>
      
      <!-- 数据项2 -->
      <g transform="translate(165, 0)">
        <rect width="155" height="38" rx="8" fill="#0d1b2a"/>
        <text x="12" y="19" font-family="Arial" font-size="15" fill="#74b9ff" font-weight="bold">×4</text>
        <text x="35" y="19" font-family="'Microsoft YaHei'" font-size="11" fill="#6b7280">4TB硬盘挂载速度</text>
        <text x="12" y="33" font-family="'Microsoft YaHei'" font-size="11" fill="#6b7280"></text>
      </g>
      
      <!-- 数据项3 -->
      <g transform="translate(0, 46)">
        <rect width="155" height="38" rx="8" fill="#0d1b2a"/>
        <text x="12" y="19" font-family="Arial" font-size="15" fill="#fdcb6e" font-weight="bold">326</text>
        <text x="55" y="19" font-family="'Microsoft YaHei'" font-size="11" fill="#6b7280">测试通过 (+19%)</text>
        <text x="12" y="33" font-family="'Microsoft YaHei'" font-size="11" fill="#6b7280">xfstest 全部通过</text>
      </g>
      
      <!-- Linus 引用标签 -->
      <g transform="translate(165, 46)">
        <rect width="155" height="38" rx="8" fill="#E95420" opacity="0.2"/>
        <text x="77" y="19" font-family="'Microsoft YaHei'" font-size="12" fill="#E95420" font-weight="bold" text-anchor="middle">"NTFS Resurrection"</text>
        <text x="77" y="33" font-family="'Microsoft YaHei'" font-size="10" fill="#aaa" text-anchor="middle">— Linus Torvalds</text>
      </g>
    </g>
  </g>

  <!-- ===== 右侧卡片：i486 退役 ===== -->
  <g transform="translate(475, 205)" filter="url(#cardShadow)">
    <!-- 卡片背景 -->
    <rect width="380" height="250" rx="16" fill="#1e2a42" opacity="0.9"/>
    <rect width="380" height="250" rx="16" fill="none" stroke="#6c5ce7" stroke-width="1.5" opacity="0.4"/>
    
    <!-- 卡片顶部色条 -->
    <rect width="380" height="46" rx="16" fill="#6c5ce7" opacity="0.15"/>
    <rect width="380" height="46" fill="#6c5ce7" opacity="0.15"/>
    <rect y="38" width="380" height="8" fill="#1e2a42"/>
    
    <!-- 图标区域 -->
    <circle cx="52" cy="23" r="14" fill="#6c5ce7" opacity="0.2"/>
    <text x="52" y="29" font-family="Arial" font-size="14" font-weight="bold" fill="#6c5ce7" text-anchor="middle">40Y</text>
    
    <!-- 卡片标题 -->
    <text x="78" y="30" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="17" font-weight="bold" fill="#fff">
      i486 架构退役
    </text>
    
    <!-- 年份时间线展示 -->
    <g transform="translate(0, 65)">
      <!-- 起始点 -->
      <text x="60" y="22" font-family="Arial" font-size="32" font-weight="bold" fill="#6c5ce7" text-anchor="middle">1989</text>
      <text x="60" y="42" font-family="'Microsoft YaHei'" font-size="12" fill="#8892a0" text-anchor="middle">486 诞生</text>
      
      <!-- 连接线箭头 -->
      <line x1="100" y1="15" x2="260" y2="15" stroke="#333" stroke-width="2" stroke-dasharray="6,4"/>
      <polygon points="270,15 258,10 258,20" fill="#555"/>
      
      <!-- 结束点 -->
      <text x="320" y="22" font-family="Arial" font-size="32" font-weight="bold" fill="#e74c3c" text-anchor="middle">2026</text>
      <text x="320" y="42" font-family="'Microsoft YaHei'" font-size="12" fill="#8892a0" text-anchor="middle">正式移除</text>
    </g>
    
    <!-- 40年标签 -->
    <g transform="translate(140, 85)">
      <rect x="0" y="0" width="100" height="26" rx="13" fill="#e74c3c" opacity="0.2"/>
      <text x="50" y="18" font-family="Arial" font-size="13" font-weight="bold" fill="#e74c3c" text-anchor="middle">40 年历程</text>
    </g>
    
    <!-- 移除列表 -->
    <g transform="translate(25, 145)">
      <text x="0" y="0" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="13" fill="#8892a0" font-weight="bold">已移除架构：</text>
      
      <g transform="translate(0, 14)">
        <circle cx="6" cy="-4" r="4" fill="#e74c3c" opacity="0.7"/>
        <text x="16" y="0" font-family="'Consolas', monospace" font-size="13" fill="#ccc">M486 / M486SX / ELAN</text>
      </g>
      
      <g transform="translate(0, 36)">
        <circle cx="6" cy="-4" r="4" fill="#fd79a8" opacity="0.7"/>
        <text x="16" y="0" font-family="'Microsoft YaHei'" font-size="13" fill="#ccc">Intel DX/DX2/DX4 + AMD 兼容</text>
      </g>
      
      <g transform="translate(0, 58)">
        <circle cx="6" cy="-4" r="4" fill="#fdcb6e" opacity="0.7"/>
        <text x="16" y="0" font-family="'Microsoft YaHei'" font-size="13" fill="#ccc">旧网络/PCMCIA/Baikal 驱动清理</text>
      </g>
      
      <!-- 安抚信息 -->
      <g transform="translate(0, 84)">
        <rect width="330" height="28" rx="6" fill="#00b894" opacity="0.15"/>
        <text x="165" y="19" font-family="'Microsoft YaHei'" font-size="12" fill="#00b894" text-anchor="middle">✓ Linux 6.18 LTS 继续支持老设备</text>
      </g>
    </g>
  </g>

  <!-- 底部信息栏 -->
  <g transform="translate(0, 470)">
    <rect width="900" height="30" fill="#0a0f1a" opacity="0.8"/>
    
    <!-- 左侧：Ubuntu标识 -->
    <circle cx="30" cy="15" r="8" fill="#E95420" opacity="0.8"/>
    <text x="48" y="20" font-family="'Microsoft YaHei', Arial" font-size="13" fill="#888">UbuntuNews</text>
    
    <!-- 右侧：关键词标签 -->
    <g transform="translate(600, 3)">
      <rect width="60" height="22" rx="4" fill="#E95420" opacity="0.2"/>
      <text x="30" y="15" font-family="Arial" font-size="11" fill="#E95420" text-anchor="middle">Linux内核</text>
      
      <g transform="translate(68, 0)">
        <rect width="55" height="22" rx="4" fill="#00b894" opacity="0.2"/>
        <text x="27" y="15" font-family="Arial" font-size="11" fill="#00b894" text-anchor="middle">NTFS</text>
      </g>
      
      <g transform="translate(129, 0)">
        <rect width="55" height="22" rx="4" fill="#6c5ce7" opacity="0.2"/>
        <text x="27" y="15" font-family="Arial" font-size="11" fill="#6c5ce7" text-anchor="middle">开源</text>
      </g>
      
      <g transform="translate(190, 0)">
        <rect width="70" height="22" rx="4" fill="#333" stroke="#444" stroke-width="0.5"/>
        <text x="35" y="15" font-family="Arial" font-size="11" fill="#888" text-anchor="middle">热点资讯</text>
      </g>
    </g>
  </g>
  
  <!-- 装饰元素：代码风格点缀 -->
  <text x="870" y="490" font-family="Consolas, monospace" font-size="10" fill="#333" text-anchor="end">// kernel 7.1-rc1</text>
</svg>