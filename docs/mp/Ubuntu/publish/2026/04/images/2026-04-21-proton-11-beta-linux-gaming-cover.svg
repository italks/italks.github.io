<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img">
  <title>Proton 11 Beta - Linux游戏大升级</title>
  
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="50%" style="stop-color:#141832"/>
      <stop offset="100%" style="stop-color:#0d1025"/>
    </linearGradient>
    
    <!-- 强调色光晕 -->
    <radialGradient id="glowOrange" cx="30%" cy="40%" r="35%">
      <stop offset="0%" style="stop-color:#E95420;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#E95420;stop-opacity:0"/>
    </radialGradient>
    
    <radialGradient id="glowBlue" cx="75%" cy="60%" r="30%">
      <stop offset="0%" style="stop-color:#1b6ef0;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#1b6ef0;stop-opacity:0"/>
    </radialGradient>
    
    <!-- 游戏手柄按钮渐变 -->
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a3050"/>
      <stop offset="100%" style="stop-color:#1a1f38"/>
    </linearGradient>
    
    <!-- 版本号徽章渐变 -->
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E95420"/>
      <stop offset="100%" style="stop-color:#ff7043"/>
    </linearGradient>
    
    <!-- 帧率条渐变 -->
    <linearGradient id="fpsGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e676;stop-opacity:0.9"/>
      <stop offset="70%" style="stop-color:#00e676;stop-opacity:0.9"/>
      <stop offset="70%" style="stop-color:#1a1f38;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#1a1f38;stop-opacity:0.9"/>
    </linearGradient>
    
    <!-- 滤镜：发光效果 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  
  <!-- 光晕效果 -->
  <rect width="900" height="500" fill="url(#glowOrange)"/>
  <rect width="900" height="500" fill="url(#glowBlue)"/>
  
  <!-- 网格背景线（科技感） -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="125" x2="900" y2="125"/>
    <line x1="0" y1="250" x2="900" y2="250"/>
    <line x1="0" y1="375" x2="900" y2="375"/>
    <line x1="180" y1="0" x2="180" y2="500"/>
    <line x1="360" y1="0" x2="360" y2="500"/>
    <line x1="540" y1="0" x2="540" y2="500"/>
    <line x1="720" y1="0" x2="720" y2="500"/>
  </g>
  
  <!-- 装饰性代码/数据流元素 -->
  <g fill="#E95420" fill-opacity="0.08" font-family="monospace" font-size="10">
    <text x="30" y="80">NTSync</text>
    <text x="30" y="94">Wine 11</text>
    <text x="30" y="108">Vulkan</text>
    <text x="790" y="420">DXVK</text>
    <text x="790" y="434">VKD3D</text>
    <text x="790" y="448">SteamVR</text>
  </g>
  
  <!-- 左侧：Proton Logo 风格的原子/能量符号 -->
  <g transform="translate(120, 230)">
    <!-- 外圈轨道 -->
    <ellipse cx="0" cy="0" rx="65" ry="22" fill="none" stroke="#E95420" stroke-width="2.5" stroke-opacity="0.6" transform="rotate(-25)"/>
    <ellipse cx="0" cy="0" rx="65" ry="22" fill="none" stroke="#1b6ef0" stroke-width="2.5" stroke-opacity="0.5" transform="rotate(25)"/>
    <ellipse cx="0" cy="0" rx="65" ry="22" fill="none" stroke="#E95420" stroke-width="2.5" stroke-opacity="0.4" transform="rotate(90)"/>
    
    <!-- 核心圆 -->
    <circle cx="0" cy="0" r="18" fill="#E95420" filter="url(#softGlow)"/>
    <circle cx="0" cy="0" r="12" fill="#ff7043"/>
    <circle cx="0" cy="0" r="6" fill="#fff" fill-opacity="0.9"/>
    
    <!-- 轨道上的电子点 -->
    <circle cx="55" cy="-18" r="4" fill="#1b6ef0" filter="url(#glow)"/>
    <circle cx="-45" cy="42" r="3" fill="#E95420" filter="url(#glow)" fill-opacity="0.8"/>
    <circle cx="0" cy="-65" r="3.5" fill="#00e676" filter="url(#glow)"/>
  </g>
  
  <!-- 主标题 -->
  <text x="240" y="175" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="42" font-weight="bold" fill="#ffffff" letter-spacing="2">
    别说 Linux 不能打游戏！
  </text>
  
  <!-- 副标题 -->
  <text x="244" y="222" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="26" fill="#E95420" font-weight="600" letter-spacing="1">
    Proton 11 Beta 重磅发布
  </text>
  
  <!-- 关键特性标签组 -->
  <g transform="translate(244, 255)">
    <!-- 特性标签1：Wine 11 -->
    <rect x="0" y="0" width="115" height="32" rx="16" fill="url(#btnGrad)" stroke="#E95420" stroke-width="1" stroke-opacity="0.4"/>
    <text x="57" y="21" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#e0e0e0" text-anchor="middle">Wine 11 内核重写</text>
    
    <!-- 特性标签2：NTSync -->
    <rect x="125" y="0" width="105" height="32" rx="16" fill="url(#btnGrad)" stroke="#1b6ef0" stroke-width="1" stroke-opacity="0.4"/>
    <text x="177" y="21" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#e0e0e0" text-anchor="middle">NTSync 加速</text>
    
    <!-- 特性标签3：帧率提升 -->
    <rect x="240" y="0" width="105" height="32" rx="16" fill="url(#btnGrad)" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
    <text x="292" y="21" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#e0e0e0" text-anchor="middle">帧率 +22%</text>
    
    <!-- 特性标签4：SteamVR -->
    <rect x="355" y="0" width="100" height="32" rx="16" fill="url(#btnGrad)" stroke="#ab47bc" stroke-width="1" stroke-opacity="0.4"/>
    <text x="405" y="21" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#e0e0e0" text-anchor="middle">Steam VR 支持</text>
  </g>
  
  <!-- 性能对比可视化区域 -->
  <g transform="translate(244, 315)">
    <!-- 区域背景卡片 -->
    <rect x="0" y="0" width="415" height="85" rx="10" fill="#0d1025" fill-opacity="0.6" stroke="#2a3050" stroke-width="1"/>
    
    <!-- 小标题 -->
    <text x="18" y="24" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#888888">性能实测 · 1% Low 帧率对比 (DX12 游戏)</text>
    
    <!-- Proton 9.x 条形图 -->
    <text x="18" y="50" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#aaaaaa">Proton 9.x</text>
    <rect x="110" y="39" width="150" height="16" rx="3" fill="#1a1f38"/>
    <rect x="110" y="39" width="120" height="16" rx="3" fill="#546e7a" fill-opacity="0.8"/>
    <text x="270" y="52" font-family="monospace" font-size="12" fill="#78909c">45 fps</text>
    
    <!-- Proton 11 条形图 -->
    <text x="18" y="74" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#E95420" font-weight="600">Proton 11</text>
    <rect x="110" y="63" width="150" height="16" rx="3" fill="#1a1f38"/>
    <rect x="110" y="63" width="146" height="16" rx="3" fill="url(#badgeGrad)"/>
    <text x="270" y="76" font-family="monospace" font-size="12" fill="#ff7043" font-weight="bold">55 fps</text>
    
    <!-- 提升箭头和百分比 -->
    <text x="320" y="68" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#00e676" font-weight="bold">↑ 22%</text>
  </g>
  
  <!-- 右侧倒计时提示 -->
  <g transform="translate(700, 260)">
    <rect x="0" y="0" width="165" height="130" rx="12" fill="#0d1025" fill-opacity="0.7" stroke="#E95420" stroke-width="1.5" stroke-opacity="0.5"/>
    
    <!-- 倒计时标签 -->
    <text x="82" y="28" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#E95420" text-anchor="middle" font-weight="600">⏰ Ubuntu 26.04 LTS</text>
    
    <!-- 大号数字 -->
    <text x="82" y="78" font-family="'Arial Black', Impact, sans-serif" font-size="46" fill="#ffffff" text-anchor="middle" font-weight="bold" filter="url(#glow)">2</text>
    
    <!-- 天 -->
    <text x="82" y="106" font-family="'Microsoft YaHei', sans-serif" font-size="15" fill="#cccccc" text-anchor="middle">天后发布</text>
    
    <!-- 日期标注 -->
    <text x="82" y="124" font-family="monospace" font-size="10" fill="#666666" text-anchor="middle">2026.04.23</text>
  </g>
  
  <!-- 底部品牌栏 -->
  <rect x="0" y="460" width="900" height="40" fill="#000000" fill-opacity="0.3"/>
  <text x="30" y="486" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#E95420" font-weight="600">🐧 UbuntuNews</text>
  <text x="160" y="486" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#888888">| 资讯 · 工具 · 教程 · 社区</text>
  
  <!-- 右下角装饰标签 -->
  <rect x="750" y="472" width="130" height="22" rx="11" fill="#E95420" fill-opacity="0.15" stroke="#E95420" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="815" y="487" font-family="'Microsoft YaHei', sans-serif" font-size="11" fill="#E95420" text-anchor="middle">Linux 游戏指南</text>
  
  <!-- 顶部装饰线 -->
  <rect x="0" y="0" width="900" height="3" fill="url(#badgeGrad)"/>
</svg>
