<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b27"/>
    </linearGradient>
    <radialGradient id="oglow" cx="20%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#E95420" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#E95420" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bglow" cx="82%" cy="55%" r="40%">
      <stop offset="0%" stop-color="#00a4ef" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00a4ef" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="topbar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E95420" stop-opacity="0"/>
      <stop offset="30%" stop-color="#E95420" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#00a4ef" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00a4ef" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="arrGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E95420"/>
      <stop offset="100%" stop-color="#00a4ef"/>
    </linearGradient>
  </defs>

  <!-- bg -->
  <rect width="900" height="500" fill="url(#bg)"/>
  <ellipse cx="180" cy="250" rx="260" ry="200" fill="url(#oglow)"/>
  <ellipse cx="738" cy="270" rx="220" ry="180" fill="url(#bglow)"/>
  <rect width="900" height="3" fill="url(#topbar)"/>

  <!-- grid -->
  <g stroke="#E95420" stroke-width="1" opacity="0.03">
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="360" x2="900" y2="360"/>
    <line x1="160" y1="0" x2="160" y2="500"/>
    <line x1="320" y1="0" x2="320" y2="500"/>
    <line x1="580" y1="0" x2="580" y2="500"/>
    <line x1="740" y1="0" x2="740" y2="500"/>
  </g>

  <!-- brand tag -->
  <rect x="48" y="44" width="148" height="26" rx="13" fill="#E95420" fill-opacity="0.12" stroke="#E95420" stroke-width="1" stroke-opacity="0.4"/>
  <text x="122" y="62" font-family="Helvetica Neue,Arial,sans-serif" font-size="12" font-weight="600" fill="#E95420" text-anchor="middle" letter-spacing="1">UbuntuNews</text>

  <!-- hot tag -->
  <rect x="206" y="46" width="86" height="22" rx="11" fill="#00a4ef"/>
  <text x="249" y="61" font-family="Helvetica Neue,Arial,sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="1">内核重磅</text>

  <!-- main title -->
  <text x="48" y="118" font-family="Helvetica Neue,Arial,sans-serif" font-size="36" font-weight="800" fill="#fff" letter-spacing="-1">Linux 终于有了</text>
  <text x="48" y="166" font-family="Helvetica Neue,Arial,sans-serif" font-size="42" font-weight="800" fill="#fff" letter-spacing="-0.5">原生<tspan fill="#E95420"> NTFS </tspan>驱动</text>

  <!-- Linus quote -->
  <rect x="48" y="193" width="300" height="32" rx="6" fill="#E95420" fill-opacity="0.08"/>
  <text x="60" y="214" font-family="Georgia,Times New Roman,serif" font-size="14" font-style="italic" fill="#f0a078">"NTFS 的复活"</text>
  <text x="166" y="214" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#8892a4"> — Linus Torvalds</text>

  <!-- divider -->
  <rect x="48" y="240" width="400" height="1.5" rx="0.75" fill="url(#topbar)" opacity="0.35"/>

  <!-- data cards -->
  <g transform="translate(48,262)">
    <rect width="122" height="72" rx="10" fill="#0f1520" fill-opacity="0.85" stroke="#E95420" stroke-width="1" stroke-opacity="0.25"/>
    <text x="61" y="28" font-family="Helvetica Neue,Arial,sans-serif" font-size="24" font-weight="800" fill="#E95420" text-anchor="middle">+110%</text>
    <text x="61" y="49" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#8892a4" text-anchor="middle">写入性能提升</text>
    <text x="61" y="63" font-family="Helvetica Neue,Arial,sans-serif" font-size="9" fill="#555e70" text-anchor="middle">多线程场景</text>

    <rect x="132" width="122" height="72" rx="10" fill="#0f1520" fill-opacity="0.85" stroke="#00a4ef" stroke-width="1" stroke-opacity="0.25"/>
    <text x="193" y="28" font-family="Helvetica Neue,Arial,sans-serif" font-size="24" font-weight="800" fill="#00a4ef" text-anchor="middle">x4</text>
    <text x="193" y="49" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#8892a4" text-anchor="middle">挂载速度</text>
    <text x="193" y="63" font-family="Helvetica Neue,Arial,sans-serif" font-size="9" fill="#555e70" text-anchor="middle">4TB 大容量硬盘</text>

    <rect x="264" width="122" height="72" rx="10" fill="#0f1520" fill-opacity="0.85" stroke="#4caf50" stroke-width="1" stroke-opacity="0.25"/>
    <text x="325" y="28" font-family="Helvetica Neue,Arial,sans-serif" font-size="22" font-weight="800" fill="#4caf50" text-anchor="middle">3.6万行</text>
    <text x="325" y="49" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#8892a4" text-anchor="middle">代码重构</text>
    <text x="325" y="63" font-family="Helvetica Neue,Arial,sans-serif" font-size="9" fill="#555e70" text-anchor="middle">历时 4 年打磨</text>
  </g>

  <!-- info lines -->
  <circle cx="54" cy="370" r="4" fill="#E95420" fill-opacity="0.7"/>
  <text x="66" y="374" font-family="Helvetica Neue,Arial,sans-serif" font-size="13" fill="#c8d0dc">Linux 7.1 内核合入 · WSL 用户受益</text>
  <circle cx="54" cy="396" r="4" fill="#00a4ef" fill-opacity="0.6"/>
  <text x="66" y="400" font-family="Helvetica Neue,Arial,sans-serif" font-size="13" fill="#c8d0dc">Namjae Jeon 开发（exFAT 驱动同作者）</text>
  <text x="48" y="438" font-family="Helvetica Neue,Arial,sans-serif" font-size="12" fill="#555e70">双系统 / WSL / Ubuntu 用户的福音</text>

  <!-- right card -->
  <rect x="520" y="60" width="340" height="380" rx="16" fill="#0f1520" fill-opacity="0.7" stroke="#fff" stroke-width="1" stroke-opacity="0.06"/>

  <!-- card header -->
  <text x="690" y="82" font-family="Helvetica Neue,Arial,sans-serif" font-size="14" font-weight="700" fill="#8892a4" text-anchor="middle" letter-spacing="2">LINUX x WINDOWS</text>

  <!-- Linux icon -->
  <g transform="translate(600,180)">
    <circle r="42" fill="#E95420" fill-opacity="0.1"/>
    <circle r="34" fill="none" stroke="#E95420" stroke-width="2" stroke-opacity="0.5"/>
    <circle cy="-8" r="12" fill="#E95420" fill-opacity="0.9"/>
    <circle cx="-14" cy="10" r="8" fill="#E95420" fill-opacity="0.75"/>
    <circle cx="14" cy="10" r="8" fill="#E95420" fill-opacity="0.75"/>
    <text y="58" font-family="Helvetica Neue,Arial,sans-serif" font-size="13" font-weight="700" fill="#E95420" text-anchor="middle">Linux</text>
    <text y="74" font-family="Helvetica Neue,Arial,sans-serif" font-size="10" fill="#6b7685" text-anchor="middle">7.1 内核</text>
  </g>

  <!-- Windows NTFS icon -->
  <g transform="translate(780,180)">
    <circle r="42" fill="#00a4ef" fill-opacity="0.08"/>
    <circle r="34" fill="none" stroke="#00a4ef" stroke-width="2" stroke-opacity="0.4"/>
    <rect x="-17" y="-17" width="14" height="14" rx="2" fill="#00a4ef" fill-opacity="0.85"/>
    <rect x="3" y="-17" width="14" height="14" rx="2" fill="#00a4ef" fill-opacity="0.65"/>
    <rect x="-17" y="3" width="14" height="14" rx="2" fill="#00a4ef" fill-opacity="0.65"/>
    <rect x="3" y="3" width="14" height="14" rx="2" fill="#00a4ef" fill-opacity="0.85"/>
    <text y="58" font-family="Helvetica Neue,Arial,sans-serif" font-size="13" font-weight="700" fill="#00a4ef" text-anchor="middle">NTFS</text>
    <text y="74" font-family="Helvetica Neue,Arial,sans-serif" font-size="10" fill="#6b7685" text-anchor="middle">文件系统</text>
  </g>

  <!-- center arrow -->
  <g transform="translate(690,175)">
    <line x1="-52" y1="5" x2="52" y2="5" stroke="url(#arrGrad)" stroke-width="2.5" stroke-dasharray="6 4" opacity="0.6"/>
    <polygon points="-52,5 -42,-1 -42,11" fill="#E95420" fill-opacity="0.7"/>
    <polygon points="52,5 42,-1 42,11" fill="#00a4ef" fill-opacity="0.7"/>
    <rect x="-30" y="-12" width="60" height="20" rx="10" fill="#0d1117" fill-opacity="0.9"/>
    <text y="3" font-family="Helvetica Neue,Arial,sans-serif" font-size="10" font-weight="700" fill="#4caf50" text-anchor="middle">原生读写</text>
  </g>

  <!-- feature list -->
  <g transform="translate(548,295)" font-family="Helvetica Neue,Arial,sans-serif">
    <circle cx="8" cy="8" r="4" fill="#E95420" fill-opacity="0.7"/>
    <text x="22" y="12" font-size="12" fill="#c8d0dc">完整写操作支持（创建/修改/删除）</text>
    <circle cx="8" cy="33" r="4" fill="#00a4ef" fill-opacity="0.7"/>
    <text x="22" y="37" font-size="12" fill="#c8d0dc">326 项 xfstests 全通过</text>
    <circle cx="8" cy="58" r="4" fill="#4caf50" fill-opacity="0.7"/>
    <text x="22" y="62" font-size="12" fill="#c8d0dc">取代 Paragon NTFS3 方案</text>
    <circle cx="8" cy="83" r="4" fill="#f39c12" fill-opacity="0.7"/>
    <text x="22" y="87" font-size="12" fill="#c8d0dc">WSL / 双系统用户直接受益</text>
  </g>

  <!-- bottom tags -->
  <rect x="548" y="405" width="140" height="24" rx="12" fill="#E95420" fill-opacity="0.1"/>
  <text x="618" y="421" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#E95420" text-anchor="middle" font-weight="600">2026.04.21 合并</text>
  <rect x="700" y="405" width="140" height="24" rx="12" fill="#00a4ef" fill-opacity="0.1"/>
  <text x="770" y="421" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#00a4ef" text-anchor="middle" font-weight="600">Kernel 7.1</text>

  <!-- footer lines -->
  <line x1="48" y1="458" x2="280" y2="458" stroke="#E95420" stroke-width="1" opacity="0.15"/>
  <line x1="620" y1="458" x2="852" y2="458" stroke="#00a4ef" stroke-width="1" opacity="0.15"/>

  <!-- ubuntu dots -->
  <circle cx="48" cy="466" r="4" fill="#E95420" fill-opacity="0.12"/>
  <circle cx="55" cy="475" r="3" fill="#E95420" fill-opacity="0.12"/>
  <circle cx="41" cy="475" r="3" fill="#E95420" fill-opacity="0.12"/>
</svg>