<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img">
  <title>Linux内核AI代码新规 - 三条铁律重新定义人机协作</title>
  
  <!-- 深色背景 -->
  <rect width="900" height="500" fill="#1a1a2e"/>
  
  <!-- 背景装饰网格 -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.05"/>
    </pattern>
    
    <!-- 渐变定义 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E95420" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#772953" stop-opacity="0.15"/>
    </linearGradient>
    
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E95420"/>
      <stop offset="100%" stop-color="#FF7043"/>
    </linearGradient>
    
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00BFFF"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    
    <!-- 发光效果 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 网格覆盖 -->
  <rect width="900" height="500" fill="url(#grid)"/>
  
  <!-- 背景渐变层 -->
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  
  <!-- 装饰性圆形元素 -->
  <circle cx="800" cy="80" r="120" fill="#E95420" opacity="0.06"/>
  <circle cx="100" cy="420" r="90" fill="#00BFFF" opacity="0.04"/>
  <circle cx="750" cy="400" r="60" fill="#772953" opacity="0.08"/>
  
  <!-- 顶部装饰线 -->
  <rect x="0" y="0" width="900" height="4" fill="url(#orangeGrad)"/>
  
  <!-- 左侧色条 -->
  <rect x="0" y="20" width="5" height="60" rx="2" fill="#E95420"/>

  <!-- 主标题区域 -->
  <text x="35" y="55" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" letter-spacing="1">
    Linux 内核正式接纳 AI 编程
  </text>
  <text x="35" y="58" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" letter-spacing="1" opacity="0.1">
    Linux 内核正式接纳 AI 编程
  </text>
  
  <!-- 副标题 -->
  <text x="37" y="56" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="28" font-weight="bold" fill="url(#orangeGrad)" letter-spacing="1">
    Linux 内核正式接纳 AI 编程
  </text>

  <!-- 三条铁律标签 -->
  <g transform="translate(35, 85)">
    
    <!-- 规则1：禁止AI签字 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="260" height="110" rx="10" fill="#E95420" opacity="0.12" stroke="#E95420" stroke-width="1.5" stroke-opacity="0.6"/>
      
      <!-- 规则编号圆圈 -->
      <circle cx="30" cy="32" r="18" fill="#E95420" filter="url(#glow)"/>
      <text x="30" y="38" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">1</text>
      
      <!-- 规则标题 -->
      <text x="56" y="28" font-family="'Microsoft YaHei', sans-serif" font-size="14" font-weight="bold" fill="#FF7043">禁止AI签署法律标签</text>
      <text x="56" y="46" font-family="Consolas, monospace" font-size="11" fill="#AAAAAA">Signed-off-by → 仅限人类</text>
      
      <!-- 图标：禁止符号 + AI -->
      <g transform="translate(175, 50)">
        <rect x="0" y="0" width="75" height="24" rx="12" fill="#E95420" opacity="0.2"/>
        <text x="37" y="16" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="11" fill="#FF8A65">❌ AI禁签</text>
      </g>
      
      <!-- 底部说明 -->
      <text x="14" y="82" font-family="'Microsoft YaHei', sans-serif" font-size="11" fill="#999999">法律责任由提交者承担</text>
      <text x="14" y="98" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#666666">DCO协议 · 许可证合规</text>
    </g>
    
    <!-- 规则2：必须标注来源 -->
    <g transform="translate(280, 0)">
      <rect x="0" y="0" width="260" height="110" rx="10" fill="#00BFFF" opacity="0.08" stroke="#00BFFF" stroke-width="1.5" stroke-opacity="0.5"/>
      
      <circle cx="30" cy="32" r="18" fill="#00BFFF" filter="url(#glow)"/>
      <text x="30" y="38" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">2</text>
      
      <text x="56" y="28" font-family="'Microsoft YaHei', sans-serif" font-size="14" font-weight="bold" fill="#00E5FF">必须标注辅助来源</text>
      <text x="56" y="46" font-family="Consolas, monospace" font-size="11" fill="#AAAAAA">Assisted-by → 透明披露</text>
      
      <g transform="translate(175, 50)">
        <rect x="0" y="0" width="75" height="24" rx="12" fill="#00BFFF" opacity="0.15"/>
        <text x="37" y="16" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="11" fill="#00E5FF">📝 必须标注</text>
      </g>
      
      <text x="14" y="82" font-family="'Microsoft YaHei', sans-serif" font-size="11" fill="#999999">Copilot / Claude / Cursor</text>
      <text x="14" y="98" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#666666">格式: 工具名:版本号</text>
    </g>
    
    <!-- 规则3：人类担全责 -->
    <g transform="translate(560, 0)">
      <rect x="0" y="0" width="270" height="110" rx="10" fill="#772953" opacity="0.12" stroke="#C77DBB" stroke-width="1.5" stroke-opacity="0.5"/>
      
      <circle cx="30" cy="32" r="18" fill="#C77DBB" filter="url(#glow)"/>
      <text x="30" y="38" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">3</text>
      
      <text x="56" y="28" font-family="'Microsoft YaHei', sans-serif" font-size="14" font-weight="bold" fill="#E0AADD">人类承担全部责任</text>
      <text x="56" y="46" font-family="Consolas, monospace" font-size="11" fill="#AAAAAA">Human Accountability → 全责</text>
      
      <g transform="translate(170, 50)">
        <rect x="0" y="0" width="90" height="24" rx="12" fill="#C77DBB" opacity="0.2"/>
        <text x="45" y="16" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="11" fill="#E0AADD">⚠️ 你来背锅</text>
      </g>
      
      <text x="14" y="82" font-family="'Microsoft YaHei', sans-serif" font-size="11" fill="#999999">Bug/漏洞/许可证问题 = 你的责任</text>
      <text x="14" y="98" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#666666">违规者可能被社区封禁</text>
    </g>
  </g>
  
  <!-- 中间核心信息区 -->
  <g transform="translate(35, 215)">
    <!-- 核心标语框 -->
    <rect x="0" y="0" width="830" height="65" rx="12" fill="#ffffff" fill-opacity="0.04" stroke="#E95420" stroke-width="1" stroke-opacity="0.3"/>
    
    <!-- 引号装饰 -->
    <text x="20" y="42" font-family="Georgia, serif" font-size="36" fill="#E95420" opacity="0.3">"</text>
    
    <!-- 核心标语 -->
    <text x="55" y="30" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF" letter-spacing="2">
    人为主导 · AI辅助 · 责任在人
    </text>
    <text x="55" y="52" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#BBBBBB">
    Linus Torvalds: "AI只是一个工具" — Linux内核首次为AI编程立规，开源治理进入新时代
    </text>
    
    <text x="795" y="42" text-anchor="end" font-family="Georgia, serif" font-size="36" fill="#E95420" opacity="0.3">"</text>
  </g>
  
  <!-- 数据亮点区 -->
  <g transform="translate(35, 300)">
    
    <!-- 数据卡片1 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="195" height="85" rx="10" fill="#ffffff" fill-opacity="0.03" stroke="#333344" stroke-width="1"/>
      <text x="97" y="28" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="22" font-weight="bold" fill="#E95420">72%</text>
      <text x="97" y="48" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="11" fill="#CCCCCC">AI代码执行得分率</text>
      <line x1="25" y1="58" x2="170" y2="58" stroke="#E95420" stroke-width="2" stroke-opacity="0.3"/>
      <text x="97" y="74" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#777777">从50%→72% 质的飞跃</text>
    </g>
    
    <!-- 数据卡片2 -->
    <g transform="translate(212, 0)">
      <rect x="0" y="0" width="195" height="85" rx="10" fill="#ffffff" fill-opacity="0.03" stroke="#333344" stroke-width="1"/>
      <text x="97" y="28" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="22" font-weight="bold" fill="#00E5FF">30%+</text>
      <text x="97" y="48" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="11" fill="#CCCCCC">编码效率提升</text>
      <line x1="25" y1="58" x2="170" y2="58" stroke="#00BFFF" stroke-width="2" stroke-opacity="0.3"/>
      <text x="97" y="74" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#777777">GitHub Copilot 官方数据</text>
    </g>
    
    <!-- 数据卡片3 -->
    <g transform="translate(424, 0)">
      <rect x="0" y="0" width="195" height="85" rx="10" fill="#ffffff" fill-opacity="0.03" stroke="#333344" stroke-width="1"/>
      <text x="97" y="28" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="22" font-weight="bold" fill="#FF8A65">17%</text>
      <text x="97" y="48" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="11" fill="#CCCCCC">低质量PR占比</text>
      <line x1="25" y1="58" x2="170" y2="58" stroke="#FF7043" stroke-width="2" stroke-opacity="0.3"/>
      <text x="97" y="74" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#777777">同比从3%飙升至17%</text>
    </g>
    
    <!-- 数据卡片4: Ubuntu倒计时 -->
    <g transform="translate(636, 0)">
      <rect x="0" y="0" width="194" height="85" rx="10" fill="#E95420" fill-opacity="0.08" stroke="#E95420" stroke-width="1" stroke-opacity="0.4"/>
      <text x="97" y="26" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#FF9980">Ubuntu 26.04 LTS 发布</text>
      <text x="97" y="54" text-anchor="middle" font-family="'Impact', 'Arial Black', sans-serif" font-size="26" font-weight="bold" fill="#E95420" filter="url(#glow)">8天</text>
      <text x="97" y="74" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#CC8877">2026.04.23 正式版</text>
    </g>
  </g>
  
  <!-- 底部信息栏 -->
  <g transform="translate(35, 410)">
    <!-- 时间戳和来源 -->
    <rect x="0" y="0" width="830" height="70" rx="10" fill="#ffffff" fill-opacity="0.02"/>
    
    <!-- 左侧：事件标识 -->
    <g transform="translate(20, 15)">
      <rect x="0" y="0" width="80" height="24" rx="4" fill="#E95420" opacity="0.2"/>
      <text x="40" y="16" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="11" font-weight="bold" fill="#E95420">🔥 超级热点</text>
    </g>
    
    <text x="115" y="31" font-family="'Microsoft YaHei', sans-serif" font-size="11" fill="#888888">发布时间：2026-04-14 | 来源：Linux内核官方 / InfoQ / 36氪 | 相关：Ubuntu 26.04 LTS、Linux 7.0、GPT-6</text>
    
    <!-- 关键词标签 -->
    <g transform="translate(20, 45)">
      <rect x="0" y="0" width="52" height="18" rx="9" fill="#E95420" fill-opacity="0.15"/>
      <text x="26" y="13" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#E95420">#Linux</text>
      
      <rect x="60" y="0" width="52" height="18" rx="9" fill="#00BFFF" fill-opacity="0.12"/>
      <text x="86" y="13" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#00BFFF">#AI编程</text>
      
      <rect x="120" y="0" width="68" height="18" rx="9" fill="#C77DBB" fill-opacity="0.15"/>
      <text x="154" y="13" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#C77DBB">#开源治理</text>
      
      <rect x="196" y="0" width="68" height="18" rx="9" fill="#772953" fill-opacity="0.15"/>
      <text x="230" y="13" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#C77DBB">#Ubuntu</text>
      
      <text x="280" y="13" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#555555">| Linus Torvalds · GitHub Copilot · Claude · 开源社区 · 三条铁律</text>
    </g>
  </g>
  
  <!-- Ubuntu品牌水印（右下角） -->
  <g transform="translate(820, 465)" opacity="0.15">
    <circle cx="20" cy="15" r="14" fill="none" stroke="#E95420" stroke-width="2.5"/>
    <circle cx="20" cy="15" r="5" fill="#E95420"/>
    <text x="42" y="21" font-family="'Ubuntu', sans-serif" font-size="13" fill="#E95420" font-weight="500">Ubuntu</text>
  </g>
  
  <!-- 公众号名称 -->
  <text x="865" y="490" text-anchor="end" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#444444">UbuntuNews</text>
</svg>