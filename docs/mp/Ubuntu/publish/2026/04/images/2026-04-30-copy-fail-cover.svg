<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a0a0a"/>
    </linearGradient>
    <linearGradient id="dangerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#cc2222"/>
    </linearGradient>
    <linearGradient id="ubuntuGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E95420"/>
      <stop offset="100%" stop-color="#C7421A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="redGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bg)"/>

  <!-- Danger accent line at top -->
  <rect x="0" y="0" width="900" height="4" fill="url(#dangerGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#ff4444" stroke-width="0.5">
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="150" y1="0" x2="150" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="450" y1="0" x2="450" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="750" y1="0" x2="750" y2="500"/>
  </g>

  <!-- Warning icon top-center -->
  <g transform="translate(450, 110)">
    <polygon points="0,-30 26,15 -26,15" fill="none" stroke="#ff4444" stroke-width="2.5" filter="glow"/>
    <text x="0" y="8" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="900" fill="#ff4444">!</text>
  </g>

  <!-- Title -->
  <text x="450" y="46" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="#ff4444" letter-spacing="3">CRITICAL VULNERABILITY · CVE-2026-31431</text>

  <text x="450" y="80" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="30" font-weight="900" fill="#ffffff" filter="softShadow">732字节，拿下所有Linux的Root</text>
  <text x="450" y="170" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#8b949e">内核"Copy Fail"漏洞潜伏9年，一个Python脚本提权所有发行版</text>

  <!-- Three key stats -->
  <g transform="translate(120, 220)">
    <rect x="-80" y="-15" width="160" height="80" rx="8" fill="#1a1f29" stroke="#ff4444" stroke-width="1" stroke-opacity="0.3"/>
    <text x="0" y="10" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="900" fill="#ff4444" filter="glow">732</text>
    <text x="0" y="35" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#8b949e">字节 Python 脚本</text>
    <text x="0" y="52" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555">无需编译 · 纯标准库</text>
  </g>

  <g transform="translate(450, 220)">
    <rect x="-80" y="-15" width="160" height="80" rx="8" fill="#1a1f29" stroke="#ff4444" stroke-width="1" stroke-opacity="0.3"/>
    <text x="0" y="10" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="900" fill="#ff4444" filter="glow">~9</text>
    <text x="0" y="35" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#8b949e">年沉默潜伏</text>
    <text x="0" y="52" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555">2017年引入 → 2026年修复</text>
  </g>

  <g transform="translate(780, 220)">
    <rect x="-80" y="-15" width="160" height="80" rx="8" fill="#1a1f29" stroke="#ff4444" stroke-width="1" stroke-opacity="0.3"/>
    <text x="0" y="10" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="900" fill="#ff4444" filter="glow">100%</text>
    <text x="0" y="35" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#8b949e">主流发行版受影响</text>
    <text x="0" y="52" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555">Ubuntu · RHEL · SUSE · AL</text>
  </g>

  <!-- Comparison section -->
  <g transform="translate(0, 320)">
    <!-- Dirty Cow -->
    <g transform="translate(120, 0)">
      <rect x="-90" y="-10" width="180" height="55" rx="6" fill="#21262d"/>
      <text x="0" y="8" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#666">Dirty Cow (2016)</text>
      <text x="0" y="28" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555">竞态条件 · 不稳定 · 需编译</text>
    </g>
    <text x="260" y="20" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#444">→</text>
    <!-- Dirty Pipe -->
    <g transform="translate(360, 0)">
      <rect x="-90" y="-10" width="180" height="55" rx="6" fill="#21262d"/>
      <text x="0" y="8" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#666">Dirty Pipe (2022)</text>
      <text x="0" y="28" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555">版本限定 · 需精确匹配</text>
    </g>
    <text x="500" y="20" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#ff4444">→</text>
    <!-- Copy Fail -->
    <g transform="translate(600, 0)">
      <rect x="-90" y="-10" width="180" height="55" rx="6" fill="#ff4444" fill-opacity="0.12" stroke="#ff4444" stroke-width="1"/>
      <text x="0" y="8" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#ff4444" font-weight="700">Copy Fail (2026)</text>
      <text x="0" y="28" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#ff6666">通用 · 隐蔽 · 容器逃逸</text>
    </g>
  </g>

  <!-- Container escape warning -->
  <g transform="translate(450, 420)">
    <rect x="-200" y="-12" width="400" height="28" rx="14" fill="#ff4444" fill-opacity="0.1" stroke="#ff4444" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="0" y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="#ff6666">⚠️ 可穿透容器隔离，威胁 Kubernetes 集群</text>
  </g>

  <!-- Key features row -->
  <g transform="translate(0, 460)">
    <g transform="translate(160, 0)">
      <rect x="-55" y="-10" width="110" height="22" rx="4" fill="#ff4444" opacity="0.12" stroke="#ff4444" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="0" y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#ff6666">无需竞态条件</text>
    </g>
    <g transform="translate(310, 0)">
      <rect x="-55" y="-10" width="110" height="22" rx="4" fill="#ff4444" opacity="0.12" stroke="#ff4444" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="0" y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#ff6666">无需版本匹配</text>
    </g>
    <g transform="translate(460, 0)">
      <rect x="-55" y="-10" width="110" height="22" rx="4" fill="#ff4444" opacity="0.12" stroke="#ff4444" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="0" y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#ff6666">磁盘文件不变</text>
    </g>
    <g transform="translate(610, 0)">
      <rect x="-55" y="-10" width="110" height="22" rx="4" fill="#ff4444" opacity="0.12" stroke="#ff4444" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="0" y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#ff6666">AI辅助发现</text>
    </g>
  </g>

  <!-- Bottom brand -->
  <text x="450" y="495" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#484f58">UbuntuNews | 2026年4月30日 | 安全紧急通告</text>
</svg>
