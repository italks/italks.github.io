<svg width="900" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2d2d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E95420;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF7043;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bgGradient)"/>
  
  <!-- 装饰性代码元素 -->
  <text x="30" y="80" font-family="Courier New, monospace" font-size="14" fill="#333" opacity="0.3">
    $ sudo do-release-upgrade -d
  </text>
  <text x="600" y="150" font-family="Courier New, monospace" font-size="12" fill="#333" opacity="0.2">
    Checking for new release...
  </text>
  <text x="650" y="420" font-family="Courier New, monospace" font-size="11" fill="#333" opacity="0.2">
    System upgrade complete
  </text>
  
  <!-- Ubuntu Logo -->
  <circle cx="780" cy="250" r="100" fill="url(#orangeGradient)" opacity="0.9"/>
  <circle cx="780" cy="250" r="70" fill="#1a1a1a"/>
  <circle cx="780" cy="250" r="55" fill="url(#orangeGradient)"/>
  <circle cx="780" cy="250" r="38" fill="#1a1a1a"/>
  <circle cx="780" cy="250" r="25" fill="url(#orangeGradient)"/>
  
  <!-- Ubuntu Logo内部装饰 -->
  <circle cx="740" cy="210" r="12" fill="url(#orangeGradient)"/>
  <circle cx="820" cy="210" r="12" fill="url(#orangeGradient)"/>
  <circle cx="780" cy="290" r="12" fill="url(#orangeGradient)"/>
  
  <!-- 主标题 -->
  <text x="50" y="200" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#FFFFFF">
    Ubuntu 26.04
  </text>
  <text x="50" y="260" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#FFFFFF">
    升级攻略
  </text>
  
  <!-- 副标题 -->
  <rect x="50" y="280" width="320" height="50" rx="8" fill="url(#orangeGradient)"/>
  <text x="70" y="315" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF">
    10天倒计时 · 避坑指南
  </text>
  
  <!-- 升级箭头 -->
  <g transform="translate(50, 360)">
    <rect x="0" y="0" width="120" height="50" rx="6" fill="#333" stroke="#E95420" stroke-width="2"/>
    <text x="20" y="32" font-family="Arial, sans-serif" font-size="20" fill="#AAA">24.04</text>
    
    <!-- 箭头 -->
    <path d="M130 25 L180 25 L170 15 M180 25 L170 35" stroke="#E95420" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <rect x="190" y="0" width="120" height="50" rx="6" fill="url(#orangeGradient)"/>
    <text x="210" y="32" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">26.04</text>
  </g>
  
  <!-- 底部标签 -->
  <g transform="translate(50, 450)">
    <rect x="0" y="0" width="140" height="30" rx="15" fill="#333" stroke="#E95420" stroke-width="1"/>
    <text x="15" y="20" font-family="Arial, sans-serif" font-size="14" fill="#E95420">LTS长期支持版</text>
    
    <rect x="155" y="0" width="130" height="30" rx="15" fill="#333" stroke="#E95420" stroke-width="1"/>
    <text x="170" y="20" font-family="Arial, sans-serif" font-size="14" fill="#E95420">Linux 7.0内核</text>
    
    <rect x="300" y="0" width="130" height="30" rx="15" fill="#333" stroke="#E95420" stroke-width="1"/>
    <text x="315" y="20" font-family="Arial, sans-serif" font-size="14" fill="#E95420">GNOME 50</text>
  </g>
  
  <!-- 装饰性进度条 -->
  <rect x="500" y="380" width="300" height="8" rx="4" fill="#333"/>
  <rect x="500" y="380" width="270" height="8" rx="4" fill="url(#orangeGradient)" opacity="0.8"/>
  <text x="500" y="410" font-family="Arial, sans-serif" font-size="12" fill="#888">升级准备完成度：90%</text>
  
  <!-- 装饰性齿轮图标 -->
  <g transform="translate(620, 70)" opacity="0.3">
    <circle cx="30" cy="30" r="25" fill="none" stroke="#E95420" stroke-width="3"/>
    <circle cx="30" cy="30" r="8" fill="#E95420"/>
    <g stroke="#E95420" stroke-width="3">
      <line x1="30" y1="0" x2="30" y2="10"/>
      <line x1="30" y1="50" x2="30" y2="60"/>
      <line x1="0" y1="30" x2="10" y2="30"/>
      <line x1="50" y1="30" x2="60" y2="30"/>
    </g>
  </g>
</svg>