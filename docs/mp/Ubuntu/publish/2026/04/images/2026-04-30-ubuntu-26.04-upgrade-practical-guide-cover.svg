<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    
    <!-- Ubuntu橙色渐变 -->
    <linearGradient id="ubuntuGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E95420"/>
      <stop offset="100%" style="stop-color:#FF7043"/>
    </linearGradient>

    <!-- 箭头渐变 -->
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E95420;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#E95420"/>
      <stop offset="100%" style="stop-color:#E95420;stop-opacity:0.3"/>
    </linearGradient>

    <!-- 发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 圆形徽章阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bgGrad)"/>

  <!-- 背景装饰网格 -->
  <g opacity="0.05">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fff" stroke-width="0.5"/>
    </pattern>
    <rect width="900" height="500" fill="url(#grid)"/>
  </g>

  <!-- 装饰圆形 -->
  <circle cx="800" cy="80" r="120" fill="#E95420" opacity="0.05"/>
  <circle cx="100" cy="420" r="90" fill="#E95420" opacity="0.04"/>
  <circle cx="450" cy="250" r="200" fill="#E95420" opacity="0.03"/>

  <!-- 顶部标签栏 -->
  <rect x="0" y="0" width="900" height="6" fill="url(#ubuntuGrad)"/>

  <!-- 左侧版本圆圈：24.04 -->
  <g filter="url(#shadow)">
    <circle cx="180" cy="220" r="75" fill="#2d2d44" stroke="#555" stroke-width="2"/>
    <text x="180" y="205" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" fill="#aaa">Ubuntu</text>
    <text x="180" y="238" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="bold" font-size="28" fill="#ccc">24.04</text>
    <text x="180" y="265" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#888">LTS</text>
  </g>

  <!-- 右侧版本圆圈：26.04 -->
  <g filter="url(#shadow)">
    <circle cx="720" cy="220" r="85" fill="#E95420" opacity="0.15" stroke="#E95420" stroke-width="2.5"/>
    <circle cx="720" cy="220" r="78" fill="#2d2d44" stroke="url(#ubuntuGrad)" stroke-width="3"/>
    <text x="720" y="202" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#E95420" font-weight="bold">Ubuntu</text>
    <text x="720" y="235" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="bold" font-size="32" fill="#fff">26.04</text>
    <text x="720" y="263" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#FFB74D">LTS ✨</text>
  </g>

  <!-- 中间升级箭头区域 -->
  <g transform="translate(280, 180)">
    <!-- 主箭头背景 -->
    <path d="M0,40 L300,40" stroke="url(#arrowGrad)" stroke-width="4" stroke-dasharray="8,4" opacity="0.6"/>
    
    <!-- 大箭头主体 -->
    <polygon points="260,15 320,40 260,65" fill="url(#ubuntuGrad)" filter="url(#glow)"/>
    
    <!-- 升级文字 -->
    <text x="150" y="25" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#E95420" font-weight="bold" letter-spacing="2">UPGRADE</text>
    
    <!-- 核心亮点标签 -->
    <g transform="translate(60, -35)">
      <rect x="0" y="0" width="90" height="24" rx="12" fill="#E95420" opacity="0.9"/>
      <text x="45" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff" font-weight="bold">Linux 7.0</text>
    </g>
    <g transform="translate(160, -35)">
      <rect x="0" y="0" width="85" height="24" rx="12" fill="#4CAF50" opacity="0.9"/>
      <text x="42" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff" font-weight="bold">GNOME 50</text>
    </g>
    <g transform="translate(110, 55)">
      <rect x="0" y="0" width="80" height="22" rx="11" fill="#2196F3" opacity="0.85"/>
      <text x="40" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">性能↑40%</text>
    </g>
  </g>

  <!-- 主标题 -->
  <text x="450" y="350" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Segoe UI', Arial, sans-serif" font-size="38" font-weight="bold" fill="#ffffff">
    升级实战指南
  </text>
  <text x="450" y="392" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Segoe UI', Arial, sans-serif" font-size="20" fill="#E95420">
    手把手教你从 24.04 平滑升级到 26.04
  </text>

  <!-- 副标题/卖点 -->
  <g transform="translate(210, 420)">
    <rect x="0" y="0" width="105" height="28" rx="14" fill="rgba(233,84,32,0.15)" stroke="#E95420" stroke-width="1"/>
    <text x="52" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFB74D">📋 备份清单</text>
  </g>
  <g transform="translate(325, 420)">
    <rect x="0" y="0" width="115" height="28" rx="14" fill="rgba(76,175,80,0.15)" stroke="#4CAF50" stroke-width="1"/>
    <text x="57" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#81C784">⚡ 一键命令</text>
  </g>
  <g transform="translate(450, 420)">
    <rect x="0" y="0" width="125" height="28" rx="14" fill="rgba(33,150,243,0.15)" stroke="#2196F3" stroke-width="1"/>
    <text x="62" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64B5F6">🔧 故障修复</text>
  </g>
  <g transform="translate(585, 420)">
    <rect x="0" y="0" width="115" height="28" rx="14" fill="rgba(156,39,176,0.15)" stroke="#9C27B0" stroke-width="1"/>
    <text x="57" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#BA68C8">⚠️ 避坑指南</text>
  </g>

  <!-- 底部品牌条 -->
  <rect x="0" y="472" width="900" height="28" fill="rgba(0,0,0,0.3)"/>
  
  <!-- Ubuntu Logo 圆圈（简化版） -->
  <g transform="translate(60, 486)">
    <circle cx="0" cy="0" r="10" fill="none" stroke="#E95420" stroke-width="2.5"/>
    <circle cx="0" cy="-7" r="3" fill="#E95420"/>
    <circle cx="6" cy="4" r="3" fill="#E95420"/>
    <circle cx="-6" cy="4" r="3" fill="#E95420"/>
  </g>
  <text x="88" y="491" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#E95420" font-weight="bold">UbuntuNews</text>
  <text x="185" y="491" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#888">| 资讯 · 工具 · 教程 · 社区</text>

  <!-- 发布日期角标 -->
  <g transform="translate(830, 468)">
    <rect x="-40" y="0" width="80" height="22" rx="4" fill="#E95420" opacity="0.9"/>
    <text x="0" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff" font-weight="bold">2026.04.30</text>
  </g>

  <!-- 装饰性代码片段（右上角） -->
  <g transform="translate(720, 380)" opacity="0.15" font-family="'Consolas', 'Courier New', monospace" font-size="11" fill="#4CAF50">
    <text x="0" y="0">$ sudo do-release-upgrade</text>
    <text x="0" y="18">→ Linux 7.0 ✓</text>
    <text x="0" y="36">→ GNOME 50 ✓</text>
  </g>

  <!-- 装饰性代码片段（左下角） -->
  <g transform="translate(30, 370)" opacity="0.12" font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#2196F3">
    <text x="0" y="0"># uname -r</text>
    <text x="0" y="14">7.0.0-generic</text>
  </g>
</svg>