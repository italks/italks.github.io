<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <!-- 渐变背景 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    
    <!-- Docker蓝渐变 -->
    <linearGradient id="dockerBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0db7ed"/>
      <stop offset="100%" style="stop-color:#0099cc"/>
    </linearGradient>
    
    <!-- Ubuntu橙渐变 -->
    <linearGradient id="ubuntuOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E95420"/>
      <stop offset="100%" style="stop-color:#FF7043"/>
    </linearGradient>
    
    <!-- 容器渐变 -->
    <linearGradient id="containerGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0db7ed"/>
      <stop offset="100%" style="stop-color:#0099cc"/>
    </linearGradient>
    
    <linearGradient id="containerGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E95420"/>
      <stop offset="100%" style="stop-color:#FF5722"/>
    </linearGradient>
    
    <linearGradient id="containerGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#388E3C"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  
  <!-- 装饰网格线 -->
  <g opacity="0.05" stroke="#0db7ed" stroke-width="1">
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="800" y1="0" x2="800" y2="500"/>
  </g>
  
  <!-- 左侧文字区域 -->
  <g>
    <!-- 标题 -->
    <text x="60" y="180" font-family="Microsoft YaHei, Arial, sans-serif" font-size="56" font-weight="bold" fill="white">
      Docker入门教程
    </text>
    
    <!-- 副标题 -->
    <text x="60" y="240" font-family="Microsoft YaHei, Arial, sans-serif" font-size="32" fill="#0db7ed">
      从安装到第一个容器，30分钟上手
    </text>
    
    <!-- 分隔线 -->
    <rect x="60" y="270" width="280" height="4" rx="2" fill="url(#ubuntuOrange)"/>
    
    <!-- 关键词标签 -->
    <g transform="translate(60, 300)">
      <!-- 标签1 -->
      <rect x="0" y="0" width="90" height="32" rx="16" fill="url(#dockerBlue)" opacity="0.8"/>
      <text x="45" y="22" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">容器化</text>
      
      <!-- 标签2 -->
      <rect x="100" y="0" width="90" height="32" rx="16" fill="url(#ubuntuOrange)" opacity="0.8"/>
      <text x="145" y="22" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">新手友好</text>
      
      <!-- 标签3 -->
      <rect x="200" y="0" width="90" height="32" rx="16" fill="#4CAF50" opacity="0.8"/>
      <text x="245" y="22" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">实战案例</text>
    </g>
    
    <!-- 底部信息 -->
    <g transform="translate(60, 380)">
      <text font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#B0BEC5">
        <tspan x="0" y="0">• 3步安装Docker</tspan>
        <tspan x="0" y="30">• 镜像/容器/仓库核心概念</tspan>
        <tspan x="0" y="60">• Nginx/MySQL/WordPress实战</tspan>
      </text>
    </g>
  </g>
  
  <!-- 右侧Docker鲸鱼与容器 -->
  <g transform="translate(480, 80)">
    <!-- 鲸鱼身体 -->
    <ellipse cx="200" cy="280" rx="160" ry="80" fill="url(#dockerBlue)" opacity="0.9"/>
    
    <!-- 鲸鱼喷水 -->
    <g transform="translate(200, 200)" opacity="0.6">
      <ellipse cx="0" cy="-20" rx="8" ry="15" fill="#0db7ed"/>
      <ellipse cx="-15" cy="-30" rx="6" ry="12" fill="#0db7ed"/>
      <ellipse cx="15" cy="-30" rx="6" ry="12" fill="#0db7ed"/>
    </g>
    
    <!-- 鲸鱼眼睛 -->
    <circle cx="320" cy="260" r="8" fill="white"/>
    <circle cx="322" cy="260" r="4" fill="#1a1a2e"/>
    
    <!-- 鲸鱼尾巴 -->
    <path d="M40 280 Q0 260 20 220 Q40 240 40 280" fill="url(#dockerBlue)" opacity="0.8"/>
    <path d="M40 280 Q0 300 20 340 Q40 320 40 280" fill="url(#dockerBlue)" opacity="0.8"/>
    
    <!-- 鲸鱼背上的容器组 -->
    <g transform="translate(120, 140)">
      <!-- 第一排容器 -->
      <rect x="0" y="0" width="50" height="50" rx="4" fill="url(#containerGrad1)" stroke="white" stroke-width="2"/>
      <rect x="60" y="0" width="50" height="50" rx="4" fill="url(#containerGrad2)" stroke="white" stroke-width="2"/>
      <rect x="120" y="0" width="50" height="50" rx="4" fill="url(#containerGrad3)" stroke="white" stroke-width="2"/>
      
      <!-- 第二排容器 -->
      <rect x="30" y="60" width="50" height="50" rx="4" fill="url(#containerGrad2)" stroke="white" stroke-width="2"/>
      <rect x="90" y="60" width="50" height="50" rx="4" fill="url(#containerGrad1)" stroke="white" stroke-width="2"/>
      
      <!-- 容器窗口 -->
      <g opacity="0.8">
        <rect x="8" y="8" width="12" height="12" rx="2" fill="white" opacity="0.5"/>
        <rect x="68" y="8" width="12" height="12" rx="2" fill="white" opacity="0.5"/>
        <rect x="128" y="8" width="12" height="12" rx="2" fill="white" opacity="0.5"/>
        <rect x="38" y="68" width="12" height="12" rx="2" fill="white" opacity="0.5"/>
        <rect x="98" y="68" width="12" height="12" rx="2" fill="white" opacity="0.5"/>
      </g>
    </g>
    
    <!-- 装饰代码片段 -->
    <g transform="translate(60, 350)" opacity="0.4">
      <text font-family="Courier New, monospace" font-size="11" fill="#0db7ed">
        <tspan x="0" y="0">$ docker run -d nginx</tspan>
        <tspan x="0" y="16">$ docker ps</tspan>
      </text>
    </g>
  </g>
  
  <!-- 浮动装饰元素 -->
  <g opacity="0.15">
    <!-- 左上角圆点 -->
    <circle cx="50" cy="50" r="20" fill="#0db7ed"/>
    <circle cx="120" cy="80" r="10" fill="#E95420"/>
    
    <!-- 右下角圆点 -->
    <circle cx="850" cy="450" r="25" fill="#0db7ed"/>
    <circle cx="800" cy="420" r="12" fill="#E95420"/>
    <circle cx="830" cy="470" r="8" fill="#4CAF50"/>
  </g>
  
  <!-- 底部品牌条 -->
  <rect x="0" y="470" width="900" height="30" fill="#0db7ed" opacity="0.1"/>
  <text x="450" y="488" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#B0BEC5" text-anchor="middle">
    UbuntuNews · Linux容器技术 · 开源生态
  </text>
</svg>