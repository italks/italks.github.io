<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img" width="900" height="500">
  <title>Ubuntu 26.04 LTS 正式发布</title>
  
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    
    <!-- Ubuntu 橙色光晕 -->
    <radialGradient id="orangeGlow" cx="50%" cy="40%" r="45%">
      <stop offset="0%" style="stop-color:#E95420;stop-opacity:0.25"/>
      <stop offset="70%" style="stop-color:#E95420;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#E95420;stop-opacity:0"/>
    </radialGradient>
    
    <!-- 标题文字渐变 -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E95420"/>
      <stop offset="50%" style="stop-color:#FF7043"/>
      <stop offset="100%" style="stop-color:#E95420"/>
    </linearGradient>
    
    <!-- 卡片渐变 -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.04)"/>
    </linearGradient>
    
    <!-- 圆环渐变 -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E95420"/>
      <stop offset="100%" style="stop-color:#FF9800"/>
    </linearGradient>

    <!-- 装饰性圆点图案 -->
    <pattern id="dotGrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="rgba(233,84,32,0.08)"/>
    </pattern>
    
    <!-- 发光滤镜 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  
  <!-- 点状装饰层 -->
  <rect width="900" height="500" fill="url(#dotGrid)" opacity="0.5"/>
  
  <!-- 橙色光晕背景 -->
  <ellipse cx="450" cy="180" rx="350" ry="200" fill="url(#orangeGlow)"/>
  
  <!-- 顶部装饰线 -->
  <line x1="80" y1="35" x2="820" y2="35" stroke="#E95420" stroke-width="2" opacity="0.6"/>
  
  <!-- 左上角标签 -->
  <g transform="translate(60, 28)">
    <rect x="0" y="0" width="120" height="22" rx="11" fill="#E95420" opacity="0.9"/>
    <text x="60" y="15" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="600">🎉 正式发布</text>
  </g>
  
  <!-- 右上角日期 -->
  <text x="820" y="42" font-family="'SF Mono',Consolas,'Courier New',monospace" font-size="13" fill="rgba(233,84,32,0.85)" text-anchor="end" font-weight="500">2026.04.23</text>

  <!-- ========== 主标题区域 ========== -->
  <text x="450" y="105" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="46" font-weight="900" fill="url(#titleGrad)" text-anchor="middle" filter="url(#glow)">
    Ubuntu 26.04 LTS
  </text>
  
  <!-- 副标题 - 代号 -->
  <text x="450" y="145" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-weight="400">
    "Resolute Raccoon" 坚毅浣熊 · 十年支持周期
  </text>

  <!-- 分隔线 -->
  <line x1="280" y1="165" x2="620" y2="165" stroke="url(#ringGrad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- ========== 中央圆环图标区 ========== -->
  <g transform="translate(450, 260)">
    <!-- 外圈轨道 -->
    <circle cx="0" cy="0" r="75" fill="none" stroke="rgba(233,84,32,0.15)" stroke-width="1.5" stroke-dasharray="4 4"/>
    
    <!-- 主圆环（Ubuntu 风格） -->
    <circle cx="0" cy="0" r="65" fill="none" stroke="url(#ringGrad)" stroke-width="4" opacity="0.9"/>
    
    <!-- 内圈填充 -->
    <circle cx="0" cy="0" r="55" fill="rgba(233,84,32,0.08)"/>
    
    <!-- 版本号 -->
    <text x="0" y="-8" font-family="'SF Pro Display',Arial,sans-serif" font-size="32" font-weight="900" fill="#E95420" text-anchor="middle">26.04</text>
    <text x="0" y="16" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" fill="rgba(255,255,255,0.8)" text-anchor="middle">正式版</text>
    
    <!-- 装饰性连接点 - 上 -->
    <circle cx="0" cy="-65" r="5" fill="#E95420" filter="url(#glow)"/>
    <text x="0" cy="-82" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="rgba(255,255,255,0.6)" text-anchor="middle">Linux 7.0</text>
    
    <!-- 装饰性连接点 - 右下 -->
    <circle cx="56" cy="33" r="5" fill="#FF9800" filter="url(#glow)"/>
    <text x="78" y="38" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="rgba(255,255,255,0.6)">GNOME 50</text>
    
    <!-- 装饰性连接点 - 左下 -->
    <circle cx="-56" cy="33" r="5" fill="#FFB74D" filter="url(#glow)"/>
    <text x="-78" y="38" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="rgba(255,255,255,0.6)" text-anchor="end">Wayland</text>
  </g>

  <!-- ========== 底部三大特性卡片 ========== -->
  <!-- 卡片1: Linux 7.0 内核 -->
  <g transform="translate(65, 370)">
    <rect width="170" height="90" rx="12" fill="url(#cardGrad)" stroke="rgba(233,84,32,0.25)" stroke-width="1"/>
    <text x="85" y="26" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="700" fill="#E95420" text-anchor="middle">Linux 7.0 内核</text>
    <text x="85" y="48" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="rgba(255,255,255,0.65)" text-anchor="middle">Rust 正式入驻</text>
    <text x="85" y="66" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="rgba(255,255,255,0.65)" text-anchor="middle">性能提升 40%</text>
    <!-- 小图标 -->
    <circle cx="24" cy="74" r="3" fill="#4CAF50"/>
    <text x="34" y="77" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="rgba(76,175,80,0.9">游戏帧率飙升</text>
  </g>
  
  <!-- 卡片2: 纯 Wayland (居中突出) -->
  <g transform="translate(265, 365)">
    <rect width="190" height="100" rx="12" fill="url(#cardGrad)" stroke="#E95420" stroke-width="1.2" opacity="1"/>
    <text x="95" y="26" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="700" fill="#FF7043" text-anchor="middle">纯 Wayland 环境</text>
    <text x="95" y="48" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="rgba(255,255,255,0.65)" text-anchor="middle">彻底告别 X11</text>
    <text x="95" y="66" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="rgba(255,255,255,0.65)" text-anchor="middle">GNOME 50 + sudo-rs</text>
    <text x="95" y="86" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#E95420" text-anchor="middle" font-weight="600">★ 历史性升级</text>
  </g>
  
  <!-- 卡片3: 后量子密码 -->
  <g transform="translate(485, 370)">
    <rect width="170" height="90" rx="12" fill="url(#cardGrad)" stroke="rgba(233,84,32,0.25)" stroke-width="1"/>
    <text x="85" y="26" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="700" fill="#E95420" text-anchor="middle">后量子密码</text>
    <text x="85" y="48" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="rgba(255,255,255,0.65)" text-anchor="middle">MLKEM 默认启用</text>
    <text x="85" y="66" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="rgba(255,255,255,0.65)" text-anchor="middle">面向未来的安全</text>
    <!-- 小图标 -->
    <circle cx="24" cy="74" r="3" fill="#E95420"/>
    <text x="34" y="77" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="rgba(233,84,32,0.9">抵御量子攻击</text>
  </g>
  
  <!-- 卡片4: 更多更新 -->
  <g transform="translate(685, 370)">
    <rect width="150" height="90" rx="12" fill="url(#cardGrad)" stroke="rgba(233,84,32,0.2)" stroke-width="1"/>
    <text x="75" y="26" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="700" fill="rgba(255,152,0,0.9)" text-anchor="middle">更多亮点</text>
    <text x="75" y="48" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="rgba(255,255,255,0.6)" text-anchor="middle">• Ptyxis 终端</text>
    <text x="75" y="64" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="rgba(255,255,255,0.6)" text-anchor="middle">• Showtime 播放器</text>
    <text x="75" y="80" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="rgba(255,255,255,0.6)" text-anchor="middle">• 安全中心整合</text>
  </g>

  <!-- ========== 底部品牌栏 ========== -->
  <rect x="0" y="472" width="900" height="28" fill="rgba(233,84,32,0.08)"/>
  <text x="450" y="491" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" fill="rgba(233,84,32,0.7)" text-anchor="middle" letter-spacing="2">
    UBUNTUNEWS · 资讯 · 工具 · 教程 · 社区
  </text>
</svg>