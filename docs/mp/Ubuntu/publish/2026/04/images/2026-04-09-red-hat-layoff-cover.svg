<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E95420"/>
      <stop offset="100%" style="stop-color:#ff6b35"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bg)"/>

  <!-- 顶部装饰线 -->
  <rect x="0" y="0" width="900" height="4" fill="url(#accent)"/>

  <!-- 红帽图标区域（左上） -->
  <g transform="translate(60, 70)">
    <!-- 红帽简化标识 - 红色帽子轮廓 -->
    <ellipse cx="30" cy="38" rx="28" ry="12" fill="#EE0000" opacity="0.9"/>
    <path d="M8,36 Q5,20 22,14 Q38,8 52,16 Q58,24 54,36" fill="#CC0000"/>
    <text x="30" y="44" font-family="Arial,sans-serif" font-size="18" fill="white" text-anchor="middle" font-weight="bold">RH</text>
  </g>

  <!-- 热点标签 -->
  <g transform="translate(140, 65)">
    <rect x="0" y="0" width="80" height="28" rx="14" fill="#E95420" opacity="0.9"/>
    <text x="40" y="19" font-family="Microsoft YaHei,Arial,sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="bold">重磅突发</text>
  </g>
  
  <g transform="translate(230, 65)">
    <rect x="0" y="0" width="70" height="28" rx="14" fill="#333" stroke="#E95420" stroke-width="1.5"/>
    <text x="35" y="19" font-family="Microsoft YaHei,Arial,sans-serif" font-size="13" fill="#E95420" text-anchor="middle">深度分析</text>
  </g>

  <!-- 主标题 -->
  <text x="450" y="175" font-family="Microsoft YaHei,Arial,sans-serif" font-size="32" fill="white" text-anchor="middle" font-weight="bold" filter="url(#glow)">
    红帽裁撤中国区研发团队
  </text>

  <!-- 副标题 -->
  <text x="450" y="218" font-family="Microsoft YaHei,Arial,sans-serif" font-size="20" fill="#aaa" text-anchor="middle">
    对中国 Linux 开源生态意味着什么？
  </text>

  <!-- 分隔线 -->
  <line x1="200" y1="240" x2="700" y2="240" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>

  <!-- 核心数据卡片组 -->
  <g transform="translate(90, 265)">
    <!-- 数据卡片1: 人数 -->
    <rect x="0" y="0" width="170" height="80" rx="10" fill="rgba(233,84,32,0.15)" stroke="#E95420" stroke-width="1.5"/>
    <text x="85" y="35" font-family="Arial,sans-serif" font-size="30" fill="#E95420" text-anchor="middle" font-weight="bold">500人</text>
    <text x="85" y="62" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#ccc" text-anchor="middle">研发团队全员</text>

    <!-- 数据卡片2: 时间 -->
    <rect x="190" y="0" width="170" height="80" rx="10" fill="rgba(255,107,53,0.12)" stroke="#ff6b35" stroke-width="1.5"/>
    <text x="275" y="35" font-family="Arial,sans-serif" font-size="24" fill="#ff6b35" text-anchor="middle" font-weight="bold">7/31 关停</text>
    <text x="275" y="62" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#ccc" text-anchor="middle">北京研发中心</text>

    <!-- 数据卡片3: 年限 -->
    <rect x="380" y="0" width="170" height="80" rx="10" fill="rgba(233,84,32,0.15)" stroke="#E95420" stroke-width="1.5"/>
    <text x="465" y="35" font-family="Arial,sans-serif" font-size="30" fill="#E95420" text-anchor="middle" font-weight="bold">18年</text>
    <text x="465" y="62" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#ccc" text-anchor="middle">运营历史终结</text>

    <!-- 数据卡片4: 影响 -->
    <rect x="570" y="0" width="170" height="80" rx="10" fill="rgba(255,200,87,0.12)" stroke="#ffc857" stroke-width="1.5"/>
    <text x="655" y="35" font-family="Microsoft YaHei,sans-serif" font-size="18" fill="#ffc857" text-anchor="middle" font-weight="bold">开源生态冲击</text>
    <text x="655" y="62" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#ccc" text-anchor="medium">人才·企业·信心</text>
  </g>

  <!-- 底部关键词条 -->
  <g transform="translate(130, 372)">
    <rect x="0" y="0" width="640" height="42" rx="21" fill="rgba(255,255,255,0.06)"/>
    
    <circle cx="30" cy="21" r="5" fill="#E95420"/>
    <text x="45" y="26" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#bbb">Red Hat</text>
    
    <circle cx="145" cy="21" r="5" fill="#ff6b35"/>
    <text x="160" y="26" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#bbb">IBM</text>
    
    <circle cx="235" cy="21" r="5" fill="#ffc857"/>
    <text x="250" y="26" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#bbb">开源社区</text>
    
    <circle cx="350" cy="21" r="5" fill="#4ECDC4"/>
    <text x="365" y="26" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#bbb">Ubuntu LTS</text>
    
    <circle cx="480" cy="21" r="5" fill="#E95420"/>
    <text x="495" y="26" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#bbb">国产化替代</text>
  </g>

  <!-- 底部品牌栏 -->
  <line x1="60" y1="445" x2="840" y2="445" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="450" y="473" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#666" text-anchor="middle">
    💡 UbuntuNews · 资讯 · 工具 · 教程 · 社区
  </text>

  <!-- 右下角日期角标 -->
  <g transform="translate(800, 430)">
    <rect x="0" y="0" width="70" height="26" rx="4" fill="rgba(233,84,32,0.2)" stroke="#E95420" stroke-width="1"/>
    <text x="35" y="18" font-family="Arial,sans-serif" font-size="12" fill="#E95420" text-anchor="middle" font-weight="bold">2026.04.09</text>
  </g>
</svg>