<svg width="900" height="500" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E95420;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF5252;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D32F2F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bgGradient)"/>
  
  <!-- 装饰性几何图形 -->
  <circle cx="120" cy="120" r="200" fill="#E95420" opacity="0.06"/>
  <circle cx="800" cy="400" r="180" fill="#FF5252" opacity="0.06"/>
  <rect x="700" y="50" width="120" height="120" rx="10" fill="#E95420" opacity="0.1" transform="rotate(45, 760, 110)"/>
  
  <!-- 内存条图标 -->
  <g transform="translate(70, 180)">
    <!-- 内存条主体 -->
    <rect x="0" y="0" width="140" height="60" rx="5" fill="#2C2C2C" stroke="#E95420" stroke-width="2"/>
    <!-- 内存芯片 -->
    <rect x="10" y="10" width="25" height="40" rx="2" fill="#E95420" opacity="0.8"/>
    <rect x="40" y="10" width="25" height="40" rx="2" fill="#E95420" opacity="0.8"/>
    <rect x="70" y="10" width="25" height="40" rx="2" fill="#E95420" opacity="0.6"/>
    <rect x="100" y="10" width="25" height="40" rx="2" fill="#E95420" opacity="0.3"/>
    <!-- 金手指 -->
    <g transform="translate(10, 60)">
      <rect x="0" y="0" width="8" height="12" fill="#FFD700" opacity="0.8"/>
      <rect x="15" y="0" width="8" height="12" fill="#FFD700" opacity="0.8"/>
      <rect x="30" y="0" width="8" height="12" fill="#FFD700" opacity="0.8"/>
      <rect x="45" y="0" width="8" height="12" fill="#FFD700" opacity="0.8"/>
      <rect x="60" y="0" width="8" height="12" fill="#FFD700" opacity="0.8"/>
      <rect x="75" y="0" width="8" height="12" fill="#FFD700" opacity="0.8"/>
      <rect x="90" y="0" width="8" height="12" fill="#FFD700" opacity="0.8"/>
      <rect x="105" y="0" width="8" height="12" fill="#FFD700" opacity="0.8"/>
    </g>
  </g>
  
  <!-- 热点标签 -->
  <rect x="30" y="30" width="90" height="40" rx="5" fill="url(#redGradient)" filter="url(#shadow)"/>
  <text x="75" y="58" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">热点</text>
  
  <!-- 主标题 -->
  <text x="480" y="155" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="white" text-anchor="middle" filter="url(#shadow)">Ubuntu 26.04</text>
  
  <!-- 副标题 -->
  <text x="480" y="210" font-family="Arial, sans-serif" font-size="28" fill="url(#orangeGradient)" text-anchor="middle">内存门槛升至6GB</text>
  
  <!-- 对比展示 -->
  <g transform="translate(200, 250)">
    <!-- 旧要求 -->
    <rect x="0" y="0" width="200" height="80" rx="8" fill="#2C2C2C" stroke="#666" stroke-width="2"/>
    <text x="100" y="30" font-family="Arial, sans-serif" font-size="16" fill="#999" text-anchor="middle">旧要求（24.04）</text>
    <text x="100" y="60" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#999" text-anchor="middle">4GB</text>
    <!-- 箭头 -->
    <text x="250" y="50" font-family="Arial, sans-serif" font-size="48" fill="#FF5252" text-anchor="middle">→</text>
    <!-- 新要求 -->
    <rect x="300" y="0" width="200" height="80" rx="8" fill="#2C2C2C" stroke="#E95420" stroke-width="3"/>
    <text x="400" y="30" font-family="Arial, sans-serif" font-size="16" fill="#E95420" text-anchor="middle">新要求（26.04）</text>
    <text x="400" y="60" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="url(#orangeGradient)" text-anchor="middle">6GB</text>
  </g>
  
  <!-- 提升百分比 -->
  <rect x="770" y="250" width="100" height="80" rx="8" fill="url(#redGradient)" opacity="0.9"/>
  <text x="820" y="285" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">+50%</text>
  <text x="820" y="310" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">提升幅度</text>
  
  <!-- 解决方案标签 -->
  <g transform="translate(100, 365)">
    <rect x="0" y="0" width="180" height="50" rx="8" fill="#2C2C2C" stroke="#4CAF50" stroke-width="2"/>
    <text x="90" y="22" font-family="Arial, sans-serif" font-size="14" fill="#4CAF50" text-anchor="middle">🔧 扩展内存</text>
    <text x="90" y="40" font-family="Arial, sans-serif" font-size="11" fill="#999" text-anchor="middle">升级到8GB流畅运行</text>
  </g>
  
  <g transform="translate(300, 365)">
    <rect x="0" y="0" width="180" height="50" rx="8" fill="#2C2C2C" stroke="#4CAF50" stroke-width="2"/>
    <text x="90" y="22" font-family="Arial, sans-serif" font-size="14" fill="#4CAF50" text-anchor="middle">🪶 轻量级版本</text>
    <text x="90" y="40" font-family="Arial, sans-serif" font-size="11" fill="#999" text-anchor="middle">Lubuntu/Xubuntu</text>
  </g>
  
  <g transform="translate(500, 365)">
    <rect x="0" y="0" width="180" height="50" rx="8" fill="#2C2C2C" stroke="#4CAF50" stroke-width="2"/>
    <text x="90" y="22" font-family="Arial, sans-serif" font-size="14" fill="#4CAF50" text-anchor="middle">⚙️ 窗口管理器</text>
    <text x="90" y="40" font-family="Arial, sans-serif" font-size="11" fill="#999" text-anchor="middle">i3/bspwm极简方案</text>
  </g>
  
  <g transform="translate(700, 365)">
    <rect x="0" y="0" width="180" height="50" rx="8" fill="#2C2C2C" stroke="#4CAF50" stroke-width="2"/>
    <text x="90" y="22" font-family="Arial, sans-serif" font-size="14" fill="#4CAF50" text-anchor="middle">🐧 其他发行版</text>
    <text x="90" y="40" font-family="Arial, sans-serif" font-size="11" fill="#999" text-anchor="middle">MX Linux/Debian</text>
  </g>
  
  <!-- 底部信息栏 -->
  <rect x="0" y="440" width="900" height="60" fill="#1a1a2e" opacity="0.8"/>
  <text x="50" y="475" font-family="Arial, sans-serif" font-size="16" fill="#FF5252">📅 2026年4月生效</text>
  <text x="260" y="475" font-family="Arial, sans-serif" font-size="16" fill="#FF6B35">🎯 仅限桌面版</text>
  <text x="450" y="475" font-family="Arial, sans-serif" font-size="16" fill="#FF6B35">📊 服务器版1.5GB不变</text>
  
  <!-- UbuntuNews 品牌标识 -->
  <text x="850" y="475" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E95420" text-anchor="end">UbuntuNews</text>
  
  <!-- 问号装饰 -->
  <text x="820" y="150" font-family="Arial, sans-serif" font-size="80" fill="#E95420" opacity="0.15" text-anchor="middle">?</text>
</svg>