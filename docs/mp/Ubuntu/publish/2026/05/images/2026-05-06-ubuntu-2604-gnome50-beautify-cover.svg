<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <!-- Ubuntu橙色渐变 -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E95420"/>
      <stop offset="100%" style="stop-color:#FF6B35"/>
    </linearGradient>
    <!-- 模糊光效 -->
    <radialGradient id="glowOrange" cx="70%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:#E95420;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#E95420;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glowBlue" cx="20%" cy="60%" r="35%">
      <stop offset="0%" style="stop-color:#4FC3F7;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#4FC3F7;stop-opacity:0"/>
    </radialGradient>
    <!-- Dock图标渐变 -->
    <linearGradient id="iconGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7C4DFF"/>
      <stop offset="100%" style="stop-color:#536DFE"/>
    </linearGradient>
    <linearGradient id="iconGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00E676"/>
      <stop offset="100%" style="stop-color:#00C853"/>
    </linearGradient>
    <linearGradient id="iconGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF5252"/>
      <stop offset="100%" style="stop-color:#FF1744"/>
    </linearGradient>
    <linearGradient id="iconGrad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD740"/>
      <stop offset="100%" style="stop-color:#FFC400"/>
    </linearGradient>
    <linearGradient id="iconGrad5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7"/>
      <stop offset="100%" style="stop-color:#29B6F6"/>
    </linearGradient>
    <!-- 模糊滤镜 -->
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  
  <!-- 光效 -->
  <rect width="900" height="500" fill="url(#glowOrange)"/>
  <rect width="900" height="500" fill="url(#glowBlue)"/>

  <!-- 装饰网格线 -->
  <g opacity="0.05" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="800" y1="0" x2="800" y2="500"/>
  </g>

  <!-- 模拟桌面窗口 - 模糊背景效果 -->
  <g filter="url(#blur)" opacity="0.4">
    <rect x="100" y="60" width="280" height="180" rx="12" fill="#2196F3"/>
    <rect x="250" y="120" width="280" height="180" rx="12" fill="#9C27B0"/>
    <rect x="400" y="80" width="280" height="180" rx="12" fill="#4CAF50"/>
  </g>

  <!-- 顶栏 - 带模糊效果 -->
  <rect x="0" y="0" width="900" height="32" fill="#1a1a2e" opacity="0.85"/>
  <rect x="0" y="32" width="900" height="1" fill="#fff" opacity="0.1"/>
  
  <!-- 顶栏内容 -->
  <text x="16" y="22" fill="#fff" font-family="monospace" font-size="12" opacity="0.9">Activities</text>
  <text x="450" y="22" fill="#fff" font-family="sans-serif" font-size="13" text-anchor="middle" opacity="0.9">5月 6日 10:51</text>
  <!-- 系统托盘图标 -->
  <circle cx="820" cy="16" r="5" fill="#4FC3F7" opacity="0.8"/>
  <circle cx="840" cy="16" r="5" fill="#00E676" opacity="0.8"/>
  <circle cx="860" cy="16" r="5" fill="#FFD740" opacity="0.8"/>
  <rect x="875" y="11" width="14" height="10" rx="2" fill="none" stroke="#fff" stroke-width="1.2" opacity="0.7"/>

  <!-- 桌面窗口 - 清晰前景 -->
  <!-- 窗口1 -->
  <g filter="url(#softShadow)">
    <rect x="80" y="60" width="320" height="220" rx="12" fill="#1e1e2e" opacity="0.95"/>
    <rect x="80" y="60" width="320" height="36" rx="12" fill="#2a2a3e"/>
    <rect x="80" y="84" width="320" height="12" fill="#2a2a3e"/>
    <circle cx="100" cy="78" r="6" fill="#FF5F56"/>
    <circle cx="118" cy="78" r="6" fill="#FFBD2E"/>
    <circle cx="136" cy="78" r="6" fill="#27C93F"/>
    <text x="240" y="82" fill="#888" font-family="monospace" font-size="11" text-anchor="middle">Terminal</text>
    <!-- 终端内容 -->
    <text x="96" y="118" fill="#27C93F" font-family="monospace" font-size="12">$ sudo apt install</text>
    <text x="96" y="138" fill="#4FC3F7" font-family="monospace" font-size="12">  gnome-tweaks</text>
    <text x="96" y="158" fill="#4FC3F7" font-family="monospace" font-size="12">  chrome-gnome-shell</text>
    <text x="96" y="188" fill="#27C93F" font-family="monospace" font-size="12">$ gnome-extensions list</text>
    <text x="96" y="208" fill="#fff" font-family="monospace" font-size="12" opacity="0.8">dash-to-dock@... ✅</text>
    <text x="96" y="228" fill="#fff" font-family="monospace" font-size="12" opacity="0.8">blur-my-shell@... ✅</text>
    <text x="96" y="248" fill="#fff" font-family="monospace" font-size="12" opacity="0.5">user-theme@... ✅</text>
  </g>

  <!-- 窗口2 -->
  <g filter="url(#softShadow)">
    <rect x="430" y="80" width="340" height="240" rx="12" fill="#1e1e2e" opacity="0.95"/>
    <rect x="430" y="80" width="340" height="36" rx="12" fill="#2a2a3e"/>
    <rect x="430" y="104" width="340" height="12" fill="#2a2a3e"/>
    <circle cx="450" cy="98" r="6" fill="#FF5F56"/>
    <circle cx="468" cy="98" r="6" fill="#FFBD2E"/>
    <circle cx="486" cy="98" r="6" fill="#27C93F"/>
    <text x="600" y="102" fill="#888" font-family="sans-serif" font-size="11" text-anchor="middle">GNOME Tweaks</text>
    <!-- Tweaks 界面模拟 -->
    <text x="450" y="136" fill="#E95420" font-family="sans-serif" font-size="11" font-weight="bold">外观</text>
    <text x="450" y="158" fill="#aaa" font-family="sans-serif" font-size="10">主题</text>
    <rect x="540" y="148" width="120" height="16" rx="4" fill="#333" opacity="0.8"/>
    <text x="548" y="160" fill="#E95420" font-family="sans-serif" font-size="10">Orchis-Dark ▾</text>
    <text x="450" y="182" fill="#aaa" font-family="sans-serif" font-size="10">图标</text>
    <rect x="540" y="172" width="120" height="16" rx="4" fill="#333" opacity="0.8"/>
    <text x="548" y="184" fill="#4FC3F7" font-family="sans-serif" font-size="10">Tela-dark ▾</text>
    <text x="450" y="206" fill="#aaa" font-family="sans-serif" font-size="10">光标</text>
    <rect x="540" y="196" width="120" height="16" rx="4" fill="#333" opacity="0.8"/>
    <text x="548" y="208" fill="#FFD740" font-family="sans-serif" font-size="10">Bibata ▾</text>
    <text x="450" y="240" fill="#E95420" font-family="sans-serif" font-size="11" font-weight="bold">窗口</text>
    <text x="450" y="262" fill="#aaa" font-family="sans-serif" font-size="10">标题栏按钮</text>
    <rect x="570" y="250" width="24" height="16" rx="3" fill="#27C93F" opacity="0.3"/>
    <text x="576" y="262" fill="#27C93F" font-family="sans-serif" font-size="9">✓ 最小化</text>
    <rect x="630" y="250" width="24" height="16" rx="3" fill="#27C93F" opacity="0.3"/>
    <text x="636" y="262" fill="#27C93F" font-family="sans-serif" font-size="9">✓ 最大化</text>
    <text x="450" y="292" fill="#aaa" font-family="sans-serif" font-size="10">字体渲染</text>
    <rect x="540" y="282" width="80" height="16" rx="4" fill="#333" opacity="0.8"/>
    <text x="548" y="294" fill="#fff" font-family="sans-serif" font-size="10" opacity="0.8">完整 ▾</text>
  </g>

  <!-- 底部 Dock 栏 - Dash to Dock 效果 -->
  <g>
    <!-- Dock 背景 - 模糊半透明效果 -->
    <rect x="240" y="430" width="420" height="56" rx="28" fill="#1a1a2e" opacity="0.85" filter="url(#softShadow)"/>
    <rect x="240" y="430" width="420" height="56" rx="28" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.15"/>
    
    <!-- Dock 图标 -->
    <!-- Files -->
    <rect x="270" y="440" width="36" height="36" rx="8" fill="url(#iconGrad2)"/>
    <text x="288" y="464" fill="#fff" font-family="sans-serif" font-size="16" text-anchor="middle">📁</text>
    
    <!-- Firefox -->
    <rect x="320" y="440" width="36" height="36" rx="8" fill="url(#iconGrad5)"/>
    <text x="338" y="464" fill="#fff" font-family="sans-serif" font-size="16" text-anchor="middle">🌐</text>
    
    <!-- Terminal -->
    <rect x="370" y="440" width="36" height="36" rx="8" fill="url(#iconGrad1)"/>
    <text x="388" y="464" fill="#fff" font-family="sans-serif" font-size="14" text-anchor="middle">⌨</text>
    
    <!-- Settings -->
    <rect x="420" y="440" width="36" height="36" rx="8" fill="#455A64"/>
    <text x="438" y="464" fill="#fff" font-family="sans-serif" font-size="16" text-anchor="middle">⚙</text>
    
    <!-- Tweaks (活跃状态 - 高亮) -->
    <rect x="470" y="436" width="40" height="40" rx="10" fill="url(#orangeGrad)" filter="url(#softShadow)"/>
    <text x="490" y="462" fill="#fff" font-family="sans-serif" font-size="16" text-anchor="middle">🎨</text>
    <!-- 活跃指示器 -->
    <circle cx="490" cy="480" r="3" fill="#E95420"/>
    
    <!-- Software -->
    <rect x="526" y="440" width="36" height="36" rx="8" fill="url(#iconGrad4)"/>
    <text x="544" y="464" fill="#fff" font-family="sans-serif" font-size="16" text-anchor="middle">📦</text>
    
    <!-- VS Code -->
    <rect x="576" y="440" width="36" height="36" rx="8" fill="url(#iconGrad3)"/>
    <text x="594" y="464" fill="#fff" font-family="sans-serif" font-size="14" text-anchor="middle">💡</text>
  </g>

  <!-- 左侧大标题区域 -->
  <g>
    <!-- GNOME 50 标签 -->
    <rect x="48" y="345" width="110" height="28" rx="14" fill="url(#orangeGrad)"/>
    <text x="103" y="364" fill="#fff" font-family="sans-serif" font-size="13" text-anchor="middle" font-weight="bold">GNOME 50</text>
    
    <!-- 主标题 -->
    <text x="48" y="400" fill="#fff" font-family="sans-serif" font-size="28" font-weight="bold">颜值翻倍</text>
    
    <!-- 副标题 -->
    <text x="48" y="425" fill="#aaa" font-family="sans-serif" font-size="14">8 款必装扩展 + Tweaks 深度调教</text>
  </g>

  <!-- 右下角扩展徽章 -->
  <g>
    <rect x="730" y="380" width="140" height="90" rx="12" fill="#1e1e2e" opacity="0.9" filter="url(#softShadow)"/>
    <text x="800" y="405" fill="#E95420" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold">✅ 必装扩展</text>
    <text x="745" y="425" fill="#4FC3F7" font-family="sans-serif" font-size="10">Dash to Dock</text>
    <text x="745" y="441" fill="#4FC3F7" font-family="sans-serif" font-size="10">Blur My Shell</text>
    <text x="745" y="457" fill="#4FC3F7" font-family="sans-serif" font-size="10">User Themes</text>
    <text x="830" y="425" fill="#aaa" font-family="sans-serif" font-size="10">Caffeine</text>
    <text x="830" y="441" fill="#aaa" font-family="sans-serif" font-size="10">Vitals</text>
    <text x="830" y="457" fill="#aaa" font-family="sans-serif" font-size="10">GSConnect</text>
  </g>

  <!-- Ubuntu Logo 右上角 -->
  <g transform="translate(840, 50)">
    <circle cx="0" cy="0" r="22" fill="url(#orangeGrad)" opacity="0.9"/>
    <circle cx="0" cy="0" r="5" fill="#fff"/>
    <circle cx="14" cy="-8" r="3" fill="#fff" opacity="0.8"/>
    <circle cx="-14" cy="-8" r="3" fill="#fff" opacity="0.8"/>
    <circle cx="0" cy="16" r="3" fill="#fff" opacity="0.8"/>
  </g>
</svg>
