<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E95420"/>
      <stop offset="100%" style="stop-color:#FF7733"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" style="stop-color:#E95420;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#E95420;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- 深色背景 -->
  <rect width="900" height="500" fill="url(#bg)"/>
  <rect width="900" height="500" fill="url(#glow)"/>

  <!-- ===== 核心标题区 - 居中大字 ===== -->

  <!-- GNOME 50 标签 -->
  <rect x="340" y="80" width="220" height="36" rx="18" fill="url(#orange)"/>
  <text x="450" y="104" fill="#fff" font-family="system-ui,sans-serif" font-size="16" text-anchor="middle" font-weight="bold" letter-spacing="2">GNOME 50</text>

  <!-- 主标题 -->
  <text x="450" y="180" fill="#fff" font-family="system-ui,sans-serif" font-size="54" text-anchor="middle" font-weight="bold" letter-spacing="4">颜值翻倍</text>

  <!-- 分隔线 -->
  <rect x="380" y="205" width="140" height="3" rx="1.5" fill="url(#orange)"/>

  <!-- 副标题 -->
  <text x="450" y="245" fill="rgba(255,255,255,0.6)" font-family="system-ui,sans-serif" font-size="18" text-anchor="middle" letter-spacing="1">8 款必装扩展 + Tweaks 深度调教</text>

  <!-- ===== 8个扩展圆角方块 - 两行排列 ===== -->
  <!-- 第一行 -->
  <g>
    <!-- 1. Dash to Dock -->
    <rect x="95" y="290" width="160" height="52" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <circle cx="122" cy="316" r="12" fill="#4FC3F7" opacity="0.9"/>
    <text x="122" y="320" fill="#fff" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">⚡</text>
    <text x="145" y="320" fill="#fff" font-family="system-ui,sans-serif" font-size="13" opacity="0.9">Dash to Dock</text>

    <!-- 2. Blur My Shell -->
    <rect x="275" y="290" width="160" height="52" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <circle cx="302" cy="316" r="12" fill="#7C4DFF" opacity="0.9"/>
    <text x="302" y="320" fill="#fff" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">🌫</text>
    <text x="325" y="320" fill="#fff" font-family="system-ui,sans-serif" font-size="13" opacity="0.9">Blur My Shell</text>

    <!-- 3. User Themes -->
    <rect x="455" y="290" width="160" height="52" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <circle cx="482" cy="316" r="12" fill="#E95420" opacity="0.9"/>
    <text x="482" y="320" fill="#fff" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">🎨</text>
    <text x="505" y="320" fill="#fff" font-family="system-ui,sans-serif" font-size="13" opacity="0.9">User Themes</text>

    <!-- 4. Caffeine -->
    <rect x="635" y="290" width="160" height="52" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <circle cx="662" cy="316" r="12" fill="#FFD740" opacity="0.9"/>
    <text x="662" y="320" fill="#fff" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">☕</text>
    <text x="685" y="320" fill="#fff" font-family="system-ui,sans-serif" font-size="13" opacity="0.9">Caffeine</text>
  </g>

  <!-- 第二行 -->
  <g>
    <!-- 5. Clipboard -->
    <rect x="95" y="358" width="160" height="52" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <circle cx="122" cy="384" r="12" fill="#00E676" opacity="0.9"/>
    <text x="122" y="388" fill="#fff" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">📋</text>
    <text x="145" y="388" fill="#fff" font-family="system-ui,sans-serif" font-size="13" opacity="0.9">Clipboard</text>

    <!-- 6. GSConnect -->
    <rect x="275" y="358" width="160" height="52" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <circle cx="302" cy="384" r="12" fill="#29B6F6" opacity="0.9"/>
    <text x="302" y="388" fill="#fff" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">📱</text>
    <text x="325" y="388" fill="#fff" font-family="system-ui,sans-serif" font-size="13" opacity="0.9">GSConnect</text>

    <!-- 7. Vitals -->
    <rect x="455" y="358" width="160" height="52" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <circle cx="482" cy="384" r="12" fill="#FF5252" opacity="0.9"/>
    <text x="482" y="388" fill="#fff" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">📊</text>
    <text x="505" y="388" fill="#fff" font-family="system-ui,sans-serif" font-size="13" opacity="0.9">Vitals</text>

    <!-- 8. Appindicator -->
    <rect x="635" y="358" width="160" height="52" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <circle cx="662" cy="384" r="12" fill="#AB47BC" opacity="0.9"/>
    <text x="662" y="388" fill="#fff" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">📌</text>
    <text x="685" y="388" fill="#fff" font-family="system-ui,sans-serif" font-size="13" opacity="0.9">Appindicator</text>
  </g>

  <!-- 底部 Ubuntu 标识 -->
  <text x="450" y="462" fill="rgba(255,255,255,0.3)" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle" letter-spacing="3">UBUNTU 26.04 LTS</text>

  <!-- 右上角 Ubuntu Logo -->
  <g transform="translate(840, 48)">
    <circle cx="0" cy="0" r="20" fill="url(#orange)" opacity="0.85"/>
    <circle cx="0" cy="0" r="4.5" fill="#fff"/>
    <circle cx="12" cy="-7" r="2.8" fill="#fff" opacity="0.8"/>
    <circle cx="-12" cy="-7" r="2.8" fill="#fff" opacity="0.8"/>
    <circle cx="0" cy="14" r="2.8" fill="#fff" opacity="0.8"/>
  </g>
</svg>
