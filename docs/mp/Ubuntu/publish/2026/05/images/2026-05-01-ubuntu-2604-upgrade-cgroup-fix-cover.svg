<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E95420"/>
      <stop offset="100%" style="stop-color:#FF7B47"/>
    </linearGradient>
    <linearGradient id="fixGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00C853"/>
      <stop offset="100%" style="stop-color:#69F0AE"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="100" x2="900" y2="100" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="900" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="900" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="900" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="150" y1="0" x2="150" y2="500" stroke="#fff" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="500" stroke="#fff" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="500" stroke="#fff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="500" stroke="#fff" stroke-width="0.5"/>
    <line x1="750" y1="0" x2="750" y2="500" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="900" height="4" fill="url(#accent)"/>

  <!-- Left decorative element: cgroup v1 → v2 arrow flow -->
  <g transform="translate(50, 120)">
    <!-- cgroup v1 block (red/disabled) -->
    <rect x="0" y="20" width="120" height="44" rx="8" fill="#2a1a1a" stroke="#ff5252" stroke-width="1.5" opacity="0.9"/>
    <text x="60" y="47" font-family="Consolas, monospace" font-size="13" fill="#ff5252" text-anchor="middle" font-weight="bold">cgroup v1</text>

    <!-- Strike-through line on v1 -->
    <line x1="10" y1="42" x2="110" y2="42" stroke="#ff5252" stroke-width="2" opacity="0.6"/>

    <!-- Arrow down -->
    <path d="M60 70 L60 95" stroke="#777" stroke-width="2" marker-end="url(#arrowDown)"/>
    <defs>
      <marker id="arrowDown" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
        <path d="M0,0 L8,4 L0,8 Z" fill="#777"/>
      </marker>
    </defs>

    <!-- Migration label -->
    <text x="75" y="88" font-family="sans-serif" font-size="10" fill="#aaa">MIGRATE</text>

    <!-- cgroup v2 block (green/active) -->
    <rect x="0" y="100" width="120" height="44" rx="8" fill="#1a2a1a" stroke="#69F0AE" stroke-width="1.5" opacity="0.9"/>
    <text x="60" y="127" font-family="Consolas, monospace" font-size="13" fill="#69F0AE" text-anchor="middle" font-weight="bold">cgroup v2</text>

    <!-- Checkmark on v2 -->
    <circle cx="105" cy="115" r="8" fill="#00C853" opacity="0.3"/>
    <path d="M100 115 L104 119 L112 111" stroke="#69F0AE" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Center: Terminal window showing the error -->
  <g transform="translate(200, 70)" filter="url(#shadow)">
    <!-- Terminal frame -->
    <rect x="0" y="0" width="380" height="210" rx="10" fill="#282c34" stroke="#3a3f4b" stroke-width="1"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="380" height="30" rx="10" fill="#21252b"/>
    <rect x="0" y="15" width="380" height="15" fill="#21252b"/>
    <!-- Traffic lights -->
    <circle cx="16" cy="15" r="5" fill="#ff5f57"/>
    <circle cx="32" cy="15" r="5" fill="#febc2e"/>
    <circle cx="48" cy="15" r="5" fill="#28c840"/>
    <text x="190" y="19" font-family="sans-serif" font-size="11" fill="#8a8f98" text-anchor="middle">terminal</text>

    <!-- Terminal content -->
    <text x="15" y="52" font-family="Consolas, monospace" font-size="12" fill="#abb2bf">$ sudo do-release-upgrade -d</text>
    <text x="15" y="72" font-family="Consolas, monospace" font-size="12" fill="#e06c75">ERROR: cgroup v1 detected</text>
    <text x="15" y="92" font-family="Consolas, monospace" font-size="12" fill="#e06c75">Refusing to run under cgroup v1</text>
    <text x="15" y="112" font-family="Consolas, monospace" font-size="12" fill="#e5c07b">systemd 259 requires unified</text>
    <text x="15" y="132" font-family="Consolas, monospace" font-size="12" fill="#e5c07b">cgroup hierarchy (v2)</text>
    <text x="15" y="162" font-family="Consolas, monospace" font-size="12" fill="#98c379">$ stat -fc %T /sys/fs/cgroup/</text>
    <text x="15" y="182" font-family="Consolas, monospace" font-size="12" fill="#e06c75">tmpfs  ← cgroup v1</text>
    <text x="15" y="198" font-family="Consolas, monospace" font-size="12" fill="#abb2bf">$ _</text>
  </g>

  <!-- Right: Fix checklist -->
  <g transform="translate(610, 70)">
    <text x="0" y="15" font-family="sans-serif" font-size="14" fill="#E95420" font-weight="bold">升级后必做 12 项修复</text>

    <!-- Checklist items -->
    <g transform="translate(0, 35)">
      <rect x="-4" y="-4" width="250" height="22" rx="4" fill="#1a3a1a" opacity="0.5"/>
      <path d="M6 7 L10 11 L18 3" stroke="#69F0AE" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="28" y="12" font-family="sans-serif" font-size="12" fill="#ccc">P0: 系统体检 &amp; 服务检查</text>
    </g>
    <g transform="translate(0, 62)">
      <rect x="-4" y="-4" width="250" height="22" rx="4" fill="#1a3a1a" opacity="0.5"/>
      <path d="M6 7 L10 11 L18 3" stroke="#69F0AE" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="28" y="12" font-family="sans-serif" font-size="12" fill="#ccc">P0: dpkg/磁盘/启动日志</text>
    </g>
    <g transform="translate(0, 89)">
      <rect x="-4" y="-4" width="250" height="22" rx="4" fill="#2a2a1a" opacity="0.5"/>
      <path d="M6 7 L10 11 L18 3" stroke="#FFB74D" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="28" y="12" font-family="sans-serif" font-size="12" fill="#ccc">P1: APT源收敛</text>
    </g>
    <g transform="translate(0, 116)">
      <rect x="-4" y="-4" width="250" height="22" rx="4" fill="#2a2a1a" opacity="0.5"/>
      <path d="M6 7 L10 11 L18 3" stroke="#FFB74D" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="28" y="12" font-family="sans-serif" font-size="12" fill="#ccc">P1: GPU驱动验证</text>
    </g>
    <g transform="translate(0, 143)">
      <rect x="-4" y="-4" width="250" height="22" rx="4" fill="#2a2a1a" opacity="0.5"/>
      <path d="M6 7 L10 11 L18 3" stroke="#FFB74D" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="28" y="12" font-family="sans-serif" font-size="12" fill="#ccc">P1: 中文显示修复 (日→中)</text>
    </g>
    <g transform="translate(0, 170)">
      <rect x="-4" y="-4" width="250" height="22" rx="4" fill="#1a1a2a" opacity="0.5"/>
      <path d="M6 7 L10 11 L18 3" stroke="#64B5F6" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="28" y="12" font-family="sans-serif" font-size="12" fill="#ccc">P2: 输入法 / Wayland</text>
    </g>
  </g>

  <!-- Bottom section: Main title -->
  <g transform="translate(450, 340)">
    <!-- Ubuntu logo circle -->
    <circle cx="-180" cy="25" r="25" fill="none" stroke="#E95420" stroke-width="2" opacity="0.6"/>
    <circle cx="-180" cy="15" r="4" fill="#E95420" opacity="0.8"/>
    <circle cx="-190" cy="32" r="4" fill="#E95420" opacity="0.8"/>
    <circle cx="-170" cy="32" r="4" fill="#E95420" opacity="0.8"/>

    <!-- Main title -->
    <text x="-140" y="10" font-family="sans-serif" font-size="28" fill="#ffffff" font-weight="bold">Ubuntu 26.04 升级避坑全攻略</text>
    <text x="-140" y="38" font-family="sans-serif" font-size="16" fill="#E95420">cgroup v1 迁移 · 12 项必做修复 · 五一升级必读</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="496" width="900" height="4" fill="url(#accent)"/>

  <!-- Brand tag -->
  <text x="880" y="488" font-family="sans-serif" font-size="11" fill="#555" text-anchor="end">UbuntuNews</text>
</svg>
