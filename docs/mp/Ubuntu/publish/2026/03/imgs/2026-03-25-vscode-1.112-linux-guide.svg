<svg width="900" height="500" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1419;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#007ACC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGradient)"/>
  
  <!-- 装饰性代码线条 -->
  <g opacity="0.1">
    <text x="50" y="80" font-family="Consolas, monospace" font-size="14" fill="#00D4FF">
      { "version": "1.112.0", "platform": "linux" }
    </text>
    <text x="650" y="450" font-family="Consolas, monospace" font-size="12" fill="#00D4FF">
      $ code --enable-features=Wayland
    </text>
    <rect x="50" y="100" width="300" height="2" fill="#007ACC" opacity="0.3"/>
    <rect x="550" y="420" width="200" height="2" fill="#007ACC" opacity="0.3"/>
  </g>
  
  <!-- VSCode Logo (简化版) -->
  <g transform="translate(70, 150)">
    <!-- 外框 -->
    <path d="M0 40 L30 0 L100 0 L100 120 L30 120 L0 80 Z" 
          fill="none" stroke="#007ACC" stroke-width="3" opacity="0.3"/>
    <!-- 内部图案 -->
    <path d="M20 50 L40 30 L80 30 L80 90 L40 90 L20 70 Z" 
          fill="url(#accentGradient)" opacity="0.8"/>
  </g>
  
  <!-- 主标题 -->
  <text x="200" y="180" font-family="Microsoft YaHei, sans-serif" font-size="42" font-weight="bold" fill="#FFFFFF">
    VSCode 1.112
  </text>
  <text x="200" y="230" font-family="Microsoft YaHei, sans-serif" font-size="32" fill="#00D4FF">
    Linux开发者的效率革命
  </text>
  
  <!-- 副标题 -->
  <text x="200" y="280" font-family="Microsoft YaHei, sans-serif" font-size="18" fill="#B0BEC5">
    5大核心更新 · Wayland原生支持 · 内存降低40%
  </text>
  
  <!-- 亮点标签 -->
  <g transform="translate(200, 320)">
    <rect x="0" y="0" width="120" height="35" rx="5" fill="#007ACC" opacity="0.8"/>
    <text x="60" y="23" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">Wayland原生</text>
    
    <rect x="140" y="0" width="120" height="35" rx="5" fill="#FF6B35" opacity="0.8"/>
    <text x="200" y="23" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">AI辅助编码</text>
    
    <rect x="280" y="0" width="120" height="35" rx="5" fill="#00C853" opacity="0.8"/>
    <text x="340" y="23" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">性能优化</text>
  </g>
  
  <!-- 底部信息 -->
  <rect x="0" y="460" width="900" height="40" fill="#000000" opacity="0.3"/>
  <text x="50" y="485" font-family="Microsoft YaHei, sans-serif" font-size="16" fill="#90A4AE">
    UbuntuNews · 2026年3月25日
  </text>
  <text x="750" y="485" font-family="Consolas, monospace" font-size="14" fill="#007ACC">
    v1.112.0
  </text>
  
  <!-- 性能提升图表 -->
  <g transform="translate(600, 150)">
    <text x="0" y="0" font-family="Microsoft YaHei, sans-serif" font-size="16" fill="#90A4AE">内存占用对比</text>
    
    <!-- 旧版本 -->
    <rect x="0" y="20" width="200" height="25" rx="3" fill="#546E7A"/>
    <text x="10" y="38" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#FFFFFF">旧版本: 580MB</text>
    
    <!-- 新版本 -->
    <rect x="0" y="55" width="120" height="25" rx="3" fill="#00C853"/>
    <text x="10" y="73" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#FFFFFF">新版本: 350MB ↓40%</text>
    
    <!-- 箭头 -->
    <path d="M220 45 L235 45 L230 40 M235 45 L230 50" stroke="#00C853" stroke-width="2" fill="none"/>
  </g>
  
  <!-- 图标装饰 -->
  <g transform="translate(700, 300)">
    <!-- Tux (简化版企鹅) -->
    <ellipse cx="40" cy="60" rx="35" ry="45" fill="#FFC107"/>
    <ellipse cx="40" cy="50" rx="25" ry="20" fill="#FFFFFF"/>
    <circle cx="30" cy="45" r="5" fill="#000000"/>
    <circle cx="50" cy="45" r="5" fill="#000000"/>
    <path d="M35 55 L40 60 L45 55" stroke="#FF6B35" stroke-width="2" fill="none"/>
  </g>
</svg>
