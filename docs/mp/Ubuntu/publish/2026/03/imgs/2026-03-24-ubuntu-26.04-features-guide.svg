<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="ubuntuGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E95420"/>
      <stop offset="100%" style="stop-color:#DD4814"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  
  <!-- 网格装饰 -->
  <g opacity="0.1" stroke="#00d4ff" stroke-width="0.5">
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="800" y1="0" x2="800" y2="500"/>
  </g>
  
  <!-- Ubuntu Logo 圆圈 -->
  <circle cx="150" cy="250" r="80" fill="url(#ubuntuGrad)" opacity="0.2"/>
  <circle cx="150" cy="250" r="60" fill="url(#ubuntuGrad)" opacity="0.3"/>
  <circle cx="150" cy="250" r="40" fill="url(#ubuntuGrad)" opacity="0.4"/>
  
  <!-- Ubuntu Logo 简化版 -->
  <g transform="translate(110, 210)">
    <circle cx="40" cy="40" r="35" fill="url(#ubuntuGrad)"/>
    <circle cx="40" cy="40" r="8" fill="#1a1a2e"/>
    <circle cx="20" cy="20" r="6" fill="#1a1a2e"/>
    <circle cx="60" cy="20" r="6" fill="#1a1a2e"/>
    <circle cx="40" cy="65" r="6" fill="#1a1a2e"/>
  </g>
  
  <!-- 主标题 -->
  <text x="260" y="150" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff">
    Ubuntu 26.04 LTS
  </text>
  
  <!-- 副标题 -->
  <text x="260" y="200" font-family="Arial, sans-serif" font-size="28" fill="#00d4ff">
    新特性详解
  </text>
  
  <!-- 强调线 -->
  <rect x="260" y="215" width="200" height="3" fill="url(#accentGrad)" rx="1.5"/>
  
  <!-- 核心特性标签 -->
  <g transform="translate(260, 250)">
    <!-- 特性1 -->
    <rect x="0" y="0" width="140" height="40" rx="8" fill="#E95420" opacity="0.9"/>
    <text x="70" y="26" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">Linux 6.13</text>
    
    <!-- 特性2 -->
    <rect x="160" y="0" width="140" height="40" rx="8" fill="#7c3aed" opacity="0.9"/>
    <text x="230" y="26" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">GNOME 50</text>
    
    <!-- 特性3 -->
    <rect x="320" y="0" width="160" height="40" rx="8" fill="#00d4ff" opacity="0.9"/>
    <text x="400" y="26" font-family="Arial, sans-serif" font-size="16" fill="#1a1a2e" text-anchor="middle">全新安装器</text>
  </g>
  
  <!-- 右侧装饰 - 终端图标 -->
  <g transform="translate(720, 80)">
    <rect x="0" y="0" width="140" height="100" rx="10" fill="#2d2d2d" stroke="#00d4ff" stroke-width="2"/>
    <text x="15" y="30" font-family="Courier New, monospace" font-size="12" fill="#00d4ff">$ uname -r</text>
    <text x="15" y="50" font-family="Courier New, monospace" font-size="12" fill="#00ff00">6.13.0-generic</text>
    <text x="15" y="70" font-family="Courier New, monospace" font-size="12" fill="#00d4ff">$ lsb_release -a</text>
    <text x="15" y="90" font-family="Courier New, monospace" font-size="12" fill="#00ff00">Ubuntu 26.04</text>
  </g>
  
  <!-- 底部信息栏 -->
  <rect x="0" y="420" width="900" height="80" fill="#0f0f1e" opacity="0.5"/>
  
  <!-- 适合人群标签 -->
  <g transform="translate(50, 445)">
    <rect x="0" y="0" width="100" height="30" rx="15" fill="#E95420" opacity="0.3" stroke="#E95420" stroke-width="1"/>
    <text x="50" y="20" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">新手友好</text>
  </g>
  
  <g transform="translate(170, 445)">
    <rect x="0" y="0" width="100" height="30" rx="15" fill="#7c3aed" opacity="0.3" stroke="#7c3aed" stroke-width="1"/>
    <text x="50" y="20" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">开发者</text>
  </g>
  
  <g transform="translate(290, 445)">
    <rect x="0" y="0" width="100" height="30" rx="15" fill="#00d4ff" opacity="0.3" stroke="#00d4ff" stroke-width="1"/>
    <text x="50" y="20" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">技术爱好者</text>
  </g>
  
  <!-- 阅读时长 -->
  <text x="780" y="465" font-family="Arial, sans-serif" font-size="16" fill="#888888" text-anchor="end">
    阅读时长：8分钟
  </text>
  
  <!-- 装饰性圆点 -->
  <circle cx="850" cy="450" r="3" fill="#E95420"/>
  <circle cx="860" cy="450" r="3" fill="#7c3aed"/>
  <circle cx="870" cy="450" r="3" fill="#00d4ff"/>
  
  <!-- 版本号强调 -->
  <text x="750" y="380" font-family="Arial Black, sans-serif" font-size="72" fill="url(#accentGrad)" opacity="0.15">
    26.04
  </text>
</svg>