<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="aptGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E95420"/>
      <stop offset="100%" style="stop-color:#FF6B35"/>
    </linearGradient>
    <linearGradient id="snapGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00B894"/>
      <stop offset="100%" style="stop-color:#00CEC9"/>
    </linearGradient>
    <linearGradient id="flatpakGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4A90E2"/>
      <stop offset="100%" style="stop-color:#5DADE2"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  
  <!-- 装饰网格 -->
  <g opacity="0.1">
    <line x1="0" y1="100" x2="900" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="900" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="900" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="900" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="150" y1="0" x2="150" y2="500" stroke="#fff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="500" stroke="#fff" stroke-width="1"/>
    <line x1="450" y1="0" x2="450" y2="500" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="500" stroke="#fff" stroke-width="1"/>
    <line x1="750" y1="0" x2="750" y2="500" stroke="#fff" stroke-width="1"/>
  </g>
  
  <!-- 标题区域 -->
  <text x="450" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#fff">Linux软件安装全攻略</text>
  <text x="450" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#E95420">apt vs snap vs flatpak</text>
  
  <!-- 三大工具卡片 -->
  <!-- apt卡片 -->
  <g transform="translate(80, 150)">
    <rect x="0" y="0" width="220" height="220" rx="15" fill="url(#aptGrad)" opacity="0.9"/>
    <text x="110" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#fff">apt</text>
    <text x="110" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#fff" opacity="0.9">传统霸主</text>
    
    <!-- 图标：盒子 -->
    <rect x="70" y="110" width="80" height="60" rx="5" fill="#fff" opacity="0.3"/>
    <line x1="70" y1="125" x2="150" y2="125" stroke="#fff" stroke-width="2" opacity="0.5"/>
    <circle cx="90" cy="145" r="8" fill="#fff" opacity="0.5"/>
    <circle cx="130" cy="145" r="8" fill="#fff" opacity="0.5"/>
    
    <text x="110" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff" opacity="0.8">系统集成 · 性能最优</text>
  </g>
  
  <!-- snap卡片 -->
  <g transform="translate(340, 150)">
    <rect x="0" y="0" width="220" height="220" rx="15" fill="url(#snapGrad)" opacity="0.9"/>
    <text x="110" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#fff">snap</text>
    <text x="110" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#fff" opacity="0.9">Ubuntu力推</text>
    
    <!-- 图标：快照 -->
    <circle cx="110" cy="140" r="40" fill="none" stroke="#fff" stroke-width="4" opacity="0.5"/>
    <path d="M90 130 L100 150 L130 120" stroke="#fff" stroke-width="4" fill="none" opacity="0.8"/>
    
    <text x="110" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff" opacity="0.8">自动更新 · 跨发行版</text>
  </g>
  
  <!-- flatpak卡片 -->
  <g transform="translate(600, 150)">
    <rect x="0" y="0" width="220" height="220" rx="15" fill="url(#flatpakGrad)" opacity="0.9"/>
    <text x="110" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#fff">flatpak</text>
    <text x="110" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#fff" opacity="0.9">沙箱隔离</text>
    
    <!-- 图标：沙箱 -->
    <rect x="65" y="110" width="90" height="60" rx="8" fill="none" stroke="#fff" stroke-width="3" opacity="0.5"/>
    <rect x="80" y="125" width="60" height="30" rx="5" fill="#fff" opacity="0.3"/>
    
    <text x="110" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff" opacity="0.8">权限控制 · 去中心化</text>
  </g>
  
  <!-- 底部装饰 -->
  <text x="450" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#fff" opacity="0.9">决策树 · 性能对比 · 场景指南</text>
  <text x="450" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#fff" opacity="0.6">2026年最新实测 · 新手友好</text>
  
  <!-- Ubuntu Logo -->
  <circle cx="850" cy="50" r="25" fill="none" stroke="#E95420" stroke-width="3"/>
  <circle cx="850" cy="42" r="5" fill="#E95420"/>
  <circle cx="843" cy="55" r="5" fill="#E95420"/>
  <circle cx="857" cy="55" r="5" fill="#E95420"/>
  
  <!-- 标签 -->
  <rect x="20" y="20" width="100" height="30" rx="5" fill="#E95420"/>
  <text x="70" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">入门教程</text>
  
  <rect x="130" y="20" width="100" height="30" rx="5" fill="#00B894"/>
  <text x="180" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">实用工具</text>
</svg>