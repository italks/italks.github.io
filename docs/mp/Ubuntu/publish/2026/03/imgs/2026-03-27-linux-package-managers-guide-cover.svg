<svg width="900" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    
    <!-- 卡片阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    
    <!-- apt渐变（橙色） -->
    <linearGradient id="aptGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E95420"/>
      <stop offset="100%" style="stop-color:#FF7043"/>
    </linearGradient>
    
    <!-- snap渐变（绿色） -->
    <linearGradient id="snapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D8D8D"/>
      <stop offset="100%" style="stop-color:#26A69A"/>
    </linearGradient>
    
    <!-- flatpak渐变（蓝色） -->
    <linearGradient id="flatpakGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2"/>
      <stop offset="100%" style="stop-color:#64B5F6"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  
  <!-- 网格背景 -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
  </pattern>
  <rect width="900" height="500" fill="url(#grid)"/>
  
  <!-- 标题区域 -->
  <text x="450" y="45" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="bold" font-family="Arial, sans-serif">
    Linux软件安装全攻略
  </text>
  <text x="450" y="75" text-anchor="middle" fill="#B0BEC5" font-size="16" font-family="Arial, sans-serif">
    apt vs snap vs flatpak · 深度对比
  </text>
  
  <!-- 三大平台卡片 -->
  
  <!-- apt卡片 -->
  <g transform="translate(60, 110)" filter="url(#shadow)">
    <rect width="240" height="300" rx="12" fill="#ffffff" opacity="0.95"/>
    <rect width="240" height="8" rx="4" fill="url(#aptGrad)"/>
    
    <!-- apt Logo -->
    <circle cx="120" cy="70" r="40" fill="url(#aptGrad)"/>
    <text x="120" y="80" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="bold" font-family="monospace">apt</text>
    
    <!-- 标题 -->
    <text x="120" y="140" text-anchor="middle" fill="#1a1a2e" font-size="20" font-weight="bold" font-family="Arial, sans-serif">APT</text>
    <text x="120" y="165" text-anchor="middle" fill="#757575" font-size="13" font-family="Arial, sans-serif">Advanced Packaging Tool</text>
    
    <!-- 特性列表 -->
    <text x="30" y="200" fill="#E95420" font-size="14" font-family="Arial, sans-serif">✓ 系统集成度高</text>
    <text x="30" y="225" fill="#E95420" font-size="14" font-family="Arial, sans-serif">✓ 启动速度最快</text>
    <text x="30" y="250" fill="#E95420" font-size="14" font-family="Arial, sans-serif">✓ 磁盘占用最小</text>
    <text x="30" y="275" fill="#E95420" font-size="14" font-family="Arial, sans-serif">✓ 稳定性最佳</text>
    
  </g>
  
  <!-- snap卡片 -->
  <g transform="translate(330, 110)" filter="url(#shadow)">
    <rect width="240" height="300" rx="12" fill="#ffffff" opacity="0.95"/>
    <rect width="240" height="8" rx="4" fill="url(#snapGrad)"/>
    
    <!-- snap Logo -->
    <circle cx="120" cy="70" r="40" fill="url(#snapGrad)"/>
    <text x="120" y="80" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="bold" font-family="monospace">snap</text>
    
    <!-- 标题 -->
    <text x="120" y="140" text-anchor="middle" fill="#1a1a2e" font-size="20" font-weight="bold" font-family="Arial, sans-serif">SNAP</text>
    <text x="120" y="165" text-anchor="middle" fill="#757575" font-size="13" font-family="Arial, sans-serif">Canonical官方容器化方案</text>
    
    <!-- 特性列表 -->
    <text x="30" y="200" fill="#0D8D8D" font-size="14" font-family="Arial, sans-serif">✓ 自动静默更新</text>
    <text x="30" y="225" fill="#0D8D8D" font-size="14" font-family="Arial, sans-serif">✓ 版本最新同步</text>
    <text x="30" y="250" fill="#0D8D8D" font-size="14" font-family="Arial, sans-serif">✓ 跨发行版通用</text>
    <text x="30" y="275" fill="#0D8D8D" font-size="14" font-family="Arial, sans-serif">✓ 一键回滚版本</text>
    
   </g>
  
  <!-- flatpak卡片 -->
  <g transform="translate(600, 110)" filter="url(#shadow)">
    <rect width="240" height="300" rx="12" fill="#ffffff" opacity="0.95"/>
    <rect width="240" height="8" rx="4" fill="url(#flatpakGrad)"/>
    
    <!-- flatpak Logo -->
    <circle cx="120" cy="70" r="40" fill="url(#flatpakGrad)"/>
    <text x="120" y="80" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="bold" font-family="monospace">flatpak</text>
    
    <!-- 标题 -->
    <text x="120" y="140" text-anchor="middle" fill="#1a1a2e" font-size="20" font-weight="bold" font-family="Arial, sans-serif">FLATPAK</text>
    <text x="120" y="165" text-anchor="middle" fill="#757575" font-size="13" font-family="Arial, sans-serif">沙箱化应用分发框架</text>
    
    <!-- 特性列表 -->
    <text x="30" y="200" fill="#4A90E2" font-size="14" font-family="Arial, sans-serif">✓ 沙箱安全隔离</text>
    <text x="30" y="225" fill="#4A90E2" font-size="14" font-family="Arial, sans-serif">✓ 权限精细控制</text>
    <text x="30" y="250" fill="#4A90E2" font-size="14" font-family="Arial, sans-serif">✓ 去中心化仓库</text>
    <text x="30" y="275" fill="#4A90E2" font-size="14" font-family="Arial, sans-serif">✓ GNOME原生支持</text>
  </g>
</svg>