<svg width="900" height="500" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E95420;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bgGradient)"/>
  
  <!-- 装饰性几何图形 -->
  <circle cx="100" cy="100" r="150" fill="#E95420" opacity="0.1"/>
  <circle cx="800" cy="400" r="200" fill="#E95420" opacity="0.08"/>
  <polygon points="750,80 850,150 750,220" fill="#E95420" opacity="0.15"/>
  <rect x="50" y="380" width="100" height="100" rx="10" fill="#E95420" opacity="0.1" transform="rotate(15, 100, 430)"/>
  
  <!-- Ubuntu Logo 风格圆圈 -->
  <circle cx="180" cy="250" r="80" fill="none" stroke="#E95420" stroke-width="3" opacity="0.6"/>
  <circle cx="180" cy="250" r="70" fill="none" stroke="#FF6B35" stroke-width="2" opacity="0.4"/>
  
  <!-- Beta 标签 -->
  <rect x="30" y="30" width="100" height="40" rx="5" fill="#E95420" filter="url(#shadow)"/>
  <text x="80" y="58" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">BETA</text>
  
  <!-- 主标题 -->
  <text x="450" y="180" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle" filter="url(#shadow)">Ubuntu 26.04</text>
  
  <!-- 副标题 -->
  <text x="450" y="230" font-family="Arial, sans-serif" font-size="32" fill="url(#orangeGradient)" text-anchor="middle">LTS Beta 体验</text>
  

  
  <!-- 核心特性标签 -->
  <g transform="translate(150, 360)">
    <rect x="0" y="0" width="140" height="50" rx="8" fill="#2C2C2C" stroke="#E95420" stroke-width="2"/>
    <text x="70" y="25" font-family="Arial, sans-serif" font-size="14" fill="#E95420" text-anchor="middle">🐧 Linux 7.0</text>
    <text x="70" y="42" font-family="Arial, sans-serif" font-size="11" fill="#999" text-anchor="middle">性能提升</text>
  </g>
  
  <g transform="translate(310, 360)">
    <rect x="0" y="0" width="140" height="50" rx="8" fill="#2C2C2C" stroke="#E95420" stroke-width="2"/>
    <text x="70" y="25" font-family="Arial, sans-serif" font-size="14" fill="#E95420" text-anchor="middle">🎨 GNOME 50</text>
    <text x="70" y="42" font-family="Arial, sans-serif" font-size="11" fill="#999" text-anchor="middle">全面Wayland</text>
  </g>
  
  <g transform="translate(470, 360)">
    <rect x="0" y="0" width="140" height="50" rx="8" fill="#2C2C2C" stroke="#E95420" stroke-width="2"/>
    <text x="70" y="25" font-family="Arial, sans-serif" font-size="14" fill="#E95420" text-anchor="middle">⚡ 5大特性</text>
    <text x="70" y="42" font-family="Arial, sans-serif" font-size="11" fill="#999" text-anchor="middle">值得期待</text>
  </g>
  
  <g transform="translate(630, 360)">
    <rect x="0" y="0" width="140" height="50" rx="8" fill="#2C2C2C" stroke="#E95420" stroke-width="2"/>
    <text x="70" y="25" font-family="Arial, sans-serif" font-size="14" fill="#E95420" text-anchor="middle">🇨🇳 中文优化</text>
    <text x="70" y="42" font-family="Arial, sans-serif" font-size="11" fill="#999" text-anchor="middle">本土化增强</text>
  </g>
  
  <!-- 底部信息栏 -->
  <rect x="0" y="440" width="900" height="60" fill="#1a1a2e" opacity="0.8"/>
  <text x="50" y="475" font-family="Arial, sans-serif" font-size="16" fill="#E95420">📅 3月26日 Beta发布</text>
  <text x="280" y="475" font-family="Arial, sans-serif" font-size="16" fill="#FF6B35">🎯 4月23日 正式发布</text>
  <text x="520" y="475" font-family="Arial, sans-serif" font-size="16" fill="#FF6B35">⏰ 距离正式版 23天</text>
  
  <!-- UbuntuNews 品牌标识 -->
  <text x="850" y="475" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E95420" text-anchor="end">UbuntuNews</text>
</svg>