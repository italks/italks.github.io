<svg width="900" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f7df1e"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bg)"/>
  
  <!-- 终端窗口模拟 -->
  <rect x="50" y="100" width="500" height="300" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="2"/>
  
  <!-- 终端标题栏 -->
  <rect x="50" y="100" width="500" height="35" rx="10" fill="#161b22"/>
  <circle cx="80" cy="117" r="8" fill="#ff5f56"/>
  <circle cx="105" cy="117" r="8" fill="#ffbd2e"/>
  <circle cx="130" cy="117" r="8" fill="#27ca40"/>
  <text x="300" y="123" font-family="monospace" font-size="14" fill="#8b949e" text-anchor="middle">zsh — terminal</text>
  
  <!-- 终端内容 -->
  <text x="70" y="165" font-family="monospace" font-size="16" fill="#4ade80">$ z ubu</text>
  <text x="70" y="195" font-family="monospace" font-size="14" fill="#8b949e">→ Jumping to ~/projects/ubuntu...</text>
  <text x="70" y="225" font-family="monospace" font-size="16" fill="#4ade80">~/projects/ubuntu $ </text>
  <text x="250" y="225" font-family="monospace" font-size="16" fill="#6b7280">update</text>
  <rect x="246" y="210" width="60" height="20" fill="none" stroke="#4ade80" stroke-width="1" rx="3" opacity="0.5"/>
  
  <!-- 侧边内容 -->
  <text x="600" y="140" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white">zsh</text>
  <text x="600" y="185" font-family="Arial, sans-serif" font-size="28" fill="url(#accent)">提速神器</text>
  
  <!-- 数字标签 -->
  <rect x="600" y="220" width="250" height="50" rx="8" fill="#1f2937"/>
  <text x="625" y="252" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#4ade80">10</text>
  <text x="660" y="252" font-family="Arial, sans-serif" font-size="20" fill="#d1d5db">个配置技巧</text>
  
  <!-- 特性标签 -->
  <g transform="translate(600, 300)">
    <rect x="0" y="0" width="100" height="30" rx="15" fill="#1f2937" stroke="#f7df1e" stroke-width="1"/>
    <text x="50" y="20" font-family="Arial, sans-serif" font-size="12" fill="#f7df1e" text-anchor="middle">智能补全</text>
  </g>
  <g transform="translate(110, 300)">
    <rect x="0" y="0" width="100" height="30" rx="15" fill="#1f2937" stroke="#4ade80" stroke-width="1"/>
    <text x="50" y="20" font-family="Arial, sans-serif" font-size="12" fill="#4ade80" text-anchor="middle">自动建议</text>
  </g>
  <g transform="translate(220, 300)">
    <rect x="0" y="0" width="100" height="30" rx="15" fill="#1f2937" stroke="#60a5fa" stroke-width="1"/>
    <text x="50" y="20" font-family="Arial, sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">快速跳转</text>
  </g>
  
  <!-- 效率提升 -->
  <text x="600" y="380" font-family="Arial, sans-serif" font-size="16" fill="#9ca3af">效率提升</text>
  <text x="600" y="420" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#4ade80" filter="url(#glow)">50%+</text>
  
  <!-- 底部Logo -->
  <g transform="translate(70, 450)">
    <rect width="120" height="30" rx="5" fill="#e95420"/>
    <text x="60" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Ubuntu 公众号</text>
  </g>
</svg>