<svg width="900" height="500" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    
    <!-- Rust橙色调 -->
    <linearGradient id="rustGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E95420;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:1" />
    </linearGradient>
    
    <!-- 发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bgGradient)"/>
  
  <!-- 网格背景 -->
  <g opacity="0.1">
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#E95420" stroke-width="0.5"/>
    </pattern>
    <rect width="900" height="500" fill="url(#grid)"/>
  </g>
  
  <!-- 左侧：经典sudo（C语言风格） -->
  <g transform="translate(100, 180)">
    <!-- 终端窗口 -->
    <rect x="0" y="0" width="280" height="180" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="2"/>
    
    <!-- 窗口按钮 -->
    <circle cx="20" cy="20" r="6" fill="#ff5f56"/>
    <circle cx="40" cy="20" r="6" fill="#ffbd2e"/>
    <circle cx="60" cy="20" r="6" fill="#27c93f"/>
    
    <!-- 终端标题 -->
    <text x="140" y="24" text-anchor="middle" fill="#8b949e" font-family="Consolas, monospace" font-size="12">Terminal - sudo</text>
    
    <!-- 命令行内容 -->
    <text x="20" y="60" fill="#7ee787" font-family="Consolas, monospace" font-size="14">$ sudo apt update</text>
    <text x="20" y="85" fill="#8b949e" font-family="Consolas, monospace" font-size="14">[sudo] password: </text>
    <text x="20" y="110" fill="#ff7b72" font-family="Consolas, monospace" font-size="14">*** buffer overflow ***</text>
    <text x="20" y="135" fill="#8b949e" font-family="Consolas, monospace" font-size="14">CVE-2021-3156</text>
    
    <!-- C语言标签 -->
    <rect x="200" y="140" width="60" height="25" rx="4" fill="#A8B9CC" opacity="0.9"/>
    <text x="230" y="157" text-anchor="middle" fill="#1a1a2e" font-family="Arial, sans-serif" font-weight="bold" font-size="14">C</text>
  </g>
  
  <!-- 中间：转换箭头 -->
  <g transform="translate(420, 250)">
    <!-- 箭头主体 -->
    <path d="M 0 0 L 60 0 L 60 -15 L 90 10 L 60 35 L 60 20 L 0 20 Z" 
          fill="url(#rustGradient)" filter="url(#glow)"/>
    
    <!-- Rust齿轮标志 -->
    <g transform="translate(35, 10)">
      <circle cx="0" cy="0" r="8" fill="none" stroke="#fff" stroke-width="2"/>
      <circle cx="0" cy="0" r="3" fill="#fff"/>
    </g>
  </g>
  
  <!-- 右侧：sudo-rs（Rust风格） -->
  <g transform="translate(520, 180)">
    <!-- 终端窗口 -->
    <rect x="0" y="0" width="280" height="180" rx="8" fill="#0d1117" stroke="#E95420" stroke-width="2" filter="url(#glow)"/>
    
    <!-- 窗口按钮 -->
    <circle cx="20" cy="20" r="6" fill="#ff5f56"/>
    <circle cx="40" cy="20" r="6" fill="#ffbd2e"/>
    <circle cx="60" cy="20" r="6" fill="#27c93f"/>
    
    <!-- 终端标题 -->
    <text x="140" y="24" text-anchor="middle" fill="#E95420" font-family="Consolas, monospace" font-size="12" font-weight="bold">Terminal - sudo-rs</text>
    
    <!-- 命令行内容 -->
    <text x="20" y="60" fill="#7ee787" font-family="Consolas, monospace" font-size="14">$ sudo apt update</text>
    <text x="20" y="85" fill="#8b949e" font-family="Consolas, monospace" font-size="14">[sudo] password: ****</text>
    <text x="20" y="110" fill="#7ee787" font-family="Consolas, monospace" font-size="14">✓ Memory Safe</text>
    <text x="20" y="135" fill="#7ee787" font-family="Consolas, monospace" font-size="14">0 CVEs (Audited)</text>
    
    <!-- Rust标签 -->
    <rect x="200" y="140" width="60" height="25" rx="4" fill="#E95420" opacity="0.9"/>
    <text x="230" y="157" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-weight="bold" font-size="12">Rust</text>
  </g>
  
  <!-- 标题区域 -->
  <g transform="translate(450, 50)">
    <!-- 主标题背景 -->
    <rect x="-350" y="0" width="700" height="80" rx="10" fill="#E95420" opacity="0.95" filter="url(#glow)"/>
    
    <!-- 主标题 -->
    <text x="0" y="45" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-weight="bold" font-size="36">
      Ubuntu26.04启用sudo-rs
    </text>
    <text x="0" y="70" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="18" opacity="0.9">
      用Rust重写sudo，46年老工具迎来新生
    </text>
  </g>
  

</svg>
