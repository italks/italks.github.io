<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    
    <!-- 强调色渐变 -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    
    <!-- 光晕效果 -->
    <radialGradient id="glowEffect" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0"/>
    </radialGradient>
    
    <!-- 电路板图案 -->
    <pattern id="circuitPattern" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <rect width="60" height="60" fill="none"/>
      <path d="M 10 0 L 10 20 M 0 10 L 20 10" stroke="#2d3a4f" stroke-width="1" opacity="0.5"/>
      <path d="M 30 30 L 30 50 M 20 40 L 40 40" stroke="#2d3a4f" stroke-width="1" opacity="0.5"/>
      <path d="M 50 10 L 60 10 M 50 0 L 50 10" stroke="#2d3a4f" stroke-width="1" opacity="0.5"/>
      <circle cx="10" cy="10" r="2" fill="#2d3a4f" opacity="0.3"/>
      <circle cx="30" cy="40" r="2" fill="#2d3a4f" opacity="0.3"/>
      <circle cx="50" cy="10" r="2" fill="#2d3a4f" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bgGradient)"/>
  
  <!-- 电路板背景图案 -->
  <rect width="900" height="500" fill="url(#circuitPattern)"/>
  
  <!-- 光晕装饰 -->
  <ellipse cx="700" cy="100" rx="250" ry="150" fill="url(#glowEffect)"/>
  <ellipse cx="200" cy="400" rx="200" ry="120" fill="url(#glowEffect)"/>
  
  <!-- 大版本号 "7.0" -->
  <text x="450" y="280" font-family="Arial Black, sans-serif" font-size="180" 
        font-weight="bold" fill="none" stroke="url(#accentGradient)" stroke-width="3"
        text-anchor="middle" dominant-baseline="middle" opacity="0.15">
    7.0
  </text>
  
  <!-- 主标题 -->
  <text x="450" y="160" font-family="Microsoft YaHei, sans-serif" font-size="56" 
        font-weight="bold" fill="url(#accentGradient)" text-anchor="middle">
    Linux 7.0
  </text>
  
  <!-- 副标题 -->
  <text x="450" y="220" font-family="Microsoft YaHei, sans-serif" font-size="28" 
        fill="#ffffff" text-anchor="middle" opacity="0.95">
    内核新时代，性能与安全双重升级
  </text>
  
  <!-- 分隔线 -->
  <line x1="200" y1="260" x2="700" y2="260" stroke="url(#accentGradient)" stroke-width="2" opacity="0.6"/>
  
  <!-- 特性标签 -->
  <g font-family="Microsoft YaHei, sans-serif" font-size="16" fill="#ffffff">
    <!-- 左侧标签 -->
    <g transform="translate(120, 310)">
      <rect x="0" y="0" width="180" height="40" rx="20" fill="#e94560" opacity="0.8"/>
      <text x="90" y="26" text-anchor="middle" fill="#ffffff">🎯 AMD Zen 6 支持</text>
    </g>
    
    <g transform="translate(120, 365)">
      <rect x="0" y="0" width="180" height="40" rx="20" fill="#ff6b6b" opacity="0.8"/>
      <text x="90" y="26" text-anchor="middle" fill="#ffffff">⚡ 性能优化提升</text>
    </g>
    
    <!-- 中间标签 -->
    <g transform="translate(360, 310)">
      <rect x="0" y="0" width="180" height="40" rx="20" fill="#e94560" opacity="0.8"/>
      <text x="90" y="26" text-anchor="middle" fill="#ffffff">🔒 Rust 正式入驻</text>
    </g>
    
    <g transform="translate(360, 365)">
      <rect x="0" y="0" width="180" height="40" rx="20" fill="#ff6b6b" opacity="0.8"/>
      <text x="90" y="26" text-anchor="middle" fill="#ffffff">🎮 图形驱动增强</text>
    </g>
    
    <!-- 右侧标签 -->
    <g transform="translate(600, 310)">
      <rect x="0" y="0" width="180" height="40" rx="20" fill="#e94560" opacity="0.8"/>
      <text x="90" y="26" text-anchor="middle" fill="#ffffff">☁️ 云原生优化</text>
    </g>
    
    <g transform="translate(600, 365)">
      <rect x="0" y="0" width="180" height="40" rx="20" fill="#ff6b6b" opacity="0.8"/>
      <text x="90" y="26" text-anchor="middle" fill="#ffffff">🚀 4月中旬发布</text>
    </g>
  </g>
  
  <!-- 底部信息栏 -->
  <g transform="translate(0, 450)">
    <rect x="0" y="0" width="900" height="50" fill="#0a0a1a" opacity="0.7"/>
    <text x="450" y="30" font-family="Microsoft YaHei, sans-serif" font-size="18" 
          fill="#ffffff" text-anchor="middle" opacity="0.8">
      UbuntuNews · 2026年3月 · Linux 内核专题
    </text>
  </g>
  
  <!-- 装饰元素 - 版本号小标签 -->
  <g transform="translate(50, 40)">
    <rect x="0" y="0" width="140" height="35" rx="17.5" fill="#e94560" opacity="0.9"/>
    <text x="70" y="24" font-family="Arial, sans-serif" font-size="16" 
          fill="#ffffff" text-anchor="middle" font-weight="bold">
      KERNEL 7.0
    </text>
  </g>
  
  <!-- Intel 标志 -->
  <g transform="translate(800, 40)">
    <rect x="0" y="0" width="70" height="35" rx="5" fill="#0071c5" opacity="0.8"/>
    <text x="35" y="24" font-family="Arial, sans-serif" font-size="14" 
          fill="#ffffff" text-anchor="middle" font-weight="bold">
      Intel
    </text>
  </g>
  
  <!-- AMD 标志 -->
  <g transform="translate(720, 40)">
    <rect x="0" y="0" width="70" height="35" rx="5" fill="#ed1c24" opacity="0.8"/>
    <text x="35" y="24" font-family="Arial, sans-serif" font-size="14" 
          fill="#ffffff" text-anchor="middle" font-weight="bold">
      AMD
    </text>
  </g>
  
  <!-- Rust 标志 -->
  <g transform="translate(640, 40)">
    <rect x="0" y="0" width="70" height="35" rx="5" fill="#ff6b6b" opacity="0.8"/>
    <text x="35" y="24" font-family="Arial, sans-serif" font-size="14" 
          fill="#ffffff" text-anchor="middle" font-weight="bold">
      Rust
    </text>
  </g>
</svg>
