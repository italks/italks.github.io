<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <!-- Background -->
  <rect width="900" height="500" fill="#1a1a2e"/>
  
  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.1">
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="150" y1="0" x2="150" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="450" y1="0" x2="450" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="750" y1="0" x2="750" y2="500"/>
  </g>
  
  <!-- Terminal window -->
  <rect x="550" y="80" width="320" height="220" rx="8" fill="#0d1117"/>
  <rect x="550" y="80" width="320" height="30" rx="8" fill="#161b22"/>
  <circle cx="570" cy="95" r="6" fill="#ff5f56"/>
  <circle cx="590" cy="95" r="6" fill="#ffbd2e"/>
  <circle cx="610" cy="95" r="6" fill="#27c93f"/>
  
  <!-- Terminal text -->
  <text x="565" y="135" fill="#8b949e" font-family="monospace" font-size="13">~ $ ls -l script.sh</text>
  <text x="565" y="160" fill="#58a6ff" font-family="monospace" font-size="13">-rwxr-xr-x 1 user user</text>
  <text x="565" y="185" fill="#c9d1d9" font-family="monospace" font-size="13">~ $ chmod +x app.sh</text>
  <text x="565" y="210" fill="#7ee787" font-family="monospace" font-size="13">Permission granted</text>
  <text x="565" y="240" fill="#c9d1d9" font-family="monospace" font-size="13">~ $ ./app.sh</text>
  <text x="565" y="265" fill="#ffa657" font-family="monospace" font-size="13">Running successfully...</text>
  
  <!-- Permission blocks -->
  <rect x="80" y="140" width="80" height="80" rx="10" fill="#e94560"/>
  <text x="120" y="175" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="28" font-weight="bold">rwx</text>
  <text x="120" y="200" text-anchor="middle" fill="#ffffff" font-size="12">读/写/执行</text>
  
  <rect x="180" y="140" width="80" height="80" rx="10" fill="#4a90d9"/>
  <text x="220" y="175" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="28" font-weight="bold">r-x</text>
  <text x="220" y="200" text-anchor="middle" fill="#ffffff" font-size="12">读/执行</text>
  
  <rect x="280" y="140" width="80" height="80" rx="10" fill="#6b7280"/>
  <text x="320" y="175" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="28" font-weight="bold">---</text>
  <text x="320" y="200" text-anchor="middle" fill="#ffffff" font-size="12">无权限</text>
  
  <rect x="380" y="140" width="80" height="80" rx="10" fill="#10b981"/>
  <text x="420" y="185" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="36" font-weight="bold">755</text>
  
  <!-- Main title -->
  <text x="60" y="380" fill="#ffffff" font-family="Arial" font-size="42" font-weight="bold">Linux文件权限</text>
  
  <!-- Accent line -->
  <rect x="60" y="400" width="200" height="4" rx="2" fill="#e94560"/>
  
  <!-- Subtitle -->
  <text x="60" y="440" fill="#a0aec0" font-family="Arial" font-size="22">从 Permission denied 到游刃有余</text>
  
  <!-- Tags -->
  <rect x="60" y="460" width="70" height="24" rx="12" fill="#2d3748"/>
  <text x="95" y="476" text-anchor="middle" fill="#e2e8f0" font-size="12">chmod</text>
  
  <rect x="140" y="460" width="70" height="24" rx="12" fill="#2d3748"/>
  <text x="175" y="476" text-anchor="middle" fill="#e2e8f0" font-size="12">chown</text>
  
  <rect x="220" y="460" width="60" height="24" rx="12" fill="#2d3748"/>
  <text x="250" y="476" text-anchor="middle" fill="#e2e8f0" font-size="12">rwx</text>
  
  <rect x="290" y="460" width="80" height="24" rx="12" fill="#2d3748"/>
  <text x="330" y="476" text-anchor="middle" fill="#e2e8f0" font-size="12">新手必读</text>
  
  <!-- Lock icon -->
  <circle cx="820" cy="380" r="40" fill="none" stroke="#e94560" stroke-width="3"/>
  <path d="M805 385 L805 375 A15 15 0 0 1 835 375 L835 385" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <rect x="800" y="385" width="40" height="30" rx="5" fill="#e94560"/>
  <circle cx="820" cy="398" r="4" fill="#ffffff"/>
  <rect x="818" y="398" width="4" height="10" fill="#ffffff"/>
  
  <!-- Error badge -->
  <rect x="720" y="50" width="150" height="40" rx="20" fill="#ef4444"/>
  <text x="795" y="76" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="14" font-weight="bold">Permission denied</text>
</svg>