<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <!-- 渐变背景 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2B579A"/>
      <stop offset="100%" style="stop-color:#E95420"/>
    </linearGradient>
    
    <!-- Ubuntu橙色渐变 -->
    <linearGradient id="ubuntuOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E95420"/>
      <stop offset="100%" style="stop-color:#DD4814"/>
    </linearGradient>
    
    <!-- 阴影效果 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.25"/>
    </filter>
    
    <!-- 发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bgGradient)"/>
  
  <!-- 装饰性网格 -->
  <g opacity="0.1">
    <line x1="0" y1="100" x2="900" y2="100" stroke="white" stroke-width="1"/>
    <line x1="0" y1="200" x2="900" y2="200" stroke="white" stroke-width="1"/>
    <line x1="0" y1="300" x2="900" y2="300" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="900" y2="400" stroke="white" stroke-width="1"/>
    <line x1="150" y1="0" x2="150" y2="500" stroke="white" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="500" stroke="white" stroke-width="1"/>
    <line x1="450" y1="0" x2="450" y2="500" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="500" stroke="white" stroke-width="1"/>
    <line x1="750" y1="0" x2="750" y2="500" stroke="white" stroke-width="1"/>
  </g>
  
  <!-- 左侧Ubuntu Logo -->
  <g transform="translate(80, 120)" filter="url(#shadow)">
    <!-- Ubuntu圆环 -->
    <circle cx="100" cy="100" r="90" fill="none" stroke="white" stroke-width="8" opacity="0.3"/>
    
    <!-- Ubuntu Logo 三个点 -->
    <circle cx="100" cy="10" r="20" fill="#E95420"/>
    <circle cx="30" cy="145" r="20" fill="#E95420"/>
    <circle cx="170" cy="145" r="20" fill="#E95420"/>
    
    <!-- 中心圆 -->
    <circle cx="100" cy="100" r="55" fill="url(#ubuntuOrange)"/>
    
    <!-- 内部白色装饰 -->
    <circle cx="100" cy="100" r="45" fill="none" stroke="white" stroke-width="3" opacity="0.3"/>
    
    <!-- 版本号 -->
    <text x="100" y="90" text-anchor="middle" fill="white" font-size="24" font-weight="bold" font-family="Arial, sans-serif">26.04</text>
    <text x="100" y="115" text-anchor="middle" fill="white" font-size="16" font-family="Arial, sans-serif">LTS</text>
  </g>
  
  <!-- 右侧准备步骤图标 -->
  <g transform="translate(480, 50)">
    <!-- 标题 -->
    <text x="0" y="0" fill="white" font-size="20" font-weight="bold" font-family="Arial, sans-serif">准备步骤</text>
    
    <!-- 步骤1: 硬件检查 -->
    <g transform="translate(0, 30)" filter="url(#shadow)">
      <rect x="0" y="0" width="380" height="55" rx="8" fill="white" opacity="0.95"/>
      <circle cx="28" cy="27" r="18" fill="#2B579A"/>
      <text x="28" y="33" text-anchor="middle" fill="white" font-size="16" font-weight="bold">1</text>
      <text x="55" y="22" fill="#333" font-size="13" font-weight="bold" font-family="Arial, sans-serif">硬件兼容性自检</text>
      <text x="55" y="40" fill="#666" font-size="11" font-family="Arial, sans-serif">检查显卡、网卡、蓝牙等硬件支持</text>
    </g>
    
    <!-- 步骤2: 数据备份 -->
    <g transform="translate(0, 95)" filter="url(#shadow)">
      <rect x="0" y="0" width="380" height="55" rx="8" fill="white" opacity="0.95"/>
      <circle cx="28" cy="27" r="18" fill="#2B579A"/>
      <text x="28" y="33" text-anchor="middle" fill="white" font-size="16" font-weight="bold">2</text>
      <text x="55" y="22" fill="#333" font-size="13" font-weight="bold" font-family="Arial, sans-serif">数据备份方案</text>
      <text x="55" y="40" fill="#666" font-size="11" font-family="Arial, sans-serif">备份文档、配置、虚拟机等重要数据</text>
    </g>
    
    <!-- 步骤3: 分区规划 -->
    <g transform="translate(0, 160)" filter="url(#shadow)">
      <rect x="0" y="0" width="380" height="55" rx="8" fill="white" opacity="0.95"/>
      <circle cx="28" cy="27" r="18" fill="#2B579A"/>
      <text x="28" y="33" text-anchor="middle" fill="white" font-size="16" font-weight="bold">3</text>
      <text x="55" y="22" fill="#333" font-size="13" font-weight="bold" font-family="Arial, sans-serif">分区规划策略</text>
      <text x="55" y="40" fill="#666" font-size="11" font-family="Arial, sans-serif">合理规划系统分区，避免数据丢失</text>
    </g>
    
    <!-- 步骤4: 启动盘制作 -->
    <g transform="translate(0, 225)" filter="url(#shadow)">
      <rect x="0" y="0" width="380" height="55" rx="8" fill="white" opacity="0.95"/>
      <circle cx="28" cy="27" r="18" fill="#2B579A"/>
      <text x="28" y="33" text-anchor="middle" fill="white" font-size="16" font-weight="bold">4</text>
      <text x="55" y="22" fill="#333" font-size="13" font-weight="bold" font-family="Arial, sans-serif">启动盘制作要点</text>
      <text x="55" y="40" fill="#666" font-size="11" font-family="Arial, sans-serif">正确制作UEFI启动盘，验证镜像</text>
    </g>
    
    <!-- 步骤5: 安装后清单 -->
    <g transform="translate(0, 290)" filter="url(#shadow)">
      <rect x="0" y="0" width="380" height="55" rx="8" fill="white" opacity="0.95"/>
      <circle cx="28" cy="27" r="18" fill="#2B579A"/>
      <text x="28" y="33" text-anchor="middle" fill="white" font-size="16" font-weight="bold">5</text>
      <text x="55" y="22" fill="#333" font-size="13" font-weight="bold" font-family="Arial, sans-serif">安装后必做清单</text>
      <text x="55" y="40" fill="#666" font-size="11" font-family="Arial, sans-serif">更新系统、安装软件、配置环境</text>
    </g>
  </g>
  
  <!-- 主标题 -->
  <text x="450" y="475" text-anchor="middle" fill="white" font-size="26" font-weight="bold" font-family="Arial, sans-serif" filter="url(#glow)">
    Ubuntu 26.04 安装前必做：5个关键准备，避开90%的坑
  </text>
  
  <!-- 装饰元素 -->
  <g opacity="0.2">
    <circle cx="50" cy="450" r="3" fill="white"/>
    <circle cx="850" cy="50" r="3" fill="white"/>
    <circle cx="750" cy="450" r="2" fill="white"/>
    <circle cx="150" cy="50" r="2" fill="white"/>
  </g>
</svg>