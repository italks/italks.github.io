<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 510">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E95420"/>
      <stop offset="100%" style="stop-color:#FF6B35"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="510" fill="url(#bgGrad)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.1">
    <line x1="0" y1="85" x2="1200" y2="85" stroke="#E95420" stroke-width="0.5"/>
    <line x1="0" y1="170" x2="1200" y2="170" stroke="#E95420" stroke-width="0.5"/>
    <line x1="0" y1="255" x2="1200" y2="255" stroke="#E95420" stroke-width="0.5"/>
    <line x1="0" y1="340" x2="1200" y2="340" stroke="#E95420" stroke-width="0.5"/>
    <line x1="0" y1="425" x2="1200" y2="425" stroke="#E95420" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="510" stroke="#E95420" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="510" stroke="#E95420" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="510" stroke="#E95420" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="510" stroke="#E95420" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="510" stroke="#E95420" stroke-width="0.5"/>
  </g>
  
  <!-- Main Title -->
  <text x="600" y="70" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="42" font-weight="bold">OpenClaw 自建指南</text>
  <text x="600" y="110" text-anchor="middle" fill="#E95420" font-family="Arial, sans-serif" font-size="22">5 种部署方式全解析</text>
  
  <!-- Central Claw Icon -->
  <g transform="translate(600, 270)">
    <!-- Claw base -->
    <circle cx="0" cy="0" r="45" fill="none" stroke="url(#orangeGrad)" stroke-width="4" filter="url(#glow)"/>
    <!-- Claw fingers -->
    <path d="M-25,20 L-35,60 L-20,45 L-10,70 L0,50 L10,70 L20,45 L35,60 L25,20" 
          fill="none" stroke="url(#orangeGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="8" fill="#E95420"/>
  </g>
  
  <!-- 5 Deployment Icons -->
  
  <!-- 1. Virtual Machine (safest) -->
  <g transform="translate(120, 380)">
    <rect x="-50" y="-40" width="100" height="80" rx="8" fill="#2d3436" stroke="#4CAF50" stroke-width="2"/>
    <!-- VM icon -->
    <rect x="-30" y="-25" width="25" height="20" rx="3" fill="#4CAF50" opacity="0.3"/>
    <rect x="5" y="-25" width="25" height="20" rx="3" fill="#4CAF50" opacity="0.3"/>
    <rect x="-30" y="5" width="25" height="20" rx="3" fill="#4CAF50" opacity="0.3"/>
    <rect x="5" y="5" width="25" height="20" rx="3" fill="#4CAF50" opacity="0.3"/>
    <text x="0" y="55" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="12" font-weight="bold">虚拟机</text>
    <text x="0" y="72" text-anchor="middle" fill="#4CAF50" font-family="Arial" font-size="11">★★★★★</text>
  </g>
  
  <!-- 2. Cloud Server -->
  <g transform="translate(330, 380)">
    <rect x="-50" y="-40" width="100" height="80" rx="8" fill="#2d3436" stroke="#2196F3" stroke-width="2"/>
    <!-- Cloud icon -->
    <ellipse cx="-15" cy="-5" rx="20" ry="15" fill="#2196F3" opacity="0.3"/>
    <ellipse cx="15" cy="-5" rx="18" ry="12" fill="#2196F3" opacity="0.3"/>
    <ellipse cx="0" cy="5" rx="25" ry="15" fill="#2196F3" opacity="0.4"/>
    <text x="0" y="55" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="12" font-weight="bold">云主机</text>
    <text x="0" y="72" text-anchor="middle" fill="#2196F3" font-family="Arial" font-size="11">★★★★☆</text>
  </g>
  
  <!-- 3. WSL -->
  <g transform="translate(540, 380)">
    <rect x="-50" y="-40" width="100" height="80" rx="8" fill="#2d3436" stroke="#FFC107" stroke-width="2"/>
    <!-- Windows + Linux icon -->
    <rect x="-30" y="-20" width="25" height="25" fill="#FFC107" opacity="0.3"/>
    <rect x="-25" y="-15" width="15" height="15" fill="#FFC107" opacity="0.5"/>
    <text x="10" y="-5" fill="#FFC107" font-family="Arial" font-size="16" font-weight="bold">WSL</text>
    <text x="0" y="55" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="12" font-weight="bold">WSL</text>
    <text x="0" y="72" text-anchor="middle" fill="#FFC107" font-family="Arial" font-size="11">★★★☆☆</text>
  </g>
  
  <!-- 4. Windows Direct (not recommended) -->
  <g transform="translate(750, 380)">
    <rect x="-50" y="-40" width="100" height="80" rx="8" fill="#2d3436" stroke="#f44336" stroke-width="2"/>
    <!-- Windows with warning -->
    <rect x="-25" y="-25" width="20" height="20" fill="#f44336" opacity="0.3"/>
    <rect x="0" y="-25" width="20" height="20" fill="#f44336" opacity="0.3"/>
    <rect x="-25" y="0" width="20" height="20" fill="#f44336" opacity="0.3"/>
    <rect x="0" y="0" width="20" height="20" fill="#f44336" opacity="0.3"/>
    <!-- Warning triangle -->
    <polygon points="40,-15 30,5 50,5" fill="#f44336"/>
    <text x="40" y="2" text-anchor="middle" fill="#1a1a2e" font-family="Arial" font-size="10" font-weight="bold">!</text>
    <text x="0" y="55" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="12" font-weight="bold">Windows直装</text>
    <text x="0" y="72" text-anchor="middle" fill="#f44336" font-family="Arial" font-size="11">★☆☆☆☆</text>
  </g>
  
  <!-- 5. Mac mini (best) -->
  <g transform="translate(960, 380)">
    <rect x="-50" y="-40" width="100" height="80" rx="8" fill="#2d3436" stroke="#9C27B0" stroke-width="2"/>
    <!-- Mac mini icon -->
    <rect x="-25" y="-20" width="50" height="35" rx="4" fill="#9C27B0" opacity="0.4"/>
    <circle cx="0" cy="-3" r="5" fill="#9C27B0"/>
    <text x="0" y="55" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="12" font-weight="bold">Mac mini</text>
    <text x="0" y="72" text-anchor="middle" fill="#9C27B0" font-family="Arial" font-size="11">★★★★★</text>
  </g>
  
  <!-- Connection lines from center to icons -->
  <g stroke="#E95420" stroke-width="1.5" stroke-dasharray="5,5" opacity="0.4">
    <line x1="600" y1="315" x2="120" y2="340"/>
    <line x1="600" y1="315" x2="330" y2="340"/>
    <line x1="600" y1="315" x2="540" y2="340"/>
    <line x1="600" y1="315" x2="750" y2="340"/>
    <line x1="600" y1="315" x2="960" y2="340"/>
  </g>
  
  <!-- Bottom tagline -->
  <text x="600" y="490" text-anchor="middle" fill="#888888" font-family="Arial" font-size="14">Ubuntu 公众号 · 2026</text>
  
  <!-- Decorative corner elements -->
  <polygon points="0,0 60,0 0,60" fill="#E95420" opacity="0.1"/>
  <polygon points="1200,510 1140,510 1200,450" fill="#E95420" opacity="0.1"/>
</svg>