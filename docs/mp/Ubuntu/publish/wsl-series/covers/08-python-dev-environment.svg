<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="900" height="500" fill="url(#bg8)"/>
  
  <!-- Python logo hint -->
  <g transform="translate(60,85)">
    <rect x="0" y="0" width="200" height="220" rx="14" fill="#282c34" opacity="0.9"/>
    <!-- Python snake shape (simplified) -->
    <circle cx="70" cy="65" r="35" fill="#306998" opacity="0.7"/>
    <circle cx="130" cy="105" r="30" fill="#FFD43B" opacity="0.7"/>
    <path d="M90 50 Q120 40 140 75 Q150 110 115 125 Q80 135 55 105 Q45 80 70 60" stroke="#E95420" stroke-width="2.5" fill="none" opacity="0.6"/>
    
    <!-- Version badges inside card -->
    <text x="100" y="165" font-family="monospace" font-size="16" fill="#61afef" text-anchor="middle">Python 3.12</text>
    <text x="100" y="190" font-family="'Microsoft YaHei',sans-serif" font-size="12" fill="#98c379" text-anchor="middle">pip / venv 就绪</text>
    <text x="100" y="210" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#8892b0" text-anchor="middle">✓ 环境激活</text>
  </g>

  <!-- Tool comparison cards -->
  <g transform="translate(300,85)">
    <!-- venv -->
    <rect x="0" y="0" width="170" height="68" rx="10" fill="#306998" opacity="0.12" stroke="#306998" stroke-width="1"/>
    <text x="15" y="28" font-family="'Microsoft YaHei',sans-serif" font-size="15" fill="#61afef" font-weight="bold">venv</text>
    <text x="15" y="48" font-family="'Microsoft YaHei',sans-serif" font-size="12" fill="#8892b0">官方内置 · 轻量</text>
    <text x="15" y="62" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#98c379">✓ 推荐首选</text>

    <!-- conda -->
    <rect x="185" y="0" width="170" height="68" rx="10" fill="#44A833" opacity="0.08" stroke="#44A833" stroke-width="1"/>
    <text x="200" y="28" font-family="'Microsoft YaHei',sans-serif" font-size="15" fill="#44A833" font-weight="bold">conda</text>
    <text x="200" y="48" font-family="'Microsoft YaHei',sans-serif" font-size="12" fill="#8892b0">数据科学 · 多环境</text>
    <text x="200" y="62" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#e5c07b">科学计算首选</text>

    <!-- uv -->
    <rect x="370" y="0" width="160" height="68" rx="10" fill="#E95420" opacity="0.1" stroke="#E95420" stroke-width="1"/>
    <text x="385" y="28" font-family="'Microsoft YaHei',sans-serif" font-size="15" fill="#E95420" font-weight="bold">uv</text>
    <text x="385" y="48" font-family="'Microsoft YaHei',sans-serif" font-size="12" fill="#8892b0">Rust 写的 · 极速</text>
    <text x="385" y="62" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#f37725">⚡ 新秀推荐</text>

    <!-- pipx -->
    <rect x="0" y="82" width="170" height="58" rx="10" fill="#56b6c2" opacity="0.08" stroke="#56b6c2" stroke-width="1"/>
    <text x="15" y="108" font-family="'Microsoft YaHei',sans-serif" font-size="14" fill="#56b6c2" font-weight="bold">pipx</text>
    <text x="15" y="128" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#8892b0">CLI 工具隔离安装</text>

    <!-- poetry -->
    <rect x="185" y="82" width="170" height="58" rx="10" fill="#c678dd" opacity="0.08" stroke="#c678dd" stroke-width="1"/>
    <text x="200" y="108" font-family="'Microsoft YaHei',sans-serif" font-size="14" fill="#c678dd" font-weight="bold">poetry</text>
    <text x="200" y="128" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#8892b0">依赖管理 + 打包</text>
  </g>

  <!-- Code snippet -->
  <g transform="translate(300,250)">
    <rect x="0" python-y="0" width="530" height="78" rx="10" fill="#282c34" opacity="0.85"/>
    <text x="18" y="26" font-family="monospace" font-size="13" fill="#e06c75"># 创建虚拟环境并安装依赖</text>
    <text x="18" y="48" font-family="monospace" font-size="13" fill="#98c379">$ python -m venv .venv &amp;&amp; source .venv/bin/activate</text>
    <text x="18" y="68" font-family="monospace" font-size="13" fill="#61afef">$ pip install -r requirements.txt</text>
  </g>

  <!-- Title -->
  <text x="50" y="380" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="38" font-weight="bold" fill="#ffffff">Python 开发环境</text>
  <text x="50" y="420" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="24" fill="#E95420">venv / conda / uv 怎么选？一篇文章讲清楚</text>
  <rect x="720" y="430" width="150" height="34" rx="17" fill="#E95420" opacity="0.15"/>
  <text x="795" y="453" font-family="'Microsoft YaHei',sans-serif" font-size="14" fill="#E95420" text-anchor="middle">实战篇 #08</text>
</svg>