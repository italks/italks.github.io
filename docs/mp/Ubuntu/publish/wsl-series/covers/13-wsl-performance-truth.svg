<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg13" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent13" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E95420"/>
      <stop offset="100%" style="stop-color:#ff7b3d"/>
    </linearGradient>
    <linearGradient id="greenZone" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#238636"/>
      <stop offset="100%" style="stop-color:#2ea043"/>
    </linearGradient>
    <linearGradient id="yellowZone" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9e6a03"/>
      <stop offset="100%" style="stop-color:#d29922"/>
    </linearGradient>
    <linearGradient id="redZone" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#da3633"/>
      <stop offset="100%" style="stop-color:#f85149"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bg13)"/>

  <!-- 篇目标识 -->
  <rect x="30" y="25" width="72" height="28" rx="4" fill="#E95420"/>
  <text x="66" y="44" font-family="Arial,sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">进阶篇</text>

  <!-- 主标题 -->
  <text x="40" y="75" font-family="'Microsoft YaHei',Arial,sans-serif" font-size="30" fill="#ffffff" font-weight="bold">WSL 性能真相揭秘</text>
  <text x="40" y="102" font-family="'Microsoft YaHei',Arial,sans-serif" font-size="15" fill="#aaaaaa">到底比原生 Linux 慢多少？4 大场景实测数据告诉你答案</text>

  <!-- 分隔线 -->
  <rect x="40" y="118" width="820" height="2" rx="1" fill="url(#accent13)"/>

  <!-- ========== 左侧：性能仪表盘 ========== -->
  <g transform="translate(40, 138)">
    <!-- 仪表盘外框 -->
    <rect width="400" height="210" rx="12" fill="#111827" opacity="0.7" stroke="#333" stroke-width="1"/>
    
    <!-- 仪表盘标题栏 -->
    <rect width="400" height="32" rx="12" fill="#1e2a45"/>
    <rect y="20" width="400" height="12" fill="#1e2a45"/>
    <circle cx="16" cy="16" r="5" fill="#f85149"/>
    <circle cx="34" cy="16" r="5" fill="#d29922"/>
    <circle cx="52" cy="16" r="5" fill="#3fb950"/>
    <text x="70" y="21" font-family="'Microsoft YaHei',Arial,sans-serif" font-size="13" fill="#ccc">性能仪表盘 — WSL2 vs 原生</text>

    <!-- 半圆仪表盘主体 -->
    <g transform="translate(120, 55)">
      <!-- 外弧背景 -->
      <path d="M 10,110 A 90,90 0 0,1 170,110" fill="none" stroke="#333" stroke-width="22" stroke-linecap="round"/>
      
      <!-- 绿色区域 (0-60%) -->
      <path d="M 10,110 A 90,90 0 0,1 58,36" fill="none" stroke="#2ea043" stroke-width="18" stroke-linecap="round"/>
      
      <!-- 黄色区域 (60-85%) -->
      <path d="M 58,36 A 90,90 0 0,1 122,28" fill="none" stroke="#d29922" stroke-width="18" stroke-linecap="round"/>
      
      <!-- 红色区域 (85-100%) -->
      <path d="M 122,28 A 90,90 0 0,1 170,110" fill="none" stroke="#f85149" stroke-width="18" stroke-linecap="round"/>

      <!-- 刻度标签 -->
      <text x="-5" y="125" font-family="Arial" font-size="11" fill="#888">快</text>
      <text x="82" y="15" font-family="Arial" font-size="11" fill="#888">慢</text>
      <text x="165" y="125" font-family="Arial" font-size="11" fill="#888">极慢</text>

      <!-- 指针 (指向 ~75% 黄绿区间) -->
      <line x1="90" y1="90" x2="55" y2="42" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <circle cx="90" cy="90" r="8" fill="#E95420"/>
      <circle cx="90" cy="90" r="4" fill="#fff"/>

      <!-- 中心数值 -->
      <text x="90" y="130" font-family="Arial,sans-serif" font-size="24" fill="#fff" text-anchor="middle" font-weight="bold">~92%</text>
      <text x="90" y="148" font-family="'Microsoft YaHei'" font-size="11" fill="#aaa" text-anchor="middle">原生性能</text>
    </g>

    <!-- 右侧图例 -->
    <g transform="translate(310, 60)">
      <rect width="80" height="20" rx="3" fill="#2ea043" opacity="0.3"/>
      <text x="40" y="14" font-family="'Microsoft YaHei'" font-size="10" fill="#3fb950" text-anchor="middle">&gt;95% 原生</text>
      <rect y="26" width="80" height="20" rx="3" fill="#d29922" opacity="0.3"/>
      <text x="40" y="40" font-family="'Microsoft YaHei'" font-size="10" fill="#d29922" text-anchor="middle">85-95%</text>
      <rect y="52" width="80" height="20" rx="3" fill="#f85149" opacity="0.3"/>
      <text x="40" y="66" font-family="'Microsoft YaHei'" font-size="10" fill="#f85149" text-anchor="middle">&lt;85%</text>
    </g>

    <!-- 底部说明 -->
    <text x="200" y="198" font-family="'Microsoft YaHei'" font-size="11" fill="#888" text-anchor="middle">综合 CPU / 内存 / 网络 / 磁盘 I/O 四项测试</text>
  </g>

  <!-- ========== 右侧：4张性能洞察卡 ========== -->
  <g transform="translate(460, 138)">
    <!-- 卡片1: CPU & 内存 -->
    <g transform="translate(0, 0)">
      <rect width="190" height="96" rx="8" fill="#1e2a45" stroke="#2ea043" stroke-width="1.5"/>
      <rect width="190" height="26" rx="8" fill="#2ea043" opacity="0.2"/>
      <rect y="18" width="190" height="8" fill="#2ea043" opacity="0.2"/>
      <circle cx="16" cy="13" r="6" fill="#2ea043"/>
      <text x="14" y="17" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">C</text>
      <text x="30" y="18" font-family="'Microsoft YaHei'" font-size="12" fill="#fff" font-weight="bold">CPU 与内存</text>
      <text x="12" y="44" font-family="'Microsoft YaHei'" font-size="11" fill="#ccc">接近原生性能</text>
      <text x="12" y="62" font-family="'Consolas'" font-size="10" fill="#3fb950">损耗 &lt; 3% ~ 5%</text>
      <text x="12" y="82" font-family="'Microsoft YaHei'" font-size="10" fill="#888">虚拟化层几乎无开销</text>
    </g>

    <!-- 卡片2: 文件I/O -->
    <g transform="translate(202, 0)">
      <rect width="190" height="96" rx="8" fill="#1e2a45" stroke="#d29922" stroke-width="1.5"/>
      <rect width="190" height="26" rx="8" fill="#d29922" opacity="0.2"/>
      <rect y="18" width="190" height="8" fill="#d29922" opacity="0.2"/>
      <circle cx="16" cy="13" r="6" fill="#d29922"/>
      <text x="14" y="17" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">D</text>
      <text x="30" y="18" font-family="'Microsoft YaHei'" font-size="12" fill="#fff" font-weight="bold">磁盘 I/O</text>
      <text x="12" y="44" font-family="'Microsoft YaHei'" font-size="11" fill="#ccc">跨文件系统有损耗</text>
      <text x="12" y="62" font-family="'Consolas'" font-size="10" fill="#d29922">/mnt/c 慢 2~5 倍</text>
      <text x="12" y="82" font-family="'Microsoft YaHei'" font-size="10" fill="#888">尽量在 ext4 内操作</text>
    </g>

    <!-- 卡片3: 网络 -->
    <g transform="translate(0, 108)">
      <rect width="190" height="96" rx="8" fill="#1e2a45" stroke="#3c6eb4" stroke-width="1.5"/>
      <rect width="190" height="26" rx="8" fill="#3c6eb4" opacity="0.2"/>
      <rect y="18" width="190" height="8" fill="#3c6eb4" opacity="0.2"/>
      <circle cx="16" cy="13" r="6" fill="#3c6eb4"/>
      <text x="14" y="17" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">N</text>
      <text x="30" y="18" font-family="'Microsoft YaHei'" font-size="12" fill="#fff" font-weight="bold">网络性能</text>
      <text x="12" y="44" font-family="'Microsoft YaHei'" font-size="11" fill="#ccc">NAT 转换有小开销</text>
      <text x="12" y="62" font-family="'Consolas'" font-size="10" fill="#79c0ff">localhost 已互通</text>
      <text x="12" y="82" font-family="'Microsoft YaHei'" font-size="10" fill="#888">镜像模式可绕过 NAT</text>
    </g>

    <!-- 卡片4: GPU / GUI -->
    <g transform="translate(202, 108)">
      <rect width="190" height="96" rx="8" fill="#1e2a45" stroke="#E95420" stroke-width="1.5"/>
      <rect width="190" height="26" rx="8" fill="#E95420" opacity="0.2"/>
      <rect y="18" width="190" height="8" fill="#E95420" opacity="0.2"/>
      <circle cx="16" cy="13" r="6" fill="#E95420"/>
      <text x="14" y="17" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">G</text>
      <text x="30" y="18" font-family="'Microsoft YaHei'" font-size="12" fill="#fff" font-weight="bold">GPU 加速</text>
      <text x="12" y="44" font-family="'Microsoft YaHei'" font-size="11" fill="#ccc">DirectX 直通支持</text>
      <text x="12" y="62" font-family="'Consolas'" font-size="10" fill="#ffa657">CUDA / GPU 计算可用</text>
      <text x="12" y="82" font-family="'Microsoft YaHei'" font-size="10" fill="#888">AI / ML 场景已就绪</text>
    </g>
  </g>

  <!-- ========== 底部：优化建议横条 ========== -->
  <rect x="40" y="362" width="820" height="126" rx="10" fill="#111827" opacity="0.5" stroke="#333" stroke-width="1"/>
  
  <text x="60" y="388" font-family="'Microsoft YaHei',Arial,sans-serif" font-size="15" fill="#E95420" font-weight="bold">优化建议</text>

  <!-- 建议1: 文件放Linux区 -->
  <g transform="translate(60, 402)">
    <rect width="235" height="72" rx="6" fill="#1e2a45"/>
    <rect x="0" y="0" width="6" height="72" rx="3" fill="#2ea043"/>
    <text x="18" y="22" font-family="'Microsoft YaHei'" font-size="13" fill="#3fb950" font-weight="bold">项目代码放 Linux 文件系统</text>
    <text x="18" y="42" font-family="'Consolas'" font-size="10" fill="#ccc">~/projects/my-app</text>
    <text x="18" y="60" font-family="'Microsoft YaHei'" font-size="10" fill="#888">避免跨文件系统 I/O 损耗</text>
  </g>

  <!-- 建议2: .wslconfig调优 -->
  <g transform="translate(310, 402)">
    <rect width="235" height="72" rx="6" fill="#1e2a45"/>
    <rect x="0" y="0" width="6" height="72" rx="3" fill="#3c6eb4"/>
    <text x="18" y="22" font-family="'Microsoft YaHei'" font-size="13" fill="#79c0ff" font-weight="bold">调整 .wslconfig 配置</text>
    <text x="18" y="42" font-family="'Consolas'" font-size="10" fill="#ccc">memory=8GB  swap=2GB</text>
    <text x="18" y="60" font-family="'Microsoft YaHei'" font-size="10" fill="#888">根据硬件合理分配资源</text>
  </g>

  <!-- 建议3: 镜像网络模式 -->
  <g transform="translate(560, 402)">
    <rect width="280" height="72" rx="6" fill="#1e2a45"/>
    <rect x="0" y="0" width="6" height="72" rx="3" fill="#E95420"/>
    <text x="18" y="22" font-family="'Microsoft YaHei'" font-size="13" fill="#ffa657" font-weight="bold">启用镜像网络模式 (Win11)</text>
    <text x="18" y="42" font-family="'Consolas'" font-size="10" fill="#ccc">networkingMode=mirrored</text>
    <text x="18" y="60" font-family="'Microsoft YaHei'" font-size="10" fill="#888">localhost 互通 + IPv6 支持</text>
  </g>

  <!-- 底部装饰条 -->
  <rect x="0" y="492" width="900" height="8" fill="url(#accent13)" opacity="0.6"/>
</svg>