<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="900" height="500" fill="url(#bg9)"/>
  
  <!-- Language icons row -->
  <g transform="translate(50,80)">
    <!-- Node.js -->
    <rect x="0" y="0" width="120" height="90" rx="10" fill="#68A063" opacity="0.15" stroke="#68A063" stroke-width="1.2"/>
    <text x="60" y="38" font-family="'Microsoft YaHei',sans-serif" font-size="28" fill="#68A063" text-anchor="middle">⬢</text>
    <text x="60" y="62" font-family="'Microsoft YaHei',sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">Node.js</text>
    <text x="60" y="80" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#8892b0" text-anchor="middle">npm / pnpm</text>

    <!-- Go -->
    <rect x="140" y="5" width="110" height="85" rx="10" fill="#00ADD8" opacity="0.15" stroke="#00ADD8" stroke-width="1.2"/>
    <text x="195" y="42" font-family="'Microsoft YaHei',sans-serif" font-size="26" fill="#00ADD8" text-anchor="middle">G</text>
    <text x="195" y="65" font-family="'Microsoft YaHei',sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">Go</text>
    <text x="195" y="82" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#8892b0" text-anchor="middle">go mod</text>

    <!-- Rust -->
    <rect x="270" y="5" width="115" height="85" rx="10" fill="#dea584" opacity="0.18" stroke="#dea584" stroke-width="1.2"/>
    <text x="327" y="40" font-family="'Microsoft YaHei',sans-serif" font-size="24" fill="#dea584" text-anchor="middle">🦀</text>
    <text x="327" y="64" font-family="'Microsoft YaHei',sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">Rust</text>
    <text x="327" y="82" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#8892b0" text-anchor="middle">cargo</text>

    <!-- Java -->
    <rect x="405" y="0" width="105" height="90" rx="10" fill="#f89820" opacity="0.15" stroke="#f89820" stroke-width="1.2"/>
    <text x="457" y="36" font-family="'Arial Black',sans-serif" font-size="22" fill="#f89820" text-anchor="middle">☕</text>
    <text x="457" y="60" font-family="'Microsoft YaHei',sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">Java</text>
    <text x="457" y="78" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#8892b0" text-anchor="middle">Maven/Gradle</text>

    <!-- C/C++ -->
    <rect x="530" y="5" width="105" height="85" rx="10" fill="#00599C" opacity="0.15" stroke="#00599C" stroke-width="1.2"/>
    <text x="582" y="40" font-family="'Microsoft YaHei',sans-serif" font-size="24" fill="#00599C" text-anchor="middle">⚙️</text>
    <text x="582" y="63" font-family="'Microsoft YaHei',sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">C / C++</text>
    <text x="582" y="80" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#8892b0" text-anchor="middle">gcc / cmake</text>

    <!-- Ruby / Others -->
    <rect x="655" y="8" width="95" height="82" rx="10" fill="#CC342D" opacity="0.13" stroke="#CC342D" stroke-width="1.2"/>
    <text x="702" y="40" font-family="'Microsoft YaHei',sans-serif" font-size="22" fill="#CC342D" text-anchor="middle">💎</text>
    <text x="702" y="62" font-family="'Microsoft YaHei',sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">Ruby</text>
    <text x="702" y="79" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#8892b0" text-anchor="middle">bundler</text>
  </g>

  <!-- Code snippet showing multi-lang setup -->
  <g transform="translate(50,210)">
    <rect x="0" y="0" width="800" height="130" rx="12" fill="#282c34" opacity="0.85"/>
    <text x="20" y="30" font-family="monospace" font-size="14" fill="#e5c07b"># Node.js 项目</text>
    <text x="20" y="52" font-family="monospace" font-size="13" fill="#61afef">$ nvm install --lts &amp;&amp; npm install -g pnpm</text>
    
    <text x="350" y="74" font-family="monospace" font-size="14" fill="#e5c07b"># Go 项目</text>
    <text x="350" y="96" font-family="monospace" font-size="13" fill="#98c379">$ go mod init myapp &amp;&amp; go build ./...</text>

    <text x="20" y="118" font-family="monospace" font-size="14" fill="#e5c07b"># Rust 项目</text>
    <text x="160" y="118" font-family="monospace" font-size="13" fill="#56b6c2">$ cargo new myproject &amp;&amp; cargo run</text>
  </g>

  <!-- Feature highlight -->
  <g transform="translate(50,365)">
    <rect x="0" y="0" width="280" height="44" rx="10" fill="#E95420" opacity="0.08"/>
    <text x="16" y="29" font-family="'Microsoft YaHei',sans-serif" font-size="15" fill="#E95420">🎯 同一套环境，6+ 种语言</text>
    <rect x="300" y="0" width="260" height="44" rx="10" fill="#61afef" opacity="0.08"/>
    <text x="316" y="29" font-family="'Microsoft YaHei',sans-serif" font-size="15" fill="#61afef">🔄 跨平台编译无压力</text>
    <rect x="580" y="0" width="220" height="44" rx="10" fill="#98c379" opacity="0.08"/>
    <text x="596" y="29" font-family="'Microsoft YaHei',sans-serif" font-size="15" fill="#98c379">📦 包管理全支持</text>
  </g>

  <!-- Title area -->
  <text x="50" y="448" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="37" font-weight="bold" fill="#ffffff">多语言开发秘诀</text>
  <text x="400" y="448" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="22" fill="#E95420">Node · Go · Rust · Java · C++ 一网打尽</text>
  <rect x="750" y="420" width="120" height="32" rx="16" fill="#E95420" opacity="0.15"/>
  <text x="810" y="442" font-family="'Microsoft YaHei',sans-serif" font-size="13" fill="#E95420" text-anchor="middle">实战篇 #09</text>
</svg>