<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="900" height="500" fill="url(#bg3)"/>
  <!-- Command cards floating -->
  <g transform="translate(50,80)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="180" height="70" rx="10" fill="#282c34" opacity="0.9"/>
    <text x="15" y="30" font-family="monospace" font-size="14" fill="#61afef">$ wsl -l -v</text>
    <text x="15" y="54" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#8892b0">查看发行版</text>
    <!-- Card 2 -->
    <rect x="210" y="20" width="190" height="70" rx="10" fill="#282c34" opacity="0.9"/>
    <text x="225" y="50" font-family="monospace" font-size="14" fill="#98c379">wsl --shutdown</text>
    <text x="225" y="74" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#8892b0">关闭子系统</text>
    <!-- Card 3 -->
    <rect x="60" y="110" width="220" height="70" rx="10" fill="#E95420" opacity="0.12" stroke="#E95420" stroke-width="1"/>
    <text x="75" y="140" font-family="monospace" font-size="14" fill="#e5c07b">wsl --install -d Ubuntu</text>
    <text x="75" y="164" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#E95420">安装指定发行版</text>
    <!-- Card 4 -->
    <rect x="310" y="150" width="170" height="70" rx="10" fill="#282c34" opacity="0.9"/>
    <text x="325" y="180" font-family="monospace" font-size="14" fill="#56b6c2">wsl --update</text>
    <text x="325" y="204" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#8892b0">更新 WSL 内核</text>
  </g>
  <!-- Number highlight -->
  <circle cx="700" cy="160" r="65" fill="#E95420" opacity="0.15"/>
  <text x="700" y="175" font-family="'Arial Black',sans-serif" font-size="56" fill="#E95420" text-anchor="middle" font-weight="bold">15</text>
  <text x="700" y="205" font-family="'Microsoft YaHei',sans-serif" font-size="16" fill="#8892b0" text-anchor="middle">个命令</text>
  <text x="700" y="230" font-family="'Microsoft YaHei',sans-serif" font-size="14" fill="#E95420" text-anchor="middle" opacity="0.8">够用半年</text>
  <!-- Terminal icon hint at bottom right -->
  <g transform="translate(580,260)" opacity="0.5">
    <text x="0" y="0" font-family="monospace" font-size="22" fill="#61afef">$_</text>
  </g>
  <!-- Title -->
  <text x="50" y="350" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="40" font-weight="bold" fill="#ffffff">新手第一课</text>
  <text x="50" y="400" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="26" fill="#E95420">15 个命令够用半年</text>
  <text x="50" y="440" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="16" fill="#8892b0">从零开始掌握 WSL 核心操作</text>
  <rect x="720" y="430" width="140" height="34" rx="17" fill="#E95420" opacity="0.15"/>
  <text x="790" y="453" font-family="'Microsoft YaHei',sans-serif" font-size="14" fill="#E95420" text-anchor="middle">入门篇 #03</text>
  <!-- Decorative dots -->
  <circle cx="800" cy="90" r="4" fill="#E95420" opacity="0.6"/><circle cx="840" cy="120" r="3" fill="#f37725" opacity="0.4"/>
  <circle cx="780" cy="300" r="5" fill="#fff" opacity="0.2"/><circle cx="830" cy="340" r="3" fill="#E95420" opacity="0.5"/>
</svg>