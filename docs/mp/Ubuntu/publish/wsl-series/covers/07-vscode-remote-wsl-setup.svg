<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="900" height="500" fill="url(#bg7)"/>
  
  <!-- VS Code logo hint + WSL connection -->
  <g transform="translate(50,80)">
    <!-- VS Code icon shape (simplified) -->
    <rect x="10" y="20" width="180" height="200" rx="14" fill="#1e1e1e" stroke="#007acc" stroke-width="2"/>
    <rect x="10" y="20" width="180" height="40" rx="14" fill="#252526"/>
    <rect x="10" y="46" width="180" height="14" fill="#252526"/>
    
    <!-- VS Code logo -->
    <g transform="translate(65,70)">
      <path d="M30 0 L60 15 L60 55 L30 70 L0 55 L0 15 Z" fill="#007acc" opacity="0.8"/>
      <path d="M30 10 L45 22 L45 48 L30 58 L15 48 L15 22 Z" fill="#fff" opacity="0.3"/>
    </g>

    <!-- Status bar -->
    <rect x="10" y="190" width="180" height="28" rx="0" fill="#007acc"/>
    <text x="100" y="208" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#fff" text-anchor="middle">WSL: Ubuntu</text>

    <!-- Side panel icons -->
    <g transform="translate(18,72)">
      <rect x="0" y="0" width="4" height="24" rx="2" fill="#E95420"/><text x="12" y="-3" font-size="9" fill="#8892b0">文件</text>
      <rect x="0" y="32" width="4" height="18" rx="2" fill="#56b6c2"/><text x="12" y="44" font-size="9" fill="#8892b0">搜索</text>
      <rect x="0" y="58" width="4" height="18" rx="2" fill="#98c379"/><text x="12" y="70" font-size="9" fill="#8892b0">Git</text>
      <rect x="0" y="82" width="4" height="18" rx="2" fill="#e5c07b"/><text x="12" y="94" font-size="9" fill="#8892b0">扩展</text>
    </g>
  </g>

  <!-- Connection line to WSL -->
  <g transform="translate(260,140)">
    <line x1="0" y1="50" x2="80" y2="50" stroke="#E95420" stroke-width="2.5" stroke-dasharray="8,4">
      <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.5s" repeatCount="indefinite"/>
    </line>
    <circle cx="90" cy="50" r="16" fill="#E95420" opacity="0.2"/>
    <text x="90" y="55" font-family="monospace" font-size="13" fill="#E95420" text-anchor="middle">$</text>
  </g>

  <!-- Feature list -->
  <g transform="translate(380,85)">
    <rect x="0" y="0" width="480" height="52" rx="10" fill="#007acc" opacity="0.08"/>
    <text x="20" y="32" font-family="'Microsoft YaHei',sans-serif" font-size="17" fill="#61afef">🔌 Remote - WSL 扩展一键连接</text>

    <rect x="0" y="62" width="230" height="52" rx="10" fill="#98c379" opacity="0.08"/>
    <text x="20" y="94" font-family="'Microsoft YaHei',sans-serif" font-size="16" fill="#98c379">⚡ 智能补全</text>

    <rect x="245" y="62" width="235" height="52" rx="10" fill="#e5c07b" opacity="0.08"/>
    <text x="265" y="94" font-family="'Microsoft YaHei',sans-serif" font-size="16" fill="#e5c07b">🐛 终端集成</text>

    <rect x="0" y="124" width="230" height="52" rx="10" fill="#56b6c2" opacity="0.08"/>
    <text x="20" y="156" font-family="'Microsoft YaHei',sans-serif" font-size="16" fill="#56b6c2">🔍 远程调试</text>

    <rect x="245" y="124" width="235" height="52" rx="10" fill="#c678dd" opacity="0.08"/>
    <text x="265" y="156" font-family="'Microsoft YaHei',sans-serif" font-size="16" fill="#c678dd">📦 Docker 集成</text>

    <rect x="0" y="186" width="480" height="52" rx="10" fill="#E95420" opacity="0.06"/>
    <text x="20" y="218" font-family="'Microsoft YaHei',sans-serif" font-size="15" fill="#8892b0">💡 Dev Container 容器开发 · Git 版本控制 · 端口转发自动配置</text>
  </g>

  <!-- Title -->
  <text x="50" y="380" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="38" font-weight="bold" fill="#ffffff">VS Code Remote - WSL 配置全攻略</text>
  <text x="50" y="420" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="23" fill="#E95420">Windows 端写代码，Linux 端跑代码，无缝体验</text>
  <rect x="720" y="430" width="150" height="34" rx="17" fill="#E95420" opacity="0.15"/>
  <text x="795" y="453" font-family="'Microsoft YaHei',sans-serif" font-size="14" fill="#E95420" text-anchor="middle">实战篇 #07</text>
</svg>