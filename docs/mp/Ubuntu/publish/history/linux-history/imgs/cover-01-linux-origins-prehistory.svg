<svg xmlns="http://www.w3.org/2000/svg" width="900" height="383" viewBox="0 0 900 383">
  <defs>
    <linearGradient id="bgGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f7971e"/>
      <stop offset="100%" style="stop-color:#ffd200"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="383" fill="url(#bgGrad1)"/>
  
  <!-- 装饰网格 -->
  <g opacity="0.1">
    <line x1="0" y1="100" x2="900" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="900" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="900" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="383" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="383" stroke="#fff" stroke-width="1"/>
  </g>
  
  <!-- 左侧装饰条 -->
  <rect x="0" y="0" width="8" height="383" fill="url(#goldGrad)"/>
  
  <!-- 年代标签 -->
  <rect x="50" y="40" width="140" height="36" rx="18" fill="#f7971e" opacity="0.9"/>
  <text x="120" y="65" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">
    1960-1980s
  </text>
  
  <!-- 主标题 -->
  <text x="50" y="130" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="42" font-weight="bold" fill="#ecf0f1">
    Linux 演进史（一）
  </text>
  
  <!-- 副标题 -->
  <text x="50" y="185" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="22" fill="#ffd200">
    黑客文化的源流与 UNIX 的工业化悖论
  </text>
  
  <!-- 分隔线 -->
  <rect x="50" y="215" width="500" height="2" fill="#f7971e" opacity="0.6"/>
  
  <!-- 关键词 -->
  <text x="50" y="260" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#bdc3c7">
    贝尔实验室 | Ken Thompson | Dennis Ritchie
  </text>
  <text x="50" y="285" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#bdc3c7">
    黑客伦理 | Multics | UNIX 诞生
  </text>
  
  <!-- 右侧复古电脑图标 -->
  <g transform="translate(650, 100)">
    <!-- 显示器 -->
    <rect x="20" y="20" width="160" height="120" rx="8" fill="#2c3e50"/>
    <rect x="30" y="30" width="140" height="100" fill="#1a1a2e"/>
    <!-- 屏幕内容 - 代码行 -->
    <text x="40" y="55" font-family="Courier New, monospace" font-size="10" fill="#27ae60">$ cat unix.c</text>
    <text x="40" y="70" font-family="Courier New, monospace" font-size="10" fill="#3498db">#include &lt;stdio.h&gt;</text>
    <text x="40" y="85" font-family="Courier New, monospace" font-size="10" fill="#e74c3c">main() {</text>
    <text x="40" y="100" font-family="Courier New, monospace" font-size="10" fill="#f39c12">  printf("Hello");</text>
    <text x="40" y="115" font-family="Courier New, monospace" font-size="10" fill="#e74c3c">}</text>
    <!-- 底座 -->
    <rect x="70" y="145" width="60" height="10" fill="#34495e"/>
    <rect x="50" y="155" width="100" height="8" rx="2" fill="#34495e"/>
  </g>
  
  <!-- 底部装饰 - 二进制代码流 -->
  <g opacity="0.15">
    <text x="50" y="350" font-family="Courier New, monospace" font-size="11" fill="#ffd200">
      01010101 01001110 01001001 01011000 00100000 00101101 00100000 01000011 01101111 01100100 01100101
    </text>
    <text x="50" y="368" font-family="Courier New, monospace" font-size="11" fill="#ffd200">
      01001000 01100001 01100011 01101011 01100101 01110010 00100000 01000101 01110100 01101000 01101001 01100011
    </text>
  </g>
</svg>