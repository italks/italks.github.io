<svg xmlns="http://www.w3.org/2000/svg" width="900" height="383" viewBox="0 0 900 383">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000428"/>
      <stop offset="100%" style="stop-color:#004e92"/>
    </linearGradient>
    <linearGradient id="finlandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#003580"/>
      <stop offset="100%" style="stop-color:#0052cc"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="383" fill="url(#bgGrad3)"/>
  
  <!-- 装饰性雪花效果 -->
  <g opacity="0.15">
    <text x="800" y="50" font-size="24" fill="#fff">❄</text>
    <text x="830" y="120" font-size="18" fill="#fff">❄</text>
    <text x="770" y="180" font-size="20" fill="#fff">❄</text>
    <text x="850" y="250" font-size="16" fill="#fff">❄</text>
    <text x="810" y="320" font-size="22" fill="#fff">❄</text>
  </g>
  
  <!-- 左侧装饰条 -->
  <rect x="0" y="0" width="8" height="383" fill="url(#finlandGrad)"/>
  
  <!-- 年代标签 -->
  <rect x="50" y="40" width="100" height="36" rx="18" fill="#0052cc" opacity="0.9"/>
  <text x="100" y="65" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">
    1991
  </text>
  
  <!-- 主标题 -->
  <text x="50" y="130" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="42" font-weight="bold" fill="#ecf0f1">
    Linux 演进史（三）
  </text>
  
  <!-- 副标题 -->
  <text x="50" y="185" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="22" fill="#3498db">
    芬兰大学生的业余爱好——Linux 内核诞生
  </text>
  
  <!-- 分隔线 -->
  <rect x="50" y="215" width="500" height="2" fill="#0052cc" opacity="0.6"/>
  
  <!-- 关键词 -->
  <text x="50" y="260" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#bdc3c7">
    Linus Torvalds | 赫尔辛基大学 | 386 电脑
  </text>
  <text x="50" y="285" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#bdc3c7">
    MINIX | 终端仿真器 | GPL 协议 | 0.01 版本
  </text>
  
  <!-- 右侧代码窗口 -->
  <g transform="translate(620, 80)">
    <!-- 窗口框架 -->
    <rect x="10" y="10" width="200" height="150" rx="8" fill="#2c3e50"/>
    <rect x="10" y="10" width="200" height="25" rx="8" fill="#34495e"/>
    <!-- 窗口按钮 -->
    <circle cx="25" cy="22" r="5" fill="#e74c3c"/>
    <circle cx="40" cy="22" r="5" fill="#f39c12"/>
    <circle cx="55" cy="22" r="5" fill="#27ae60"/>
    <!-- 终端内容 -->
    <rect x="20" y="40" width="180" height="115" fill="#1a1a2e"/>
    <text x="30" y="60" font-family="Courier New, monospace" font-size="9" fill="#27ae60">From: torvalds@kruuna.helsinki.fi</text>
    <text x="30" y="75" font-family="Courier New, monospace" font-size="9" fill="#3498db">Newsgroups: comp.os.minix</text>
    <text x="30" y="90" font-family="Courier New, monospace" font-size="9" fill="#f39c12">Subject: What would you like...</text>
    <text x="30" y="108" font-family="Courier New, monospace" font-size="8" fill="#ecf0f1">I'm doing a (free) operating</text>
    <text x="30" y="120" font-family="Courier New, monospace" font-size="8" fill="#ecf0f1">system (just a hobby...)</text>
    <text x="30" y="135" font-family="Courier New, monospace" font-size="9" fill="#e74c3c">- Linus Torvalds</text>
    <text x="30" y="148" font-family="Courier New, monospace" font-size="8" fill="#7f8c8d">1991.08.25</text>
  </g>
  
  <!-- 底部重要日期 -->
  <rect x="50" y="310" width="600" height="50" rx="5" fill="#003580" opacity="0.4"/>
  <text x="70" y="335" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#3498db">
    📧 1991年8月25日 — 那封改变世界的邮件
  </text>
  <text x="70" y="355" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#7f8c8d">
    "不会像 GNU 那样庞大和专业，只是个业余爱好"
  </text>
</svg>