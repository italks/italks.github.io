<svg xmlns="http://www.w3.org/2000/svg" width="900" height="383" viewBox="0 0 900 383">
  <defs>
    <linearGradient id="bgGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50"/>
      <stop offset="100%" style="stop-color:#4CA1AF"/>
    </linearGradient>
    <linearGradient id="debateGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e96443"/>
      <stop offset="100%" style="stop-color:#904e95"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="383" fill="url(#bgGrad4)"/>
  
  <!-- 对称装饰线 -->
  <g opacity="0.1">
    <line x1="450" y1="0" x2="450" y2="383" stroke="#fff" stroke-width="2"/>
    <line x1="0" y1="191.5" x2="900" y2="191.5" stroke="#fff" stroke-width="2"/>
  </g>
  
  <!-- 左侧装饰条 -->
  <rect x="0" y="0" width="8" height="383" fill="url(#debateGrad)"/>
  
  <!-- 年代标签 -->
  <rect x="50" y="40" width="100" height="36" rx="18" fill="#e96443" opacity="0.9"/>
  <text x="100" y="65" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">
    1992
  </text>
  
  <!-- 主标题 -->
  <text x="50" y="130" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="42" font-weight="bold" fill="#ecf0f1">
    Linux 演进史（四）
  </text>
  
  <!-- 副标题 -->
  <text x="50" y="185" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="22" fill="#e96443">
    世纪学术之辩——微内核与宏内核之争
  </text>
  
  <!-- 分隔线 -->
  <rect x="50" y="215" width="500" height="2" fill="#904e95" opacity="0.6"/>
  
  <!-- 关键词 -->
  <text x="50" y="260" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#bdc3c7">
    Tanenbaum vs Torvalds | "Linux is obsolete"
  </text>
  <text x="50" y="285" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#bdc3c7">
    Microkernel | Monolithic Kernel | 学术派 vs 实用派
  </text>
  
  <!-- 右侧架构对比图 -->
  <g transform="translate(580, 50)">
    <!-- 微内核 -->
    <g transform="translate(0, 0)">
      <text x="70" y="20" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#e96443" text-anchor="middle" font-weight="bold">微内核</text>
      <rect x="20" y="35" width="100" height="100" fill="#34495e" rx="5"/>
      <rect x="55" y="70" width="30" height="30" fill="#e96443" rx="3"/>
      <rect x="25" y="40" width="25" height="15" fill="#3498db" rx="2"/>
      <rect x="90" y="40" width="25" height="15" fill="#3498db" rx="2"/>
      <rect x="25" y="115" width="25" height="15" fill="#3498db" rx="2"/>
      <rect x="90" y="115" width="25" height="15" fill="#3498db" rx="2"/>
      <text x="70" y="90" font-family="Courier New, monospace" font-size="8" fill="#fff" text-anchor="middle">IPC</text>
    </g>
    
    <!-- VS -->
    <text x="160" y="100" font-family="Impact, sans-serif" font-size="28" fill="#fff" text-anchor="middle">VS</text>
    
    <!-- 宏内核 -->
    <g transform="translate(180, 0)">
      <text x="70" y="20" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#904e95" text-anchor="middle" font-weight="bold">宏内核</text>
      <rect x="20" y="35" width="100" height="100" fill="#904e95" rx="5"/>
      <rect x="25" y="40" width="90" height="90" fill="#2c3e50" rx="3"/>
      <rect x="30" y="45" width="35" height="20" fill="#27ae60" rx="2"/>
      <rect x="75" y="45" width="35" height="20" fill="#f39c12" rx="2"/>
      <rect x="30" y="70" width="35" height="20" fill="#3498db" rx="2"/>
      <rect x="75" y="70" width="35" height="20" fill="#e74c3c" rx="2"/>
      <rect x="30" y="95" width="80" height="30" fill="#9b59b6" rx="2"/>
      <text x="70" y="115" font-family="Courier New, monospace" font-size="8" fill="#fff" text-anchor="middle">KERNEL</text>
    </g>
  </g>
  
  <!-- 底部引言 -->
  <rect x="50" y="310" width="600" height="50" rx="5" fill="#2c3e50" opacity="0.6"/>
  <text x="70" y="335" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#ecf0f1" font-style="italic">
    "Linux 已经过时了" — Tanenbaum
  </text>
  <text x="70" y="355" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#7f8c8d">
    一场改变 Linux 命运的学术争论
  </text>
</svg>