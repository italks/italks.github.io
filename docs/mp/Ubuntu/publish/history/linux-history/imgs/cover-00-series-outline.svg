<svg xmlns="http://www.w3.org/2000/svg" width="900" height="383" viewBox="0 0 900 383">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f39c12"/>
      <stop offset="100%" style="stop-color:#e74c3c"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="383" fill="url(#bgGrad)"/>
  
  <!-- 装饰线条 -->
  <rect x="0" y="0" width="8" height="383" fill="url(#accentGrad)"/>
  
  <!-- 企鹅图标 -->
  <g transform="translate(750, 80)">
    <!-- 企鹅身体 -->
    <ellipse cx="60" cy="110" rx="50" ry="70" fill="#2c3e50"/>
    <ellipse cx="60" cy="120" rx="35" ry="50" fill="#ecf0f1"/>
    <!-- 眼睛 -->
    <circle cx="45" cy="90" r="8" fill="#ecf0f1"/>
    <circle cx="75" cy="90" r="8" fill="#ecf0f1"/>
    <circle cx="47" cy="92" r="4" fill="#2c3e50"/>
    <circle cx="77" cy="92" r="4" fill="#2c3e50"/>
    <!-- 嘴 -->
    <path d="M50 105 L60 115 L70 105 Z" fill="#f39c12"/>
    <!-- 脚 -->
    <ellipse cx="45" cy="175" rx="15" ry="8" fill="#f39c12"/>
    <ellipse cx="75" cy="175" rx="15" ry="8" fill="#f39c12"/>
  </g>
  
  <!-- 主标题 -->
  <text x="50" y="120" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="48" font-weight="bold" fill="#ecf0f1">
    Linux 演进史
  </text>
  
  <!-- 副标题 -->
  <text x="50" y="180" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="24" fill="#bdc3c7">
    从个人黑客到统治世界的开源传奇历程
  </text>
  
  <!-- 分隔线 -->
  <rect x="50" y="210" width="600" height="2" fill="#e74c3c" opacity="0.5"/>
  
  <!-- 底部说明 -->
  <text x="50" y="280" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" fill="#7f8c8d">
    穿越时光，见证开源传奇的诞生与崛起
  </text>
  <text x="50" y="310" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#5d6d7e">
    全系列八篇连载 | 从黑客文化到云计算霸主
  </text>
  
  <!-- 装饰元素 - 时间线 -->
  <g opacity="0.3">
    <line x1="50" y1="340" x2="700" y2="340" stroke="#f39c12" stroke-width="1"/>
    <circle cx="50" cy="340" r="4" fill="#f39c12"/>
    <circle cx="150" cy="340" r="4" fill="#f39c12"/>
    <circle cx="250" cy="340" r="4" fill="#f39c12"/>
    <circle cx="350" cy="340" r="4" fill="#f39c12"/>
    <circle cx="450" cy="340" r="4" fill="#f39c12"/>
    <circle cx="550" cy="340" r="4" fill="#f39c12"/>
    <circle cx="650" cy="340" r="4" fill="#f39c12"/>
    <circle cx="700" cy="340" r="4" fill="#e74c3c"/>
  </g>
</svg>