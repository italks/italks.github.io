<svg xmlns="http://www.w3.org/2000/svg" width="900" height="383" viewBox="0 0 900 383">
  <defs>
    <linearGradient id="bgGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f1c2c"/>
      <stop offset="100%" style="stop-color:#928DAB"/>
    </linearGradient>
    <linearGradient id="bazaarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#11998e"/>
      <stop offset="100%" style="stop-color:#38ef7d"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="383" fill="url(#bgGrad5)"/>

  <!-- 左侧装饰条 -->
  <rect x="0" y="0" width="8" height="383" fill="url(#bazaarGrad)"/>

  <!-- 年代标签 -->
  <rect x="50" y="40" width="120" height="36" rx="18" fill="#11998e" opacity="0.9"/>
  <text x="110" y="65" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">
    1993-1998
  </text>

  <!-- 主标题 -->
  <text x="50" y="130" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="42" font-weight="bold" fill="#ecf0f1">
    Linux 演进史（五）
  </text>

  <!-- 副标题 -->
  <text x="50" y="175" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="18" fill="#38ef7d">
    一群散兵游勇，如何打败微软帝国？
  </text>

  <!-- 分隔线 -->
  <rect x="50" y="205" width="500" height="2" fill="#11998e" opacity="0.6"/>

  <!-- 关键词 -->
  <text x="50" y="245" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#bdc3c7">
    Eric S. Raymond | 林纳斯定律 | Linus's Law
  </text>
  <text x="50" y="270" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#bdc3c7">
    大教堂 vs 集市 | Netscape 开源 | 敏捷开发
  </text>

  <!-- 右侧对比图 -->
  <g transform="translate(580, 60)">
    <!-- 微软帝国 -->
    <g transform="translate(0, 0)">
      <text x="70" y="20" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#928DAB" text-anchor="middle" font-weight="bold">微软帝国</text>
      <!-- 大厦 -->
      <rect x="30" y="40" width="80" height="120" fill="#5D4E6D" rx="3"/>
      <rect x="40" y="50" width="15" height="20" fill="#3498db"/>
      <rect x="60" y="50" width="15" height="20" fill="#3498db"/>
      <rect x="80" y="50" width="15" height="20" fill="#3498db"/>
      <rect x="40" y="80" width="15" height="20" fill="#3498db"/>
      <rect x="60" y="80" width="15" height="20" fill="#3498db"/>
      <rect x="80" y="80" width="15" height="20" fill="#3498db"/>
      <rect x="40" y="110" width="15" height="20" fill="#3498db"/>
      <rect x="60" y="110" width="15" height="20" fill="#3498db"/>
      <rect x="80" y="110" width="15" height="20" fill="#3498db"/>
      <rect x="50" y="140" width="40" height="20" fill="#2c3e50"/>
      <text x="70" y="175" font-family="Courier New, monospace" font-size="10" fill="#928DAB" text-anchor="middle">$$$</text>
    </g>

    <!-- VS -->
    <text x="160" y="110" font-family="Impact, sans-serif" font-size="28" fill="#fff" text-anchor="middle">VS</text>

    <!-- 开源社区 -->
    <g transform="translate(190, 0)">
      <text x="70" y="20" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#38ef7d" text-anchor="middle" font-weight="bold">开源社区</text>
      <!-- 多个小人 -->
      <circle cx="30" cy="60" r="12" fill="#27ae60"/>
      <circle cx="70" cy="50" r="12" fill="#3498db"/>
      <circle cx="110" cy="65" r="12" fill="#f39c12"/>
      <circle cx="50" cy="100" r="12" fill="#e74c3c"/>
      <circle cx="90" cy="95" r="12" fill="#9b59b6"/>
      <circle cx="70" cy="130" r="12" fill="#1abc9c"/>
      <!-- 连接线 -->
      <line x1="30" y1="72" x2="70" y2="62" stroke="#38ef7d" stroke-width="1" opacity="0.6"/>
      <line x1="70" y1="62" x2="110" y2="77" stroke="#38ef7d" stroke-width="1" opacity="0.6"/>
      <line x1="50" y1="112" x2="90" y2="107" stroke="#38ef7d" stroke-width="1" opacity="0.6"/>
      <line x1="70" y1="142" x2="90" y2="107" stroke="#38ef7d" stroke-width="1" opacity="0.6"/>
      <text x="70" y="175" font-family="Courier New, monospace" font-size="10" fill="#38ef7d" text-anchor="middle">FREE</text>
    </g>
  </g>

  <!-- 底部引言 -->
  <rect x="50" y="310" width="600" height="50" rx="5" fill="#1f1c2c" opacity="0.6"/>
  <text x="70" y="335" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#ecf0f1" font-style="italic">
    "只要有足够多的眼球，所有的 Bug 都将浮出水面"
  </text>
  <text x="70" y="355" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#7f8c8d">
    —— 林纳斯定律 (Linus's Law)
  </text>

</svg>
