<svg xmlns="http://www.w3.org/2000/svg" width="900" height="383" viewBox="0 0 900 383">
  <defs>
    <linearGradient id="bgGrad6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#2d2d2d"/>
    </linearGradient>
    <linearGradient id="redhatGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#cc0000"/>
      <stop offset="100%" style="stop-color:#ff0000"/>
    </linearGradient>
    <linearGradient id="moneyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f1c40f"/>
      <stop offset="100%" style="stop-color:#f39c12"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="383" fill="url(#bgGrad6)"/>
  
  <!-- 装饰性上升线条 -->
  <g opacity="0.1">
    <polyline points="700,350 720,300 740,320 760,250 780,270 800,180 820,200 840,100" stroke="#cc0000" stroke-width="3" fill="none"/>
    <polyline points="650,350 670,320 690,340 710,280 730,300 750,220 770,240 790,150" stroke="#f1c40f" stroke-width="2" fill="none"/>
  </g>
  
  <!-- 左侧装饰条 -->
  <rect x="0" y="0" width="8" height="383" fill="url(#redhatGrad)"/>
  
  <!-- 年代标签 -->
  <rect x="50" y="40" width="120" height="36" rx="18" fill="#cc0000" opacity="0.9"/>
  <text x="110" y="65" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">
    1999-2002
  </text>
  
  <!-- 主标题 -->
  <text x="50" y="130" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="42" font-weight="bold" fill="#ecf0f1">
    Linux 演进史（六）
  </text>
  
  <!-- 副标题 -->
  <text x="50" y="185" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="22" fill="#cc0000">
    资本入局与巨头的恐惧——红帽崛起
  </text>
  
  <!-- 分隔线 -->
  <rect x="50" y="215" width="500" height="2" fill="#cc0000" opacity="0.6"/>
  
  <!-- 关键词 -->
  <text x="50" y="260" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#bdc3c7">
    Red Hat 上市 | IBM 10亿投资 | 商业模式创新
  </text>
  <text x="50" y="285" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#bdc3c7">
    万圣节文件 | 微软恐惧 | 软件免费服务收费
  </text>
  
  <!-- 右侧红帽图标 -->
  <g transform="translate(680, 70)">
    <!-- 红帽 -->
    <ellipse cx="70" cy="150" rx="60" ry="15" fill="#8B0000"/>
    <path d="M20 150 Q20 80 70 70 Q120 80 120 150 Z" fill="#cc0000"/>
    <path d="M20 150 Q20 140 70 135 Q120 140 120 150" fill="#8B0000"/>
    <!-- 帽带 -->
    <rect x="15" y="130" width="110" height="15" fill="#2c3e50"/>
    <!-- 阴影 -->
    <ellipse cx="70" cy="165" rx="55" ry="8" fill="#1a1a1a" opacity="0.3"/>
    <!-- Red Hat 文字 -->
    <text x="70" y="200" font-family="Impact, sans-serif" font-size="28" fill="#cc0000" text-anchor="middle" font-weight="bold">RED HAT</text>
    <!-- 上升箭头 -->
    <g transform="translate(120, 20)">
      <polygon points="20,0 40,30 30,30 30,60 10,60 10,30 0,30" fill="url(#moneyGrad)" opacity="0.8"/>
    </g>
  </g>
  
  <!-- 底部重要信息 -->
  <rect x="50" y="310" width="600" height="50" rx="5" fill="#cc0000" opacity="0.3"/>
  <text x="70" y="335" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#f1c40f">
    📈 1999年8月11日 红帽纳斯达克上市
  </text>
  <text x="70" y="355" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#bdc3c7">
    "软件免费，服务收费" — 开源商业模式的胜利
  </text>
</svg>