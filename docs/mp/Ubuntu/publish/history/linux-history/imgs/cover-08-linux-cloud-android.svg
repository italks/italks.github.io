<svg xmlns="http://www.w3.org/2000/svg" width="900" height="383" viewBox="0 0 900 383">
  <defs>
    <linearGradient id="bgGrad8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#3a7bd5"/>
    </linearGradient>
    <linearGradient id="androidGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e063"/>
      <stop offset="100%" style="stop-color:#56ab2f"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="383" fill="url(#bgGrad8)"/>
  
  <!-- 星空效果 -->
  <g opacity="0.3">
    <circle cx="100" cy="50" r="1.5" fill="#fff"/>
    <circle cx="200" cy="80" r="1" fill="#fff"/>
    <circle cx="350" cy="40" r="1.5" fill="#fff"/>
    <circle cx="500" cy="70" r="1" fill="#fff"/>
    <circle cx="650" cy="45" r="1.5" fill="#fff"/>
    <circle cx="800" cy="85" r="1" fill="#fff"/>
    <circle cx="750" cy="30" r="1" fill="#fff"/>
    <circle cx="450" cy="25" r="1" fill="#fff"/>
    <circle cx="300" cy="90" r="1" fill="#fff"/>
  </g>
  
  <!-- 左侧装饰条 -->
  <rect x="0" y="0" width="8" height="383" fill="url(#cloudGrad)"/>
  
  <!-- 年代标签 -->
  <rect x="50" y="40" width="130" height="36" rx="18" fill="#00d2ff" opacity="0.9"/>
  <text x="115" y="65" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">
    2008-至今
  </text>
  
  <!-- 主标题 -->
  <text x="50" y="130" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="42" font-weight="bold" fill="#ecf0f1">
    Linux 演进史（八）
  </text>
  
  <!-- 副标题 -->
  <text x="50" y="185" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="22" fill="#00d2ff">
    吞噬世界的企鹅——从移动端到云端霸主
  </text>
  
  <!-- 分隔线 -->
  <rect x="50" y="215" width="500" height="2" fill="#3a7bd5" opacity="0.6"/>
  
  <!-- 关键词 -->
  <text x="50" y="260" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#bdc3c7">
    Android | Docker | Kubernetes
  </text>
  <text x="50" y="285" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#bdc3c7">
    AWS | 公有云 | Top 500 超算 | AI 算力底座
  </text>
  
  <!-- 右侧云与Android组合图 -->
  <g transform="translate(600, 40)">
    <!-- 云朵 -->
    <g transform="translate(0, 0)">
      <ellipse cx="100" cy="80" rx="60" ry="35" fill="url(#cloudGrad)" opacity="0.8"/>
      <ellipse cx="60" cy="90" rx="40" ry="25" fill="url(#cloudGrad)" opacity="0.8"/>
      <ellipse cx="140" cy="90" rx="40" ry="25" fill="url(#cloudGrad)" opacity="0.8"/>
      <ellipse cx="100" cy="100" rx="50" ry="20" fill="url(#cloudGrad)" opacity="0.8"/>
      <!-- 云朵内的小图标 -->
      <text x="100" y="85" font-family="Arial, sans-serif" font-size="18" fill="#fff" text-anchor="middle">☁️</text>
      <text x="60" y="95" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle">AWS</text>
      <text x="140" y="95" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">K8S</text>
    </g>
    
    <!-- Android 机器人 -->
    <g transform="translate(40, 120)">
      <!-- 身体 -->
      <rect x="30" y="30" width="60" height="50" rx="5" fill="url(#androidGrad)"/>
      <!-- 头 -->
      <path d="M30 30 Q30 5 60 5 Q90 5 90 30 Z" fill="url(#androidGrad)"/>
      <!-- 眼睛 -->
      <circle cx="45" cy="20" r="5" fill="#fff"/>
      <circle cx="75" cy="20" r="5" fill="#fff"/>
      <!-- 天线 -->
      <line x1="45" y1="5" x2="40" y2="-5" stroke="url(#androidGrad)" stroke-width="3" stroke-linecap="round"/>
      <line x1="75" y1="5" x2="80" y2="-5" stroke="url(#androidGrad)" stroke-width="3" stroke-linecap="round"/>
      <!-- 手臂 -->
      <rect x="10" y="35" width="15" height="40" rx="7" fill="url(#androidGrad)"/>
      <rect x="95" y="35" width="15" height="40" rx="7" fill="url(#androidGrad)"/>
      <!-- 腿 -->
      <rect x="38" y="80" width="15" height="30" rx="5" fill="url(#androidGrad)"/>
      <rect x="67" y="80" width="15" height="30" rx="5" fill="url(#androidGrad)"/>
    </g>
    
    <!-- 连接线 -->
    <path d="M100 115 Q100 130 100 140" stroke="#00d2ff" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
  </g>
  
  <!-- 底部统计信息 -->
  <rect x="50" y="310" width="600" height="50" rx="5" fill="#0f0c29" opacity="0.8"/>
  <text x="70" y="335" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#00d2ff">
    🌍 30亿+ 设备 | 🖥️ Top 500 超算 100% | ☁️ 云计算绝对霸主
  </text>
  <text x="70" y="355" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#7f8c8d">
    从移动端到云端，Linux 成为人类数字基础设施的底座
  </text>
</svg>