<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="200" viewBox="0 0 1200 200">
  <defs>
    <!-- 主渐变背景 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/>
      <stop offset="50%" style="stop-color:#1a1a4e"/>
      <stop offset="100%" style="stop-color:#2d1b4e"/>
    </linearGradient>
    
    <!-- 橙色高光渐变 -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="50%" style="stop-color:#f7931e"/>
      <stop offset="100%" style="stop-color:#ffcc00"/>
    </linearGradient>
    
    <!-- 节点发光效果 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 强发光 -->
    <filter id="strongGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 网格图案 -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="200" fill="url(#bgGrad)"/>
  <rect width="1200" height="200" fill="url(#grid)"/>
  
  <!-- 装饰性光晕 -->
  <ellipse cx="150" cy="100" rx="200" ry="120" fill="rgba(99,102,241,0.08)"/>
  <ellipse cx="1050" cy="100" rx="250" ry="140" fill="rgba(249,115,22,0.06)"/>
  
  <!-- 连接线 - Agent网络 -->
  <g stroke="rgba(99,102,241,0.3)" stroke-width="1" fill="none">
    <!-- 左侧网络 -->
    <line x1="180" y1="60" x2="280" y2="90"/>
    <line x1="180" y1="60" x2="240" y2="130"/>
    <line x1="280" y1="90" x2="240" y2="130"/>
    <line x1="280" y1="90" x2="350" y2="70"/>
    <line x1="240" y1="130" x2="340" y2="140"/>
    <line x1="350" y1="70" x2="420" y2="100"/>
    
    <!-- 右侧网络 -->
    <line x1="780" y1="65" x2="850" y2="95"/>
    <line x1="780" y1="65" x2="820" y2="135"/>
    <line x1="850" y1="95" x2="820" y2="135"/>
    <line x1="850" y1="95" x2="930" y2="75"/>
    <line x1="820" y1="135" x2="900" y2="145"/>
    <line x1="930" y1="75" x2="1000" y2="100"/>
  </g>
  
  <!-- 数据流动线条 -->
  <g stroke="url(#accentGrad)" stroke-width="2" fill="none" opacity="0.6">
    <path d="M 380 100 Q 450 80 520 100 Q 590 120 660 100" stroke-dasharray="8,4">
      <animate attributeName="stroke-dashoffset" from="0" to="24" dur="2s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- AI节点 - 左侧 -->
  <g filter="url(#glow)">
    <circle cx="180" cy="60" r="10" fill="#6366f1" opacity="0.9"/>
    <circle cx="280" cy="90" r="14" fill="#818cf8" opacity="0.85"/>
    <circle cx="240" cy="130" r="8" fill="#a5b4fc" opacity="0.8"/>
    <circle cx="350" cy="70" r="11" fill="#6366f1" opacity="0.9"/>
    <circle cx="340" cy="140" r="7" fill="#c7d2fe" opacity="0.75"/>
    <circle cx="420" cy="100" r="12" fill="#818cf8" opacity="0.85"/>
  </g>
  
  <!-- AI节点 - 右侧（橙色系） -->
  <g filter="url(#glow)">
    <circle cx="780" cy="65" r="10" fill="#f97316" opacity="0.9"/>
    <circle cx="850" cy="95" r="14" fill="#fb923c" opacity="0.85"/>
    <circle cx="820" cy="135" r="8" fill="#fdba74" opacity="0.8"/>
    <circle cx="930" cy="75" r="11" fill="#f97316" opacity="0.9"/>
    <circle cx="900" cy="145" r="7" fill="#fed7aa" opacity="0.75"/>
    <circle cx="1000" cy="100" r="12" fill="#fb923c" opacity="0.85"/>
  </g>
  
  <!-- 中央主节点 - 大脑/AI核心 -->
  <g transform="translate(590, 100)" filter="url(#strongGlow)">
    <circle cx="0" cy="0" r="35" fill="none" stroke="url(#accentGrad)" stroke-width="3" opacity="0.9">
      <animate attributeName="r" values="33;37;33" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="28" fill="rgba(249,115,22,0.15)"/>
    
    <!-- 简化的AI大脑图标 -->
    <g fill="#ffcc00" opacity="0.95">
      <ellipse cx="0" cy="-5" rx="16" ry="14"/>
      <rect x="-12" y="-2" width="24" height="16" rx="3"/>
      <line x1="-8" y1="4" x2="8" y2="4" stroke="#0a0a2e" stroke-width="2"/>
      <line x1="-5" y1="9" x2="5" y2="9" stroke="#0a0a2e" stroke-width="2"/>
      <!-- 脑电波 -->
      <path d="M -18,-12 Q -14,-18 -10,-12 Q -6,-6 -2,-12 Q 2,-18 6,-12 Q 10,-6 14,-12 Q 18,-18 18,-12" 
            fill="none" stroke="#ffcc00" stroke-width="2" opacity="0.8"/>
    </g>
  </g>
  
  <!-- 代码符号装饰 -->
  <g font-family="Monaco, 'Courier New', monospace" font-size="11" fill="rgba(255,255,255,0.15)">
    <text x="60" y="45">{ }</text>
    <text x="110" y="165">const</text>
    <text x="450" y="35">async</text>
    <text x="700" y="175">=&gt;</text>
    <text x="1030" y="50">import</text>
    <text x="1090" y="155">AI()</text>
  </g>
  
  <!-- 左侧标题区域 -->
  <text x="50" y="98" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="28" font-weight="bold" fill="white">
    2026 编程革命
  </text>
  <text x="50" y="125" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" fill="rgba(255,255,255,0.7)">
    Anthropic 重磅报告 · AI Agent 编程八大趋势
  </text>
  
  <!-- 右侧标签 -->
  <g transform="translate(1020, 70)">
    <rect x="0" y="0" width="130" height="28" rx="14" fill="rgba(249,115,22,0.2)" stroke="#f97316" stroke-width="1"/>
    <text x="65" y="19" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" fill="#fb923c" text-anchor="middle">AI 编程</text>
  </g>
  <g transform="translate(1020, 106)">
    <rect x="0" y="0" width="130" height="28" rx="14" fill="rgba(99,102,241,0.2)" stroke="#6366f1" stroke-width="1"/>
    <text x="65" y="19" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" fill="#a5b4fc" text-anchor="middle">Agent 智能体</text>
  </g>
  
  <!-- 底部分隔线 -->
  <line x1="50" y1="175" x2="1150" y2="175" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
</svg>